<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Chart — Live Crypto (Coinbase)</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root{
    --bg:#131722; --panel:#1e222d; --panel2:#181c27; --border:#2a2e39;
    --text:#d1d4dc; --muted:#787b86; --green:#26a69a; --red:#ef5350;
    --accent:#2962ff; --hover:#2a2e39;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%; font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); overflow:hidden;}
  #app{display:flex; height:100vh; width:100vw;}

  /* ── Left drawing toolbar ── */
  #toolbar{width:44px; flex-shrink:0; background:var(--bg); border-right:1px solid var(--border);
    display:flex; flex-direction:column; align-items:center; padding-top:4px; gap:1px; overflow-y:auto; z-index:30;}
  #toolbar::-webkit-scrollbar{width:0;}
  .tool{width:38px; height:34px; display:flex; align-items:center; justify-content:center;
    border-radius:5px; cursor:pointer; color:#b2b5be; position:relative;}
  .tool:hover{background:var(--hover); color:#fff;}
  .tool.active{background:#2962ff22; color:#2962ff;}
  .tool.active svg{stroke:#2962ff;}
  .tool svg{width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:1.6; pointer-events:none;}
  .tool .badge{position:absolute; bottom:2px; right:3px; font-size:7px; color:var(--muted);}
  .tool-sep{width:24px; height:1px; background:var(--border); margin:4px 0;}

  #topbar{position:absolute; top:0; left:44px; right:300px; height:46px; background:var(--bg);
    border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; padding:0 12px; z-index:20;}
  #symbolBox{font-weight:700; font-size:15px; letter-spacing:.3px; white-space:nowrap;}
  #symbolBox .exch{color:var(--muted); font-weight:400; font-size:12px; margin-left:6px;}
  .tf-group{display:flex; gap:2px; margin-left:8px;}
  .tf{padding:5px 9px; font-size:12px; border-radius:4px; cursor:pointer; color:var(--muted); user-select:none;}
  .tf:hover{background:var(--hover); color:var(--text);}
  .tf.active{background:var(--accent); color:#fff;}
  #maLegend{font-size:11px; margin-left:12px; white-space:nowrap;}
  #maLegend span{margin-right:8px;}
  #ohlc{font-size:11px; color:var(--muted); margin-left:10px; white-space:nowrap;}
  #ohlc b{color:var(--text); font-weight:600;}
  #status{margin-left:auto; font-size:11px; color:var(--muted); white-space:nowrap;}
  .dot{display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--green); margin-right:5px; vertical-align:middle;}

  #main{flex:1; position:relative; padding-top:46px;}
  #chartWrap{width:100%;}
  #chart{width:100%; height:100%;}
  #draw{cursor:crosshair;}
  #rsiWrap{height:32%; border-top:1px solid var(--border); position:relative;}
  #rsiLabel{position:absolute; top:6px; left:10px; font-size:11px; color:var(--muted); z-index:5;}
  #rsiLabel b{font-weight:600;}
  #rsi{width:100%; height:100%;}

  #watchlist{width:300px; background:var(--panel); border-left:1px solid var(--border);
    display:flex; flex-direction:column; overflow:hidden;}
  #wlHead{padding:10px 12px; font-size:13px; font-weight:600; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;}
  #wlHead .sub{font-size:10px; color:var(--muted); font-weight:400;}
  #wlCols{display:flex; padding:6px 12px 6px 14px; font-size:11px; color:var(--muted);
    border-bottom:1px solid var(--border);}
  #wlCols .c1{flex:1;} #wlCols .c2{width:78px; text-align:right;}
  #wlCols .c3{width:66px; text-align:right;} #wlCols .c4{width:54px; text-align:right;}
  #wlBody{flex:1; overflow-y:auto;}
  .section{padding:7px 12px 5px 14px; font-size:11px; color:var(--muted); background:transparent;
    letter-spacing:.4px; border-bottom:1px solid rgba(42,46,57,.5);}
  .row{display:flex; align-items:center; padding:6px 12px 6px 14px; cursor:pointer;}
  .row:hover{background:var(--hover);}
  .row.active{background:#1c2c4a;}
  .row .sym{flex:1; display:flex; align-items:center; gap:9px; min-width:0;}
  .row .sym .nm{font-size:13px; font-weight:500; color:#d1d4dc; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .row .ic{width:20px; height:20px; border-radius:50%; flex-shrink:0; object-fit:contain;
    background:#2a2e39; color:#fff; font-size:9px; display:flex; align-items:center;
    justify-content:center; font-weight:700;}
  .row .last{width:78px; text-align:right; font-size:13px; font-variant-numeric:tabular-nums; color:#d1d4dc;}
  .row .chgabs{width:66px; text-align:right; font-size:12px; font-variant-numeric:tabular-nums;}
  .row .chg{width:54px; text-align:right; font-size:12px; font-variant-numeric:tabular-nums;}
  .up{color:#26a69a;} .down{color:#ef5350;}
  #wlBody::-webkit-scrollbar{width:8px;}
  #wlBody::-webkit-scrollbar-thumb{background:var(--border); border-radius:4px;}
  .flash-up{animation:fu .6s;} .flash-down{animation:fd .6s;}
  @keyframes fu{0%{background:rgba(38,166,154,.25);}100%{background:transparent;}}
  @keyframes fd{0%{background:rgba(239,83,80,.25);}100%{background:transparent;}}
</style>
</head>
<body>
<div id="app">
  <div id="toolbar"></div>
  <div id="main">
    <div id="topbar">
      <span id="symbolBox"><span id="symName">NEAR-USD/INJ-USD</span><span class="exch">· Coinbase · <span id="tfName">1D</span></span></span>
      <div class="tf-group" id="tfGroup">
        <span class="tf" data-i="1m">1m</span>
        <span class="tf" data-i="5m">5m</span>
        <span class="tf" data-i="15m">15m</span>
        <span class="tf" data-i="1h">1H</span>
        <span class="tf" data-i="4h">4H</span>
        <span class="tf" data-i="6h">6H</span>
        <span class="tf" data-i="12h">12H</span>
        <span class="tf active" data-i="1d">1D</span>
        <span class="tf" data-i="1w">1W</span>
      </div>
      <span id="maLegend"></span>
      <span id="ohlc"></span>
      <span id="status"><span class="dot"></span>Live · Coinbase API</span>
    </div>
    <div id="chartWrap" style="position:relative; height:68%;">
      <div id="chart" style="position:absolute; inset:0;"></div>
      <canvas id="draw" style="position:absolute; inset:0; pointer-events:none; z-index:10;"></canvas>
    </div>
    <div id="rsiWrap">
      <div id="rsiLabel">RSI 14 close <b id="rsiVal" style="color:#7e57c2">—</b> <b id="rsiMaVal" style="color:#e0a82e">—</b></div>
      <div id="rsi"></div>
    </div>
  </div>

  <div id="watchlist">
    <div id="wlHead">comeback <span class="sub">▾</span></div>
    <div id="wlCols"><span class="c1">Symbol</span><span class="c2">Last</span><span class="c3">Chg</span><span class="c4">Chg%</span></div>
    <div id="wlBody"></div>
  </div>
</div>

<script>
// ── Coinbase Exchange public API (no key, no paywall) ──
const API = "https://api.exchange.coinbase.com";

// Coinbase uses BASE-USD. Watchlist mirrors the TradingView "comeback" layout.
// Symbols Coinbase doesn't list (XVG, XMR, NIL, DUSK) still appear but show "—".
const GROUPS = [
  { name:"SPREADS", symbols:["NEAR-USD/INJ-USD"] },
  { name:"MEME",    symbols:["BONK-USD"] },
  { name:"PRIVACY", symbols:["XVG-USD","DASH-USD","XMR-USD","NIL-USD","ZEC-USD","HYPE-USD"] },
  { name:"OMEGA",   symbols:["TON-USD","HBAR-USD","SUI-USD","XLM-USD","SEI-USD"] },
  { name:"ALPHA",   symbols:["FET-USD","DUSK-USD","RENDER-USD","ASTER-USD","TAO-USD","INJ-USD","NEAR-USD"] },
  { name:"SECTION 2", symbols:["BTC-USD","XRP-USD","BNB-USD","ETH-USD","LINK-USD","BCH-USD","SOL-USD"] },
  { name:"BTC PAIRS", symbols:["ETH-BTC","SOL-BTC","LINK-BTC"] },
  { name:"SECTION 3", symbols:["ADA-USD","DOGE-USD","AVAX-USD","DOT-USD"] },
];
const ALL = [...new Set(GROUPS.flatMap(g=>g.symbols))];

// Coin logos from CoinCap's free icon CDN (BASE symbol, lowercased).
// ASTER isn't on CoinCap → falls back to a letter circle.
const NO_LOGO = new Set(["ASTER","NIL"]);
function logoUrl(sym){
  const base = sym.split("/")[0].split("-")[0].toLowerCase();
  return `https://assets.coincap.io/assets/icons/${base}@2x.png`;
}

let activeSymbol = "NEAR-USD/INJ-USD";
let activeTF = "1d";  // timeframe key into TF{}

// ── Chart setup ──
const chartEl = document.getElementById("chart");
const rsiEl   = document.getElementById("rsi");
const common = {
  layout:{ background:{color:"#131722"}, textColor:"#d1d4dc" },
  grid:{ vertLines:{color:"#1e222d"}, horzLines:{color:"#1e222d"} },
  rightPriceScale:{ borderColor:"#2a2e39" },
  timeScale:{ borderColor:"#2a2e39", timeVisible:true, secondsVisible:false },
  crosshair:{ mode:0 },
};
const chart = LightweightCharts.createChart(chartEl, common);
const candle = chart.addCandlestickSeries({
  upColor:"#26a69a", downColor:"#ef5350", borderVisible:false,
  wickUpColor:"#26a69a", wickDownColor:"#ef5350",
});

// TradingView shows 7/25/99 MAs + SMA 150/200/300 — recreate all six.
// MA colors matched to the TradingView screenshot:
// MA7 orange · MA25 red · MA99 green · MA150 cyan · MA200 magenta · MA300 white
const MAS = [
  { p:7,   color:"#ff9800", w:1 },   // orange
  { p:25,  color:"#e53935", w:1 },   // red
  { p:99,  color:"#43a047", w:1 },   // green
  { p:150, color:"#26c6da", w:1 },   // cyan / light blue
  { p:200, color:"#ec407a", w:1 },   // magenta / pink
  { p:300, color:"#e0e0e0", w:1 },   // white / light gray
];
const maSeries = MAS.map(m => chart.addLineSeries({
  color:m.color, lineWidth:m.w, priceLineVisible:false, lastValueVisible:true, crosshairMarkerVisible:false,
}));

// RSI panel — styled to match TradingView (overbought fill, RSI + MA, fixed scale)
const rsiChart = LightweightCharts.createChart(rsiEl, { ...common });

// Keep the panel pinned to a sensible RSI window so it reads like TradingView.
const rsiScale = () => ({ priceRange:{ minValue:18, maxValue:82 } });

// Overbought (>70) green highlight: baseline anchored at 70, fill only above it.
const rsiOver = rsiChart.addBaselineSeries({
  baseValue:{ type:"price", price:70 },
  topFillColor1:"rgba(38,166,154,0.30)", topFillColor2:"rgba(38,166,154,0.05)",
  topLineColor:"rgba(0,0,0,0)",
  bottomFillColor1:"rgba(0,0,0,0)", bottomFillColor2:"rgba(0,0,0,0)",
  bottomLineColor:"rgba(0,0,0,0)",
  priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false,
});
// Oversold (<30) red highlight: baseline at 30, fill only below it.
const rsiUnder = rsiChart.addBaselineSeries({
  baseValue:{ type:"price", price:30 },
  topFillColor1:"rgba(0,0,0,0)", topFillColor2:"rgba(0,0,0,0)",
  topLineColor:"rgba(0,0,0,0)",
  bottomFillColor1:"rgba(239,83,80,0.05)", bottomFillColor2:"rgba(239,83,80,0.30)",
  bottomLineColor:"rgba(0,0,0,0)",
  priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false,
});
// dashed 70 / 30 bands + faint 50 midline
const band70  = rsiChart.addLineSeries({ color:"#787b86", lineWidth:1, lineStyle:2, priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false });
const band30  = rsiChart.addLineSeries({ color:"#787b86", lineWidth:1, lineStyle:2, priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false });
const band50  = rsiChart.addLineSeries({ color:"#3a3e4a", lineWidth:1, lineStyle:2, priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false });
// RSI line (purple, thin) + smoothing MA (gold, thicker), added last = on top.
const rsiLine = rsiChart.addLineSeries({ color:"#9c6ade", lineWidth:1, priceLineVisible:false, lastValueVisible:true, autoscaleInfoProvider:rsiScale });
const rsiMa   = rsiChart.addLineSeries({ color:"#e6b400", lineWidth:2, priceLineVisible:false, lastValueVisible:true });

// sync the two time scales
chart.timeScale().subscribeVisibleLogicalRangeChange(r=>{ if(r) rsiChart.timeScale().setVisibleLogicalRange(r); });
rsiChart.timeScale().subscribeVisibleLogicalRangeChange(r=>{ if(r) chart.timeScale().setVisibleLogicalRange(r); });

function resize(){
  chart.applyOptions({ width:chartEl.clientWidth, height:chartEl.clientHeight });
  rsiChart.applyOptions({ width:rsiEl.clientWidth, height:rsiEl.clientHeight });
}
window.addEventListener("resize", resize);

// ── Indicator math ──
function smaSeries(data, period){
  const out=[]; let sum=0;
  for(let i=0;i<data.length;i++){
    sum+=data[i].close;
    if(i>=period) sum-=data[i-period].close;
    if(i>=period-1) out.push({ time:data[i].time, value:sum/period });
  }
  return out;
}
function rsiSeries(data, period=14){
  const out=[]; let gain=0, loss=0;
  for(let i=1;i<data.length;i++){
    const d = data[i].close - data[i-1].close;
    const up = Math.max(d,0), dn = Math.max(-d,0);
    if(i<=period){ gain+=up; loss+=dn;
      if(i===period){ gain/=period; loss/=period;
        out.push({ time:data[i].time, value: loss===0?100:100-100/(1+gain/loss) }); }
    } else {
      gain=(gain*(period-1)+up)/period;
      loss=(loss*(period-1)+dn)/period;
      out.push({ time:data[i].time, value: loss===0?100:100-100/(1+gain/loss) });
    }
  }
  return out;
}
// simple MA over an arbitrary {time,value} series (for RSI smoothing)
function maOfSeries(series, period){
  const out=[]; let sum=0;
  for(let i=0;i<series.length;i++){
    sum+=series[i].value;
    if(i>=period) sum-=series[i-period].value;
    if(i>=period-1) out.push({ time:series[i].time, value:sum/period });
  }
  return out;
}

// ── Data loading (Coinbase) ──
// Coinbase candle = [time(s), low, high, open, close, volume], newest-first, ≤300 per call.
// Native granularities only: 1m,5m,15m,1h,6h,1d. 4h/12h/1w are AGGREGATED from a base.
//   base   = native granularity (sec) we actually fetch
//   bucket = target bar size (sec); if === base, no aggregation
//   pages  = how many ≤300-bar windows to paginate for depth
// pages tuned to Coinbase's real max depth per granularity (loop stops early on empty,
// so slightly over-asking is harmless). Every TF now pulls far more history than before.
const TF = {
  "1m":  { label:"1m",  base:60,    bucket:60,     pages:26 },  // ~7k bars (Coinbase caps 1m history)
  "5m":  { label:"5m",  base:300,   bucket:300,    pages:36 },  // ~10k bars (~1 month)
  "15m": { label:"15m", base:900,   bucket:900,    pages:18 },  // ~5k bars
  "1h":  { label:"1H",  base:3600,  bucket:3600,   pages:36 },  // ~10k bars (back to 2025)
  "4h":  { label:"4H",  base:3600,  bucket:14400,  pages:36 },  // 4×1h, deep
  "6h":  { label:"6H",  base:21600, bucket:21600,  pages:20 },  // ~5.5k bars (to 2022)
  "12h": { label:"12H", base:21600, bucket:43200,  pages:20 },  // 2×6h, to 2022
  "1d":  { label:"1D",  base:86400, bucket:86400,  pages:9 },   // ~1.4k bars (to 2022)
  "1w":  { label:"1W",  base:86400, bucket:604800, pages:9 },   // 7×1d
};

function parseCandlesAgg(raw){
  if(!Array.isArray(raw)) return [];
  return raw.map(k=>({ time:k[0], low:+k[1], high:+k[2], open:+k[3], close:+k[4] }));
}

// Roll base bars up into fixed-size buckets aligned to epoch.
function aggregate(bars, base, bucket){
  if(bucket === base) return bars;
  const groups = {};
  for(const b of bars){
    const t = Math.floor(b.time / bucket) * bucket;   // bucket start
    const g = groups[t] || (groups[t] = { time:t, open:b.open, high:b.high, low:b.low, close:b.close, _first:b.time, _last:b.time });
    if(b.time <= g._first){ g.open = b.open; g._first = b.time; }
    if(b.time >= g._last ){ g.close = b.close; g._last = b.time; }
    if(b.high > g.high) g.high = b.high;
    if(b.low  < g.low ) g.low  = b.low;
  }
  return Object.values(groups)
    .map(({_first,_last,...g})=>g)
    .sort((a,b)=>a.time-b.time);
}


// ── Bad-print filter ──
// Exchange feeds occasionally emit a single corrupt candle with an impossible
// high/low (e.g. INJ 2025-11-08 printed a 14.75 high on a day it opened 7.68 /
// closed 7.44). Dividing that into a ratio creates a fake spike. We clamp any
// wick that exceeds ~4× the LOCAL-median wick of its neighbors (genuine
// volatility is allowed; lone glitches are pulled back in line).
function median(arr){
  if(!arr.length) return 0;
  const s=[...arr].sort((a,b)=>a-b), m=s.length>>1;
  return s.length%2 ? s[m] : (s[m-1]+s[m])/2;
}
function sanitize(bars){
  const N=bars.length, W=10, K=4, MINW=0.15;   // window radius, slack factor, min allowed wick
  if(N<6) return bars;
  const upW=bars.map(k=>{const t=Math.max(k.open,k.close); return t? (k.high-t)/t : 0;});
  const dnW=bars.map(k=>{const b=Math.min(k.open,k.close); return b? (b-k.low)/b : 0;});
  const out=bars.map(k=>({...k}));
  for(let i=0;i<N;i++){
    const lo=Math.max(0,i-W), hi=Math.min(N,i+W+1);
    const u=[],d=[]; for(let j=lo;j<hi;j++) if(j!==i){ u.push(upW[j]); d.push(dnW[j]); }
    const top=Math.max(out[i].open,out[i].close), bot=Math.min(out[i].open,out[i].close);
    const upCap=top*(1+Math.max(median(u)*K, MINW));
    const dnFloor=bot*(1-Math.max(median(d)*K, MINW));
    if(out[i].high>upCap)  out[i].high=upCap;
    if(out[i].low<dnFloor) out[i].low=dnFloor;
  }
  return out;
}

async function fetchKlines(product, tfKey){
  const tf = TF[tfKey] || TF["1d"];
  const g = tf.base;
  const span = 300 * g;                 // seconds covered by one full page
  let end = null;                       // null = newest; Coinbase returns latest
  const all = [];
  for(let i=0; i<tf.pages; i++){
    const qs = end===null
      ? `granularity=${g}`
      : `granularity=${g}&start=${end-span}&end=${end}`;
    let raw;
    try{
      const res = await fetch(`${API}/products/${product}/candles?${qs}`);
      raw = await res.json();
    }catch{ break; }
    const page = parseCandlesAgg(raw);
    if(!page.length) break;
    all.push(...page);
    end = Math.min(...page.map(k=>k.time)) - g;   // step strictly before the oldest bar we got
    if(page.length < 200) break;                  // short page = reached start of history; stop early
  }
  // dedupe by time, oldest-first
  const seen = {};
  const out = [];
  for(const k of all){ if(seen[k.time]) continue; seen[k.time]=1; out.push(k); }
  out.sort((a,b)=>a.time-b.time);
  if(!out.length) throw new Error("No data for "+product);
  const clean = sanitize(out);                  // strip corrupt bad-print wicks
  return aggregate(clean, tf.base, tf.bucket);  // roll up to 4h/12h/1w if needed
}

// Build synthetic A/B ratio (spread) by aligning candles on matching timestamps
function makeRatio(a, b){
  const bm = {}; b.forEach(k=>bm[k.time]=k);
  const out=[];
  for(const k of a){
    const q = bm[k.time];
    if(!q || !q.open || !q.close || !q.high || !q.low) continue;
    // TradingView spread = component-wise division (NOT high/low cross terms,
    // which falsely assume A peaks the instant B bottoms → fake giant wicks).
    const o = k.open/q.open;
    const c = k.close/q.close;
    let hi = k.high/q.high;
    let lo = k.low/q.low;
    if(lo > hi) [lo, hi] = [hi, lo];          // guard if division flips order
    // wick must still envelope the real open & close
    hi = Math.max(hi, o, c);
    lo = Math.min(lo, o, c);
    out.push({ time:k.time, open:o, high:hi, low:lo, close:c });
  }
  return out;
}

function fmt(v){ return v>=100 ? v.toFixed(2) : v>=1 ? v.toFixed(3) : v.toPrecision(4); }

async function loadChart(symbol, tf){
  document.getElementById("symName").textContent = symbol;
  document.getElementById("tfName").textContent = (TF[tf]||{}).label || tf;
  try{
    let data;
    if(symbol.includes("/")){
      const [a,b] = symbol.split("/");
      const [ka,kb] = await Promise.all([fetchKlines(a,tf), fetchKlines(b,tf)]);
      data = makeRatio(ka, kb);
      if(!data.length) throw new Error("No overlapping data for "+symbol);
    } else {
      data = await fetchKlines(symbol, tf);
    }
    candle.setData(data);
    lastData = data;                 // expose to the drawing engine (magnet/measure/extrapolation)
    if(typeof redraw==="function") redraw();

    // moving averages
    const legend=[];
    maSeries.forEach((s,i)=>{
      const m = MAS[i];
      const sd = smaSeries(data, m.p);
      s.setData(sd);
      if(sd.length) legend.push(`<span style="color:${m.color}">MA${m.p} ${fmt(sd[sd.length-1].value)}</span>`);
    });
    document.getElementById("maLegend").innerHTML = legend.slice(0,6).join("");

    // RSI + smoothing MA + TradingView-style fills
    const r = rsiSeries(data, 14);
    const rm = maOfSeries(r, 14);
    rsiOver.setData(r);                                  // green fill where RSI>70
    rsiUnder.setData(r);                                 // red fill where RSI<30
    band70.setData(r.map(d=>({time:d.time, value:70})));
    band50.setData(r.map(d=>({time:d.time, value:50})));

}

// Coinbase has no bulk 24hr endpoint; use per-product /stats (24h open/last).
async function fetchStats(product){
  try{
    const r = await fetch(`${API}/products/${product}/stats`);
    const s = await r.json();
    if(!s || !s.last) return null;
    return { last:+s.last, open:+s.open };
  }catch{ return null; }
}

async function refreshPrices(){
  // resolve every leg we need (plain symbols + both sides of any ratio)
  const legs = new Set();
  ALL.forEach(sym=> sym.split("/").forEach(s=>legs.add(s)) );
  const entries = await Promise.all([...legs].map(async p=>[p, await fetchStats(p)]));
  const stats = Object.fromEntries(entries);

  ALL.forEach(sym=>{
    let price, prev;
    if(sym.includes("/")){
      const [a,b] = sym.split("/");
      const sa = stats[a], sb = stats[b];
      if(!sa || !sb) return;
      price = sa.last / sb.last;
      prev  = (sa.open && sb.open) ? sa.open/sb.open : price;
    } else {
      const s = stats[sym];
      if(!s) return;
      price = s.last;
      prev  = s.open || price;
    }
    const chgAbs = price - prev;                 // absolute change
    const chgPct = prev ? (price/prev - 1)*100 : 0;
    const up = chgAbs >= 0;
    const txt    = fmtPrice(price);
    const absTxt = (up?"+":"−") + fmtPrice(Math.abs(chgAbs));
    const pctTxt = (up?"+":"−") + Math.abs(chgPct).toFixed(2) + "%";

    (rowMap[sym]||[]).forEach(row=>{
      const lastEl = row.querySelector("[data-last]");
      const absEl  = row.querySelector("[data-chgabs]");
      const pctEl  = row.querySelector("[data-chg]");
      if(lastEl.textContent !== txt){
        row.classList.remove("flash-up","flash-down"); void row.offsetWidth;
        row.classList.add(up?"flash-up":"flash-down");
      }
      lastEl.textContent = txt;
      absEl.textContent = absTxt; absEl.className = "chgabs "+(up?"up":"down");
      pctEl.textContent = pctTxt; pctEl.className = "chg "+(up?"up":"down");
    });
  });
}

// Price formatting that preserves small-decimal precision like TradingView
// (e.g. 0.00000424, 0.05233, 1.813, 59,716.00).
function fmtPrice(v){
  const a = Math.abs(v);
  if(a === 0) return "0";
  if(a >= 1000) return v.toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2});
  if(a >= 1)    return v.toFixed(a>=100?2:3);
  if(a >= 0.001) return v.toFixed(a>=0.1?4:5);
  // very small: show enough significant digits (e.g. BONK 0.00000424)
  return v.toFixed(8).replace(/0+$/,"");
}

// ── state ──

  tool: "cross",
  magnet: false, locked: false, hidden: false,
  shapes: [],          // committed drawings (coords in {time, price})
  pending: null,       // in-progress drawing
  sel: null,           // selected shape index
  drag: null,          // {idx, pointIdx, startX, startY} when dragging a handle/body
};
const dcanvas = document.getElementById("draw");
const dctx = dcanvas.getContext("2d");

// ── build the toolbar DOM ──

function onToolClick(t, el){
  if(t.action){                       // one-shot actions (clear)
    if(t.key==="clear"){ draw.shapes=[]; draw.sel=null; redraw(); }
    return;
  }
  if(t.toggle){                       // toggles (magnet/lock/hide)
    el.classList.toggle("active");
    const on = el.classList.contains("active");
    if(t.key==="magnet") draw.magnet = on;
    if(t.key==="lock")   draw.locked = on;
    if(t.key==="hide"){  draw.hidden = on; redraw(); }
    return;
  }
  // selecting a drawing tool
  document.querySelectorAll('.tool[data-tool]').forEach(x=>{
    const k = x.dataset.tool;
    if(["magnet","lock","hide"].includes(k)) return;     // leave toggles alone
    x.classList.toggle("active", k===t.key);
  });
  draw.tool = t.key;
  draw.pending = null; draw.sel = null;
  // crosshair tool = no drawing; let chart handle events
  dcanvas.style.pointerEvents = (t.key==="cross") ? "none" : "auto";
  dcanvas.style.cursor = (t.key==="text"||t.key==="emoji") ? "text" : "crosshair";
  redraw();
}

// ── coordinate conversion (price/time ⇄ pixels) ──
function timeToX(time){ const c = chart.timeScale().timeToCoordinate(time); return c; }
function priceToY(price){ const c = candle.priceToCoordinate(price); return c; }
function xToTime(x){ return chart.timeScale().coordinateToTime(x); }
function yToPrice(y){ return candle.coordinateToPrice(y); }

// nearest candle (for magnet snapping). lastData set in loadChart.
let lastData = [];
function snap(time, price){
  if(!draw.magnet || !lastData.length) return { time, price };
  // find nearest bar by time
  let best=lastData[0], bd=Infinity;
  for(const b of lastData){ const d=Math.abs(b.time-time); if(d<bd){bd=d; best=b;} }
  // snap price to nearest OHLC of that bar
  const cand=[best.open,best.high,best.low,best.close];
  let bp=cand[0], pd=Infinity;
  for(const p of cand){ const d=Math.abs(p-price); if(d<pd){pd=d; bp=p;} }
  return { time:best.time, price:bp };
}

// resize canvas to match chart pixel size (handles DPR for crispness)
function sizeCanvas(){
  const w = dcanvas.clientWidth, h = dcanvas.clientHeight;
  const dpr = window.devicePixelRatio || 1;
  dcanvas.width = w*dpr; dcanvas.height = h*dpr;
  dctx.setTransform(dpr,0,0,dpr,0,0);
  redraw();
}

// ── pointer handling ──
function evtPt(e){
  const r = dcanvas.getBoundingClientRect();
  return { x:e.clientX-r.left, y:e.clientY-r.top };
}
function ptToCoord(p){
  let time = xToTime(p.x), price = yToPrice(p.y);
  if(time==null){ // beyond last bar: extrapolate using bar spacing
    time = estimateTimeFromX(p.x);
  }
  return snap(time, price);
}
function estimateTimeFromX(x){
  // use two known bars to extrapolate time for points past the data edge
  if(lastData.length<2) return lastData.length?lastData[lastData.length-1].time:0;
  const a=lastData[lastData.length-2], b=lastData[lastData.length-1];
  const xa=timeToX(a.time), xb=timeToX(b.time);
  if(xa==null||xb==null||xa===xb) return b.time;
  const slope=(b.time-a.time)/(xb-xa);
  return b.time + (x-xb)*slope;
}

const POINT_TOOLS_2 = ["trend","ray","ext","channel","rect","ellipse","fib","fibext","fibfan","fibtime","long","short","measure"];
const POINT_TOOLS_1 = ["hline","hray","vline","text","emoji"];

dcanvas.addEventListener("mousedown", e=>{
  if(draw.tool==="cross") return;
  const p = evtPt(e);
  const c = ptToCoord(p);

  // try selecting/dragging an existing shape first (when not placing a fresh 1-click tool)
  if(!draw.pending && !draw.locked){
    const hit = hitTest(p);
    if(hit){ draw.sel=hit.idx; draw.drag={idx:hit.idx, pointIdx:hit.pointIdx, last:c}; redraw(); return; }
  }

  if(POINT_TOOLS_1.includes(draw.tool)){
    placeOneClick(draw.tool, c);
    return;
  }
  if(POINT_TOOLS_2.includes(draw.tool)){
    if(!draw.pending){
      draw.pending = { type:draw.tool, a:c, b:c };
    } else {
      draw.pending.b = c;
      commitPending();
    }
    redraw();
  }
});

dcanvas.addEventListener("mousemove", e=>{
  const p = evtPt(e);
  const c = ptToCoord(p);
  if(draw.drag && !draw.locked){
    dragShape(draw.drag, c);
    redraw(); return;
  }
  if(draw.pending){
    draw.pending.b = c;
    redraw();
  }
});

window.addEventListener("mouseup", ()=>{ draw.drag=null; });

// double-click to finish channel's 3rd point or deselect
dcanvas.addEventListener("dblclick", ()=>{ draw.pending=null; draw.sel=null; redraw(); });
// Esc cancels current drawing; Delete removes selected
window.addEventListener("keydown", e=>{
  if(e.key==="Escape"){ draw.pending=null; draw.sel=null; redraw(); }
  if((e.key==="Delete"||e.key==="Backspace") && draw.sel!=null && !draw.locked){
    draw.shapes.splice(draw.sel,1); draw.sel=null; redraw();
  }
});

function placeOneClick(tool, c){
  if(tool==="text" || tool==="emoji"){
    const txt = tool==="emoji" ? prompt("Emoji / note:","⭐") : prompt("Text:","Note");
    if(txt==null) return;
    draw.shapes.push({ type:"text", a:c, text:txt });
  } else {
    draw.shapes.push({ type:tool, a:c });   // hline / hray / vline
  }
  redraw();
}

function commitPending(){
  if(draw.pending){
    // ignore zero-size drawings (accidental click)
    draw.shapes.push(draw.pending);
    draw.pending=null;
  }
}

// ── dragging shapes / handles ──
function dragShape(drag, c){
  const s = draw.shapes[drag.idx]; if(!s) return;
  if(drag.pointIdx==="a"){ s.a = c; }
  else if(drag.pointIdx==="b" && s.b){ s.b = c; }
  else { // move whole shape by delta
    const dt = c.time - drag.last.time, dp = c.price - drag.last.price;
    s.a = { time:s.a.time+dt, price:s.a.price+dp };
    if(s.b) s.b = { time:s.b.time+dt, price:s.b.price+dp };
  }
  drag.last = c;
}

// ── hit testing for selection ──
function hitTest(p){
  for(let i=draw.shapes.length-1;i>=0;i--){
    const s=draw.shapes[i];
    const ax=timeToX(s.a.time), ay=priceToY(s.a.price);
    if(ax!=null && ay!=null && Math.hypot(p.x-ax,p.y-ay)<8) return {idx:i, pointIdx:"a"};
    if(s.b){ const bx=timeToX(s.b.time), by=priceToY(s.b.price);
      if(bx!=null && by!=null && Math.hypot(p.x-bx,p.y-by)<8) return {idx:i, pointIdx:"b"}; }
    if(nearShape(s,p)) return {idx:i, pointIdx:"body"};
  }
  return null;
}
function nearShape(s,p){
  const ax=timeToX(s.a.time), ay=priceToY(s.a.price);
  if(ax==null) return false;
  if(s.type==="hline"||s.type==="hray") return Math.abs(p.y-ay)<6;
  if(s.type==="vline") return Math.abs(p.x-ax)<6;
  if(!s.b) return false;
  const bx=timeToX(s.b.time), by=priceToY(s.b.price);
  if(bx==null) return false;
  return distToSeg(p.x,p.y,ax,ay,bx,by)<6;
}
function distToSeg(px,py,x1,y1,x2,y2){
  const dx=x2-x1, dy=y2-y1, l2=dx*dx+dy*dy;
  if(l2===0) return Math.hypot(px-x1,py-y1);
  let t=((px-x1)*dx+(py-y1)*dy)/l2; t=Math.max(0,Math.min(1,t));
  return Math.hypot(px-(x1+t*dx), py-(y1+t*dy));
}

// ════════ RENDERING ════════
const FIB_LEVELS = [0,0.236,0.382,0.5,0.618,0.786,1];
const FIB_EXT    = [0,0.618,1,1.618,2.618];
const FIB_COLORS = ["#787b86","#ef5350","#ff9800","#4caf50","#26a69a","#26c6da","#2962ff","#9c6ade"];

function redraw(){
  const W=dcanvas.clientWidth, H=dcanvas.clientHeight;
  dctx.clearRect(0,0,W,H);
  if(draw.hidden) return;
  for(let i=0;i<draw.shapes.length;i++) drawShape(draw.shapes[i], i===draw.sel);
  if(draw.pending) drawShape(draw.pending, true);
}

function line(x1,y1,x2,y2,color,width,dash){
  dctx.save();
  dctx.strokeStyle=color; dctx.lineWidth=width||1.4;
  dctx.setLineDash(dash||[]);
  dctx.beginPath(); dctx.moveTo(x1,y1); dctx.lineTo(x2,y2); dctx.stroke();
  dctx.restore();
}
function handle(x,y){ dctx.save(); dctx.fillStyle="#fff"; dctx.strokeStyle="#2962ff"; dctx.lineWidth=1.5;
  dctx.beginPath(); dctx.arc(x,y,4,0,7); dctx.fill(); dctx.stroke(); dctx.restore(); }

function drawShape(s, selected){
  const W=dcanvas.clientWidth, H=dcanvas.clientHeight;
  const ax=timeToX(s.a.time), ay=priceToY(s.a.price);
  const C="#2962ff";
  let bx,by;
  if(s.b){ bx=timeToX(s.b.time); by=priceToY(s.b.price); }

  switch(s.type){
    case "trend": if(bx!=null) line(ax,ay,bx,by,C,1.6); break;
    case "ray": if(bx!=null){ const [ex,ey]=extend(ax,ay,bx,by,W,H); line(ax,ay,ex,ey,C,1.6);} break;
    case "ext": if(bx!=null){ const [sx,sy]=extend(bx,by,ax,ay,W,H); const [ex,ey]=extend(ax,ay,bx,by,W,H); line(sx,sy,ex,ey,C,1.6);} break;
    case "hline": line(0,ay,W,ay,C,1.4); labelPrice(s.a.price,ay); break;
    case "hray": line(ax,ay,W,ay,C,1.4); labelPrice(s.a.price,ay); break;
    case "vline": line(ax,0,ax,H,C,1.4); break;
    case "rect": if(bx!=null){ dctx.save(); dctx.fillStyle="rgba(41,98,255,0.10)"; dctx.strokeStyle=C; dctx.lineWidth=1.4;
        dctx.fillRect(ax,ay,bx-ax,by-ay); dctx.strokeRect(ax,ay,bx-ax,by-ay); dctx.restore(); } break;
    case "ellipse": if(bx!=null){ dctx.save(); dctx.strokeStyle=C; dctx.lineWidth=1.4; dctx.fillStyle="rgba(41,98,255,0.08)";
        dctx.beginPath(); dctx.ellipse((ax+bx)/2,(ay+by)/2,Math.abs(bx-ax)/2,Math.abs(by-ay)/2,0,0,7); dctx.fill(); dctx.stroke(); dctx.restore(); } break;
    case "channel": drawChannel(s,W); break;
    case "fib": if(bx!=null) drawFib(s,FIB_LEVELS,W); break;
    case "fibext": if(bx!=null) drawFib(s,FIB_EXT,W); break;
    case "fibfan": if(bx!=null) drawFibFan(s,W,H); break;
    case "fibtime": if(bx!=null) drawFibTime(s,H); break;
    case "long": case "short": if(bx!=null) drawPosition(s,W); break;
    case "measure": if(bx!=null) drawMeasure(s); break;
    case "text": drawText(s); break;
  }
  if(selected){
    if(ax!=null) handle(ax,ay);
    if(bx!=null) handle(bx,by);
  }
}

// extend the ray from (x1,y1) through (x2,y2) to the canvas edge
function extend(x1,y1,x2,y2,W,H){
  const dx=x2-x1, dy=y2-y1;
  if(dx===0 && dy===0) return [x2,y2];
  // smallest positive t that hits a boundary in the ray's direction
  const ts=[];
  if(dx>0) ts.push((W-x1)/dx); else if(dx<0) ts.push((0-x1)/dx);
  if(dy>0) ts.push((H-y1)/dy); else if(dy<0) ts.push((0-y1)/dy);
  const t = Math.min(...ts.filter(v=>v>0));
  return [x1+dx*t, y1+dy*t];
}

function drawFib(s,levels,W){
  const ay=priceToY(s.a.price), by=priceToY(s.b.price);
  const ax=timeToX(s.a.time), bx=timeToX(s.b.time);
  const x1=Math.min(ax,bx), x2=Math.max(ax,bx);
  levels.forEach((lv,i)=>{
    const y = ay + (by-ay)*lv;
    const col = FIB_COLORS[i%FIB_COLORS.length];
    line(x1,y,W,y,col,1.1);
    dctx.save(); dctx.fillStyle=col; dctx.font="10px sans-serif";
    const price = yToPrice(y);
    dctx.fillText(`${lv}  ${price!=null?fmt(price):""}`, x1+4, y-3); dctx.restore();
  });
  line(ax,ay,bx,by,"#787b86",1,[3,3]);
}
function drawFibFan(s,W,H){
  const ax=timeToX(s.a.time), ay=priceToY(s.a.price);
  const bx=timeToX(s.b.time), by=priceToY(s.b.price);
  [0,0.382,0.5,0.618,1].forEach((lv,i)=>{
    const ty = ay + (by-ay)*lv;
    const [ex,ey]=extend(ax,ay,bx,ty,W,H);
    line(ax,ay,ex,ey,FIB_COLORS[i%FIB_COLORS.length],1.1);
  });
  line(ax,ay,bx,by,"#787b86",1,[3,3]);
}
function drawFibTime(s,H){
  const ax=timeToX(s.a.time), bx=timeToX(s.b.time);
  const step=bx-ax;
  [0,1,2,3,5,8,13,21].forEach((n,i)=>{
    const x=ax+step*n;
    line(x,0,x,H,FIB_COLORS[i%FIB_COLORS.length],1,[2,3]);
  });
}
function drawChannel(s,W){
  const ax=timeToX(s.a.time), ay=priceToY(s.a.price);
  const bx=timeToX(s.b.time), by=priceToY(s.b.price);
  line(ax,ay,bx,by,"#2962ff",1.5);
  // offset line: use stored width or default 40px below
  const off = s.off!=null ? s.off : 40;
  line(ax,ay+off,bx,by+off,"#2962ff",1.5);
  dctx.save(); dctx.fillStyle="rgba(41,98,255,0.07)";
  dctx.beginPath(); dctx.moveTo(ax,ay); dctx.lineTo(bx,by); dctx.lineTo(bx,by+off); dctx.lineTo(ax,ay+off); dctx.closePath(); dctx.fill(); dctx.restore();
}
function drawPosition(s,W){
  const ax=timeToX(s.a.time), ay=priceToY(s.a.price);
  const bx=timeToX(s.b.time), by=priceToY(s.b.price);
  const entry=s.a.price, tgt=s.b.price;
  const isLong = s.type==="long";
  const stop = entry - (tgt-entry)*0.5;       // simple 2:1 RR stop
  const sy = priceToY(stop);
  const x1=Math.min(ax,bx), x2=Math.max(ax,bx);
  // profit zone
  dctx.save();
  dctx.fillStyle = isLong?"rgba(38,166,154,0.15)":"rgba(239,83,80,0.15)";
  dctx.fillRect(x1,Math.min(ay,by),x2-x1,Math.abs(by-ay));
  dctx.fillStyle = isLong?"rgba(239,83,80,0.15)":"rgba(38,166,154,0.15)";
  dctx.fillRect(x1,Math.min(ay,sy),x2-x1,Math.abs(sy-ay));
  dctx.restore();
  line(x1,ay,x2,ay,"#2962ff",1.3);            // entry
  line(x1,by,x2,by,"#26a69a",1.1);            // target
  line(x1,sy,x2,sy,"#ef5350",1.1);            // stop
  dctx.save(); dctx.fillStyle="#d1d4dc"; dctx.font="10px sans-serif";
  dctx.fillText(`Entry ${fmt(entry)}`, x1+4, ay-3);
  dctx.fillText(`Target ${fmt(tgt)}`, x1+4, by-3);
  dctx.fillText(`Stop ${fmt(stop)}`, x1+4, sy-3); dctx.restore();
}
function drawMeasure(s){
  const ax=timeToX(s.a.time), ay=priceToY(s.a.price);
  const bx=timeToX(s.b.time), by=priceToY(s.b.price);
  const up = s.b.price>=s.a.price;
  dctx.save();
  dctx.fillStyle = up?"rgba(38,166,154,0.15)":"rgba(239,83,80,0.15)";
  dctx.fillRect(ax,ay,bx-ax,by-ay);
  dctx.strokeStyle = up?"#26a69a":"#ef5350"; dctx.lineWidth=1.2;
  dctx.strokeRect(ax,ay,bx-ax,by-ay);
  const dPrice=s.b.price-s.a.price, pct=(dPrice/s.a.price*100);
  const nbars = countBars(s.a.time,s.b.time);
  dctx.fillStyle="#fff"; dctx.font="11px sans-serif";
  const label=`${dPrice>=0?"+":""}${fmt(dPrice)} (${pct.toFixed(2)}%)  ${nbars} bars`;
  const tx=(ax+bx)/2, ty=by+(up?-8:14);
  const w=dctx.measureText(label).width+10;
  dctx.fillStyle = up?"#26a69a":"#ef5350";
  dctx.fillRect(tx-w/2,ty-12,w,16);
  dctx.fillStyle="#fff"; dctx.textAlign="center"; dctx.fillText(label,tx,ty);
  dctx.restore();
}
function countBars(t1,t2){
  if(!lastData.length) return 0;
  let lo=Math.min(t1,t2), hi=Math.max(t1,t2), n=0;
  for(const b of lastData) if(b.time>=lo && b.time<=hi) n++;
  return n;
}
function drawText(s){
  const x=timeToX(s.a.time), y=priceToY(s.a.price);
  if(x==null||y==null) return;
  dctx.save(); dctx.font="13px sans-serif"; dctx.fillStyle="#d1d4dc";
  dctx.fillText(s.text||"", x, y); dctx.restore();
}
function labelPrice(price,y){
  dctx.save(); dctx.fillStyle="#2962ff"; dctx.font="10px sans-serif";
  dctx.fillText(fmt(price), 4, y-3); dctx.restore();
}

// redraw drawings whenever the chart pans/zooms or prices update
chart.timeScale().subscribeVisibleLogicalRangeChange(()=>redraw());
chart.subscribeCrosshairMove(()=>{ if(draw.shapes.length||draw.pending) redraw(); });

// ── Boot ──
buildWatchlist();
loadChart(activeSymbol, activeTF);
refreshPrices();
resize();
sizeCanvas();
window.addEventListener("resize", sizeCanvas);
setInterval(refreshPrices, 6000);
setInterval(()=>loadChart(activeSymbol, activeTF), 20000);
</script>
