<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Chart — Live Crypto (Coinbase)</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root{
    --bg:#131722; --panel:#1e222d; --panel2:#181c27; --border:#2a2e39;
    --text:#d1d4dc; --muted:#787b86; --green:#26a69a; --red:#ef5350;
    --accent:#2962ff; --hover:#2a2e39;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%; font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); overflow:hidden;}
  #app{display:flex; height:100vh; width:100vw;}

  /* ── Left drawing toolbar ── */
  #toolbar{width:44px; flex-shrink:0; background:var(--bg); border-right:1px solid var(--border);
    display:flex; flex-direction:column; align-items:center; padding-top:4px; gap:1px; overflow-y:auto; z-index:30;}
  #toolbar::-webkit-scrollbar{width:0;}
  .tool{width:38px; height:34px; display:flex; align-items:center; justify-content:center;
    border-radius:5px; cursor:pointer; color:#b2b5be; position:relative;}
  .tool:hover{background:var(--hover); color:#fff;}
  .tool.active{background:#2962ff22; color:#2962ff;}
  .tool.active svg{stroke:#2962ff;}
  .tool svg{width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:1.6; pointer-events:none;}
  .tool .badge{position:absolute; bottom:2px; right:3px; font-size:7px; color:var(--muted);}
  .tool-sep{width:24px; height:1px; background:var(--border); margin:4px 0;}

  #topbar{position:absolute; top:0; left:44px; right:300px; height:46px; background:var(--bg);
    border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; padding:0 12px; z-index:20;}
  #symbolBox{font-weight:700; font-size:15px; letter-spacing:.3px; white-space:nowrap;}
  #symbolBox .exch{color:var(--muted); font-weight:400; font-size:12px; margin-left:6px;}
  .tf-group{display:flex; gap:2px; margin-left:8px;}
  .tf{padding:5px 9px; font-size:12px; border-radius:4px; cursor:pointer; color:var(--muted); user-select:none;}
  .tf:hover{background:var(--hover); color:var(--text);}
  .tf.active{background:var(--accent); color:#fff;}
  #maLegend{font-size:11px; margin-left:12px; white-space:nowrap;}
  #maLegend span{margin-right:8px;}
  #ohlc{font-size:11px; color:var(--muted); margin-left:10px; white-space:nowrap;}
  #ohlc b{color:var(--text); font-weight:600;}
  #status{margin-left:auto; font-size:11px; color:var(--muted); white-space:nowrap;}
  .dot{display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--green); margin-right:5px; vertical-align:middle;}

  #main{flex:1; position:relative; padding-top:46px; display:flex; flex-direction:column; overflow:hidden;}
  #chartWrap{width:100%; flex:1 1 0; min-height:60px;}   /* the only growable pane */
  #chart{width:100%; height:100%;}
  #draw{cursor:crosshair;}
  #rsiWrap{flex:0 1 auto; height:26%; min-height:96px; border-top:1px solid var(--border); position:relative;}
  #subPanes{flex:0 1 auto; min-height:0;}
  #rsiLabel{position:absolute; top:6px; left:10px; font-size:11px; color:var(--muted); z-index:5;}
  #rsiLabel b{font-weight:600;}
  #rsi{width:100%; height:100%;}

  #watchlist{width:300px; background:var(--panel); border-left:1px solid var(--border);
    display:flex; flex-direction:column; overflow:hidden;}
  #wlHead{padding:10px 12px; font-size:13px; font-weight:600; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;}
  #wlHead .sub{font-size:10px; color:var(--muted); font-weight:400;}
  #wlCols{display:flex; padding:6px 12px 6px 14px; font-size:11px; color:var(--muted);
    border-bottom:1px solid var(--border);}
  #wlCols .c1{flex:1;} #wlCols .c2{width:78px; text-align:right;}
  #wlCols .c3{width:66px; text-align:right;} #wlCols .c4{width:54px; text-align:right;}
  #wlBody{flex:1; overflow-y:auto;}
  .section{padding:7px 12px 5px 14px; font-size:11px; color:var(--muted); background:transparent;
    letter-spacing:.4px; border-bottom:1px solid rgba(42,46,57,.5);}
  .row{display:flex; align-items:center; padding:6px 12px 6px 14px; cursor:pointer;}
  .row:hover{background:var(--hover);}
  .row.active{background:#1c2c4a;}
  .row .sym{flex:1; display:flex; align-items:center; gap:9px; min-width:0;}
  .row .sym .nm{font-size:13px; font-weight:500; color:#d1d4dc; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .row .ic{width:20px; height:20px; border-radius:50%; flex-shrink:0; object-fit:contain;
    background:#2a2e39; color:#fff; font-size:9px; display:flex; align-items:center;
    justify-content:center; font-weight:700;}
  .row .last{width:78px; text-align:right; font-size:13px; font-variant-numeric:tabular-nums; color:#d1d4dc;}
  .row .chgabs{width:66px; text-align:right; font-size:12px; font-variant-numeric:tabular-nums;}
  .row .chg{width:54px; text-align:right; font-size:12px; font-variant-numeric:tabular-nums;}
  .up{color:#26a69a;} .down{color:#ef5350;}
  #wlBody::-webkit-scrollbar{width:8px;}
  #wlBody::-webkit-scrollbar-thumb{background:var(--border); border-radius:4px;}
  .flash-up{animation:fu .6s;} .flash-down{animation:fd .6s;}
  @keyframes fu{0%{background:rgba(38,166,154,.25);}100%{background:transparent;}}
  @keyframes fd{0%{background:rgba(239,83,80,.25);}100%{background:transparent;}}

  /* ── topbar buttons ── */
  .tbtn{background:transparent; border:none; color:#d1d4dc; font-size:12px; cursor:pointer;
    padding:5px 8px; border-radius:4px; display:flex; align-items:center; gap:4px;}
  .tbtn:hover{background:var(--hover);}

  /* ── sub-panes for separate-pane indicators (MACD, Stoch, etc.) ── */
  #subPanes{display:none; flex-direction:column; flex:0 1 auto; min-height:0;}
  .subpane{position:relative; height:120px; flex:0 1 120px; min-height:70px; border-top:1px solid var(--border);}
  .subpane .subLabel{position:absolute; top:4px; left:8px; z-index:5; font-size:11px; color:var(--muted);}
  .subpane .subClose{cursor:pointer; margin-left:8px; color:var(--muted);}
  .subpane .subClose:hover{color:var(--red);}

  /* ── indicator legend (top-left of chart) ── */
  #indLegend{position:absolute; top:50px; left:10px; z-index:40; font-size:11px;
    display:flex; flex-direction:column; gap:2px; pointer-events:auto;}
  .indrow{display:flex; align-items:center; gap:6px; background:#131722cc; padding:1px 6px; border-radius:3px;}
  .indrow .nm{font-weight:600;} .indrow .vals{color:var(--muted);}
  .indrow .x{cursor:pointer; color:var(--muted); padding:0 3px;}
  .indrow .x:hover{color:var(--red);} .indrow .gear{cursor:pointer; color:var(--muted);}
  .indrow .gear:hover{color:#fff;}

  /* ── popup context menu ── */
  .popmenu{position:absolute; display:none; z-index:300; background:#1e222d; border:1px solid var(--border);
    border-radius:6px; padding:4px 0; min-width:180px; box-shadow:0 6px 24px #000a; font-size:13px;}
  .popmenu .mi{padding:7px 14px; cursor:pointer; display:flex; align-items:center; gap:8px; color:#d1d4dc;}
  .popmenu .mi:hover{background:var(--accent); color:#fff;}
  .popmenu .msep{height:1px; background:var(--border); margin:4px 0;}
  .popmenu .sw{width:12px; height:12px; border-radius:2px; display:inline-block;}

  /* ── side panels (indicators / alerts) ── */
  .panel{position:absolute; display:none; z-index:300; top:90px; left:60px; width:340px; max-height:70vh;
    background:#1e222d; border:1px solid var(--border); border-radius:8px; box-shadow:0 8px 32px #000a;
    overflow:hidden; flex-direction:column;}
  .panel.open{display:flex;}
  .panel .ph{padding:12px 14px; font-weight:600; font-size:14px; border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center;}
  .panel .ph .cl{cursor:pointer; color:var(--muted); font-size:18px;}
  .panel .pb{overflow-y:auto; padding:6px 0;}
  .panel .pi{padding:9px 14px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; font-size:13px;}
  .panel .pi:hover{background:var(--hover);}
  .panel .pi .meta{color:var(--muted); font-size:11px;}
  .panel .search{margin:8px 12px; padding:7px 10px; background:#131722; border:1px solid var(--border);
    border-radius:5px; color:#d1d4dc; font-size:13px; outline:none;}

  /* ── settings dialog ── */
  #dlgBackdrop{position:fixed; inset:0; background:#0008; display:none; z-index:400;}
  #dlgBackdrop.open{display:block;}
  .dialog{position:fixed; display:none; z-index:401; top:50%; left:50%; transform:translate(-50%,-50%);
    width:360px; background:#1e222d; border:1px solid var(--border); border-radius:10px;
    box-shadow:0 12px 48px #000c; flex-direction:column;}
  .dialog.open{display:flex;}
  .dialog .dh{padding:14px 16px; font-weight:600; font-size:15px; border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center;}
  .dialog .dh .cl{cursor:pointer; color:var(--muted); font-size:20px;}
  .dialog .db{padding:14px 16px; display:flex; flex-direction:column; gap:12px; max-height:60vh; overflow-y:auto;}
  .dialog .field{display:flex; justify-content:space-between; align-items:center; gap:10px;}
  .dialog .field label{font-size:13px; color:#d1d4dc;}
  .dialog .field input[type=number], .dialog .field input[type=text], .dialog .field select{
    width:120px; padding:6px 8px; background:#131722; border:1px solid var(--border); border-radius:5px;
    color:#d1d4dc; font-size:13px; outline:none;}
  .dialog .field input[type=color]{width:34px; height:26px; padding:0; border:1px solid var(--border);
    border-radius:4px; background:#131722; cursor:pointer;}
  .dialog .field input[type=range]{width:120px;}
  .dialog .df{padding:12px 16px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px;}
  .dialog .btn{padding:7px 16px; border-radius:5px; border:none; cursor:pointer; font-size:13px;}
  .dialog .btn.primary{background:var(--accent); color:#fff;}
  .dialog .btn.ghost{background:transparent; color:#d1d4dc; border:1px solid var(--border);}

  /* alert price lines drawn by lightweight-charts createPriceLine - styled inline */
</style>
</head>
<body>
<div id="app">
  <div id="toolbar"></div>
  <div id="main">
    <div id="topbar">
      <span id="symbolBox"><span id="symName">NEAR-USD/INJ-USD</span><span class="exch">· Coinbase · <span id="tfName">1D</span></span></span>
      <div class="tf-group" id="tfGroup">
        <span class="tf" data-i="1m">1m</span>
        <span class="tf" data-i="5m">5m</span>
        <span class="tf" data-i="15m">15m</span>
        <span class="tf" data-i="1h">1H</span>
        <span class="tf" data-i="4h">4H</span>
        <span class="tf" data-i="6h">6H</span>
        <span class="tf" data-i="12h">12H</span>
        <span class="tf active" data-i="1d">1D</span>
        <span class="tf" data-i="1w">1W</span>
      </div>
      <button class="tbtn" id="btnIndicators">⊞ Indicators</button>
      <button class="tbtn" id="btnAlert">🔔 Alert</button>
      <span id="maLegend"></span>
      <span id="ohlc"></span>
      <span id="status"><span class="dot"></span>Live · Coinbase API</span>
    </div>
    <div id="chartWrap" style="position:relative;">
      <div id="chart" style="position:absolute; inset:0;"></div>
      <canvas id="draw" style="position:absolute; inset:0; pointer-events:none; z-index:100; outline:1px solid transparent;"></canvas>
    </div>
    <div id="rsiWrap">
      <div id="rsiLabel">RSI 14 close <b id="rsiVal" style="color:#7e57c2">—</b> <b id="rsiMaVal" style="color:#e0a82e">—</b></div>
      <div id="rsi"></div>
    </div>
    <div id="subPanes"></div>
    <div id="indLegend"></div>
  </div>

  <!-- floating UI -->
  <div id="ctxMenu" class="popmenu"></div>
  <div id="indicatorsMenu" class="panel"></div>
  <div id="alertsPanel" class="panel"></div>
  <div id="settingsDlg" class="dialog"></div>
  <div id="dlgBackdrop"></div>

  <div id="watchlist">
    <div id="wlHead">comeback <span class="sub">▾</span></div>
    <div id="wlCols"><span class="c1">Symbol</span><span class="c2">Last</span><span class="c3">Chg</span><span class="c4">Chg%</span></div>
    <div id="wlBody"></div>
  </div>
</div>

<script>
// ── Coinbase Exchange public API (no key, no paywall) ──
const API = "https://api.exchange.coinbase.com";

// Coinbase uses BASE-USD. Watchlist mirrors the TradingView "comeback" layout.
// Symbols Coinbase doesn't list (XVG, XMR, NIL, DUSK) still appear but show "—".
const GROUPS = [
  { name:"SPREADS", symbols:["NEAR-USD/INJ-USD"] },
  { name:"MEME",    symbols:["BONK-USD"] },
  { name:"PRIVACY", symbols:["XVG-USD","DASH-USD","XMR-USD","NIL-USD","ZEC-USD","HYPE-USD"] },
  { name:"OMEGA",   symbols:["TON-USD","HBAR-USD","SUI-USD","XLM-USD","SEI-USD"] },
  { name:"ALPHA",   symbols:["FET-USD","DUSK-USD","RENDER-USD","ASTER-USD","TAO-USD","INJ-USD","NEAR-USD"] },
  { name:"SECTION 2", symbols:["BTC-USD","XRP-USD","BNB-USD","ETH-USD","LINK-USD","BCH-USD","SOL-USD"] },
  { name:"BTC PAIRS", symbols:["ETH-BTC","SOL-BTC","LINK-BTC"] },
  { name:"SECTION 3", symbols:["ADA-USD","DOGE-USD","AVAX-USD","DOT-USD"] },
];
const ALL = [...new Set(GROUPS.flatMap(g=>g.symbols))];

// Coin logos from CoinCap's free icon CDN (BASE symbol, lowercased).
// ASTER isn't on CoinCap → falls back to a letter circle.
const NO_LOGO = new Set(["ASTER","NIL"]);
function logoUrl(sym){
  const base = sym.split("/")[0].split("-")[0].toLowerCase();
  return `https://assets.coincap.io/assets/icons/${base}@2x.png`;
}

let activeSymbol = "NEAR-USD/INJ-USD";
let activeTF = "1d";  // timeframe key into TF{}

// ── Chart setup ──
const chartEl = document.getElementById("chart");
const rsiEl   = document.getElementById("rsi");
const common = {
  layout:{ background:{color:"#131722"}, textColor:"#d1d4dc" },
  grid:{ vertLines:{color:"#1e222d"}, horzLines:{color:"#1e222d"} },
  rightPriceScale:{ borderColor:"#2a2e39" },
  timeScale:{ borderColor:"#2a2e39", timeVisible:true, secondsVisible:false },
  crosshair:{ mode:0 },
};
const chart = LightweightCharts.createChart(chartEl, common);
const candle = chart.addCandlestickSeries({
  upColor:"#26a69a", downColor:"#ef5350", borderVisible:false,
  wickUpColor:"#26a69a", wickDownColor:"#ef5350",
});

// TradingView shows 7/25/99 MAs + SMA 150/200/300 — recreate all six.
// MA colors matched to the TradingView screenshot:
// MA7 orange · MA25 red · MA99 green · MA150 cyan · MA200 magenta · MA300 white
const MAS = [
  { p:7,   color:"#ff9800", w:1 },   // orange
  { p:25,  color:"#e53935", w:1 },   // red
  { p:99,  color:"#43a047", w:1 },   // green
  { p:150, color:"#26c6da", w:1 },   // cyan / light blue
  { p:200, color:"#ec407a", w:1 },   // magenta / pink
  { p:300, color:"#e0e0e0", w:1 },   // white / light gray
];
const maSeries = MAS.map(m => chart.addLineSeries({
  color:m.color, lineWidth:m.w, priceLineVisible:false, lastValueVisible:true, crosshairMarkerVisible:false,
}));

// RSI panel — styled to match TradingView (overbought fill, RSI + MA, fixed scale)
const rsiChart = LightweightCharts.createChart(rsiEl, { ...common });

// Keep the panel pinned to a sensible RSI window so it reads like TradingView.
const rsiScale = () => ({ priceRange:{ minValue:18, maxValue:82 } });

// Overbought (>70) green highlight: baseline anchored at 70, fill only above it.
const rsiOver = rsiChart.addBaselineSeries({
  baseValue:{ type:"price", price:70 },
  topFillColor1:"rgba(38,166,154,0.30)", topFillColor2:"rgba(38,166,154,0.05)",
  topLineColor:"rgba(0,0,0,0)",
  bottomFillColor1:"rgba(0,0,0,0)", bottomFillColor2:"rgba(0,0,0,0)",
  bottomLineColor:"rgba(0,0,0,0)",
  priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false,
});
// Oversold (<30) red highlight: baseline at 30, fill only below it.
const rsiUnder = rsiChart.addBaselineSeries({
  baseValue:{ type:"price", price:30 },
  topFillColor1:"rgba(0,0,0,0)", topFillColor2:"rgba(0,0,0,0)",
  topLineColor:"rgba(0,0,0,0)",
  bottomFillColor1:"rgba(239,83,80,0.05)", bottomFillColor2:"rgba(239,83,80,0.30)",
  bottomLineColor:"rgba(0,0,0,0)",
  priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false,
});
// dashed 70 / 30 bands + faint 50 midline
const band70  = rsiChart.addLineSeries({ color:"#787b86", lineWidth:1, lineStyle:2, priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false });
const band30  = rsiChart.addLineSeries({ color:"#787b86", lineWidth:1, lineStyle:2, priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false });
const band50  = rsiChart.addLineSeries({ color:"#3a3e4a", lineWidth:1, lineStyle:2, priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false });
// RSI line (purple, thin) + smoothing MA (gold, thicker), added last = on top.
const rsiLine = rsiChart.addLineSeries({ color:"#9c6ade", lineWidth:1, priceLineVisible:false, lastValueVisible:true, autoscaleInfoProvider:rsiScale });
const rsiMa   = rsiChart.addLineSeries({ color:"#e6b400", lineWidth:2, priceLineVisible:false, lastValueVisible:true });

// sync the two time scales
let _rsiSyncing=false;   // reentrancy guard so the two scales don't ping-pong
chart.timeScale().subscribeVisibleLogicalRangeChange(r=>{ if(r&&!_rsiSyncing){ _rsiSyncing=true; try{rsiChart.timeScale().setVisibleLogicalRange(r);}catch(e){} _rsiSyncing=false; } });
rsiChart.timeScale().subscribeVisibleLogicalRangeChange(r=>{ if(r&&!_rsiSyncing){ _rsiSyncing=true; try{chart.timeScale().setVisibleLogicalRange(r);}catch(e){} _rsiSyncing=false; } });

function resize(){
  chart.applyOptions({ width:chartEl.clientWidth, height:chartEl.clientHeight });
  rsiChart.applyOptions({ width:rsiEl.clientWidth, height:rsiEl.clientHeight });
}
window.addEventListener("resize", resize);

// ── Indicator math ──
function smaSeries(data, period){
  const out=[]; let sum=0;
  for(let i=0;i<data.length;i++){
    sum+=data[i].close;
    if(i>=period) sum-=data[i-period].close;
    if(i>=period-1) out.push({ time:data[i].time, value:sum/period });
  }
  return out;
}
function rsiSeries(data, period=14){
  const out=[]; let gain=0, loss=0;
  for(let i=1;i<data.length;i++){
    const d = data[i].close - data[i-1].close;
    const up = Math.max(d,0), dn = Math.max(-d,0);
    if(i<=period){ gain+=up; loss+=dn;
      if(i===period){ gain/=period; loss/=period;
        out.push({ time:data[i].time, value: loss===0?100:100-100/(1+gain/loss) }); }
    } else {
      gain=(gain*(period-1)+up)/period;
      loss=(loss*(period-1)+dn)/period;
      out.push({ time:data[i].time, value: loss===0?100:100-100/(1+gain/loss) });
    }
  }
  return out;
}
// simple MA over an arbitrary {time,value} series (for RSI smoothing)
function maOfSeries(series, period){
  const out=[]; let sum=0;
  for(let i=0;i<series.length;i++){
    sum+=series[i].value;
    if(i>=period) sum-=series[i-period].value;
    if(i>=period-1) out.push({ time:series[i].time, value:sum/period });
  }
  return out;
}

// ── Data loading (Coinbase) ──
// Coinbase candle = [time(s), low, high, open, close, volume], newest-first, ≤300 per call.
// Native granularities only: 1m,5m,15m,1h,6h,1d. 4h/12h/1w are AGGREGATED from a base.
//   base   = native granularity (sec) we actually fetch
//   bucket = target bar size (sec); if === base, no aggregation
//   pages  = how many ≤300-bar windows to paginate for depth
// pages tuned to Coinbase's real max depth per granularity (loop stops early on empty,
// so slightly over-asking is harmless). Every TF now pulls far more history than before.
const TF = {
  "1m":  { label:"1m",  base:60,    bucket:60,     pages:26 },  // ~7k bars (Coinbase caps 1m history)
  "5m":  { label:"5m",  base:300,   bucket:300,    pages:36 },  // ~10k bars (~1 month)
  "15m": { label:"15m", base:900,   bucket:900,    pages:18 },  // ~5k bars
  "1h":  { label:"1H",  base:3600,  bucket:3600,   pages:36 },  // ~10k bars (back to 2025)
  "4h":  { label:"4H",  base:3600,  bucket:14400,  pages:36 },  // 4×1h, deep
  "6h":  { label:"6H",  base:21600, bucket:21600,  pages:20 },  // ~5.5k bars (to 2022)
  "12h": { label:"12H", base:21600, bucket:43200,  pages:20 },  // 2×6h, to 2022
  "1d":  { label:"1D",  base:86400, bucket:86400,  pages:9 },   // ~1.4k bars (to 2022)
  "1w":  { label:"1W",  base:86400, bucket:604800, pages:9 },   // 7×1d
};

function parseCandlesAgg(raw){
  if(!Array.isArray(raw)) return [];
  // Coinbase candle = [time, low, high, open, close, volume]; keep volume for VWAP/Volume.
  return raw.map(k=>({ time:k[0], low:+k[1], high:+k[2], open:+k[3], close:+k[4], volume:+k[5]||0 }));
}

// Roll base bars up into fixed-size buckets aligned to epoch.
function aggregate(bars, base, bucket){
  if(bucket === base) return bars;
  const groups = {};
  for(const b of bars){
    const t = Math.floor(b.time / bucket) * bucket;   // bucket start
    const g = groups[t] || (groups[t] = { time:t, open:b.open, high:b.high, low:b.low, close:b.close, volume:0, _first:b.time, _last:b.time });
    if(b.time <= g._first){ g.open = b.open; g._first = b.time; }
    if(b.time >= g._last ){ g.close = b.close; g._last = b.time; }
    if(b.high > g.high) g.high = b.high;
    if(b.low  < g.low ) g.low  = b.low;
    g.volume += b.volume||0;
  }
  return Object.values(groups)
    .map(({_first,_last,...g})=>g)
    .sort((a,b)=>a.time-b.time);
}


// ── Bad-print filter ──
// Exchange feeds occasionally emit a single corrupt candle with an impossible
// high/low (e.g. INJ 2025-11-08 printed a 14.75 high on a day it opened 7.68 /
// closed 7.44). Dividing that into a ratio creates a fake spike. We clamp any
// wick that exceeds ~4× the LOCAL-median wick of its neighbors (genuine
// volatility is allowed; lone glitches are pulled back in line).
function median(arr){
  if(!arr.length) return 0;
  const s=[...arr].sort((a,b)=>a-b), m=s.length>>1;
  return s.length%2 ? s[m] : (s[m-1]+s[m])/2;
}
function sanitize(bars){
  const N=bars.length, W=10, K=4, MINW=0.15;   // window radius, slack factor, min allowed wick
  if(N<6) return bars;
  const upW=bars.map(k=>{const t=Math.max(k.open,k.close); return t? (k.high-t)/t : 0;});
  const dnW=bars.map(k=>{const b=Math.min(k.open,k.close); return b? (b-k.low)/b : 0;});
  const out=bars.map(k=>({...k}));
  for(let i=0;i<N;i++){
    const lo=Math.max(0,i-W), hi=Math.min(N,i+W+1);
    const u=[],d=[]; for(let j=lo;j<hi;j++) if(j!==i){ u.push(upW[j]); d.push(dnW[j]); }
    const top=Math.max(out[i].open,out[i].close), bot=Math.min(out[i].open,out[i].close);
    const upCap=top*(1+Math.max(median(u)*K, MINW));
    const dnFloor=bot*(1-Math.max(median(d)*K, MINW));
    if(out[i].high>upCap)  out[i].high=upCap;
    if(out[i].low<dnFloor) out[i].low=dnFloor;
  }
  return out;
}

async function fetchKlines(product, tfKey){
  const tf = TF[tfKey] || TF["1d"];
  const g = tf.base;
  const span = 300 * g;                 // seconds covered by one full page
  let end = null;                       // null = newest; Coinbase returns latest
  const all = [];
  for(let i=0; i<tf.pages; i++){
    const qs = end===null
      ? `granularity=${g}`
      : `granularity=${g}&start=${end-span}&end=${end}`;
    let raw;
    try{
      const res = await fetch(`${API}/products/${product}/candles?${qs}`);
      raw = await res.json();
    }catch{ break; }
    const page = parseCandlesAgg(raw);
    if(!page.length) break;
    all.push(...page);
    end = Math.min(...page.map(k=>k.time)) - g;   // step strictly before the oldest bar we got
    if(page.length < 200) break;                  // short page = reached start of history; stop early
  }
  // dedupe by time, oldest-first
  const seen = {};
  const out = [];
  for(const k of all){ if(seen[k.time]) continue; seen[k.time]=1; out.push(k); }
  out.sort((a,b)=>a.time-b.time);
  if(!out.length) throw new Error("No data for "+product);
  const clean = sanitize(out);                  // strip corrupt bad-print wicks
  return aggregate(clean, tf.base, tf.bucket);  // roll up to 4h/12h/1w if needed
}

// Build synthetic A/B ratio (spread) by aligning candles on matching timestamps
function makeRatio(a, b){
  const bm = {}; b.forEach(k=>bm[k.time]=k);
  const out=[];
  for(const k of a){
    const q = bm[k.time];
    if(!q || !q.open || !q.close || !q.high || !q.low) continue;
    // TradingView spread = component-wise division (NOT high/low cross terms,
    // which falsely assume A peaks the instant B bottoms → fake giant wicks).
    const o = k.open/q.open;
    const c = k.close/q.close;
    let hi = k.high/q.high;
    let lo = k.low/q.low;
    if(lo > hi) [lo, hi] = [hi, lo];          // guard if division flips order
    // wick must still envelope the real open & close
    hi = Math.max(hi, o, c);
    lo = Math.min(lo, o, c);
    out.push({ time:k.time, open:o, high:hi, low:lo, close:c, volume:k.volume||0 });
  }
  return out;
}

function fmt(v){ return v>=100 ? v.toFixed(2) : v>=1 ? v.toFixed(3) : v.toPrecision(4); }

async function loadChart(symbol, tf, keepView){
  document.getElementById("symName").textContent = symbol;
  document.getElementById("tfName").textContent = (TF[tf]||{}).label || tf;
  try{
    let data;
    if(symbol.includes("/")){
      const [a,b] = symbol.split("/");
      const [ka,kb] = await Promise.all([fetchKlines(a,tf), fetchKlines(b,tf)]);
      data = makeRatio(ka, kb);
      if(!data.length) throw new Error("No overlapping data for "+symbol);
    } else {
      data = await fetchKlines(symbol, tf);
    }
    candle.setData(data);
    lastData = data;                 // expose to the drawing engine (magnet/measure/extrapolation)
    if(typeof redraw==="function") redraw();

    // moving averages
    const legend=[];
    maSeries.forEach((s,i)=>{
      const m = MAS[i];
      const sd = smaSeries(data, m.p);
      s.setData(sd);
      if(sd.length) legend.push(`<span style="color:${m.color}">MA${m.p} ${fmt(sd[sd.length-1].value)}</span>`);
    });
    document.getElementById("maLegend").innerHTML = legend.slice(0,6).join("");

    // RSI + smoothing MA + TradingView-style fills
    const r = rsiSeries(data, 14);
    const rm = maOfSeries(r, 14);
    rsiOver.setData(r);                                  // green fill where RSI>70
    rsiUnder.setData(r);                                 // red fill where RSI<30
    band70.setData(r.map(d=>({time:d.time, value:70})));
    band50.setData(r.map(d=>({time:d.time, value:50})));
    band30.setData(r.map(d=>({time:d.time, value:30})));
    rsiLine.setData(r);
    rsiMa.setData(rm);
    if(r.length)  document.getElementById("rsiVal").textContent   = r[r.length-1].value.toFixed(2);
    if(rm.length) document.getElementById("rsiMaVal").textContent = rm[rm.length-1].value.toFixed(2);

    // user indicators + alerts (engine defined later in file; guard for first paint)
    if(typeof renderAllIndicators==="function") renderAllIndicators();
    if(typeof checkAlerts==="function") checkAlerts();

    // show the most recent ~420 bars on first/symbol/tf load only — NOT on the 20s
    // refresh (that would yank the view back while the user is panning/zooming).
    if(!keepView){
      const view = Math.min(data.length, 420);
      chart.timeScale().setVisibleLogicalRange({ from: data.length-view, to: data.length+2 });
    }
    document.getElementById("status").innerHTML = `<span class="dot"></span>Live · Coinbase API · ${data.length} bars`;
  }catch(e){
    document.getElementById("ohlc").innerHTML = `<span class="down">⚠ ${e.message}</span>`;
  }
}

// Coinbase has no bulk 24hr endpoint; use per-product /stats (24h open/last).
async function fetchStats(product){
  try{
    const r = await fetch(`${API}/products/${product}/stats`);
    const s = await r.json();
    if(!s || !s.last) return null;
    return { last:+s.last, open:+s.open };
  }catch{ return null; }
}

async function refreshPrices(){
  // resolve every leg we need (plain symbols + both sides of any ratio)
  const legs = new Set();
  ALL.forEach(sym=> sym.split("/").forEach(s=>legs.add(s)) );
  const entries = await Promise.all([...legs].map(async p=>[p, await fetchStats(p)]));
  const stats = Object.fromEntries(entries);

  ALL.forEach(sym=>{
    let price, prev;
    if(sym.includes("/")){
      const [a,b] = sym.split("/");
      const sa = stats[a], sb = stats[b];
      if(!sa || !sb) return;
      price = sa.last / sb.last;
      prev  = (sa.open && sb.open) ? sa.open/sb.open : price;
    } else {
      const s = stats[sym];
      if(!s) return;
      price = s.last;
      prev  = s.open || price;
    }
    const chgAbs = price - prev;                 // absolute change
    const chgPct = prev ? (price/prev - 1)*100 : 0;
    const up = chgAbs >= 0;
    const txt    = fmtPrice(price);
    const absTxt = (up?"+":"−") + fmtPrice(Math.abs(chgAbs));
    const pctTxt = (up?"+":"−") + Math.abs(chgPct).toFixed(2) + "%";

    (rowMap[sym]||[]).forEach(row=>{
      const lastEl = row.querySelector("[data-last]");
      const absEl  = row.querySelector("[data-chgabs]");
      const pctEl  = row.querySelector("[data-chg]");
      if(lastEl.textContent !== txt){
        row.classList.remove("flash-up","flash-down"); void row.offsetWidth;
        row.classList.add(up?"flash-up":"flash-down");
      }
      lastEl.textContent = txt;
      absEl.textContent = absTxt; absEl.className = "chgabs "+(up?"up":"down");
      pctEl.textContent = pctTxt; pctEl.className = "chg "+(up?"up":"down");
    });
  });
}

// Price formatting that preserves small-decimal precision like TradingView
// (e.g. 0.00000424, 0.05233, 1.813, 59,716.00).
function fmtPrice(v){
  const a = Math.abs(v);
  if(a === 0) return "0";
  if(a >= 1000) return v.toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2});
  if(a >= 1)    return v.toFixed(a>=100?2:3);
  if(a >= 0.001) return v.toFixed(a>=0.1?4:5);
  // very small: show enough significant digits (e.g. BONK 0.00000424)
  return v.toFixed(8).replace(/0+$/,"");
}

function onToolClick(t,el){
  if(t.action){ if(t.key==="clear"){ if(confirm("Remove all drawings?")){ draw.shapes=[]; draw.sel=null; persist(); redraw(); } } return; }
  if(t.toggle){
    el.classList.toggle("active");
    const on=el.classList.contains("active");
    if(t.key==="magnet") draw.magnet=on;
    if(t.key==="lock")   draw.locked=on;
    if(t.key==="hide"){  draw.hidden=on; redraw(); }
    return;
  }
  document.querySelectorAll('.tool[data-tool]').forEach(x=>{
    if(["magnet","lock","hide"].includes(x.dataset.tool)) return;
    x.classList.toggle("active", x.dataset.tool===t.key);
  });
  draw.tool=t.key; draw.pending=null; draw.sel=null;
  const drawing=(t.key!=="cross");
  // While a DRAW tool is active the canvas owns all events and the chart can't pan.
  // In CROSSHAIR mode the canvas is click-through (chart pans) EXCEPT when the cursor
  // is over a drawing — then the hover tracker flips it interactive so you can
  // select/drag/right-click existing shapes. (see installHoverTracker)
  dcanvas.style.pointerEvents = drawing ? "auto" : "none";
  dcanvas.style.cursor = drawing ? "crosshair" : "default";
  chart.applyOptions({ handleScroll:!drawing, handleScale:!drawing });
  redraw();
}

// In crosshair mode, watch the cursor (via a listener on the chart wrapper that
// always fires) and make the overlay canvas interactive only when hovering a shape,
// so empty-space drags still pan the chart but shapes stay clickable/editable.
function installHoverTracker(){
  const wrap=document.getElementById("chartWrap");
  wrap.addEventListener("mousemove", e=>{
    if(draw.tool!=="cross") return;          // draw tools already own the canvas
    if(draw.drag||draw.pending) return;
    const r=dcanvas.getBoundingClientRect();
    const p={ x:e.clientX-r.left, y:e.clientY-r.top };
    const hit=hitTest(p);
    const over=!!hit && !draw.hidden;
    dcanvas.style.pointerEvents = over ? "auto" : "none";
    dcanvas.style.cursor = over ? (hit.handle==="body"?"move":"pointer") : "default";
    const newHover=over?hit.id:null;
    if(newHover!==draw.hover){ draw.hover=newHover; redraw(); }
  });
}

// ─────────────────────────────────────────────────────────────────────
//  COORDINATE CONVERSION  (price/time ⇄ pixels)
// ─────────────────────────────────────────────────────────────────────
function timeToX(time){
  const c=chart.timeScale().timeToCoordinate(time);
  if(c!=null) return c;
  if(lastData.length<2) return null;
  const a=lastData[lastData.length-2], b=lastData[lastData.length-1];
  const xa=chart.timeScale().timeToCoordinate(a.time), xb=chart.timeScale().timeToCoordinate(b.time);
  if(xa==null||xb==null||b.time===a.time) return null;
  return xb + (time-b.time)*(xb-xa)/(b.time-a.time);
}
function priceToY(price){ return candle.priceToCoordinate(price); }
function xToTime(x){
  const t=chart.timeScale().coordinateToTime(x);
  if(t!=null) return t;
  if(lastData.length<2) return lastData.length?lastData[lastData.length-1].time:0;
  const a=lastData[lastData.length-2], b=lastData[lastData.length-1];
  const xa=chart.timeScale().timeToCoordinate(a.time), xb=chart.timeScale().timeToCoordinate(b.time);
  if(xa==null||xb==null||xa===xb) return b.time;
  return Math.round(b.time + (x-xb)*(b.time-a.time)/(xb-xa));
}
function yToPrice(y){ return candle.coordinateToPrice(y); }

function snap(time,price){
  if(!draw.magnet || !lastData.length) return {time,price};
  let best=lastData[0], bd=Infinity;
  for(const b of lastData){ const d=Math.abs(b.time-time); if(d<bd){bd=d;best=b;} }
  const cand=[best.open,best.high,best.low,best.close];
  let bp=cand[0], pd=Infinity;
  for(const p of cand){ const d=Math.abs(p-price); if(d<pd){pd=d;bp=p;} }
  return {time:best.time, price:bp};
}

function sizeCanvas(){
  const w=dcanvas.clientWidth, h=dcanvas.clientHeight, dpr=window.devicePixelRatio||1;
  dcanvas.width=w*dpr; dcanvas.height=h*dpr;
  dctx.setTransform(dpr,0,0,dpr,0,0);
  redraw();
}
function evtPt(e){ const r=dcanvas.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; }
function ptToCoord(p){ return snap(xToTime(p.x), yToPrice(p.y)); }

// ─────────────────────────────────────────────────────────────────────
//  POINTER STATE MACHINE  (the part that was broken — rewritten cleanly)
// ─────────────────────────────────────────────────────────────────────
let uid=1; function newId(){ return "s"+(uid++); }

dcanvas.addEventListener("mousedown", e=>{
  if(e.button!==0) return;                 // left only; right handled by contextmenu
  e.preventDefault();
  const p=evtPt(e), c=ptToCoord(p);

  // ── CROSSHAIR mode: the canvas only receives this when hovering a shape (the
  //    hover tracker flipped pointer-events on). Select & drag it. ──
  if(draw.tool==="cross"){
    if(draw.locked) return;
    const hit=hitTest(p);
    if(hit){ draw.sel=hit.id; draw.drag={ id:hit.id, handle:hit.handle, last:c }; redraw(); }
    return;
  }

  // ── DRAW mode below ──
  // mid-placement: this click adds the next point of the pending shape
  if(draw.pending){ addPendingPoint(c); return; }

  // click directly on a HANDLE of the currently-selected shape → resize it
  if(!draw.locked && draw.sel){
    const hit=hitTest(p);
    if(hit && hit.id===draw.sel && typeof hit.handle==="number"){
      draw.drag={ id:hit.id, handle:hit.handle, last:c }; redraw(); return;
    }
  }

  // otherwise the active tool ALWAYS starts a new shape
  startPending(c);
});

function startPending(c){
  const tool=draw.tool;
  const need=CLICKS[tool]||2;
  draw.needClicks=need;
  if(need===1){
    finishOneClick(tool,c);
    return;
  }
  draw.pending={ id:newId(), type:tool, pts:[c, {...c}], style:{...DEFAULT_STYLE} };
  draw.needClicks=need-1;        // first point placed, remaining to set
  redraw();
}

function addPendingPoint(c){
  const pend=draw.pending;
  pend.pts[pend.pts.length-1]=c;          // lock current floating point
  draw.needClicks--;
  if(draw.needClicks<=0){
    commitPending();
  } else {
    pend.pts.push({...c});                 // new floating point for next segment
    redraw();
  }
}

function commitPending(){
  const pend=draw.pending;
  draw.pending=null; draw.needClicks=0;
  // reject degenerate (all points identical)
  const p0=pend.pts[0];
  const degenerate=pend.pts.every(pt=>pt.time===p0.time && pt.price===p0.price);
  if(degenerate){ redraw(); return; }
  draw.shapes.push(pend);
  draw.sel=pend.id;
  // auto-return to crosshair after placing (TradingView default), keep tool if user holds nothing
  persist();
  redraw();
}

function finishOneClick(tool,c){
  if(tool==="text" || tool==="callout"){
    const txt=prompt(tool==="callout"?"Note:":"Text:", tool==="callout"?"Note":"Text");
    if(txt==null) return;
    const s={ id:newId(), type:tool, pts:[c], style:{...DEFAULT_STYLE, color:"#d1d4dc"}, text:txt };
    draw.shapes.push(s); draw.sel=s.id;
  } else {
    const s={ id:newId(), type:tool, pts:[c], style:{...DEFAULT_STYLE} };
    draw.shapes.push(s); draw.sel=s.id;
  }
  persist(); redraw();
}

dcanvas.addEventListener("mousemove", e=>{
  const p=evtPt(e), c=ptToCoord(p);
  draw.mouse=p;
  if(draw.drag && !draw.locked){
    applyDrag(draw.drag, c); redraw(); return;
  }
  if(draw.pending){
    draw.pending.pts[draw.pending.pts.length-1]=c;   // floating point tracks cursor
    redraw(); return;
  }
  // hover feedback
  const hit=hitTest(p);
  const newHover=hit?hit.id:null;
  if(newHover!==draw.hover){ draw.hover=newHover; redraw(); }
  dcanvas.style.cursor = hit ? (hit.handle==="body"?"move":"pointer")
                       : (draw.tool==="cross"?"default":"crosshair");
});

window.addEventListener("mouseup", ()=>{ if(draw.drag){ persist(); draw.drag=null; } });

// double-click finishes a MULTI-point pending (>2 pts, e.g. channel) OR opens settings.
// For 2-point tools the second mousedown already commits; dbl-click must NOT pop their
// endpoint (that produced a degenerate 1-point shape that got discarded).
dcanvas.addEventListener("dblclick", e=>{
  if(draw.pending){
    if(draw.pending.pts.length>2){ draw.pending.pts.pop(); commitPending(); }
    // 2-point tools: ignore — mousedown #2 handles the commit.
    return;
  }
  const hit=hitTest(evtPt(e));
  if(hit){ draw.sel=hit.id; openSettings(hit.id); }
});

// keyboard: Esc cancels, Del removes selected
window.addEventListener("keydown", e=>{
  if(e.key==="Escape"){ draw.pending=null; draw.needClicks=0; draw.sel=null; closeAllPopups(); redraw(); }
  if((e.key==="Delete"||e.key==="Backspace") && draw.sel!=null && !draw.locked){
    if(document.activeElement && /INPUT|TEXTAREA/.test(document.activeElement.tagName)) return;
    deleteShape(draw.sel);
  }
});

// ─────────────────────────────────────────────────────────────────────
//  DRAG / EDIT
// ─────────────────────────────────────────────────────────────────────
function getShape(id){ return draw.shapes.find(s=>s.id===id); }
function deleteShape(id){ draw.shapes=draw.shapes.filter(s=>s.id!==id); if(draw.sel===id) draw.sel=null; persist(); redraw(); }

function applyDrag(drag,c){
  const s=getShape(drag.id); if(!s) return;
  if(typeof drag.handle==="number"){
    s.pts[drag.handle]=c;
  } else { // body: move all points by delta
    const dt=c.time-drag.last.time, dp=c.price-drag.last.price;
    s.pts=s.pts.map(pt=>({time:pt.time+dt, price:pt.price+dp}));
  }
  drag.last=c;
}

// ─────────────────────────────────────────────────────────────────────
//  HIT TESTING
// ─────────────────────────────────────────────────────────────────────
function px(pt){ return {x:timeToX(pt.time), y:priceToY(pt.price)}; }
function hitTest(p){
  for(let i=draw.shapes.length-1;i>=0;i--){
    const s=draw.shapes[i];
    // handles first
    for(let h=0;h<s.pts.length;h++){
      const q=px(s.pts[h]);
      if(q.x!=null && q.y!=null && Math.hypot(p.x-q.x,p.y-q.y)<8) return {id:s.id, handle:h};
    }
    if(nearShape(s,p)) return {id:s.id, handle:"body"};
  }
  return null;
}
function nearShape(s,p){
  const a=px(s.pts[0]); if(a.x==null||a.y==null) return false;
  const W=dcanvas.clientWidth, H=dcanvas.clientHeight;
  if(s.type==="hline") return Math.abs(p.y-a.y)<6;
  if(s.type==="hray")  return Math.abs(p.y-a.y)<6 && p.x>=a.x;
  if(s.type==="vline") return Math.abs(p.x-a.x)<6;
  if(s.type==="text"||s.type==="callout") return Math.abs(p.x-a.x)<60 && Math.abs(p.y-a.y)<14;
  if(s.pts.length<2) return false;
  const b=px(s.pts[1]); if(b.x==null) return false;
  if(s.type==="rect"||s.type==="long"||s.type==="short"||s.type==="measure"){
    const x1=Math.min(a.x,b.x),x2=Math.max(a.x,b.x),y1=Math.min(a.y,b.y),y2=Math.max(a.y,b.y);
    const onEdge = (p.x>=x1-4&&p.x<=x2+4&&(Math.abs(p.y-y1)<5||Math.abs(p.y-y2)<5)) ||
                   (p.y>=y1-4&&p.y<=y2+4&&(Math.abs(p.x-x1)<5||Math.abs(p.x-x2)<5));
    const inside = p.x>=x1&&p.x<=x2&&p.y>=y1&&p.y<=y2;
    return onEdge||inside;
  }
  if(s.type==="ellipse"){
    const cx=(a.x+b.x)/2, cy=(a.y+b.y)/2, rx=Math.abs(b.x-a.x)/2, ry=Math.abs(b.y-a.y)/2;
    if(rx<1||ry<1) return false;
    const v=((p.x-cx)**2)/(rx*rx)+((p.y-cy)**2)/(ry*ry);
    return v>0.7 && v<1.3;
  }
  if(s.type==="ray"){ const [ex,ey]=extend(a.x,a.y,b.x,b.y,W,H); return distToSeg(p.x,p.y,a.x,a.y,ex,ey)<6; }
  if(s.type==="ext"){ const [sx,sy]=extend(b.x,b.y,a.x,a.y,W,H),[ex,ey]=extend(a.x,a.y,b.x,b.y,W,H); return distToSeg(p.x,p.y,sx,sy,ex,ey)<6; }
  // default: segment a-b (trend, fib lines, channel, etc.)
  return distToSeg(p.x,p.y,a.x,a.y,b.x,b.y)<6;
}
function distToSeg(px_,py,x1,y1,x2,y2){
  const dx=x2-x1,dy=y2-y1,l2=dx*dx+dy*dy;
  if(l2===0) return Math.hypot(px_-x1,py-y1);
  let t=((px_-x1)*dx+(py-y1)*dy)/l2; t=Math.max(0,Math.min(1,t));
  return Math.hypot(px_-(x1+t*dx),py-(y1+t*dy));
}

const ctxMenu=document.getElementById("ctxMenu");
dcanvas.addEventListener("contextmenu", e=>{

function mi(label, fn, swatch){

function msep(){ const d=document.createElement("div"); d.className="msep"; return d; }
function showCtx(x,y,items){

function hideCtx(){ ctxMenu.style.display="none"; }
function showShapeMenu(id,x,y){

function showChartMenu(x,y,p){

function setStyle(id,patch){ const s=getShape(id); if(s){ Object.assign(s.style,patch); persist(); redraw(); } }

const dlg=document.getElementById("settingsDlg");

function openSettings(id){

  const st=s.style;
  const dashOpts=[["Solid",0],["Dashed",6],["Dotted",2]];
  dlg.innerHTML=`
    <div class="dh"><span>${prettyType(s.type)} settings</span><span class="cl" id="dlgClose">×</span></div>
    <div class="db">
      <div class="field"><label>Line color</label><input type="color" id="f_color" value="${toHex(st.color)}"></div>
      <div class="field"><label>Line width</label><input type="range" id="f_width" min="1" max="6" value="${st.width}"></div>
      <div class="field"><label>Line style</label><select id="f_dash">${dashOpts.map(([n,v])=>`<option value="${v}" ${v===st.dash?"selected":""}>${n}</option>`).join("")}</select></div>
      ${["rect","ellipse","long","short"].includes(s.type)?`<div class="field"><label>Fill opacity</label><input type="range" id="f_fill" min="0" max="40" value="${fillOpacity(st.fill)}"></div>`:""}
      ${["text","callout"].includes(s.type)?`<div class="field"><label>Text</label><input type="text" id="f_text" value="${(s.text||"").replace(/"/g,'&quot;')}"></div>`:""}
      <div class="field"><label>Show price label</label><input type="checkbox" id="f_label" ${st.showLabel?"checked":""}></div>
    </div>
    <div class="df">
      <button class="btn ghost" id="dlgDel">Delete</button>
      <button class="btn ghost" id="dlgCancel">Cancel</button>

// ─────────────────────────────────────────────────────────────────────
//  PERSISTENCE (localStorage, per symbol+timeframe)
// ─────────────────────────────────────────────────────────────────────
function persistKey(){ return "fv_draw_"+activeSymbol+"_"+activeTF; }
function persist(){ try{ localStorage.setItem(persistKey(), JSON.stringify(draw.shapes)); }catch{} }
function loadPersisted(){
  try{ const raw=localStorage.getItem(persistKey()); draw.shapes = raw?JSON.parse(raw):[]; }
  catch{ draw.shapes=[]; }
  draw.sel=null;
}

// ─────────────────────────────────────────────────────────────────────
//  RENDERING
// ─────────────────────────────────────────────────────────────────────
const FIB_LEVELS=[0,0.236,0.382,0.5,0.618,0.786,1];
const FIB_EXT=[0,0.618,1,1.618,2.618];
const FIB_COLORS=["#787b86","#ef5350","#ff9800","#4caf50","#26a69a","#26c6da","#2962ff","#9c6ade"];

function redraw(){
  const W=dcanvas.clientWidth, H=dcanvas.clientHeight;
  dctx.clearRect(0,0,W,H);
  drawAlertLines();
  if(!draw.hidden){
    for(const s of draw.shapes) drawShape(s, s.id===draw.sel, s.id===draw.hover);
  }
  if(draw.pending) drawShape(draw.pending, true, false);
}

function strokeLine(x1,y1,x2,y2,st){
  dctx.save();
  dctx.strokeStyle=st.color; dctx.lineWidth=st.width||1.5;
  dctx.setLineDash(st.dash?(st.dash===2?[2,3]:[7,5]):[]);
  dctx.beginPath(); dctx.moveTo(x1,y1); dctx.lineTo(x2,y2); dctx.stroke();
  dctx.restore();
}
function handle(x,y){ dctx.save(); dctx.fillStyle="#fff"; dctx.strokeStyle="#2962ff"; dctx.lineWidth=1.5;
  dctx.beginPath(); dctx.arc(x,y,4.5,0,7); dctx.fill(); dctx.stroke(); dctx.restore(); }

function drawShape(s, selected, hovered){
  const st=s.style||DEFAULT_STYLE;
  const W=dcanvas.clientWidth, H=dcanvas.clientHeight;
  const P=s.pts.map(px);
  if(P[0].x==null) return;
  const a=P[0], b=P[1];

  switch(s.type){
    case "trend": if(b)strokeLine(a.x,a.y,b.x,b.y,st); break;
    case "ray": if(b){ const[ex,ey]=extend(a.x,a.y,b.x,b.y,W,H); strokeLine(a.x,a.y,ex,ey,st);} break;
    case "ext": if(b){ const[sx,sy]=extend(b.x,b.y,a.x,a.y,W,H),[ex,ey]=extend(a.x,a.y,b.x,b.y,W,H); strokeLine(sx,sy,ex,ey,st);} break;
    case "hline": strokeLine(0,a.y,W,a.y,st); if(st.showLabel) labelPrice(s.pts[0].price,a.y,st.color); break;
    case "hray": strokeLine(a.x,a.y,W,a.y,st); if(st.showLabel) labelPrice(s.pts[0].price,a.y,st.color); break;
    case "vline": strokeLine(a.x,0,a.x,H,st); break;
    case "rect": if(b)drawRect(a,b,st); break;
    case "ellipse": if(b)drawEllipse(a,b,st); break;
    case "channel": drawChannel(s,P,st,W,H); break;
    case "fib": if(b)drawFib(s,P,FIB_LEVELS,W); break;
    case "fibext": if(b)drawFib(s,P,FIB_EXT,W); break;
    case "fibfan": if(b)drawFibFan(P,W,H); break;
    case "fibtime": if(b)drawFibTime(P,H); break;
    case "long": case "short": if(b)drawPosition(s,P,st); break;
    case "measure": if(b)drawMeasure(s,P); break;
    case "text": case "callout": drawText(s,a); break;
  }
  if(selected || hovered){
    for(const q of P) if(q.x!=null && (selected)) handle(q.x,q.y);
    if(hovered && !selected && a.x!=null){ /* subtle hover dot */ dctx.save(); dctx.fillStyle="#2962ff"; dctx.beginPath(); dctx.arc(a.x,a.y,3,0,7); dctx.fill(); dctx.restore(); }
  }
}

function extend(x1,y1,x2,y2,W,H){
  const dx=x2-x1,dy=y2-y1; if(dx===0&&dy===0) return [x2,y2];
  const ts=[];
  if(dx>0)ts.push((W-x1)/dx); else if(dx<0)ts.push((0-x1)/dx);
  if(dy>0)ts.push((H-y1)/dy); else if(dy<0)ts.push((0-y1)/dy);
  const t=Math.min(...ts.filter(v=>v>0));
  return [x1+dx*t, y1+dy*t];
}
function drawRect(a,b,st){
  dctx.save(); dctx.fillStyle=st.fill||"rgba(41,98,255,0.10)"; dctx.strokeStyle=st.color; dctx.lineWidth=st.width;
  dctx.setLineDash(st.dash?(st.dash===2?[2,3]:[7,5]):[]);
  dctx.fillRect(a.x,a.y,b.x-a.x,b.y-a.y); dctx.strokeRect(a.x,a.y,b.x-a.x,b.y-a.y); dctx.restore();
}
function drawEllipse(a,b,st){
  dctx.save(); dctx.strokeStyle=st.color; dctx.lineWidth=st.width; dctx.fillStyle=st.fill||"rgba(41,98,255,0.08)";
  dctx.beginPath(); dctx.ellipse((a.x+b.x)/2,(a.y+b.y)/2,Math.abs(b.x-a.x)/2,Math.abs(b.y-a.y)/2,0,0,7);
  dctx.fill(); dctx.stroke(); dctx.restore();
}
function drawFib(s,P,levels,W){
  const a=P[0], b=P[1];
  const x1=Math.min(a.x,b.x);
  levels.forEach((lv,i)=>{
    const y=a.y+(b.y-a.y)*lv, col=FIB_COLORS[i%FIB_COLORS.length];
    strokeLine(x1,y,W,y,{color:col,width:1.1,dash:0});
    const price=yToPrice(y);
    dctx.save(); dctx.fillStyle=col; dctx.font="10px sans-serif";
    dctx.fillText(`${lv}  ${price!=null?fmt(price):""}`, x1+4, y-3); dctx.restore();
  });
  strokeLine(a.x,a.y,b.x,b.y,{color:"#787b86",width:1,dash:6});
}
function drawFibFan(P,W,H){
  const a=P[0], b=P[1];
  [0,0.382,0.5,0.618,1].forEach((lv,i)=>{
    const ty=a.y+(b.y-a.y)*lv, [ex,ey]=extend(a.x,a.y,b.x,ty,W,H);
    strokeLine(a.x,a.y,ex,ey,{color:FIB_COLORS[i%FIB_COLORS.length],width:1.1,dash:0});
  });
  strokeLine(a.x,a.y,b.x,b.y,{color:"#787b86",width:1,dash:6});
}
function drawFibTime(P,H){
  const a=P[0], b=P[1], step=b.x-a.x;
  [0,1,2,3,5,8,13,21].forEach((n,i)=>{ const x=a.x+step*n; strokeLine(x,0,x,H,{color:FIB_COLORS[i%FIB_COLORS.length],width:1,dash:2}); });
}
function drawChannel(s,P,st,W,H){
  const a=P[0], b=P[1];
  strokeLine(a.x,a.y,b.x,b.y,st);
  if(P[2]){
    const off=P[2].y - lineY(a,b,P[2].x);          // vertical offset of 3rd point from main line
    strokeLine(a.x,a.y+off,b.x,b.y+off,st);
    dctx.save(); dctx.fillStyle=withOpacity(st.color,0.07);
    dctx.beginPath(); dctx.moveTo(a.x,a.y); dctx.lineTo(b.x,b.y); dctx.lineTo(b.x,b.y+off); dctx.lineTo(a.x,a.y+off); dctx.closePath(); dctx.fill(); dctx.restore();
  }
}
function lineY(a,b,x){ if(b.x===a.x) return a.y; return a.y+(b.y-a.y)*(x-a.x)/(b.x-a.x); }
function drawPosition(s,P,st){
  const a=P[0], b=P[1];
  const entry=s.pts[0].price, tgt=s.pts[1].price;
  const isLong=s.type==="long";
  const stop=entry-(tgt-entry)*0.5;
  const sy=priceToY(stop);
  const x1=Math.min(a.x,b.x), x2=Math.max(a.x,b.x);
  dctx.save();
  dctx.fillStyle=isLong?"rgba(38,166,154,0.15)":"rgba(239,83,80,0.15)";
  dctx.fillRect(x1,Math.min(a.y,b.y),x2-x1,Math.abs(b.y-a.y));
  dctx.fillStyle=isLong?"rgba(239,83,80,0.15)":"rgba(38,166,154,0.15)";
  dctx.fillRect(x1,Math.min(a.y,sy),x2-x1,Math.abs(sy-a.y));
  dctx.restore();
  strokeLine(x1,a.y,x2,a.y,{color:"#2962ff",width:1.3,dash:0});
  strokeLine(x1,b.y,x2,b.y,{color:"#26a69a",width:1.1,dash:0});
  strokeLine(x1,sy,x2,sy,{color:"#ef5350",width:1.1,dash:0});
  const rr=(entry-stop)!==0 ? Math.abs((tgt-entry)/(entry-stop)) : 0;
  dctx.save(); dctx.fillStyle="#d1d4dc"; dctx.font="10px sans-serif";
  dctx.fillText(`Entry ${fmt(entry)}`,x1+4,a.y-3);
  dctx.fillText(`Target ${fmt(tgt)}  (RR ${rr.toFixed(1)})`,x1+4,b.y-3);
  dctx.fillText(`Stop ${fmt(stop)}`,x1+4,sy-3); dctx.restore();
}
function drawMeasure(s,P){
  const a=P[0], b=P[1];
  const up=s.pts[1].price>=s.pts[0].price;
  dctx.save();
  dctx.fillStyle=up?"rgba(38,166,154,0.15)":"rgba(239,83,80,0.15)";
  dctx.fillRect(a.x,a.y,b.x-a.x,b.y-a.y);
  dctx.strokeStyle=up?"#26a69a":"#ef5350"; dctx.lineWidth=1.2; dctx.strokeRect(a.x,a.y,b.x-a.x,b.y-a.y);
  const dP=s.pts[1].price-s.pts[0].price, pct=dP/s.pts[0].price*100, nb=countBars(s.pts[0].time,s.pts[1].time);
  const label=`${dP>=0?"+":""}${fmt(dP)} (${pct.toFixed(2)}%)  ${nb} bars`;
  dctx.font="11px sans-serif"; const w=dctx.measureText(label).width+12;
  const tx=(a.x+b.x)/2, ty=up?Math.min(a.y,b.y)-10:Math.max(a.y,b.y)+18;
  dctx.fillStyle=up?"#26a69a":"#ef5350"; dctx.fillRect(tx-w/2,ty-12,w,17);
  dctx.fillStyle="#fff"; dctx.textAlign="center"; dctx.fillText(label,tx,ty); dctx.restore();
}
function countBars(t1,t2){ if(!lastData.length)return 0; const lo=Math.min(t1,t2),hi=Math.max(t1,t2); let n=0; for(const b of lastData) if(b.time>=lo&&b.time<=hi)n++; return n; }
function drawText(s,a){
  if(a.x==null) return;
  dctx.save(); dctx.font="13px sans-serif";
  if(s.type==="callout"){
    const w=dctx.measureText(s.text||"").width+14;
    dctx.fillStyle="#1e222d"; dctx.strokeStyle=s.style.color; dctx.lineWidth=1;
    dctx.fillRect(a.x,a.y-16,w,22); dctx.strokeRect(a.x,a.y-16,w,22);
    dctx.fillStyle="#d1d4dc"; dctx.fillText(s.text||"",a.x+7,a.y);
  } else {
    dctx.fillStyle=s.style.color||"#d1d4dc"; dctx.fillText(s.text||"",a.x,a.y);
  }
  dctx.restore();
}
function labelPrice(price,y,color){
  dctx.save(); dctx.fillStyle=color; dctx.font="10px sans-serif"; dctx.fillText(fmt(price),4,y-3); dctx.restore();
}

function toHex(c){ if(c&&c[0]==="#") return c.slice(0,7); return "#2962ff"; }
function withOpacity(hex,op){ const h=toHex(hex); const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16); return `rgba(${r},${g},${b},${op})`; }
function fillOpacity(fill){ const m=/rgba?\([^)]*,\s*([\d.]+)\)/.exec(fill||""); return m?Math.round(parseFloat(m[1])*100):10; }

// ── math ──
function emaCalc(data,len){ const out=[]; const k=2/(len+1); let prev=null;
  for(let i=0;i<data.length;i++){ const c=data[i].close; prev=prev==null?c:c*k+prev*(1-k); if(i>=len-1)out.push({time:data[i].time,value:prev}); } return out; }
function smaCalc(data,len){ const out=[]; let sum=0;
  for(let i=0;i<data.length;i++){ sum+=data[i].close; if(i>=len)sum-=data[i-len].close; if(i>=len-1)out.push({time:data[i].time,value:sum/len}); } return out; }
function stddev(arr){ const m=arr.reduce((a,b)=>a+b,0)/arr.length; return Math.sqrt(arr.reduce((a,b)=>a+(b-m)*(b-m),0)/arr.length); }
function bbCalc(data,len,mult){ const mid=[],up=[],lo=[];
  for(let i=len-1;i<data.length;i++){ const win=data.slice(i-len+1,i+1).map(d=>d.close); const m=win.reduce((a,b)=>a+b,0)/len, sd=stddev(win);
    mid.push({time:data[i].time,value:m}); up.push({time:data[i].time,value:m+mult*sd}); lo.push({time:data[i].time,value:m-mult*sd}); } return {mid,up,lo}; }
function vwapCalc(data){ const out=[]; let cumPV=0,cumV=0;
  for(const d of data){ const tp=(d.high+d.low+d.close)/3; const v=d.volume||1; cumPV+=tp*v; cumV+=v; out.push({time:d.time,value:cumPV/cumV}); } return out; }
function emaArr(arr,len){ const out=new Array(arr.length).fill(null); const k=2/(len+1); let prev=null;
  for(let i=0;i<arr.length;i++){ prev=prev==null?arr[i]:arr[i]*k+prev*(1-k); if(i>=len-1)out[i]=prev; } return out; }
function macdCalc(data,f,s,sig){
  const ef=emaArr(data.map(d=>d.close),f), es=emaArr(data.map(d=>d.close),s);
  const macd=[]; for(let i=0;i<data.length;i++){ if(ef[i]!=null&&es[i]!=null) macd.push({time:data[i].time,value:ef[i]-es[i]}); }
  const sigArr=emaArr(macd.map(m=>m.value),sig);
  const signal=macd.map((m,i)=>sigArr[i]!=null?{time:m.time,value:sigArr[i]}:null).filter(Boolean);
  const sigMap={}; signal.forEach(p=>sigMap[p.time]=p.value);
  const hist=macd.map(m=> sigMap[m.time]!=null?{time:m.time,value:m.value-sigMap[m.time]}:null).filter(Boolean);
  return {macd,signal,hist};
}
function stochCalc(data,kLen,dLen){
  const kArr=[]; for(let i=kLen-1;i<data.length;i++){ const win=data.slice(i-kLen+1,i+1); const hh=Math.max(...win.map(d=>d.high)),ll=Math.min(...win.map(d=>d.low)); const k=hh===ll?50:(data[i].close-ll)/(hh-ll)*100; kArr.push({time:data[i].time,value:k}); }
  const dArr=[]; for(let i=dLen-1;i<kArr.length;i++){ const avg=kArr.slice(i-dLen+1,i+1).reduce((a,b)=>a+b.value,0)/dLen; dArr.push({time:kArr[i].time,value:avg}); }
  return {k:kArr,d:dArr};
}
function atrCalc(data,len){ const tr=[];
  for(let i=0;i<data.length;i++){ if(i===0){tr.push(data[i].high-data[i].low);continue;} const h=data[i].high,l=data[i].low,pc=data[i-1].close; tr.push(Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc))); }
  const out=[]; let prev=null; for(let i=0;i<data.length;i++){ if(i<len-1)continue; if(prev==null)prev=tr.slice(0,len).reduce((a,b)=>a+b,0)/len; else prev=(prev*(len-1)+tr[i])/len; out.push({time:data[i].time,value:prev}); } return out; }
function momCalc(data,len){ const out=[]; for(let i=len;i<data.length;i++) out.push({time:data[i].time,value:data[i].close-data[i-len].close}); return out; }
function willrCalc(data,len){ const out=[]; for(let i=len-1;i<data.length;i++){ const win=data.slice(i-len+1,i+1); const hh=Math.max(...win.map(d=>d.high)),ll=Math.min(...win.map(d=>d.low)); out.push({time:data[i].time,value:hh===ll?-50:(hh-data[i].close)/(hh-ll)*-100}); } return out; }
function cciCalc(data,len){ const out=[]; for(let i=len-1;i<data.length;i++){ const win=data.slice(i-len+1,i+1).map(d=>(d.high+d.low+d.close)/3); const m=win.reduce((a,b)=>a+b,0)/len; const md=win.reduce((a,b)=>a+Math.abs(b-m),0)/len; const tp=(data[i].high+data[i].low+data[i].close)/3; out.push({time:data[i].time,value:md===0?0:(tp-m)/(0.015*md)}); } return out; }

// ── add / remove / render ──
function addIndicator(type){
  const cat=IND_CATALOG.find(c=>c.type===type); if(!cat) return;
  const ind={ id:"i"+(indUid++), type, name:cat.name, pane:cat.pane, params:Object.assign({},cat.params), series:[], subChart:null };
  indicators.push(ind); buildIndicatorSeries(ind); renderIndicator(ind); renderIndLegend(); layoutPanes(); toggleIndicatorsMenu(false);
}
function removeIndicator(id){
  const idx=indicators.findIndex(i=>i.id===id); if(idx<0) return; const ind=indicators[idx];
  if(ind.syncMain){ try{ chart.timeScale().unsubscribeVisibleLogicalRangeChange(ind.syncMain); }catch(e){} }
  ind.series.forEach(s=>{ try{ (ind.subChart||chart).removeSeries(s); }catch(e){} });
  if(ind.subChart){ try{ ind.subChart.remove(); }catch(e){} if(ind.paneEl) ind.paneEl.remove(); }
  indicators.splice(idx,1); renderIndLegend(); layoutPanes();
}
function buildIndicatorSeries(ind){
  if(ind.pane==="main"){
    if(ind.type==="bb"){ ind.series=[ chart.addLineSeries({color:ind.params.color,lineWidth:1,priceLineVisible:false,lastValueVisible:false}),
      chart.addLineSeries({color:ind.params.color,lineWidth:1,priceLineVisible:false,lastValueVisible:false}),
      chart.addLineSeries({color:ind.params.color,lineWidth:1,priceLineVisible:false,lastValueVisible:false}) ]; }
    else ind.series=[ chart.addLineSeries({color:ind.params.color||"#ffeb3b",lineWidth:2,priceLineVisible:false,lastValueVisible:true}) ];
  } else {
    const wrap=document.getElementById("subPanes");
    const el=document.createElement("div"); el.className="subpane";
    const label=document.createElement("div"); label.className="subLabel"; label.textContent=ind.name;
    const close=document.createElement("span"); close.className="subClose"; close.textContent="×"; close.onclick=()=>removeIndicator(ind.id);
    label.appendChild(close); el.appendChild(label); wrap.appendChild(el); ind.paneEl=el;
    const sc=LightweightCharts.createChart(el,{ layout:{background:{color:"#131722"},textColor:"#d1d4dc"},
      grid:{vertLines:{color:"#1e222d"},horzLines:{color:"#1e222d"}}, rightPriceScale:{borderColor:"#2a2e39"},
      timeScale:{borderColor:"#2a2e39",timeVisible:true,secondsVisible:false}, crosshair:{mode:0} });
    ind.subChart=sc;
    // store sync handlers so removeIndicator can unsubscribe (avoid leaks on add/remove)
    let syncing=false;
    ind.syncMain=r=>{ if(r&&!syncing){ syncing=true; try{sc.timeScale().setVisibleLogicalRange(r);}catch(e){} syncing=false; } };
    ind.syncSub =r=>{ if(r&&!syncing){ syncing=true; try{chart.timeScale().setVisibleLogicalRange(r);}catch(e){} syncing=false; } };
    chart.timeScale().subscribeVisibleLogicalRangeChange(ind.syncMain);
    sc.timeScale().subscribeVisibleLogicalRangeChange(ind.syncSub);
    if(ind.type==="macd") ind.series=[ sc.addHistogramSeries({color:"#26a69a"}), sc.addLineSeries({color:"#2962ff",lineWidth:1.5}), sc.addLineSeries({color:"#ff9800",lineWidth:1.5}) ];
    else if(ind.type==="stoch") ind.series=[ sc.addLineSeries({color:"#2962ff",lineWidth:1.5}), sc.addLineSeries({color:"#ff9800",lineWidth:1.5}) ];
    else if(ind.type==="volume") ind.series=[ sc.addHistogramSeries({color:"#26a69a"}) ];
    else ind.series=[ sc.addLineSeries({color:ind.params.color||"#ff9800",lineWidth:1.5}) ];
    setTimeout(()=>{ try{ sc.applyOptions({width:el.clientWidth,height:el.clientHeight}); }catch(e){} },0);
  }
}
function renderIndicator(ind){
  const d=lastData; if(!d.length) return; const pp=ind.params;
  try{
    switch(ind.type){
      case "ema": ind.series[0].setData(emaCalc(d,pp.length)); break;
      case "sma": ind.series[0].setData(smaCalc(d,pp.length)); break;
      case "bb": { const r=bbCalc(d,pp.length,pp.mult); ind.series[0].setData(r.up); ind.series[1].setData(r.mid); ind.series[2].setData(r.lo); break; }
      case "vwap": ind.series[0].setData(vwapCalc(d)); break;
      case "macd": { const r=macdCalc(d,pp.fast,pp.slow,pp.signal); ind.series[0].setData(r.hist.map(h=>({time:h.time,value:h.value,color:h.value>=0?"#26a69a":"#ef5350"}))); ind.series[1].setData(r.macd); ind.series[2].setData(r.signal); break; }
      case "stoch": { const r=stochCalc(d,pp.k,pp.d); ind.series[0].setData(r.k); ind.series[1].setData(r.d); break; }
      case "atr": ind.series[0].setData(atrCalc(d,pp.length)); break;
      case "mom": ind.series[0].setData(momCalc(d,pp.length)); break;
      case "willr": ind.series[0].setData(willrCalc(d,pp.length)); break;
      case "cci": ind.series[0].setData(cciCalc(d,pp.length)); break;
      case "volume": ind.series[0].setData(d.map(b=>({time:b.time, value:b.volume||0, color: b.close>=b.open?"#26a69a88":"#ef535088"}))); break;
    }
  }catch(e){}
}
function renderAllIndicators(){ indicators.forEach(renderIndicator); }
function layoutPanes(){
  const subs=indicators.filter(i=>i.pane==="sub").length;
  const wrap=document.getElementById("subPanes");
  wrap.style.display = subs?"flex":"none";
  // resize after the browser has applied the new flex layout, then re-derive the
  // overlay canvas size and redraw so drawings stay pinned to the candles.
  const apply=()=>{
    indicators.filter(i=>i.subChart).forEach(i=>{ try{ i.subChart.applyOptions({width:i.paneEl.clientWidth,height:i.paneEl.clientHeight}); }catch(e){} });
    resize();
    sizeCanvas();
  };
  if(window.requestAnimationFrame){ requestAnimationFrame(()=>{ apply(); requestAnimationFrame(redraw); }); }
  else setTimeout(apply,0);
}
function renderIndLegend(){
  const box=document.getElementById("indLegend"); box.innerHTML="";
  indicators.filter(i=>i.pane==="main").forEach(ind=>{
    const row=document.createElement("div"); row.className="indrow";
    const params=Object.entries(ind.params).filter(e=>e[0]!=="color").map(e=>e[1]).join(", ");
    row.innerHTML='<span class="nm" style="color:'+(ind.params.color||"#d1d4dc")+'">'+ind.name+(params?" ("+params+")":"")+'</span><span class="gear" title="Settings">⚙</span><span class="x" title="Remove">×</span>';
    row.querySelector(".gear").onclick=()=>openIndicatorSettings(ind.id);
    row.querySelector(".x").onclick=()=>removeIndicator(ind.id);
    box.appendChild(row);
  });
}
function toggleIndicatorsMenu(force){
  const m=document.getElementById("indicatorsMenu");
  const open = force!==undefined ? force : !m.classList.contains("open");
  if(open){
    m.innerHTML='<div class="ph">Indicators <span class="cl" id="indClose">×</span></div><input class="search" id="indSearch" placeholder="Search…"><div class="pb" id="indList"></div>';
    const list=m.querySelector("#indList");
    const fill=(q)=>{ q=q||""; list.innerHTML=""; IND_CATALOG.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())).forEach(c=>{
      const it=document.createElement("div"); it.className="pi";
      it.innerHTML='<span>'+c.name+'</span><span class="meta">'+(c.pane==="main"?"overlay":"separate pane")+'</span>';
      it.onclick=()=>addIndicator(c.type); list.appendChild(it); }); };
    fill();
    m.querySelector("#indSearch").oninput=e=>fill(e.target.value);
    m.querySelector("#indClose").onclick=()=>toggleIndicatorsMenu(false);
    m.classList.add("open");
  } else m.classList.remove("open");
}
function openIndicatorSettings(id){
  const ind=indicators.find(i=>i.id===id); if(!ind) return;
  const fields=Object.entries(ind.params).map(e=>{ const k=e[0],v=e[1];
    if(k==="color") return '<div class="field"><label>'+k+'</label><input type="color" id="ip_'+k+'" value="'+toHex(v)+'"></div>';
    return '<div class="field"><label>'+k+'</label><input type="number" id="ip_'+k+'" value="'+v+'" step="'+(k==="mult"?0.1:1)+'"></div>';
  }).join("");
  dlg.innerHTML='<div class="dh"><span>'+ind.name+' settings</span><span class="cl" id="dlgClose">×</span></div><div class="db">'+fields+'</div><div class="df"><button class="btn ghost" id="dlgCancel">Cancel</button><button class="btn primary" id="dlgOk">OK</button></div>';
  dlg.classList.add("open"); backdrop.classList.add("open");
  const apply=()=>{ Object.keys(ind.params).forEach(k=>{ const el=document.getElementById("ip_"+k); if(!el)return; ind.params[k]= el.type==="color"?el.value:+el.value; });
    if(ind.params.color && ind.pane==="main"){
      // BB has 3 line series; single-line indicators have 1 — recolor all of them
      ind.series.forEach(s=>{ try{ s.applyOptions({color:ind.params.color}); }catch(e){} });
    }
    renderIndicator(ind); renderIndLegend(); };
  dlg.querySelectorAll("input").forEach(el=>el.addEventListener("input",apply));
  document.getElementById("dlgOk").onclick=()=>{ apply(); closeDlg(); };
  document.getElementById("dlgCancel").onclick=closeDlg;
  document.getElementById("dlgClose").onclick=closeDlg;
}

const alerts=[];
let alertUid=1;
function alertsKey(){ return "fv_alerts_"+activeSymbol; }
function saveAlerts(){ try{ localStorage.setItem(alertsKey(), JSON.stringify(alerts.map(a=>({id:a.id,price:a.price,dir:a.dir,active:a.active})))); }catch(e){} }
function loadAlerts(){ alerts.length=0;
  try{ const raw=localStorage.getItem(alertsKey()); if(raw) JSON.parse(raw).forEach(a=>alerts.push(Object.assign({},a,{_last:null}))); }catch(e){}
  redraw(); renderAlertsPanel();
}
function addAlertAt(price){ if(price==null) return;
  const cur=lastData.length?lastData[lastData.length-1].close:price;
  alerts.push({ id:"a"+(alertUid++), price, dir: price>=cur?"above":"below", active:true, _last:cur });
  saveAlerts(); redraw(); renderAlertsPanel(); requestNotifPermission();
}
function removeAlert(id){ const i=alerts.findIndex(a=>a.id===id); if(i>=0){ alerts.splice(i,1); saveAlerts(); redraw(); renderAlertsPanel(); } }
function drawAlertLines(){
  alerts.forEach(a=>{ const y=priceToY(a.price); if(y==null) return; const W=dcanvas.clientWidth;
    dctx.save(); dctx.strokeStyle=a.active?"#f7525f":"#555"; dctx.setLineDash([6,4]); dctx.lineWidth=1;
    dctx.beginPath(); dctx.moveTo(0,y); dctx.lineTo(W,y); dctx.stroke(); dctx.setLineDash([]);
    const txt="🔔 "+fmt(a.price); dctx.font="10px sans-serif"; const w=dctx.measureText(txt).width+10;
    dctx.fillStyle=a.active?"#f7525f":"#555"; dctx.fillRect(W-w-2,y-8,w,16); dctx.fillStyle="#fff"; dctx.fillText(txt,W-w+2,y+3); dctx.restore();
  });
}
function checkAlerts(){
  if(!lastData.length) return; const cur=lastData[lastData.length-1].close;
  alerts.forEach(a=>{ if(!a.active) return; const prev=a._last==null?cur:a._last;
    const crossed=(a.dir==="above"&&prev<a.price&&cur>=a.price)||(a.dir==="below"&&prev>a.price&&cur<=a.price);
    if(crossed){ fireAlert(a,cur); a.active=false; saveAlerts(); renderAlertsPanel(); redraw(); }
    a._last=cur;
  });
}
function fireAlert(a,price){
  const msg=activeSymbol+" crossed "+fmt(a.price)+" (now "+fmt(price)+")";
  if(window.Notification && Notification.permission==="granted"){ try{ new Notification("Freeview Alert",{body:msg}); }catch(e){} }
  const t=document.createElement("div"); t.textContent="🔔 "+msg;
  t.style.cssText="position:fixed;top:60px;right:320px;z-index:500;background:#f7525f;color:#fff;padding:10px 16px;border-radius:6px;box-shadow:0 4px 16px #0008;font-size:13px;";
  document.body.appendChild(t); setTimeout(()=>t.remove(),6000);
  try{ beep(); }catch(e){}
}
function beep(){ const ac=new (window.AudioContext||window.webkitAudioContext)(); const o=ac.createOscillator(),g=ac.createGain(); o.connect(g); g.connect(ac.destination); o.frequency.value=880; g.gain.value=0.08; o.start(); setTimeout(()=>{o.stop();ac.close();},220); }
function requestNotifPermission(){ if(window.Notification && Notification.permission==="default") Notification.requestPermission(); }
function toggleAlertsPanel(force){
  const m=document.getElementById("alertsPanel");
  const open=force!==undefined?force:!m.classList.contains("open");
  if(open){ renderAlertsPanel(); m.classList.add("open"); } else m.classList.remove("open");
}
function renderAlertsPanel(){
  const m=document.getElementById("alertsPanel");
  m.innerHTML='<div class="ph">Alerts <span class="cl" id="alClose">×</span></div><div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:6px;"><input class="search" id="alPrice" style="margin:0;flex:1;" placeholder="Price" type="number" step="any"><button class="btn primary" id="alAdd" style="padding:7px 12px;">Add</button></div><div class="pb" id="alList"></div>';
  const list=m.querySelector("#alList");
  if(!alerts.length) list.innerHTML='<div class="pi" style="color:var(--muted)">No alerts. Right-click the chart or add a price above.</div>';
  alerts.forEach(a=>{ const it=document.createElement("div"); it.className="pi";
    it.innerHTML='<span>'+fmt(a.price)+' <span class="meta">('+a.dir+(a.active?"":" · triggered")+')</span></span><span class="x" style="cursor:pointer;color:var(--muted)">×</span>';
    it.querySelector(".x").onclick=()=>removeAlert(a.id); list.appendChild(it);
  });
  m.querySelector("#alClose").onclick=()=>toggleAlertsPanel(false);
  m.querySelector("#alAdd").onclick=()=>{ const v=parseFloat(m.querySelector("#alPrice").value); if(!isNaN(v)) addAlertAt(v); };
}

document.getElementById("btnIndicators").onclick=()=>toggleIndicatorsMenu();
document.getElementById("btnAlert").onclick=()=>toggleAlertsPanel();
function closeAllPopups(){ hideCtx(); toggleIndicatorsMenu(false); toggleAlertsPanel(false); closeDlg(); }

// ── Boot ──
buildWatchlist();
installHoverTracker();     // lets crosshair mode select/edit shapes while still panning
loadPersisted();           // restore saved drawings for current symbol+tf
loadAlerts();              // restore saved alerts for current symbol
loadChart(activeSymbol, activeTF);
refreshPrices();
resize();
sizeCanvas();
window.addEventListener("resize", ()=>{ resize(); sizeCanvas(); });
setInterval(refreshPrices, 6000);
setInterval(()=>loadChart(activeSymbol, activeTF, true), 20000);  // keepView: don't snap the chart
</script>
