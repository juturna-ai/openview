<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Coin logos all come from assets.coincap.io, and the watchlist requests a dozen of them the
     moment it renders. Warming DNS + TLS here means the first icon doesn't pay the handshake. -->
<link rel="preconnect" href="https://assets.coincap.io" crossorigin>
<link rel="dns-prefetch" href="https://assets.coincap.io">
<title>Openview — Live Crypto Charts</title>
<meta name="description" content="Free, keyless, TradingView-style crypto charts. No signup, no paywall.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Openview">
<meta property="og:url" content="https://openview.site/">
<meta property="og:title" content="Openview — Live Crypto Charts">
<meta property="og:description" content="Free, keyless, TradingView-style crypto charts. No signup, no paywall.">
<meta property="og:image" content="https://openview.site/assets/banner.png">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1428">
<meta property="og:image:height" content="798">
<meta property="og:image:alt" content="Openview — the charting platform">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Openview — Live Crypto Charts">
<meta name="twitter:description" content="Free, keyless, TradingView-style crypto charts. No signup, no paywall.">
<meta name="twitter:image" content="https://openview.site/assets/banner.png">
<link rel="icon" type="image/x-icon" href="assets/freeview.ico">
<link rel="icon" type="image/png" sizes="256x256" href="assets/openview.png">
<link rel="apple-touch-icon" href="assets/openview.png">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root{
    --bg:#131722; --panel:#1e222d; --panel2:#181c27; --border:#2a2e39;
    --text:#d1d4dc; --muted:#787b86; --green:#26a69a; --red:#ef5350;
    --accent:#2962ff; --hover:#2a2e39;
  }
  /* Light theme (TradingView light) — overrides the variables when <html class="light"> */
  html.light{
    --bg:#ffffff; --panel:#f8f9fd; --panel2:#eff2f7; --border:#e0e3eb;
    --text:#131722; --muted:#6a6d78; --green:#089981; --red:#f23645;
    --accent:#2962ff; --hover:#e9edf4;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  /* Theme every native scrollbar (dialogs, menus, lists) — defaults are light and clash. */
  *{scrollbar-width:thin; scrollbar-color:var(--border) var(--bg);}
  ::-webkit-scrollbar{width:8px; height:8px; background:var(--bg);}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--border); border-radius:4px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--muted);}
  ::-webkit-scrollbar-corner{background:var(--bg);}
  html,body{height:100%; font-family:'Trebuchet MS',-apple-system,'Segoe UI',Roboto,Ubuntu,Tahoma,Arial,sans-serif; background:var(--bg); color:var(--text); overflow:hidden;}
  #app{display:flex; height:100vh; width:100vw;}
  /* ── Folder-tab bar (site nav): Home ↔ OpenView. Dark, browser-tab style. Sits above
     #app. Hidden entirely in embed mode (phone app / grid panels) — see html.embed rule
     below — so the mobile WebView only ever sees the raw chart. */
  /* Bar + inactive tabs sit on --bg, not the lighter --panel2/--panel, so the chrome is one shade
     with the page. Kept in sync with .ov-tabs / .ov-tab in web/app/globals.css — this document is
     standalone and carries its own copy of the tab-bar CSS. */
  #ovTabs{position:relative; display:flex; align-items:flex-end; gap:2px; height:34px; padding:0 8px;
    background:var(--bg); border-bottom:1px solid var(--border); user-select:none;}
  #ovTabs .ov-tabs-brand{position:absolute; right:clamp(16px,4vw,40px); top:50%; transform:translateY(-50%);
    display:flex; flex-direction:row-reverse; align-items:center; gap:8px;
    font-size:15px; font-weight:700; letter-spacing:-0.01em; color:var(--text); text-decoration:none;}
  #ovTabs .ov-tabs-brand img{width:20px; height:20px; border-radius:6px;}
  #ovTabs .ov-tab{display:inline-flex; align-items:center; height:26px; padding:0 16px;
    font-size:13px; font-weight:600; color:rgba(255,255,255,0.7); background:transparent;
    border:1px solid var(--border); border-bottom:none;
    border-radius:8px 8px 0 0; cursor:pointer; text-decoration:none; line-height:1;
    transition:color .12s ease, background .12s ease;}
  #ovTabs .ov-tab:hover{color:var(--text); background:var(--hover);}
  #ovTabs .ov-tab.active{background:var(--bg); height:28px;
    border-color:var(--border); position:relative; z-index:1; color:#715587;}
  @keyframes ovTabFlow{0%{background-position:0 0,0 0;}100%{background-position:300% 0,0 0;}}
  @keyframes ovTabPulse{0%,100%{filter:brightness(0.92);}50%{filter:brightness(1.15);}}
  /* When the tab bar is present (NOT embed), shrink the chart app to make room. */
  html:not(.embed) #app{height:calc(100vh - 34px);}
  /* Embed mode (grid panel): hide the watchlist so the panel is pure chart */
  html.embed #ovTabs{display:none;}
  html.embed #watchlist{display:none;}
  html.embed #rightPanel{display:none !important;}   /* docked rail panels stay host-only */
  /* Mobile app frames this page and provides its own toolbar → hide the engine's
     floating drawing toolbar (left) and right rail so they don't overlap the chart. */
  html.embed #toolbar{display:none !important;}
  html.embed #rightRail{display:none !important;}
  /* Symbol/search block hidden in embed — the chart legend already shows sym·tf·venue
     and search lives host-side. The divider right after it goes too. */
  html.embed #symbolBox{display:none;}
  html.embed #symbolBox + .tbdiv{display:none;}
  /* Embed toolbar = tf + chart-type ONLY. Everything right of the chart-type selector
     (Compare/Indicators/Alert/Script/Snap/Layout/Replay/Undo/…/status) is hidden — the
     mobile app overlays its own ƒ/✎/ⓘ icons in that free space. */
  html.embed #topbar #ctSel ~ *{display:none !important;}
  /* Narrow phone frame: let the SMA/indicator legend wrap instead of overflowing.
     Cap the legend so it stops BEFORE the right price-axis gutter (72px + margin) —
     otherwise the wrapped SMA line lands on top of the price scale. */
  html.embed #chartLegend{max-width:calc(100% - 106px);}
  html.embed #maLegend{white-space:normal; width:auto; max-width:100%;}
  /* App shows OHLC in its own UI → hide the engine's OHLC legend row in embed mode. */
  html.embed #ohlcRow{display:none;}
  /* Indicators menu opened from the mobile app ({fvx:'indmenu'}): the desktop position
     (left:60px, fixed 340px) overflows a ~390px phone WebView — pin it inside. */
  html.embed #indicatorsMenu{left:8px; top:34px; width:min(340px, calc(100vw - 16px)); max-height:75vh;}
  /* ── Multi-chart grid (iframe panels) ── */
  #chartGrid{display:none; position:absolute; top:38px; left:0; right:0; bottom:0; z-index:35;
    background:var(--bg); gap:2px; grid-auto-rows:1fr;}
  html.grid-on #chartGrid{display:grid;}
  html.grid-on #chartWrap, html.grid-on #rsiWrap, html.grid-on #subPanes, html.grid-on #bottomBar{display:none;}
  #chartGrid iframe{width:100%; height:100%; border:1px solid var(--border); border-radius:0; background:var(--bg);}
  #chartGrid iframe.gsel{border-color:var(--accent);}
  /* Draggable dividers between grid panels (col-/row-resize) */
  .grid-div{position:absolute; z-index:45;}
  .grid-div.v{width:7px; cursor:col-resize; top:0; bottom:0; margin-left:-3px;}
  .grid-div.h{height:7px; cursor:row-resize; left:0; right:0; margin-top:-3px;}
  .grid-div:hover, .grid-div.dragging{background:rgba(41,98,255,0.35);}
  #chartGrid.resizing iframe{pointer-events:none;}   /* don't lose the drag to an iframe */
  /* Per-panel maximize button (hover) + maximized panel state */
  .grid-max{position:absolute; z-index:46; width:22px; height:22px; display:flex; align-items:center;
    justify-content:center; border-radius:4px; background:var(--panel); border:1px solid var(--border);
    color:#b2b5be; cursor:pointer; font-size:12px; opacity:0; transition:opacity .12s;}
  #chartGrid:hover .grid-max{opacity:.75;}
  .grid-max:hover{opacity:1 !important; color:var(--accent);}
  #chartGrid.maxed .grid-div{display:none;}
  #chartGrid.maxed iframe{visibility:hidden;}
  #chartGrid.maxed iframe.gmax{visibility:visible; position:absolute; inset:0; width:100%; height:100%; z-index:44;}
  #chartGrid[data-layout="2h"]{grid-template-columns:1fr 1fr; grid-template-rows:1fr;}
  #chartGrid[data-layout="2v"]{grid-template-columns:1fr; grid-template-rows:1fr 1fr;}
  #chartGrid[data-layout="4"]{grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr;}
  /* TV-style layout picker popup: variants grouped by chart count, thumbnail previews */
  #layoutMenu.layout-pick{width:308px; max-height:70vh; overflow-y:auto; padding:8px; right:0; left:auto;}
  #layoutMenu .lp-group{display:flex; flex-wrap:wrap; gap:6px; padding:4px 2px 8px;}
  #layoutMenu .lp-count{font-size:10px; color:var(--muted); padding:4px 2px 2px; letter-spacing:.5px;}
  #layoutMenu .lp-item{width:44px; height:34px; border:1px solid var(--border); border-radius:4px;
    cursor:pointer; display:grid; gap:2px; padding:3px; background:var(--bg);}
  #layoutMenu .lp-item:hover{border-color:#5a5e6b; background:var(--hover);}
  #layoutMenu .lp-item.active{border-color:var(--accent);}
  #layoutMenu .lp-item i{background:#363a45; border-radius:1px; display:block;}
  #layoutMenu .lp-item.active i{background:var(--accent);}
  /* SYNC IN LAYOUT toggles at the bottom of the picker */
  #layoutMenu .lp-sync-row{display:flex; align-items:center; justify-content:space-between;
    padding:5px 6px; font-size:12px; color:var(--text); cursor:pointer; border-radius:4px;}
  #layoutMenu .lp-sync-row:hover{background:var(--hover);}
  #layoutMenu .lp-sync-row .info{color:var(--muted); font-size:10px; margin-left:4px; cursor:help;}
  #layoutMenu .lp-switch{width:26px; height:14px; border-radius:7px; background:#363a45; position:relative; flex-shrink:0;}
  #layoutMenu .lp-switch::after{content:""; position:absolute; top:2px; left:2px; width:10px; height:10px;
    border-radius:50%; background:#b2b5be; transition:left .12s;}
  #layoutMenu .lp-sync-row.on .lp-switch{background:var(--accent);}
  #layoutMenu .lp-sync-row.on .lp-switch::after{left:14px; background:#fff;}

  /* ── Left drawing toolbar ── */
  #toolbar{width:52px; flex-shrink:0; background:var(--bg); border-right:1px solid var(--border);
    display:flex; flex-direction:column; align-items:center; padding-top:6px; gap:2px; overflow-y:auto; z-index:30;}
  #toolbar::-webkit-scrollbar{width:0;}
  .tool{width:44px; height:38px; display:flex; align-items:center; justify-content:center;
    border-radius:6px; cursor:pointer; color:#b2b5be; position:relative;}
  .tool:hover{background:var(--hover); color:#e6e8eb;}
  .tool.active{background:rgba(41,98,255,.15); color:#2962ff;}
  .tool.active svg{stroke:#2962ff;}
  .tool svg{width:26px; height:26px; stroke:currentColor; fill:none; stroke-width:1.5; pointer-events:none;}
  .tool .badge{position:absolute; bottom:2px; right:3px; font-size:7px; color:var(--muted);}
  .tool-sep{width:28px; height:1px; background:var(--border); margin:5px 0;}
  .tool.cat{position:relative;}
  .tool .catarrow{position:absolute; bottom:3px; right:3px; font-size:6px; color:var(--muted); pointer-events:auto;}
  .tool.cat:hover .catarrow{color:var(--text);}
  /* Flyout popup listing a category's tools */
  .tool-flyout{position:fixed; z-index:320; background:#1e222d; border:1px solid var(--border);
    border-radius:8px; padding:5px; min-width:200px; box-shadow:0 8px 28px #000b;}
  .tool-flyout .tfrow{display:flex; align-items:center; gap:10px; padding:7px 10px; border-radius:5px; cursor:pointer; color:#d1d4dc; font-size:13px;}
  .tool-flyout .tfrow:hover{background:var(--hover);}
  .tool-flyout .tfrow.sel{color:var(--accent);}
  .tool-flyout .tfi{width:22px; height:22px; display:flex; align-items:center; justify-content:center; color:#b2b5be;}
  .tool-flyout .tfi svg{width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:1.5;}
  .tool-flyout .tfrow.sel .tfi{color:var(--accent);}
  .tool-flyout .tfrow .tfn{flex:1;}
  .tool-flyout .tfstar{cursor:pointer; color:var(--muted); font-size:13px;}
  .tool-flyout .tfstar.on{color:#f5c518;} .tool-flyout .tfstar:hover{color:#f5c518;}

  /* z-index must beat the always-interactive drawing canvas (#draw, z-index:100)
     so toolbar dropdowns (timeframe menu etc.) that drop over the chart stay
     clickable instead of being swallowed by the overlay. The bar is only the top
     46px strip, so this never blocks chart pan/zoom gestures below it. */
  /* left:0, not 52px — the bar is absolute inside #main, which already sits to the
     right of the 52px drawing toolbar; a 52px left here doubles the offset. */
  #topbar{position:absolute; top:0; left:0; right:0; height:38px; background:var(--bg);
    border-bottom:1px solid var(--border); display:flex; align-items:center; gap:2px; padding:0 8px; z-index:120;}
  #topbar .tbdiv{width:1px; height:20px; background:var(--border); margin:0 6px; flex:none;}
  #topbar .tbspacer{flex:1;}
  /* ── Bottom bar (date-range shortcuts + timezone/scale) ── */
  #bottomBar{flex:none; height:28px; background:var(--bg); border-top:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; padding:0 8px; z-index:30;}
  #rangeShortcuts{display:flex; gap:2px;}
  #rangeShortcuts .rng{font-size:11px; color:var(--muted); padding:2px 8px; border-radius:4px; cursor:pointer;}
  #rangeShortcuts .rng:hover{background:var(--hover); color:var(--text);}
  #rangeShortcuts .rng.active{color:var(--accent);}
  #bottomRight{display:flex; align-items:center; gap:4px;}
  #bottomRight .tf-sel-btn{font-size:11px; padding:2px 6px;}
  #bottomRight #btnScale{font-size:11px; padding:2px 8px;}
  /* The timezone selector lives in the bottom bar (bottom edge of the screen), so its
     dropdown opens UPWARD into the chart area. Two hazards there: (1) the ancestor
     #main has overflow:hidden (clips it), and (2) the drawing canvas #draw (z-index:100,
     in a sibling stacking context) covers the chart — a plain z-index on the menu can't
     escape #main's context, so #draw swallowed clicks on the upper options. Fix: when
     open, the menu is position:FIXED and re-parented to <body> (openTzMenu positions it),
     escaping both the clip and the stacking trap. z-index:130 beats every chart layer. */
  #tzMenu.tz-fixed{position:fixed; z-index:130; max-height:60vh;}
  #symbolBox{font-weight:700; font-size:15px; letter-spacing:.3px; white-space:nowrap; cursor:pointer; padding:2px 6px; border-radius:5px;}
  #symbolBox:hover{background:var(--hover);}
  #symbolBox #symSearchIcon{display:inline-flex; align-items:center; margin-right:6px; opacity:.7;}
  #symbolBox .exch{color:var(--muted); font-weight:400; font-size:12px; margin-left:6px;}
  /* ── Timeframe selector (TradingView-style sectioned dropdown) ── */
  .tf-group{display:flex; align-items:center; gap:2px; margin-left:8px;}
  .tf{padding:5px 9px; font-size:12px; border-radius:4px; cursor:pointer; color:var(--muted); user-select:none;}
  .tf:hover{background:var(--hover); color:var(--text);}
  .tf.active{background:var(--accent); color:#fff;}
  .tf-sel{position:relative;}
  .tf-sel-btn{display:flex; align-items:center; gap:5px; padding:5px 9px; font-size:12px; font-weight:600;
    border-radius:4px; cursor:pointer; color:var(--text); user-select:none; white-space:nowrap;}
  .tf-sel-btn:hover{background:var(--hover);}
  .tf-sel.open .tf-sel-btn{background:var(--hover);}
  .tf-sel-btn .caret{font-size:9px; color:var(--muted); transition:transform .12s;}
  .tf-sel.open .tf-sel-btn .caret{transform:rotate(180deg);}
  .tf-menu{display:none; position:absolute; top:calc(100% + 4px); left:0; z-index:60;
    background:var(--panel); border:1px solid var(--border); border-radius:6px; padding:4px;
    min-width:150px; max-height:70vh; overflow-y:auto; box-shadow:0 8px 24px rgba(0,0,0,.5);}
  .tf-sel.open .tf-menu{display:block;}
  .tf-menu::-webkit-scrollbar{width:8px;}
  .tf-menu::-webkit-scrollbar-thumb{background:var(--border); border-radius:4px;}
  .tf-sec{font-size:10px; font-weight:700; letter-spacing:.6px; color:var(--muted);
    text-transform:uppercase; padding:8px 10px 4px;}
  .tf-opt{display:flex; align-items:center; padding:6px 10px; font-size:13px; border-radius:4px;
    cursor:pointer; color:var(--text); user-select:none; white-space:nowrap;}
  .tf-opt:hover{background:var(--hover);}
  .tf-opt.active{background:var(--accent); color:#fff;}
  .tf-custom{padding:6px 8px 8px; border-bottom:1px solid var(--border); margin-bottom:4px;}
  .tf-custom input{width:100%; box-sizing:border-box; background:var(--panel,#1e222d); color:var(--text);
    border:1px solid var(--border); border-radius:4px; padding:6px 8px; font-size:12px; outline:none;}
  .tf-custom input:focus{border-color:var(--accent);}
  .tf-custom input.bad{border-color:var(--red); animation:tfShake .3s;}
  @keyframes tfShake{25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
  /* ── Floating on-chart legend (TradingView top-left) ── */
  #chartLegend{position:absolute; top:8px; left:10px; z-index:110; max-width:70%;
    display:flex; flex-direction:column; gap:3px; pointer-events:none;}
  #chartLegend > div{pointer-events:auto; width:fit-content; background:rgba(19,23,34,.55);
    border-radius:3px; padding:2px 6px; line-height:1.35;}
  #legSymRow{font-size:13px; font-weight:700; color:var(--text); white-space:nowrap;}
  #legCollapse{cursor:pointer; color:var(--muted); font-size:10px; margin-right:4px; display:inline-block; transition:transform .12s;}
  #legCollapse:hover{color:var(--text);}
  #chartLegend.collapsed #legCollapse{transform:rotate(-90deg);}
  #chartLegend.collapsed #ohlcRow, #chartLegend.collapsed #maLegend, #chartLegend.collapsed #indLegend{display:none;}
  #legSymRow #legMeta{color:var(--muted); font-weight:400; font-size:11px; margin-left:4px;}
  #maLegend{font-size:11px; white-space:nowrap; font-variant-numeric:tabular-nums;}
  #maLegend span{margin-right:8px;}
  #ohlcRow{font-size:11px; white-space:nowrap;}
  #ohlc{color:var(--muted); font-variant-numeric:tabular-nums;}
  #ohlc b{color:var(--text); font-weight:600;}
  #status{margin-left:auto; font-size:11px; color:var(--muted); white-space:nowrap;}
  .dot{display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--green); margin-right:5px; vertical-align:middle;}

  #main{flex:1; position:relative; padding-top:38px; display:flex; flex-direction:column; overflow:hidden;}
  #chartWrap{width:100%; flex:1 1 0; min-height:60px;}   /* the only growable pane */
  #chart{width:100%; height:100%;}
  /* touch-action:none — the touch bridge (dcanvas touchstart handlers) owns all touch
     gestures; without it mobile browsers claim the drag for page scrolling and the
     chart never pans on a phone. */
  #draw{cursor:crosshair; touch-action:none;}
  /* Standard horizontal-resize cursor while hovering/dragging the date-axis strip
     (the time-scale bar-spacing stretch). Native ew-resize — smaller/cleaner than the
     old custom SVG double-arrow, and matches the OS pointer the user expects. */
  body.time-resize, body.time-resize *{ cursor: ew-resize !important; }
  /* Sized with a viewport unit (not %) because the pane is hosted INSIDE #subPanes
     (auto-height flex column) so it can be reordered among the indicator panes. */
  #rsiWrap{flex:0 0 24vh; min-height:96px; border-top:1px solid var(--border); position:relative;}
  /* RSI pane chrome: same controls + top-border resize grip as indicator sub-panes. */
  #rsiWrap.pane-collapsed{min-height:22px;}
  #rsiWrap.pane-collapsed #rsi{opacity:0; pointer-events:none;}
  #rsiLabel .subClose{cursor:pointer; margin-left:8px; color:var(--muted);}
  #rsiLabel .subClose:hover{color:var(--text);}
  #rsiWrap .paneResize{position:absolute; top:-3px; left:0; right:0; height:7px; z-index:8; cursor:ns-resize; touch-action:none;}
  #rsiWrap .paneResize:hover{background:rgba(41,98,255,0.25);}
  #subPanes{flex:0 1 auto; min-height:0;}
  #rsiLabel{position:absolute; top:6px; left:10px; font-size:11px; color:var(--muted); z-index:5;}
  /* Countdown-to-bar-close pill, pinned to the right price axis at the last price. */
  #barCountdown{position:absolute; right:0; z-index:6; display:none;
    width:72px; text-align:center; box-sizing:border-box;
    background:#4E3470; color:#fff; font-size:11px; font-weight:600; font-variant-numeric:tabular-nums;
    padding:2px 6px; border-radius:3px; pointer-events:none; white-space:nowrap;}
  #rsiLabel b{font-weight:600;}
  #rsi{width:100%; height:100%;}
  /* RSI axis stretch cursor: the LWC canvas inside #rsi sets its own inline cursor, so
     a plain rsiEl.style.cursor never shows — force it down onto the children. The html-
     level class holds the ↕ for the whole drag even when the pointer leaves the pane. */
  #rsi.axis-hover, #rsi.axis-hover *{cursor:ns-resize !important;}
  #rsi.alert-hover, #rsi.alert-hover *{cursor:ns-resize !important;}
  html.rsi-axis-drag, html.rsi-axis-drag *{cursor:ns-resize !important;}
  /* Hover pill on an RSI alert line (mirrors the main pane's on-line pill). */
  #rsiAlertPill{position:absolute; z-index:7; display:none; transform:translateY(-50%);
    align-items:center; gap:6px; background:#1e222d; border:1px solid #9aa0aa;
    color:#d1d4dc; font-size:10px; padding:2px 6px; border-radius:4px; white-space:nowrap;
    pointer-events:none; box-shadow:0 2px 8px #0006;}
  #rsiAlertPill .trash{cursor:pointer; opacity:.8; pointer-events:auto;}
  #rsiAlertPill .trash:hover{opacity:1;}
  /* Crosshair ⊕ quick-add-alert button for the RSI pane (mirrors the main pane's on-crosshair
     ⊕). Rides the cursor's y at the right edge; click → add an RSI alert at that level. It's an
     HTML element (not a canvas) because the RSI sub-pane has no overlay canvas — same approach
     as #rsiAlertPill above. Positioned relative to #rsiWrap, like the pill. */
  #rsiCrossPlus{position:absolute; z-index:7; display:none; transform:translateY(-50%);
    align-items:center; justify-content:center; width:16px; height:16px;
    background:#1e222d; border:1px solid #9aa0aa; color:#d1d4dc; border-radius:50%;
    font-size:13px; line-height:1; cursor:pointer; pointer-events:auto; box-shadow:0 2px 8px #0006;}
  #rsiCrossPlus:hover{border-color:#d1d4dc; color:#fff;}

  #watchlist{width:var(--wl-w,300px); background:var(--bg); border-left:1px solid var(--border);
    display:flex; flex-direction:column; overflow:hidden; position:relative;}
  #wlResize{position:absolute; left:-3px; top:0; bottom:0; width:6px; cursor:col-resize; z-index:10;}
  #wlResize:hover{background:rgba(41,98,255,.3);}
  /* Far-right vertical icon rail (TradingView) */
  #rightRail{width:40px; flex-shrink:0; background:var(--bg); border-left:1px solid var(--border);
    display:flex; flex-direction:column; align-items:center; padding-top:8px; gap:4px;}
  #rightRail .rr-btn{width:32px; height:32px; display:flex; align-items:center; justify-content:center;
    border-radius:6px; cursor:pointer; font-size:15px; opacity:.75; color:#b2b5be;}
  #rightRail .rr-btn:hover{background:var(--hover); opacity:1;}
  /* Active panel icon: blue tint + highlight, TV-style */
  #rightRail .rr-btn.rr-active{background:var(--hover); opacity:1; color:#2962ff;}
  #rightRail .rr-btn svg{width:20px; height:20px; display:block;}
  #rightRail .rr-spacer{flex:1 1 auto;}   /* pushes the bottom group down */
  /* Unread-count badge on the Notifications bell */
  #rightRail .rr-btn{position:relative;}
  #rightRail .rr-badge{position:absolute; top:1px; right:1px; min-width:14px; height:14px;
    padding:0 3px; border-radius:7px; background:#f7525f; color:#fff; font-size:9px;
    line-height:14px; text-align:center; font-weight:700; pointer-events:none;}
  #wlHead{padding:10px 12px; font-size:13px; font-weight:600; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;}
  #wlHead .sub{font-size:10px; color:var(--muted); font-weight:400;}
  #wlAdd{cursor:pointer; color:var(--muted); font-size:16px; line-height:1; padding:2px 6px;
    border-radius:4px; font-weight:400;}
  #wlAdd:hover{color:#fff; background:var(--hover);}
  .wlActions{display:flex; align-items:center; gap:2px;}
  .wlActions span{cursor:pointer; color:var(--muted); line-height:1; padding:4px 6px; border-radius:4px;
    display:inline-flex; align-items:center;}
  .wlActions span:hover{color:#fff; background:var(--hover);}
  /* right padding matches .row (10px) so header column boundaries sit exactly over the
     data columns below. */
  #wlCols{display:flex; padding:6px 10px 6px 14px; font-size:11px; color:var(--muted);
    border-bottom:1px solid var(--border);}
  #wlCols{position:relative;}
  #wlCols .c1{flex:1;}
  /* Column dividers: labels centered between them; each cell is position:relative so its
     .colgrip (the draggable resize handle) anchors ON its own column boundary. The line
     itself is drawn by .colgrip::before spanning the FULL header height (the grip's
     -6px top/bottom covers #wlCols's vertical padding), so it meets the horizontal
     borders above and below, in the same faded --border color as those lines. */
  #wlCols .c2{width:var(--wl-c2,72px);}
  #wlCols .c3{width:var(--wl-c3,60px);}
  #wlCols .c4{width:var(--wl-c4,52px);}
  #wlCols .c2, #wlCols .c3, #wlCols .c4{position:relative; text-align:center; padding:0 4px;}
  /* 9px-wide grab zone straddling the divider; hover paints the line accent-blue. */
  #wlCols .colgrip{position:absolute; top:-6px; bottom:-6px; left:-5px; width:9px; cursor:col-resize; z-index:2;}
  #wlCols .colgrip::before{content:""; position:absolute; left:4px; top:0; bottom:0; width:1px;
    background:var(--border); transition:background .12s, width .12s;}
  #wlCols .colgrip:hover::before{left:3.5px; width:2px; background:var(--accent);}
  #wlCols span{cursor:pointer; user-select:none;} #wlCols span:hover{color:var(--text);}
  #wlCols span.sorted{color:var(--accent);}
  #wlBody{flex:1; overflow-y:auto;}
  .section{padding:7px 12px 5px 14px; font-size:11px; color:var(--muted); background:transparent;
    letter-spacing:.4px; border-bottom:1px solid rgba(42,46,57,.5);
    display:flex; align-items:center; gap:6px; cursor:pointer; user-select:none; position:relative;}
  .section:hover{background:rgba(42,46,57,.35);}
  .section .caret{font-size:13px; line-height:1; width:10px; text-align:center; flex-shrink:0; color:var(--muted); font-weight:600;}
  .section .gname{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  /* section trash: hidden until header hover, far right */
  .section .gdel{display:none; align-items:center; justify-content:center; width:20px; height:20px;
    border-radius:4px; color:var(--muted); cursor:pointer; flex-shrink:0;}
  .section:hover .gdel{display:flex;}
  .section .gdel:hover{color:var(--red); background:#2a2e39;}
  .section .gdel svg{width:13px; height:13px; fill:none; stroke:currentColor; stroke-width:1.6;
    stroke-linecap:round; stroke-linejoin:round;}
  /* section drop indicator (drag a symbol onto a collapsed/empty section header) */
  .section.drop-into{box-shadow:inset 0 0 0 1px var(--accent);}
  /* whole-section reorder indicators (drag a section header above/below another) */
  .section.gdrop-above{box-shadow:inset 0 2px 0 0 var(--accent);}
  .section.gdrop-below{box-shadow:inset 0 -2px 0 0 var(--accent);}
  .section.gdragging{opacity:.5;}
  /* Rows are separated by a thin divider (TradingView-style list). The border uses the
     theme --border so it reads faint in dark and light. box-shadow (not border) draws
     it so the 1px line never shifts row height / the flex baseline. */
  .row{display:flex; align-items:center; height:32px; padding:0 10px 0 8px; cursor:pointer; position:relative;
    box-shadow:inset 0 -1px 0 0 var(--border);}
  .row:hover{background:var(--hover);}
  .row.active{background:#1c2c4a;}
  .row.dragging{opacity:.4;}
  .row.drop-above{box-shadow:inset 0 2px 0 0 var(--accent);}
  .row.drop-below{box-shadow:inset 0 -2px 0 0 var(--accent);}
  /* trash button: hidden until row hover, sits over the change columns at the right edge */
  .row .del{position:absolute; right:8px; top:50%; transform:translateY(-50%);
    width:22px; height:22px; border-radius:4px; display:none; align-items:center;
    justify-content:center; color:var(--muted); background:#1e222dcc; cursor:pointer; z-index:2;}
  .row:hover .del{display:flex;}
  .row .del:hover{color:var(--red); background:#2a2e39;}
  .row .del svg{width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:1.6;
    stroke-linecap:round; stroke-linejoin:round;}
  /* view toggle: sits just left of the trash; masks THIS symbol's price cells (••••••) */
  .row .eye{position:absolute; right:34px; top:50%; transform:translateY(-50%);
    width:22px; height:22px; border-radius:4px; display:none; align-items:center;
    justify-content:center; color:var(--muted); background:#1e222dcc; cursor:pointer; z-index:2;}
  .row:hover .eye{display:flex;}
  .row .eye:hover{color:#fff; background:#2a2e39;}
  .row .eye svg{width:15px; height:15px; fill:none; stroke:currentColor; stroke-width:1.6;
    stroke-linecap:round; stroke-linejoin:round;}
  /* a masked row shows "••••••" in the price columns, dimmed and colorless */
  .row.masked .last, .row.masked .chgabs, .row.masked .chg{color:var(--muted); letter-spacing:1px;}
  /* flag sits flush against the panel's left edge, TradingView-style */
  .row .flag{position:absolute; left:0; top:50%; transform:translateY(-50%); display:flex; pointer-events:none;}
  .row.flagged{padding-left:16px;}
  .row .sym{flex:1; display:flex; align-items:center; gap:6px; min-width:0; overflow:hidden;}
  /* Ticker holds its space; the exchange badge is the first thing to give when the
     watchlist is narrowed (min-width:0 lets it shrink to nothing before the nm). */
  .row .sym .nm{flex:1 0 auto; min-width:0; font-size:12px; font-weight:500; color:#d1d4dc; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .row .sym .exbadge{flex:0 1 auto; min-width:0; overflow:hidden; text-overflow:clip; white-space:nowrap;
    font-size:9px; font-weight:600; letter-spacing:.3px; color:var(--muted);
    background:#2a2e39; border-radius:3px; padding:1px 4px; text-transform:uppercase;}
  .row .ic{width:20px; height:20px; border-radius:50%; flex-shrink:0; object-fit:contain;
    background:#2a2e39; color:#fff; font-size:9px; display:flex; align-items:center;
    justify-content:center; font-weight:700;}
  /* Spread icons: two diagonal halves (leg A top-left, leg B bottom-right) inside the
     circle. Each half is the full icon, clipped to a triangle; the polygons stop just
     short of the diagonal so the container background reads as a thin seam. */
  .split{overflow:hidden; padding:0; position:relative;}
  .split .half{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; color:#fff;
    display:flex; align-items:center; justify-content:center; font-weight:700;}
  .split .half.l{clip-path:polygon(0 0, 94% 0, 0 94%);}
  .split .half.r{clip-path:polygon(100% 6%, 100% 100%, 6% 100%);}
  .split span.half.l{align-items:flex-start; justify-content:flex-start; padding:9% 0 0 18%;}
  .split span.half.r{align-items:flex-end; justify-content:flex-end; padding:0 18% 9% 0;}
  /* padding-right matches the header cells (#wlCols .c2/.c3/.c4) so values sit exactly
     under their column labels and clear of the header divider positions. */
  .row .last{width:var(--wl-c2,72px); text-align:right; font-size:12px; font-variant-numeric:tabular-nums; color:#d1d4dc; padding-right:6px;}
  .row .chgabs{width:var(--wl-c3,60px); text-align:right; font-size:11px; font-variant-numeric:tabular-nums; padding-right:6px;}
  .row .chg{width:var(--wl-c4,52px); text-align:right; font-size:11px; font-variant-numeric:tabular-nums; padding-right:6px;}
  .up{color:#26a69a;} .down{color:#ef5350;}
  #wlBody::-webkit-scrollbar{width:8px;}
  #wlBody::-webkit-scrollbar-thumb{background:var(--border); border-radius:4px;}
  .flash-up{animation:fu .6s;} .flash-down{animation:fd .6s;}
  @keyframes fu{0%{background:rgba(38,166,154,.25);}100%{background:transparent;}}
  @keyframes fd{0%{background:rgba(239,83,80,.25);}100%{background:transparent;}}

  /* ── topbar buttons ── */
  .tbtn{background:transparent; border:none; color:#d1d4dc; font-size:12px; cursor:pointer;
    padding:5px 9px; border-radius:6px; display:flex; align-items:center; gap:5px; height:28px;}
  .tbtn:hover{background:var(--hover);}
  .tbtn:disabled{opacity:.35; cursor:default;} .tbtn:disabled:hover{background:transparent;}
  /* Professional stroke icons (replace emoji) across topbar + watchlist header. */
  .tbtn svg, .wlActions svg, #symSearchIcon svg{width:15px; height:15px; flex:none;
    fill:none; stroke:currentColor; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round;}
  .tbtn.icon-only{padding:5px 7px;}

  /* ── sub-panes for separate-pane indicators (MACD, Stoch, etc.) ── */
  #subPanes{display:none; flex-direction:column; flex:0 1 auto; min-height:0;}
  .subpane{position:relative; height:120px; flex:0 1 120px; min-height:70px; border-top:1px solid var(--border);}
  .subpane .subLabel{position:absolute; top:4px; left:8px; z-index:5; font-size:11px; color:var(--muted);}
  .subpane.pane-collapsed{min-height:0 !important;}
  .subpane.pane-collapsed > div:not(.subLabel){opacity:0; pointer-events:none;}
  .subpane.pane-collapsed .subLabel{top:4px;}
  .subpane .subClose{cursor:pointer; margin-left:8px; color:var(--muted);}
  .subpane .subClose:hover{color:var(--red);}
  .subpane .subEye{cursor:pointer; margin-left:8px; color:var(--muted);}
  .subpane .subEye:hover{color:var(--text);}
  .subpane.hiddenInd{opacity:.5;}
  /* Drag handle straddling a pane's top border to resize the pane above/below it. */
  .subpane .paneResize{position:absolute; top:-3px; left:0; right:0; height:7px; z-index:8; cursor:ns-resize; touch-action:none;}
  .subpane .paneResize:hover{background:rgba(41,98,255,0.25);}

  /* ── indicator legend (rows inside the floating #chartLegend) ── */
  #indLegend{font-size:11px; display:flex; flex-direction:column; gap:1px; padding:0 !important; background:none !important;}
  .indrow{display:flex; align-items:center; gap:6px; padding:0; border-radius:3px;}
  .indrow .nm{font-weight:600;} .indrow .vals{color:var(--text); font-variant-numeric:tabular-nums;}
  .subpane .subVals{color:var(--text); font-size:11px; font-variant-numeric:tabular-nums; margin-left:6px;}
  .indrow .x{cursor:pointer; color:var(--muted); padding:0 3px;}
  .indrow .x:hover{color:var(--red);} .indrow .gear{cursor:pointer; color:var(--muted);}
  .indrow .gear:hover{color:#fff;} .indrow .eye{cursor:pointer; color:var(--muted);}
  .indrow .eye:hover{color:#fff;}
  /* Information button (pane labels + legend rows). The ⓘ codepoint (U+24D8) is missing from
     Trebuchet MS and renders as tofu, so the circle is drawn in CSS around a plain ASCII "i". */
  .infoBtn{display:inline-flex; align-items:center; justify-content:center; flex:none;
    width:12px; height:12px; border:1px solid currentColor; border-radius:50%;
    font-family:Georgia, 'Times New Roman', serif; font-size:9px; font-style:italic; font-weight:700;
    line-height:1; cursor:pointer; color:var(--muted); opacity:.9;}
  .infoBtn:hover{color:var(--accent); opacity:1;}
  .indrow .infoBtn{margin:0 1px;}
  /* #rsiLabel is the built-in RSI pane's label — it is not a .subLabel, so it needs
     naming explicitly or the button ends up flush against the last value. */
  .subpane .subLabel .infoBtn, #rsiLabel .infoBtn{margin-left:8px; vertical-align:middle;}
  /* Symbol info popover */
  #symInfoPop .sibody{padding:6px 0;}
  #symInfoPop .sirow{display:flex; justify-content:space-between; padding:5px 14px; font-size:12px;}
  #symInfoPop .sirow .sik{color:var(--muted);} #symInfoPop .sirow .siv{color:var(--text); font-weight:500; text-align:right; max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

  /* ── popup context menu ── */
  .popmenu{position:absolute; display:none; z-index:300; background:#1e222d; border:1px solid var(--border);
    border-radius:6px; padding:4px 0; min-width:180px; box-shadow:0 6px 24px #000a; font-size:13px;}
  .popmenu .mi{padding:7px 14px; cursor:pointer; display:flex; align-items:center; gap:8px; color:#d1d4dc;}
  .popmenu .mi:hover{background:var(--accent); color:#fff;}
  .popmenu .msep{height:1px; background:var(--border); margin:4px 0;}
  .popmenu .sw{width:12px; height:12px; border-radius:2px; display:inline-block;}
  .popmenu .mi svg{width:15px; height:15px; flex:none; fill:none; stroke:currentColor;
    stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round;}

  /* ── side panels (indicators / alerts) ── */
  .panel{position:absolute; display:none; z-index:300; top:90px; left:60px; width:340px; max-height:70vh;
    background:#1e222d; border:1px solid var(--border); border-radius:8px; box-shadow:0 8px 32px #000a;
    overflow:hidden; flex-direction:column;}
  .panel.open{display:flex;}
  .panel .ph{padding:12px 14px; font-weight:600; font-size:14px; border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center;}
  .panel .ph .cl{cursor:pointer; color:var(--muted); font-size:18px;}
  .panel .pb{overflow-y:auto; padding:6px 0;}
  .panel .pi{padding:9px 14px; cursor:pointer; display:flex; align-items:center; gap:8px; font-size:13px;}
  .panel .pi:hover{background:var(--hover);}
  .panel .pi .pinm{flex:1;}
  .panel .pi .meta{color:var(--muted); font-size:11px;}
  .panel .pi .star{color:var(--muted); font-size:14px; cursor:pointer; width:16px; text-align:center;}
  .panel .pi .star.on{color:#f5c518;} .panel .pi .star:hover{color:#f5c518;}
  .panel .indtabs{display:flex; gap:4px; padding:6px 12px 0;}
  .panel .indtab{font-size:12px; padding:5px 10px; border-radius:5px 5px 0 0; cursor:pointer; color:var(--muted); border-bottom:2px solid transparent;}
  .panel .indtab:hover{color:var(--text);}
  .panel .indtab.active{color:var(--text); border-bottom-color:var(--accent);}
  .panel .search{margin:8px 12px; padding:7px 10px; background:#131722; border:1px solid var(--border);
    border-radius:5px; color:#d1d4dc; font-size:13px; outline:none;}
  .panel .indcat{font-size:10px; font-weight:700; letter-spacing:.6px; color:var(--muted);
    text-transform:uppercase; padding:10px 14px 4px; position:sticky; top:0; background:#1e222d;}

  /* ── settings dialog ── */
  #dlgBackdrop{position:fixed; inset:0; background:#0008; display:none; z-index:400;}
  #dlgBackdrop.open{display:block;}
  .dialog{position:fixed; display:none; z-index:401; top:50%; left:50%; transform:translate(-50%,-50%);
    width:360px; background:#1e222d; border:1px solid var(--border); border-radius:10px;
    box-shadow:0 12px 48px #000c; flex-direction:column;
    /* Phone WebViews are narrower than the fixed dialog widths below — never overflow. */
    max-width:calc(100vw - 12px);}
  /* Fib settings needs room for the 2-column level grid — widen it and never scroll sideways. */
  .dialog.fib-dialog{width:460px;}
  .dialog .db{scrollbar-width:thin; scrollbar-color:#3a3f4b #131722;}
  .dialog .db::-webkit-scrollbar{width:10px;}
  .dialog .db::-webkit-scrollbar-track{background:#131722;}
  .dialog .db::-webkit-scrollbar-thumb{background:#3a3f4b; border-radius:5px; border:2px solid #131722;}
  .dialog .db::-webkit-scrollbar-thumb:hover{background:#4a505e;}
  .dialog.open{display:flex;}
  .dialog .dh{padding:14px 16px; font-weight:600; font-size:15px; border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center;}
  .dialog .dh .cl{cursor:pointer; color:var(--muted); font-size:20px;}
  .dialog .db{padding:14px 16px; display:flex; flex-direction:column; gap:12px; max-height:64vh; overflow-y:auto; overflow-x:hidden;}
  .dialog .field{display:flex; justify-content:space-between; align-items:center; gap:10px;}
  .dialog .field label{font-size:13px; color:#d1d4dc;}
  .dialog .field input[type=number], .dialog .field input[type=text], .dialog .field select{
    width:120px; padding:6px 8px; background:#131722; border:1px solid var(--border); border-radius:5px;
    color:#d1d4dc; font-size:13px; outline:none;}
  .dialog .field input[type=color]{width:34px; height:26px; padding:0; border:1px solid var(--border);
    border-radius:4px; background:#131722; cursor:pointer;}
  .dialog .field input[type=range]{width:120px;}
  /* Indicator settings dashboard — TradingView-style Inputs/Style/Visibility tabs */
  .dialog .dtabs{display:flex; gap:18px; padding:0 16px; border-bottom:1px solid var(--border);}
  .dialog .dtab{padding:10px 0; font-size:13px; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px;}
  .dialog .dtab:hover{color:#d1d4dc;}
  .dialog .dtab.active{color:#d1d4dc; border-bottom-color:var(--accent);}
  .dialog .dpane{display:none;} .dialog .dpane.active{display:flex; flex-direction:column; gap:12px;}
  .dialog .dsec{font-size:11px; letter-spacing:.4px; color:var(--muted); text-transform:uppercase; margin-top:4px;}
  .dialog .prow{display:flex; align-items:center; gap:8px; justify-content:space-between;}
  .dialog .prow .pl{display:flex; align-items:center; gap:8px; font-size:13px; color:#d1d4dc; flex:1; min-width:0;}
  .dialog .prow .pl input[type=checkbox]{flex:none;}
  .dialog .prow .pc{display:flex; align-items:center; gap:6px; flex:none;}
  .dialog .prow input[type=color]{width:34px; height:26px; padding:0; border:1px solid var(--border); border-radius:4px; background:#131722; cursor:pointer;}
  .dialog .prow select{padding:5px 6px; background:#131722; border:1px solid var(--border); border-radius:5px; color:#d1d4dc; font-size:12px; outline:none;}
  .dialog .prow input[type=number], .dialog .prow input[type=text]{padding:5px 6px; background:#131722; border:1px solid var(--border); border-radius:5px; color:#d1d4dc; font-size:12px; outline:none;}
  .dialog .prow .pw{width:52px;}
  /* ⓘ Information dialog — read-only prose, so it's wider and the body text wraps. */
  .dialog.info-dlg{width:480px;}
  .dialog .infotext{font-size:13px; line-height:1.55; color:#d1d4dc; white-space:normal; margin-top:-4px;}
  .dialog .infotext em{font-style:normal; font-weight:600; color:#fff;}
  /* Draggable header (info dialog). touch-action:none so a drag doesn't scroll the page. */
  .dialog .dh.dh-drag{cursor:move; touch-action:none; user-select:none;}
  .dialog .dh.dh-drag .cl{cursor:pointer;}
  .dialog .infocat{font-size:12px; color:var(--muted); padding-bottom:2px; border-bottom:1px solid var(--border);}
  .dialog.ma-dlg{width:520px;}
  .dialog .ma-editrow{gap:6px; justify-content:flex-start;}
  .dialog .ma-editrow .ma_type, .dialog .ma-editrow .ma_src{flex:none; width:72px;}
  .dialog .ma-editrow .ma_ls{flex:none; width:66px;}
  .dialog .ma-editrow .ma_p{width:64px;}
  .dialog .ma-editrow .ma_w{width:46px;}
  .dialog .ma-editrow .ma_del{margin-left:auto;}
  /* ── Fib retracement level editor (2-column grid) ── */
  .dialog .fib-grid{display:grid; grid-auto-flow:column; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:6px 14px; width:100%; box-sizing:border-box;}
  .dialog .fib-lvl{display:flex; align-items:center; gap:6px;}
  .dialog .fib-lvl{gap:8px;}
  .dialog .fib-lvl input[type=number]{flex:1; width:auto; min-width:0; padding:5px 8px; background:#131722; border:1px solid var(--border); border-radius:5px; color:#d1d4dc; font-size:12px; outline:none;}
  .dialog .fib-lvl input[type=color]{width:28px; height:24px; padding:0; border:1px solid var(--border); border-radius:4px; background:#131722; cursor:pointer;}
  .dialog .fib-lvl input[type=checkbox]{flex:none;}
  .dialog .fib-pager{display:flex; align-items:center; justify-content:center; gap:14px; margin-top:4px;}
  .dialog .fib-pager span{font-size:12px; color:var(--muted);}
  .dialog .fib-parrow{width:26px; height:24px; border-radius:5px; border:1px solid var(--border); background:#131722; color:#d1d4dc; cursor:pointer; font-size:15px; line-height:1;}
  .dialog .fib-parrow:hover:not(:disabled){background:var(--hover);}
  .dialog .fib-parrow:disabled{opacity:.35; cursor:default;}
  /* ── Template menu ── */
  .dialog .df{position:relative;}
  .dialog .fib-tpl-wrap{position:relative;}
  .dialog .fib-tpl-menu{display:none; position:absolute; bottom:calc(100% + 6px); left:0; min-width:200px;
    background:#1e222d; border:1px solid var(--border); border-radius:8px; box-shadow:0 8px 28px #000b;
    padding:6px 0; z-index:410; max-height:300px; overflow-y:auto;
    scrollbar-width:thin; scrollbar-color:#3a3f4b #131722;}
  .dialog .fib-tpl-menu.open{display:block;}
  .dialog .fib-tpl-menu::-webkit-scrollbar{width:10px;}
  .dialog .fib-tpl-menu::-webkit-scrollbar-track{background:#131722;}
  .dialog .fib-tpl-menu::-webkit-scrollbar-thumb{background:#3a3f4b; border-radius:5px; border:2px solid #131722;}
  .dialog .fib-tpl-menu .tpli{padding:8px 14px; font-size:13px; color:#d1d4dc; cursor:pointer; display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .dialog .fib-tpl-menu .tpli:hover{background:var(--hover);}
  .dialog .fib-tpl-menu .tpli-sep{height:1px; background:var(--border); margin:5px 0;}
  .dialog .fib-tpl-menu .tpli-del{color:var(--muted); font-size:11px; opacity:0;}
  .dialog .fib-tpl-menu .tpli-named:hover .tpli-del{opacity:1;}
  .dialog .fib-tpl-menu .tpli-del:hover{color:#ef5350;}
  .dialog .df{padding:12px 16px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px;}
  .dialog .btn, .panel .btn{padding:7px 16px; border-radius:5px; border:none; cursor:pointer; font-size:13px;}
  .dialog .btn.primary, .panel .btn.primary{background:var(--accent); color:#fff;}
  .dialog .btn.ghost, .panel .btn.ghost{background:transparent; color:#d1d4dc; border:1px solid var(--border);}

  /* ── Create-alert dialog (TradingView-style) ── */
  .alertdlg{width:440px;}
  /* Freeview Script editor */
  .scriptdlg{width:600px;}
  .scriptdlg textarea{width:100%; height:300px; resize:vertical; font-family:'SF Mono',Menlo,Consolas,monospace;
    font-size:12px; line-height:1.5; background:#0e1117; color:#d1d4dc; border:1px solid var(--border);
    border-radius:6px; padding:10px; outline:none; tab-size:2;}
  .scriptdlg textarea:focus{border-color:var(--accent);}
  #scriptLegend{display:flex; flex-direction:column; gap:2px; margin-top:2px;}
  .alertdlg .dh .sym{display:inline-flex;align-items:center;gap:6px;font-weight:700;}
  .alertdlg .arow{display:flex;align-items:flex-start;gap:14px;padding:6px 0;}
  .alertdlg .arow > .alabel{width:92px;flex:none;font-size:13px;color:#e8e9ed;padding-top:7px;}
  .alertdlg .actl{flex:1;display:flex;flex-direction:column;gap:8px;}
  .alertdlg select, .alertdlg input[type=number], .alertdlg input[type=text], .alertdlg input[type=url], .alertdlg input[type=datetime-local]{
    width:100%;padding:8px 10px;background:#131722;border:1px solid var(--border);border-radius:6px;
    color:#d1d4dc;font-size:13px;outline:none;}
  .alertdlg select:focus, .alertdlg input:focus{border-color:var(--accent);}
  /* color-scheme:dark makes the browser render the native datetime picker (and its
     calendar glyph) in dark mode instead of the default white popup. */
  .alertdlg input[type=datetime-local]{color-scheme:dark;}
  /* 140px basis: side-by-side at desktop width, stacked rows on phone-width WebViews. */
  .alertdlg .twocol{display:flex;gap:8px;flex-wrap:wrap;}
  .alertdlg .twocol > *{flex:1 1 140px;min-width:0;}
  .alertdlg .addcond{color:var(--accent);font-size:13px;cursor:pointer;user-select:none;padding:2px 0;}
  .alertdlg .addcond:hover{text-decoration:underline;}
  .alertdlg .asep{height:1px;background:var(--border);margin:8px 0;}
  .alertdlg .notif{display:flex;flex-wrap:wrap;gap:14px;}
  .alertdlg .notif label{display:flex;align-items:center;gap:6px;font-size:13px;color:#d1d4dc;cursor:pointer;}
  .alertdlg .notif input[type=checkbox]{width:auto;}
  .alertdlg .hint{font-size:11px;color:#b8bcc6;}
  /* Custom sound-kind dropdown: native <option> can't render SVG icons. */
  .alertdlg .selkind{position:relative;}
  .alertdlg .selkind > button{width:100%;padding:8px 10px;background:#131722;border:1px solid var(--border);
    border-radius:6px;color:#d1d4dc;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:7px;text-align:left;}
  .alertdlg .selkind > button:focus{border-color:var(--accent);outline:none;}
  .alertdlg .selkind svg{width:15px;height:15px;flex:none;fill:none;stroke:currentColor;
    stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
  .alertdlg .selkind .car{margin-left:auto;color:var(--muted);font-size:10px;}
  .alertdlg .selkind .popmenu{left:0;right:0;top:calc(100% + 4px);min-width:0;}

  /* ── Add-symbol search dialog (TradingView-style) ── */
  .symdlg{width:500px;}
  .symdlg .db{padding:12px 14px 6px;}
  .symdlg .symsearch{display:flex;align-items:center;gap:8px;background:#131722;border:1px solid var(--border);
    border-radius:8px;padding:0 10px;}
  .symdlg .symsearch:focus-within{border-color:var(--accent);}
  .symdlg .symsearch svg{width:15px;height:15px;flex:none;fill:none;stroke:var(--muted);stroke-width:1.8;}
  .symdlg .symsearch input{flex:1;background:transparent;border:none;outline:none;color:#d1d4dc;
    font-size:14px;padding:10px 0;}
  .symdlg .symsearch input::placeholder{color:var(--muted);}
  .symdlg .symtabs{display:flex;gap:2px;margin-top:10px;border-bottom:1px solid var(--border);}
  .symdlg .symtab{appearance:none;background:transparent;border:none;cursor:pointer;color:var(--muted);
    font-size:12px;font-weight:500;padding:7px 9px;border-bottom:2px solid transparent;margin-bottom:-1px;
    border-radius:4px 4px 0 0;white-space:nowrap;}
  .symdlg .symstatus{margin-top:8px;font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .symdlg .symstatus::before{content:"";width:10px;height:10px;border:2px solid var(--border);
    border-top-color:var(--accent);border-radius:50%;animation:symspin .7s linear infinite;}
  @keyframes symspin{to{transform:rotate(360deg);}}
  .symdlg .symtab:hover{color:#d1d4dc;background:var(--hover);}
  .symdlg .symtab.cur{color:#fff;border-bottom-color:var(--accent);}
  .symdlg .symlist{margin-top:10px;max-height:46vh;overflow-y:auto;display:flex;flex-direction:column;}
  .symdlg .symlist::-webkit-scrollbar{width:8px;}
  .symdlg .symlist::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .symdlg .symrow{display:flex;align-items:center;gap:10px;padding:8px 8px;border-radius:6px;cursor:pointer;}
  .symdlg .symrow:hover,.symdlg .symrow.cur{background:var(--hover);}
  .symdlg .symrow .ic{width:24px;height:24px;border-radius:50%;flex:none;object-fit:cover;
    display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;}
  .symdlg .symrow .meta{flex:1;min-width:0;display:flex;flex-direction:column;}
  .symdlg .symrow .meta .id{font-size:13px;font-weight:600;color:#d1d4dc;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;}
  .symdlg .symrow .meta .nm{font-size:11px;color:var(--muted);white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;}
  .symdlg .symrow .exch{font-size:11px;color:var(--muted);flex:none;}
  .symdlg .symrow .plus{flex:none;width:22px;height:22px;border-radius:5px;display:inline-flex;
    align-items:center;justify-content:center;color:var(--muted);font-size:16px;}
  .symdlg .symrow:hover .plus{color:#fff;background:var(--panel);}
  .symdlg .symrow.added{cursor:default;}
  .symdlg .symrow.added .plus{color:var(--green);}
  .symdlg .symempty{padding:24px 8px;text-align:center;color:var(--muted);font-size:13px;}
  .symdlg .symfoot{padding:8px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);
    display:flex;justify-content:center;gap:6px;flex-wrap:wrap;}
  .symdlg .symfoot kbd{background:#131722;border:1px solid var(--border);border-radius:4px;
    padding:1px 6px;font-size:10px;color:#d1d4dc;font-family:inherit;}
  /* ── Spread builder ── */
  .symdlg .sp-build{padding:4px 2px 12px;border-bottom:1px solid var(--border);margin-bottom:8px;}
  .symdlg .sp-slots{display:flex;align-items:flex-end;gap:8px;}
  .symdlg .sp-slots .sp-div{font-size:22px;color:var(--muted);font-weight:600;padding-bottom:9px;}
  .symdlg .sp-slot{flex:1;min-width:0;cursor:pointer;}
  .symdlg .sp-slot .sp-lab{display:block;font-size:10.5px;color:var(--muted);margin-bottom:4px;padding-left:2px;}
  .symdlg .sp-chip{display:flex;align-items:center;gap:8px;background:#131722;border:1px solid var(--border);
    border-radius:8px;padding:8px 10px;min-height:22px;}
  .symdlg .sp-slot.active .sp-chip{border-color:var(--accent);}
  .symdlg .sp-slot .sp-ph{color:var(--muted);font-size:12.5px;}
  .symdlg .sp-slot .ic{width:20px;height:20px;border-radius:50%;flex:none;object-fit:cover;
    display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;}
  .symdlg .sp-slot .sp-id{flex:1;min-width:0;font-size:13px;font-weight:600;color:#d1d4dc;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .symdlg .sp-slot .sp-x{flex:none;color:var(--muted);font-size:15px;cursor:pointer;padding:0 2px;}
  .symdlg .sp-slot .sp-x:hover{color:#fff;}
  .symdlg .sp-preview{font-size:11.5px;color:var(--muted);margin:10px 2px 8px;}
  .symdlg .sp-preview b{color:#d1d4dc;}
  .symdlg .sp-add{width:100%;appearance:none;border:none;border-radius:8px;background:var(--accent);
    color:#fff;font-size:13px;font-weight:600;padding:9px;cursor:pointer;}
  .symdlg .sp-add:disabled{background:var(--border);color:var(--muted);cursor:default;}
  .symdlg .sp-pickhint{font-size:11px;color:var(--muted);margin:2px 2px 6px;}
  .symdlg .sp-pickhint b{color:var(--accent);}

  /* ── Bar replay control bar ── */
  #replayBar{position:absolute; bottom:12px; left:50%; transform:translateX(-50%); z-index:110;
    display:none; align-items:center; gap:8px; background:rgba(30,34,45,.95); border:1px solid var(--border);
    border-radius:8px; padding:5px 10px; box-shadow:0 4px 16px #0007;}
  #replayBar.active{display:flex;}
  #replayBar.picking{display:flex;}
  #replayBar .rb-btn{background:transparent; border:none; color:var(--text); cursor:pointer; font-size:14px; padding:3px 7px; border-radius:5px;}
  #replayBar .rb-btn:hover{background:var(--hover);}
  #replayBar .rb-hint{color:var(--muted); font-size:12px;}
  #replayBar .rb-pos{color:var(--muted); font-size:11px; font-variant-numeric:tabular-nums;}
  html.light #replayBar{background:rgba(248,249,253,.97);}

  /* ── Docked right-sidebar panel (Object tree / Data window / rail panels) ──
     Replaces the watchlist area while open — TradingView docks rail panels, never floats. */
  #rightPanel{width:var(--wl-w,300px); background:var(--bg); border-left:1px solid var(--border);
    display:none; flex-direction:column; overflow:hidden; position:relative;}
  #rightPanel.open{display:flex;}
  html.dock-open #watchlist{display:none;}
  #rpHead{padding:10px 12px; font-size:13px; font-weight:600; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; flex-shrink:0;}
  #rpClose{cursor:pointer; color:var(--muted); font-size:16px; line-height:1; padding:2px 6px; border-radius:4px;}
  #rpClose:hover{color:#fff; background:var(--hover);}
  #rpBody{flex:1; overflow-y:auto; display:flex; flex-direction:column;}
  /* Object tree ⇄ Data window tab bar (TV pill tabs) */
  .rp-tabs{display:flex; gap:4px; padding:8px 10px; border-bottom:1px solid var(--border); flex-shrink:0;}
  .rp-tab{flex:1; text-align:center; font-size:12px; font-weight:600; color:var(--muted); cursor:pointer;
    padding:6px 8px; border-radius:14px; user-select:none; white-space:nowrap;}
  .rp-tab:hover{color:var(--text);}
  .rp-tab.active{background:var(--hover); color:var(--text);}
  /* toolbar above the tree: new group / clone / z-order / clean all */
  .ot-toolbar{display:flex; align-items:center; gap:2px; padding:5px 10px; border-bottom:1px solid var(--border); flex-shrink:0;}
  .ot-toolbar .ot-tb{width:26px; height:26px; display:flex; align-items:center; justify-content:center;
    border-radius:5px; cursor:pointer; color:var(--muted);}
  .ot-toolbar .ot-tb:hover{background:var(--hover); color:var(--text);}
  .ot-toolbar .ot-tb svg{width:17px; height:17px; fill:none; stroke:currentColor; stroke-width:1.5;
    stroke-linecap:round; stroke-linejoin:round;}
  .ot-toolbar .ot-tb.disabled{opacity:.35; cursor:default;} .ot-toolbar .ot-tb.disabled:hover{background:none; color:var(--muted);}
  .ot-toolbar .ot-flex{flex:1;}
  /* tree rows */
  .ot-row{display:flex; align-items:center; gap:8px; padding:6px 12px; font-size:12px; cursor:pointer; position:relative;}
  .ot-row:hover{background:var(--hover);}
  .ot-row.selected{background:#1c2c4a;}
  .ot-row .ot-ic{width:16px; height:16px; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:var(--muted);}
  .ot-row .ot-ic svg{width:15px; height:15px; fill:none; stroke:currentColor; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round;}
  .ot-nm{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text);}
  .ot-row.ot-hidden .ot-nm, .ot-row.ot-hidden .ot-ic{opacity:.45;}
  .ot-nm input{width:100%; background:#131722; border:1px solid var(--accent); border-radius:4px;
    color:var(--text); font:inherit; padding:1px 5px; outline:none;}
  /* inline hover actions: lock / eye / delete (TV shows them on row hover only) */
  .ot-acts{display:none; align-items:center; gap:2px; flex-shrink:0;}
  .ot-row:hover .ot-acts{display:flex;}
  .ot-row.ot-hidden .ot-acts, .ot-row.ot-locked .ot-acts{display:flex;}  /* pinned state stays visible */
  .ot-acts span{width:20px; height:20px; display:flex; align-items:center; justify-content:center;
    border-radius:4px; cursor:pointer; color:var(--muted);}
  .ot-acts span:hover{background:#2a2e39; color:var(--text);}
  .ot-acts span.ot-del:hover{color:var(--red);}
  .ot-acts span.on{color:var(--accent);}
  .ot-acts svg{width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round;}
  .ot-sym{font-weight:600;}
  .ot-empty{padding:6px 14px; color:var(--muted); font-size:11px;}
  .ot-cat{padding:8px 12px 4px; font-size:10px; letter-spacing:.5px; color:var(--muted);}
  /* Data window tab */
  .dw-sec{padding:8px 14px 4px; font-size:11px; font-weight:600; color:var(--text);}
  .dw-row{display:flex; justify-content:space-between; gap:10px; padding:3px 14px; font-size:12px;}
  .dw-row .k{color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .dw-row .v{color:var(--text); font-variant-numeric:tabular-nums; white-space:nowrap;}
  /* alerts panel re-parented into the dock */
  #alertsPanel.docked{display:block !important; position:static; width:auto; max-height:none;
    background:transparent; box-shadow:none; border:none; border-radius:0; flex:1; overflow-y:auto;}
  #alertsPanel.docked .ph{display:none;}   /* dock supplies the header */
  #wlNameBtn{cursor:pointer; padding:2px 4px; border-radius:4px;} #wlNameBtn:hover{background:var(--hover);}
  #wlNameMenu{position:absolute; top:34px; left:12px; min-width:160px;}

  /* ── Strategy tester results panel ── */
  #strategyPanel{position:absolute; right:312px; bottom:38px; z-index:60; display:none; width:220px;
    background:var(--panel); border:1px solid var(--border); border-radius:8px; box-shadow:0 6px 20px #0007; font-size:12px;}
  #strategyPanel .sp-head{padding:7px 10px; font-weight:600; border-bottom:1px solid var(--border); display:flex; justify-content:space-between;}
  #strategyPanel .sp-x{cursor:pointer; color:var(--muted);} #strategyPanel .sp-x:hover{color:var(--red);}
  #strategyPanel .sp-stats{display:flex; flex-direction:column; gap:3px; padding:8px 10px; border-bottom:1px solid var(--border);}
  #strategyPanel .sp-stats span{display:flex; justify-content:space-between; color:var(--muted);}
  #strategyPanel .sp-stats b{color:var(--text);}
  #strategyPanel .sp-trades{max-height:160px; overflow-y:auto; padding:4px 0;}
  #strategyPanel .sp-row{display:flex; justify-content:space-between; padding:3px 10px; color:var(--muted); font-variant-numeric:tabular-nums;}

  /* ── Toast notifications ── */
  #toastWrap{position:fixed; bottom:44px; left:50%; transform:translateX(-50%); z-index:600;
    display:flex; flex-direction:column; gap:6px; align-items:center; pointer-events:none;}
  #toastWrap .toast{background:#2a2e39; color:var(--text); border:1px solid var(--border); border-radius:6px;
    padding:8px 14px; font-size:12px; box-shadow:0 4px 16px #0008; opacity:1; transition:opacity .3s, transform .3s;}
  #toastWrap .toast.out{opacity:0; transform:translateY(6px);}
  #toastWrap .toast.ok{border-color:var(--green);} #toastWrap .toast.err{border-color:var(--red);}
  html.light #toastWrap .toast{background:#fff;}

  /* alert price lines drawn by lightweight-charts createPriceLine - styled inline */

  /* ── Pair info card (right-click → View details) ── */
  #pairCard{position:fixed; z-index:402; top:50%; left:50%; transform:translate(-50%,-50%);
    width:560px; max-width:94vw; max-height:88vh; overflow-y:auto; overflow-x:hidden; background:var(--panel);
    border:1px solid var(--border); border-radius:14px; box-shadow:0 24px 64px #000e, 0 0 0 1px #ffffff0a inset;
    display:none; flex-direction:column;}
  #pairCard.open{display:flex; animation:pcIn .16s ease-out;}
  @keyframes pcIn{from{opacity:0; transform:translate(-50%,-46%) scale(.98);} to{opacity:1; transform:translate(-50%,-50%) scale(1);}}
  #pairCard::-webkit-scrollbar{width:9px;}
  #pairCard::-webkit-scrollbar-thumb{background:var(--border); border-radius:5px; border:2px solid var(--panel);}
  /* Header sits on a subtle gradient so the card reads as a "sheet". */
  #pairCard .pc-head{display:flex; align-items:center; gap:11px; padding:16px 16px 14px;
    background:linear-gradient(180deg,#ffffff08,transparent); border-bottom:1px solid var(--border);}
  #pairCard .pc-ic{width:38px; height:38px; border-radius:50%; flex:none; object-fit:contain; background:#2a2e39;
    color:#fff; font-size:14px; font-weight:700; display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 0 1px #ffffff14;}
  #pairCard .pc-tt{flex:1; min-width:0;}
  #pairCard .pc-sym{font-size:16px; font-weight:700; color:var(--text); letter-spacing:.2px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  #pairCard .pc-sub{font-size:11px; color:var(--muted); margin-top:2px; display:flex; align-items:center; gap:6px;}
  #pairCard .pc-badge{font-size:9.5px; font-weight:700; letter-spacing:.4px; text-transform:uppercase;
    color:var(--accent); background:#2962ff1f; border:1px solid #2962ff33; padding:1px 6px; border-radius:4px;}
  #pairCard .pc-x{cursor:pointer; color:var(--muted); font-size:18px; line-height:1; width:26px; height:26px;
    display:flex; align-items:center; justify-content:center; border-radius:6px; flex:none;}
  #pairCard .pc-x:hover{color:var(--text); background:var(--hover);}
  /* Price block: big number + a change chip. */
  #pairCard .pc-price{padding:14px 16px 16px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:16px;}
  #pairCard .pc-price-main{flex:none;}
  #pairCard .pc-last{font-size:30px; font-weight:800; color:var(--text); font-variant-numeric:tabular-nums; letter-spacing:-.5px; line-height:1;}
  #pairCard .pc-chg{display:inline-flex; align-items:center; gap:5px; font-size:12.5px; font-weight:700;
    margin-top:9px; padding:3px 9px; border-radius:6px; font-variant-numeric:tabular-nums;}
  #pairCard .pc-chg.up{color:var(--green); background:#26a69a1c;}
  #pairCard .pc-chg.down{color:var(--red); background:#ef53501c;}
  #pairCard .pc-desc{flex:1; min-width:0; text-align:left; font-size:12px; line-height:1.5; color:var(--text);}
  #pairCard .pc-desc a{color:var(--accent,#2962ff); text-decoration:none; font-weight:600;}

  #pairCard .pc-desc .pc-site{display:block; margin-top:4px;}
  #pairCard .pc-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:var(--border);}

  #pairCard .pc-cell.has-help:hover .pc-k::after{opacity:.8;}

  #pairCard .pc-sec{padding:11px 16px 6px; font-size:10px; font-weight:700; color:var(--muted);
    text-transform:uppercase; letter-spacing:.6px; background:var(--panel); display:flex; align-items:center; gap:8px;}
  #pairCard .pc-sec::after{content:""; flex:1; height:1px; background:var(--border);}
  #pairCard .pc-foot{padding:12px 16px 14px; display:flex; gap:9px;}
  #pairCard .pc-btn{flex:1; appearance:none; border:1px solid var(--border); background:var(--panel2);

  #pairCard .pc-btn.primary{background:var(--accent); border-color:var(--accent); color:#fff; box-shadow:0 2px 10px #2962ff40;}
  #pairCard .pc-btn:hover{filter:brightness(1.14);}

  html.light #pairCard .pc-cell[data-help]:hover::before{background:#fff; color:#131722;}

<script>
// ── Coinbase Exchange public API (no key, no paywall) ──
const API = "https://api.exchange.coinbase.com";

// ── CORS proxy ──────────────────────────────────────────────────────────
// Crypto exchange APIs (Coinbase/Binance/Bybit) send permissive CORS headers,
// so the browser calls them directly. Yahoo Finance (stocks/ETFs/forex/metals/
// indices — the global-market search and charting) does NOT — a static page
// can't fetch it cross-origin. We relay just those calls through a public CORS
// proxy. These free relays flake intermittently (occasional 403/500), so we try
// each proxy, then make a second pass after a short pause before giving up.
const CORS_PROXIES = [
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
  u => `https://thingproxy.freeboard.io/fetch/${u}`,
];
const sleep = ms => new Promise(r=>setTimeout(r, ms));
// fetch() with a hard timeout. A stalled upstream (endpoint accepts the socket but
// never responds) would otherwise block the awaiting caller forever — the chart's
// "sometimes it hangs / takes too long to load" glitch. AbortController turns that
// into a normal rejection after `ms`, so the existing retry/fallthrough logic runs.
async function fetchTimeout(url, ms=8000, opts){
  const ac = new AbortController();
  const t = setTimeout(()=>ac.abort(), ms);
  try{ return await fetch(url, { ...(opts||{}), signal: ac.signal }); }
  finally{ clearTimeout(t); }
}
// Fetch `url` through whichever proxy first returns parseable JSON. Some proxies
// answer 200 with an HTML landing/error page — we parse the body ourselves and
// fall through on anything that isn't JSON, rather than trusting status alone.
// Two passes total so a transient proxy hiccup doesn't fail an otherwise-good call.
async function proxyJSON(url){
  let lastErr;
  for(let pass=0; pass<2; pass++){
   if(pass) await sleep(500);
   for(const wrap of CORS_PROXIES){
    try{
      const r = await fetchTimeout(wrap(url), 8000);
      if(!r.ok){ lastErr = new Error("proxy "+r.status); continue; }
      const text = await r.text();
      try{ return JSON.parse(text); }
      catch{ lastErr = new Error("non-JSON from proxy"); continue; }   // HTML page → try next
    }catch(e){ lastErr = e; }
   }
  }
  throw lastErr || new Error("all proxies failed");
}

// ── Multi-exchange routing ──────────────────────────────────────────────
// A watchlist "leg" is the string stored in GROUPS[].symbols. Historically every
// leg was a Coinbase product id (BTC-USD), with ratios written A/B. We keep that
// as the default, and add an exchange prefix for the new venues:
//
//   BTC-USD              → Coinbase spot           (unchanged, back-compat)
//   BINANCE:BTCUSDT      → Binance spot
//   BINANCE:BTCUSDT.P    → Binance USDⓈ-M perpetual
//   BYBIT:BTCUSDT        → Bybit spot
//   BYBIT:BTCUSDT.P      → Bybit linear perpetual
//
// resolveLeg() turns any leg into a descriptor the data layer routes on. The
// candle + stats fetchers each normalise their exchange's payload to the common
// Coinbase shape ({time(sec), low, high, open, close, volume}) so the rest of the
// pipeline (sanitize/aggregate/makeRatio/render) is untouched.
const EX = {
  COINBASE: { id:"COINBASE", label:"Coinbase" },
  BINANCE:  { id:"BINANCE",  label:"Binance"  },
  BYBIT:    { id:"BYBIT",    label:"Bybit"    },
  // Yahoo Finance covers everything else TradingView lists: stocks, ETFs, forex,
  // commodities/metals, indices. Leg form is YF:<yahooSymbol> (YF:AAPL, YF:GC=F,
  // YF:EURUSD=X, YF:^GSPC). Routed through the CORS proxy.
  YAHOO:    { id:"YAHOO",    label:"TradingView" },
};
// Per-exchange interval strings keyed by our TF base granularity (seconds).
const BINANCE_IV = {60:"1m",300:"5m",900:"15m",3600:"1h",21600:"6h",86400:"1d"};
const BYBIT_IV   = {60:"1",  300:"5", 900:"15", 3600:"60",21600:"360",86400:"D"};
// Yahoo chart endpoint: {interval, range}. Range is capped per interval to the
// deepest window Yahoo serves at THAT resolution — asking range=max with a daily
// interval silently downsamples to quarterly bars, so we cap daily at 10y (true
// daily) and let the app's aggregate() roll daily up to the 6h/12h/1w buckets.
const YAHOO_IV = {
  60:    {iv:"1m",  range:"7d"},   300:  {iv:"5m",  range:"60d"},
  900:   {iv:"15m", range:"60d"},  3600: {iv:"60m", range:"730d"},
  21600: {iv:"1d",  range:"10y"},  86400:{iv:"1d",  range:"10y"},
};

function resolveLeg(leg){
  if(leg.includes(":")){
    const ci = leg.indexOf(":");
    const exRaw = leg.slice(0, ci), restRaw = leg.slice(ci+1);    // Yahoo syms may hold ":"? none do, but be safe
    const ex = exRaw.toUpperCase();
    if(ex==="YF" || ex==="YAHOO") return { exchange:EX.YAHOO, rest:restRaw, isPerp:false, leg };
    const isPerp = restRaw.endsWith(".P");
    const rest = isPerp ? restRaw.slice(0,-2) : restRaw;          // BTCUSDT
    if(ex==="BINANCE") return { exchange:EX.BINANCE, rest, isPerp, leg };
    if(ex==="BYBIT")   return { exchange:EX.BYBIT,   rest, isPerp, leg };
  }
  // default: Coinbase spot product id (BTC-USD)
  return { exchange:EX.COINBASE, rest:leg, isPerp:false, leg };
}
// Base ticker for logo / display (BTC from any venue's leg).
function legBase(leg){
  const r = resolveLeg(leg);
  if(r.exchange.id==="COINBASE") return r.rest.split("-")[0];
  // Yahoo symbol IS the ticker (AAPL, SPY); strip Yahoo's class suffixes for logos
  if(r.exchange.id==="YAHOO") return r.rest.replace(/[=^].*$/,"").split(".")[0] || r.rest;
  // BINANCE/BYBIT rest is BASEQUOTE; strip a known quote suffix
  const m = r.rest.match(/^(.*?)(USDT|USDC|USD|BTC|ETH|EUR|TRY|FDUSD|DAI)$/);
  return m ? m[1] : r.rest;
}
// Human label for a leg, e.g. "BTCUSDT.P", "BTC-USD", or "AAPL".
function legShort(leg){
  const r=resolveLeg(leg);
  if(r.exchange.id==="COINBASE") return r.rest;
  if(r.exchange.id==="YAHOO")    return r.rest;
  return r.rest+(r.isPerp?".P":"");
}
// Clean display label for any symbol: a plain leg → its ticker; a spread A/B →
// each leg shortened (drops BINANCE:/BYBIT: prefixes), e.g.
// "BINANCE:NEARUSDT/BINANCE:INJUSDT" → "NEARUSDT/INJUSDT".
function symLabel(sym){
  return String(sym).includes("/")
    ? String(sym).split("/").map(legShort).join("/")
    : legShort(sym);
}
// Venue label for the live-status line, derived from the active symbol (handles ratios).
function activeVenueLabel(){
  const sym = (typeof activeSymbol!=="undefined") ? activeSymbol : "";
  const exs = [...new Set(String(sym).split("/").map(s=>resolveLeg(s).exchange.label))];
  return (exs.length ? exs.join(" / ") : "Coinbase") + " API";
}

// Coin logos from CoinCap's free icon CDN (BASE symbol, lowercased).
// ASTER isn't on CoinCap → falls back to a letter circle.
const NO_LOGO = new Set(["ASTER","NIL"]);
// encodeURIComponent so a hostile base (from an old persisted symbol) can't break out
// of the src attribute / inject markup when this URL lands in an <img src>.
function logoForBase(base){ return `https://assets.coincap.io/assets/icons/${encodeURIComponent(String(base).toLowerCase())}@2x.png`; }
function logoUrl(sym){
  const base = legBase(sym).toLowerCase();
  return `https://assets.coincap.io/assets/icons/${base}@2x.png`;
}
// Spread icon: one circle split diagonally — leg A's coin in the top-left triangle,
// leg B's in the bottom-right. A leg whose icon is missing (NO_LOGO) or 404s falls
// back to a letter half. Same escaping discipline as the single-coin <img> paths.
function splitIconHtml(sym, cls="ic"){
  const legs = String(sym).split("/");
  const half = (leg, side)=>{
    const base = legBase(leg||"").toUpperCase();
    const initial = escHtml(base[0]||"?");
    if(!base || NO_LOGO.has(base))
      return `<span class="half ${side}" style="background:#2962ff">${initial}</span>`;
    return `<img class="half ${side}" src="${logoForBase(base)}" alt="${escHtml(base)}" onerror="this.outerHTML='<span class=\\'half ${side}\\' style=\\'background:#2962ff\\'>${initial}</span>'">`;
  };
  return `<span class="${cls} split">${half(legs[0],"l")}${half(legs[1],"r")}</span>`;
}

let tzOffsetMin = 0;   // persisted below; default UTC
function tzShift(ms){ return new Date(ms + tzOffsetMin*60000); }
function tickLabel(t, type){
  // Numeric times are UNIX seconds; {year,month,day} business-days come through as objects.
  const d = (typeof t === "object")
    ? new Date(Date.UTC(t.year, t.month-1, t.day))
    : tzShift(t*1000);
  switch(type){
    case 0:  return String(d.getUTCFullYear());                       // year boundary
    case 1:  return _MONTHS[d.getUTCMonth()];                         // month boundary
    case 2:  return String(d.getUTCDate());                           // day within month
    default: return String(d.getUTCHours()).padStart(2,"0") + ":" +   // intraday
                    String(d.getUTCMinutes()).padStart(2,"0");
  }
}
// Crosshair bottom-axis tag formatter (full date+time in the selected zone).
function crosshairTimeFmt(t){
  const d = (typeof t==="object") ? new Date(Date.UTC(t.year,t.month-1,t.day)) : tzShift(t*1000);
  const dd=String(d.getUTCDate()).padStart(2,"0"), mon=_MONTHS[d.getUTCMonth()], yr=String(d.getUTCFullYear()).slice(2);
  const hh=String(d.getUTCHours()).padStart(2,"0"), mm=String(d.getUTCMinutes()).padStart(2,"0");
  return `${dd} ${mon} '${yr}  ${hh}:${mm}`;
}

    // future region is padded with whitespace, ticks can land mid-month and months
    // get skipped or print a stray day number. Deriving the label from the tick date
    // gives clean, TradingView-style month/day/year labels across the future region.
    tickMarkFormatter:(t,type)=>tickLabel(t,type) },
  crosshair:{ mode:0 },
  // priceFormatter drives every price-axis tick label, the last-value tag, and the
  // crosshair price — fmtPrice keeps 4–5 decimals for sub-$1 symbols instead of the
  // library default's 2, so tags like 0.4213 show full precision.
  localization:{ timeFormatter:crosshairTimeFmt, priceFormatter:v=>fmtPrice(v) },
