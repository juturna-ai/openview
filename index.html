function onToolClick(t,el){
  if(t.action){ if(t.key==="clear"){ if(confirm("Remove all drawings?")){ snapshotDraw(); draw.shapes=[]; draw.sel=null; persist(); redraw(); } } return; }
  if(t.toggle){
    el.classList.toggle("active");
    const on=el.classList.contains("active");
    if(t.key==="magnet") draw.magnet=on;
    if(t.key==="stay")   draw.stay=on;
    if(t.key==="lock")   draw.locked=on;
    if(t.key==="hide"){  draw.hidden=on; redraw(); }
    return;
  }
  selectTool(t.key);
}

// Activate a tool by key (also used to auto-return to crosshair after placing).
function selectTool(key){
  // Update category buttons: highlight the category that owns `key`, and make that
  // category's button show/activate `key` (so the rail reflects the active tool).
  if(typeof TOOL_CATEGORIES!=="undefined"){
    const owner=TOOL_CATEGORIES.find(c=>c.tools.includes(key));
    if(owner) catCurrent[owner.id]=key;
    document.querySelectorAll('.tool.cat').forEach(btn=>{
      const cat=TOOL_CATEGORIES.find(c=>c.id===btn.dataset.cat); if(!cat) return;
      const isOwner=cat.tools.includes(key);
      btn.classList.toggle("active", isOwner);
      if(isOwner){ btn.dataset.tool=key; const m=toolMeta(key); if(m) btn.innerHTML=m.icon()+(cat.tools.length>1?'<span class="catarrow">◢</span>':""); }
    });
  }
  draw.tool=key; draw.pending=null; draw.needClicks=0; draw.pendingClickMode=false; draw.sel=null;
  // The canvas is ALWAYS interactive now (pointerEvents stays "auto"). The chart's own
  // pan/zoom is disabled while drawing tools are active; in crosshair mode we forward
  // empty-space drags to the chart manually (see the pan logic in mousedown/move).
  const drawing=(key!=="cross");
  dcanvas.style.cursor = drawing ? "crosshair" : "default";
  // We handle pan (dcanvas mousedown) and zoom (dcanvas wheel) manually because
  // the overlay canvas hides these gestures from the chart's own handlers.
  chart.applyOptions({ handleScroll:false, handleScale:false });
  redraw();
}

// No-op kept for boot compatibility (panning + hover are handled inline now).
function installHoverTracker(){}

// Manual chart pan for crosshair mode (the canvas always covers the chart, so the
// chart's built-in drag-to-scroll can't see the gesture — we forward it here).
// Horizontal drag scrolls the time scale; vertical drag shifts the price scale
// (TradingView-style free pan in any direction).
let panState=null;
function startPan(p){
  const ts=chart.timeScale();
  panState={ startX:p.x, startY:p.y, startScroll:ts.scrollPosition(),
             startRange:null, h:dcanvas.clientHeight||1 };
  capturePanPrice();   // snapshot the current price range so vertical drag can slide it
}
// Snapshot the current visible PRICE RANGE (min/max) so a vertical drag can
// translate it. We shift the whole range up/down by the dragged pixel delta
// converted to price — this has NO [0,1] bound (unlike scaleMargins), so the
// user can drag the band as far as they want, exactly like TradingView. The span
// (max-min) is preserved, so candle SIZE never changes — a pure translation.
// Seeds manualPriceRange on first drag so the offset sticks. Returns false only
// if the scale isn't readable yet.
// When the user takes manual control of the price scale (drag/pan/stretch), zero
// the scale margins so manualPriceRange maps 1:1 to the pane. With the default
// 0.2/0.1 margins LWC pads the returned range, which inflates the rendered span
// and compounds across successive vertical pans. We seed manualPriceRange from
// the CURRENTLY VISIBLE range at the same moment we zero the margins, so the
// pixels don't jump. resetPriceScale restores the default margins + auto-scale.
let _manualMargins=false;
function enterManualScale(){
  if(_manualMargins) return true;
  const r = manualPriceRange || visiblePriceRange();
  if(!r) return false;
  _manualMargins=true;
  manualPriceRange = { min:r.min, max:r.max };
  try{ chart.priceScale("right").applyOptions({ scaleMargins:{ top:0, bottom:0 } }); }catch(e){}
  candle.applyOptions({});
  return true;
}
function capturePanPrice(){
  if(!enterManualScale()) return false;
  panState.startRange = { min:manualPriceRange.min, max:manualPriceRange.max };
  return true;
}
function doPan(p){
  if(!panState) return;
  const ts=chart.timeScale();
  // — horizontal: scroll the time scale by whole-bar deltas —
  const spacing = currentBarSpacing();                       // px per bar
  const deltaBars = (p.x - panState.startX) / spacing;        // drag-right → scroll back
  let targetScroll = panState.startScroll - deltaBars;
  // Clamp the back-scroll so the oldest LOADED bar can't be dragged past the left
  // edge into empty negative-index space (which blanks the chart, then "bounces"
  // when a lazy older-history prepend snaps it back). A fast swipe can jump `from`
  // by >1000 bars in one gesture — far past the from<200 loadOlderHistory trigger —
  // so without this clamp the fetch can't keep up and the view strands in the void.
  // Bound so the visible range's left edge (`from`) stays at ≥0: the extra bars we
  // can still scroll back = (current from). scrollPosition moves 1:1 with `from`,
  // so subtract that headroom from startScroll to get the floor. Kick off a deepen
  // when we hit the wall so continued dragging keeps pulling in history.
  // Don't let `from` go below 0. `from` and scrollPosition move 1:1, so the floor
  // for the target scroll is (currentScroll − currentFrom): scrolling back by that
  // much lands `from` exactly on 0 (oldest bar at the left edge).
  const vr = ts.getVisibleLogicalRange();
  if(vr){
    const floor = ts.scrollPosition() - Math.max(0, vr.from);
    if(targetScroll < floor){
      targetScroll = floor;
      if(!_loadingOlder && !_historyExhausted) loadOlderHistory();   // pull more so the wall recedes
    }
  }
  ts.scrollToPosition(targetScroll, false);
  // — vertical: translate the price range 1:1 with the cursor (unbounded) —
  if(!panState.startRange){                                   // late-bind if press was too early
    if(capturePanPrice()) panState.startY = p.y;             // re-anchor so there's no jump
  }
  if(panState.startRange){
    const dy = p.y - panState.startY;                         // px dragged (down = +)
    const span = panState.startRange.max - panState.startRange.min;
    // px→price: pane height maps to the span. Drag DOWN (dy>0) moves the view
    // down, i.e. prices under the cursor increase → shift the range UP. Panning
    // takes over the price scale (auto-scale off until the axis is double-clicked),
    // same as TradingView.
    const dPrice = (dy / panState.h) * span;
    manualPriceRange = { min:panState.startRange.min + dPrice, max:panState.startRange.max + dPrice };
    candle.applyOptions({});                                  // re-run autoscale with the shifted range
  }
  redraw();
}
function currentBarSpacing(){
  // estimate px-per-bar from two visible bars
  if(lastData.length<2) return 6;
  const a=lastData[lastData.length-2], b=lastData[lastData.length-1];
  const xa=chart.timeScale().timeToCoordinate(a.time), xb=chart.timeScale().timeToCoordinate(b.time);
  if(xa!=null&&xb!=null&&xa!==xb) return Math.abs(xb-xa);
  return 6;
}
// TradingView-style zoom limits, expressed as BAR SPACING (px per bar) not bar count:
//   span ≈ chartWidth / barSpacing. Zoom IN until a bar is ~ZOOM_MAX_BAR_SPACING wide
//   (≈4 bars fill the screen — the "almost infinite" zoom-in feel), zoom OUT until
//   spacing hits ZOOM_MIN_BAR_SPACING (sub-pixel), never past the loaded history.
// Shared by every zoom path (wheel, keyboard +/-, time-axis drag) so they agree.
const ZOOM_MAX_BAR_SPACING = 350;   // px per bar at deepest zoom-in
const ZOOM_MIN_BAR_SPACING = 0.5;   // px per bar at widest zoom-out
function zoomSpanLimits(){
  const w = (dcanvas.clientWidth || chartEl.clientWidth || 1);
  const loadedBars = (lastData && lastData.length) ? lastData.length : w;
  return {
    minSpan: Math.max(1, w / ZOOM_MAX_BAR_SPACING),                 // deepest zoom-in
    maxSpan: Math.min(loadedBars * 1.2, w / ZOOM_MIN_BAR_SPACING),  // widest zoom-out
  };
}

// ── Wheel-zoom sensitivity ──
// A mouse fires ONE discrete event per notch (|deltaY| ≈ 100px, or 1-3 "lines").
// A trackpad pinch/two-finger scroll fires a high-frequency STREAM of small-deltaY
// events. The old code used only the SIGN of deltaY (`deltaY>0 ? 1.1 : 1/1.1`), so
// every one of those tiny trackpad events applied a FULL notch of zoom and the zoom
// compounded: the same 100px of physical scroll gave 1.1x on a mouse but 1.1^10 =
// 2.59x on a trackpad. Fix: make the zoom EXPONENT proportional to the delta's
// magnitude, so total zoom depends on total scroll distance, not event count.
//   factor = ZOOM_STEP ^ (delta / WHEEL_NOTCH)
// One 100px mouse notch → ZOOM_STEP^1 = 1.1x (identical to before — mice unchanged).
// Ten 10px trackpad events → ZOOM_STEP^(10 * 0.1) = 1.1x total (was 2.59x).
// TRACKPAD_DAMPING then divides trackpad sensitivity by a further 3x, as requested.
const ZOOM_STEP        = 1.1;   // zoom per full notch — matches the old per-event factor
const WHEEL_NOTCH      = 100;   // px of deltaY in one mouse notch (DOM_DELTA_PIXEL)
const TRACKPAD_DAMPING = 3;     // trackpad-only: 3x less sensitive
// Normalize deltaY to PIXELS. deltaMode 1 = lines (~16px), 2 = pages (~1 viewport).
function wheelDeltaPx(e){
  const d = e.deltaY;
  if(e.deltaMode === 1) return d * 16;                       // DOM_DELTA_LINE
  if(e.deltaMode === 2) return d * (dcanvas.clientHeight || 800); // DOM_DELTA_PAGE
  return d;                                                  // DOM_DELTA_PIXEL
}
// Heuristic: mouse wheels emit coarse, quantized deltas (|deltaY| a multiple of ~100,
// or deltaMode=line). Trackpads emit fine-grained pixel deltas. Anything small and
// non-integer-notch is a trackpad. Only trackpads get the extra damping — a mouse
// wheel keeps its exact current feel.
function isTrackpadWheel(e){
  if(e.deltaMode !== 0) return false;            // line/page mode → real wheel
  return Math.abs(e.deltaY) < WHEEL_NOTCH;       // fine-grained → trackpad
}
// The multiplicative zoom factor for one wheel event. >1 = zoom out, <1 = zoom in.
function wheelZoomFactor(e){
  let px = wheelDeltaPx(e);
  if(isTrackpadWheel(e)) px /= TRACKPAD_DAMPING;
  return Math.pow(ZOOM_STEP, px / WHEEL_NOTCH);
}


// ── Right price-axis vertical drag (TradingView-style scale stretch) ──
// The overlay canvas covers the chart, so the chart's own axisPressedMouseMove
// never sees the gesture. We detect a press in the axis gutter and adjust a manual
// price range: drag DOWN expands the range (zoom out / candles shrink), drag UP
// compresses it (zoom in / candles grow). Double-click the axis → back to auto.
let axisDrag=null;
// True when the point is over the right price-axis gutter (the strip past the plot).
function inPriceAxis(p){
  const w=dcanvas.clientWidth;
  return p.x >= w - axisW() && p.x <= w;
}
// Read the plot's current visible price span from the candle's pixel↔price map.
function visiblePriceRange(){
  const h=dcanvas.clientHeight;
  let top=candle.coordinateToPrice(0), bot=candle.coordinateToPrice(h);
  if(top==null || bot==null){ const f=priceFit(); if(!f) return null;
    top=f.p1+(0-f.y1)*f.slope; bot=f.p1+(h-f.y1)*f.slope; }
  const max=Math.max(top,bot), min=Math.min(top,bot);
  return (isFinite(max)&&isFinite(min)&&max>min) ? {min,max} : null;
}
function startAxisDrag(p){
  // Zero margins + seed manualPriceRange from the visible range (no jump), then
  // re-base from the REQUESTED manual range — not a read-back of LWC's clamped
  // coordinate map — so the library's floor can't cap successive zoom-ins.
  if(!enterManualScale()) return false;
  const r = manualPriceRange;
  axisDrag={ startY:p.y, base:r, center:(r.min+r.max)/2, span:r.max-r.min };
  dcanvas.style.cursor="ns-resize";
  return true;
}
function doAxisDrag(p){
  if(!axisDrag) return;
  const h=dcanvas.clientHeight||1;
  // Drag distance as a fraction of pane height → exponential zoom factor so the
  // feel is symmetric up vs down. Down (dy>0) → factor>1 (expand range / zoom out).
  const dy=p.y-axisDrag.startY;
  const factor=Math.exp(dy/h * 2.2);            // 2.2 ≈ TradingView sensitivity
  const span=Math.max(axisDrag.span*factor, 1e-12);
  manualPriceRange={ min:axisDrag.center-span/2, max:axisDrag.center+span/2 };
  candle.applyOptions({});                        // nudge LWC to re-run autoscaleInfoProvider
  redraw();
}
// ── Bottom time-axis horizontal drag (TradingView-style bar-spacing stretch) ──
// Mirror of the price-axis drag but on the X axis: drag LEFT expands the span
// (zoom out / more bars visible), drag RIGHT compresses it (zoom in). Anchored at
// the right edge so the latest bar stays put. Double-click the strip → fit all.
//
// NOTE: the date axis is only drawn under the BOTTOM-most pane (RSI / indicator /
// script pane when present, else the main chart). That strip is NOT under the
// #draw overlay, so this is wired at the document level and hit-tested in PAGE
// coordinates against the bottom pane's own timeScale().height() gutter.
let timeDrag=null;
// DOM element that hosts a given pane chart (for page-coordinate hit-testing).
function paneElFor(c){
  if(c===chart) return chartEl;
  if(c===rsiChart) return rsiEl;
  try{ const ind=indicators.find(i=>i.subChart===c); if(ind&&ind.paneEl) return ind.paneEl; }catch(e){}
  try{ const s=scripts.find(x=>x.subChart===c); if(s&&s.paneEl) return s.paneEl; }catch(e){}
  return null;
}
// The bottom-most visible pane chart — the one that actually renders the date axis.
function bottomPaneChart(){
  const list=allPaneCharts();
  return list[list.length-1] || chart;
}
// If the page point (client coords) lands in the bottom pane's date-axis strip,
// return {chart, el}; otherwise null. Excludes the right price-axis gutter.
function timeAxisHitPage(clientX, clientY){
  const c=bottomPaneChart(); const el=paneElFor(c); if(!el) return null;
  const r=el.getBoundingClientRect();
  let taxH=28, axisW=64;
  try{ const h=c.timeScale().height(); if(h>0) taxH=h; }catch(e){}
  try{ const w=c.priceScale("right").width(); if(w>0) axisW=w; }catch(e){}

// Document-level listeners: the date strip lives outside #draw, so bind globally.

// The RSI pane is its own LWC chart with no overlay canvas, so we hit-test the

// mirroring the main chart's axis drag. Drag DOWN expands (zoom out), UP
// compresses (zoom in). Double-click the RSI axis → back to the 18–82 default.
let rsiAxisDrag=null;
function rsiAxisW(){
  try{ const w=rsiChart.priceScale("right").width(); if(w>0) return w; }catch(e){}
  return 64;

function rsiEvtPt(e){ const r=rsiEl.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; }
function inRsiPriceAxis(p){ const w=rsiEl.clientWidth; return p.x >= w-rsiAxisW() && p.x <= w; }

// ── RSI pane touch bridge (phones) ──────────────────────────────────────────
// The pane's built-in pan/zoom is disabled (`common`) and the axis stretch above is

// re-dispatches the same mouse events → the existing stretch logic runs. Alert-line
// touch dragging (rsiAlertDragStart, registered later) still wins outside the axis:
// this bridge only claims the gesture when the axis actually grabbed it.
function _rsiTouchMouse(type, target, t){
  target.dispatchEvent(new MouseEvent(type, {
    clientX:t.clientX, clientY:t.clientY, button:0, buttons:type==="mouseup"?0:1,
    bubbles:true, cancelable:true, view:window,
  }));
}
// Time pan (1 finger, horizontal) + pinch-zoom (2 fingers) on the RSI PLOT — mirrors
// the main pane's dcanvas gestures. Both drive chart.timeScale(); the RSI pane's time

// The right-edge axis gutter still owns vertical value-stretch (rsiAxisDrag).
let _rsiTimePan=null, _rsiPinch=null;
function _rsiPt(t){ const r=rsiEl.getBoundingClientRect(); return { x:t.clientX-r.left, y:t.clientY-r.top }; }
rsiEl.addEventListener("touchstart", e=>{
  if(rsiAlertDrag) return;
  if(e.touches.length===1){
    _rsiTouchMouse("mousedown", rsiEl, e.touches[0]);     // starts rsiAxisDrag iff in axis
    if(rsiAxisDrag){ e.preventDefault(); return; }        // axis gutter → value-stretch
    // Plot body → start a horizontal time pan (drives the shared time scale). Also
    // remember the start point + a moved flag so a TAP (no drag) can surface the ⊕
    // quick-add-alert button at that level (touch has no hover to show it otherwise).
    const range=chart.timeScale().getVisibleLogicalRange();
    if(range){ _rsiTimePan={ startX:e.touches[0].clientX, startY:e.touches[0].clientY, startScroll:chart.timeScale().scrollPosition(), moved:false }; stopAutoSnap(); e.preventDefault(); }

    const [a,b]=e.touches;

                range:chart.timeScale().getVisibleLogicalRange(),

rsiEl.addEventListener("touchmove", e=>{
  if(rsiAxisDrag && e.touches.length){ _rsiTouchMouse("mousemove", document, e.touches[0]); e.preventDefault(); return; }
  if(_rsiPinch && e.touches.length>=2){
    const [a,b]=e.touches;

    const {from,to}=_rsiPinch.range, span=to-from;
    const rect=rsiEl.getBoundingClientRect();
    const frac=Math.min(1, Math.max(0, (_rsiPinch.midX-rect.left)/(rect.width||1)));
    const anchor=from+span*frac;
    const newSpan=span/(d/_rsiPinch.d);

  } else if(_rsiTimePan && e.touches.length===1){

    const deltaBars=(t.clientX-_rsiTimePan.startX)/currentBarSpacing();
    let target=_rsiTimePan.startScroll-deltaBars;
    const vr=ts.getVisibleLogicalRange();
    if(vr){ const floor=ts.scrollPosition()-Math.max(0, vr.from);
      if(target<floor){ target=floor; if(!_loadingOlder && !_historyExhausted) loadOlderHistory(); } }

  // A stationary TAP on the plot (no pan). Touch has no hover, so this is how a phone

    const t=e && e.changedTouches && e.changedTouches[0];

      const hitId=rsiAlertHit(p);

      else if(rsiCrossPlusEl && p.y>7 && p.y<rsiEl.clientHeight-7 && !inRsiPriceAxis(p)){

rsiEl.addEventListener("touchend", _rsiTouchEnd);
rsiEl.addEventListener("touchcancel", _rsiTouchEnd);
// Mouse-wheel zoom over the RSI plot (desktop) — mirrors the main pane's dcanvas wheel
// handler, anchored at the cursor's x, driving the shared time scale. Skips the right
// axis gutter (that's value-scale territory). shift/horizontal wheel → sideways pan.
rsiEl.addEventListener("wheel", e=>{
  const p={ x:e.clientX-rsiEl.getBoundingClientRect().left };
  if(inRsiPriceAxis(p)) return;                        // axis gutter: leave value-scale alone
  e.preventDefault(); stopAutoSnap();
  const ts=chart.timeScale(); const range=ts.getVisibleLogicalRange(); if(!range) return;
  const { from, to }=range, span=to-from;
  if(e.shiftKey || Math.abs(e.deltaX) > Math.abs(e.deltaY)){
    const delta=(e.shiftKey ? e.deltaY : e.deltaX);
    let shift=(delta/100)*span*0.1;
    if(from+shift < 0){ shift=-from; if(!_loadingOlder && !_historyExhausted) loadOlderHistory(); }

  }
  const w=rsiEl.clientWidth-rsiAxisW() || 1;
  const frac=Math.min(1, Math.max(0, p.x/w));

  const { minSpan, maxSpan }=zoomSpanLimits();
  const newSpan=Math.min(maxSpan, Math.max(minSpan, span*factor));

// ─────────────────────────────────────────────────────────────────────
//  COORDINATE CONVERSION  (price/time ⇄ pixels)
//
//  These MUST be total functions: every drawing point has to resolve to a pixel
//  even when it sits past the last bar (future) or outside the visible price
//  band — otherwise an endpoint vanishes or the line gets clipped ("eaten") the
//  instant it crosses the edge. We always fall back to a linear extrapolation
//  built from two reference points we know map cleanly.
// ─────────────────────────────────────────────────────────────────────

// Two bars whose time maps to a real (non-null) x. Prefer the tail, but scan
// inward so an anchor still exists when the last bars are scrolled off-screen
// (precisely the case where the old last-two-bars code returned null → "wall").
function timeAnchors(){
  const ts=chart.timeScale();
  // Collect every bar that currently maps to a real pixel.
  const pts=[];
  for(let i=0;i<lastData.length;i++){
    const x=ts.timeToCoordinate(lastData[i].time);
    if(x!=null) pts.push({time:lastData[i].time, x});
  }
  if(pts.length<2) return null;
  // CRITICAL: use anchors that are FAR APART in pixels, not the last two bars.
  // Adjacent bars near the right edge are often <3px apart; extrapolating 100px+
  // into the future off a 3px baseline amplifies sub-pixel error into a huge gap
  // (the line endpoint drifting away from its handle). The first + last visible
  // bars give the widest, most stable baseline.
  const a=pts[0], b=pts[pts.length-1];
  return (a.x!==b.x && a.time!==b.time) ? {a,b} : null;
}

function timeToX(time){
  const c=chart.timeScale().timeToCoordinate(time);
  if(c!=null) return c;
  const an=timeAnchors();
  if(!an) return lastData.length ? chart.timeScale().timeToCoordinate(lastData[lastData.length-1].time) : null;
  const {a,b}=an;
  return b.x + (time-b.time)*(b.x-a.x)/(b.time-a.time);
}
function xToTime(x){
  const t=chart.timeScale().coordinateToTime(x);
  if(t!=null) return t;
  // Past the last bar coordinateToTime returns null. Extrapolate WITHOUT rounding
  // so the value round-trips exactly through timeToX (otherwise the handle "sticks").
  const an=timeAnchors();
  if(!an) return lastData.length?lastData[lastData.length-1].time:0;
  const {a,b}=an;
  return b.time + (x-b.x)*(b.time-a.time)/(b.x-a.x);   // fractional time, no Math.round
}

// Price ⇄ y. coordinateToPrice / priceToCoordinate return null outside the
// visible price band; fit a line through two probe coordinates so off-band
// endpoints still resolve instead of nuking the whole shape.
function priceFit(){
  const H=dcanvas.clientHeight||1;
  const y1=Math.round(H*0.25), y2=Math.round(H*0.75);
  const p1=candle.coordinateToPrice(y1), p2=candle.coordinateToPrice(y2);
  if(p1==null||p2==null||p1===p2||y1===y2) return null;
  return {y1, p1, slope:(p2-p1)/(y2-y1)};            // price = p1 + (y-y1)*slope
}
function priceToY(price){
  const y=candle.priceToCoordinate(price);
  if(y!=null) return y;
  const f=priceFit(); if(!f) return null;
  return f.y1 + (price-f.p1)/f.slope;
}
function yToPrice(y){
  const p=candle.coordinateToPrice(y);
  if(p!=null) return p;
  const f=priceFit(); if(!f) return null;
  return f.p1 + (y-f.y1)*f.slope;
}

// Drive the chart's built-in crosshair from the overlay cursor so the crosshair
// lines and the right-axis price tag + bottom-axis time tag follow the mouse
// (TradingView behaviour). The overlay canvas otherwise eats the mousemove.
// setCrosshairPosition() doesn't reliably fire subscribeCrosshairMove when driven
// programmatically, so we also refresh the OHLC legend ourselves here.
function updateCrosshair(p){
  try{
    const price=candle.coordinateToPrice(p.y);
    const time=chart.timeScale().coordinateToTime(p.x);
    if(price==null || time==null){ chart.clearCrosshairPosition(); syncCrosshairToPanes(null, chart); relayXhairToGrid(null); return; }
    chart.setCrosshairPosition(price, time, candle);
    updateOhlcLegend(time);
    updateIndLegendValues(time);         // indicator readouts follow the crosshair
    updateDataWindow(time);              // Data window tab (docked panel) too
    syncCrosshairToPanes(time, chart);   // relay onto RSI + indicator/script panes
    relayXhairToGrid(time);              // relay onto other GRID PANELS (embed only)
  }catch(e){}
}
// Show the OHLC of the bar nearest the crosshair time (or the hovered price when
// past the last bar / between bars with no exact match).
function updateOhlcLegend(time){
  if(!lastData.length) return;
  let best=lastData[0], bd=Infinity, bi=0;
  for(let i=0;i<lastData.length;i++){ const d=Math.abs(lastData[i].time-time); if(d<bd){bd=d;best=lastData[i];bi=i;} }
  const col = best.close>=best.open ? "var(--green)":"var(--red)";
  // Change vs previous bar's close (TradingView convention); falls back to open for bar 0.
  const prevClose = bi>0 ? lastData[bi-1].close : best.open;
  const chg = best.close - prevClose;
  const chgPct = prevClose ? (chg/prevClose*100) : 0;
  const up = chg>=0;
  const cCol = up ? "var(--green)":"var(--red)";
  const sign = up?"+":"−";
  document.getElementById("ohlc").innerHTML =
    `O<b>${fmt(best.open)}</b> H<b>${fmt(best.high)}</b> L<b>${fmt(best.low)}</b> C<b style="color:${col}">${fmt(best.close)}</b>`
    + ` <span style="color:${cCol}">${sign}${fmt(Math.abs(chg))} (${sign}${Math.abs(chgPct).toFixed(2)}%)</span>`;
}
// Width (px) of the right price-axis gutter — the strip past the plot where the
// candles don't render. Used to keep ray arrowheads off the axis price tag.
function axisW(){
  try{ const w=chart.priceScale("right").width(); if(w>0) return w; }catch(e){}
  return 64;   // sane default if the API is unavailable
}

function snap(time,price){
  if(!draw.magnet || !lastData.length) return {time,price};
  let best=lastData[0], bd=Infinity;
  for(const b of lastData){ const d=Math.abs(b.time-time); if(d<bd){bd=d;best=b;} }
  const cand=[best.open,best.high,best.low,best.close];
  let bp=cand[0], pd=Infinity;
  for(const p of cand){ const d=Math.abs(p-price); if(d<pd){pd=d;bp=p;} }
  return {time:best.time, price:bp};
}

function sizeCanvas(){
  const w=dcanvas.clientWidth, h=dcanvas.clientHeight, dpr=window.devicePixelRatio||1;
  dcanvas.width=w*dpr; dcanvas.height=h*dpr;
  dctx.setTransform(dpr,0,0,dpr,0,0);
  redraw();
}
function evtPt(e){ const r=dcanvas.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; }
function ptToCoord(p){ return snap(xToTime(p.x), yToPrice(p.y)); }

// ─────────────────────────────────────────────────────────────────────
//  POINTER STATE MACHINE  (the part that was broken — rewritten cleanly)
// ─────────────────────────────────────────────────────────────────────
// uid restarts at 1 each load while persisted shapes keep their saved ids, so
// skip past any id an existing shape already holds — otherwise the session's
// first new drawing collides with a persisted "s1" and id-based ops (object
// tree selection, per-id delete) become ambiguous.
let uid=1; function newId(){ let id; do{ id="s"+(uid++); }while(draw.shapes.some(s=>s.id===id)); return id; }

// Tracks the press location so mouseup can tell a CLICK from a DRAG.
let downPt=null, downMoved=false;
// True once any touch gesture has driven the synthetic mouse events — gates touch-only
// UX (sticky price line tap-toggle) so plain desktop mouse clicks keep their behavior.
let _touchActive=false;
// Set when a press's job was dismissing an alert hover pill — that tap must not ALSO
// toggle the sticky price line on release.
let _dismissedPill=false;

dcanvas.addEventListener("mousedown", e=>{
  if(e.button!==0) return;                 // left only; right handled by contextmenu
  e.preventDefault();
  stopAutoSnap();                          // a real pan gesture → stop auto-snapping to latest
  // Trusted = a real mouse press (the touch bridge dispatches untrusted synthetics) —
  // drop the touch flag so desktop clicks after touch input keep desktop behavior.
  if(e.isTrusted) _touchActive=false;
  const p=evtPt(e), c=ptToCoord(p);
  downPt=p; downMoved=false;

  // ── Right price-axis: vertical drag stretches the price scale (any mode). ──
  if(inPriceAxis(p) && startAxisDrag(p)){ downPt=null; return; }


  // ── Alert delete icon takes priority in any mode (it's only shown on hover). ──
  const trashId=alertTrashHit(p);
  if(trashId){ removeAlert(trashId); draw.alertHover=null; downPt=null; return; }

  // ── Crosshair ⊕: tap → add the alert right there (defaults; edit later via the
  // pill's long-press menu). ──
  if(draw.tool==="cross" && crossPlusHit &&
     Math.hypot(p.x-crossPlusHit.x, p.y-crossPlusHit.y)<=crossPlusHit.r+5){
    addQuickAlert(crossPlusHit.price);
    downPt=null; return;
  }

  // ── Alert line (or its hover pill, which is taller than the line's 6px hit band):
  // grab it to drag to a new price level (cross mode only). HOLDING on the pill
  // without moving opens the Pause/Edit/Delete menu instead. ──
  if(draw.tool==="cross"){
    const dragId=alertHit(p) || alertPillHit(p);
    if(dragId){ const da=alerts.find(z=>z.id===dragId);
      if(da){
        draw.alertDrag={ id:dragId }; draw.alertHover=dragId; redraw();
        if(alertPillHit(p)===dragId){
          const mx=e.clientX, my=e.clientY;
          _pillPressTimer=setTimeout(()=>{ _pillPressTimer=null;
            if(draw.alertDrag && draw.alertDrag.id===dragId && !downMoved){
              draw.alertDrag=null; downPt=null; redraw();
              showAlertMenu(dragId, mx, my);
            }
          }, 450);
        }
        return;
      } }
  }

  // ── A press anywhere else dismisses the on-line alert pill. On touch no mousemove
  // fires between taps, so the hover set by tapping the line would otherwise stick
  // forever — tap the line to show the pill, tap anywhere else to hide it. ──
  if(draw.alertHover!=null){ draw.alertHover=null; _dismissedPill=true; redraw(); }

  // ── Sticky price line: press near it → drag to a new level (stationary tap on it
  // resolves to dismiss in mouseup, same !downMoved discrimination as alert pills). ──
  if(draw.tool==="cross" && draw.stickyLine && !inPriceAxis(p)){
    const sy=priceToY(draw.stickyLine.price);
    if(sy!=null && Math.abs(p.y-sy)<8){ draw.stickyDrag=true; redraw(); return; }
  }

  // ── CROSSHAIR mode: click a shape → select/drag it; click empty → pan the chart ──
  if(draw.tool==="cross"){
    const hit = draw.locked ? null : hitTest(p);
    const hs = hit ? getShape(hit.id) : null;
    if(hit && hs && !hs.locked){ draw.sel=hit.id; snapshotDraw(); draw.drag={ id:hit.id, handle:hit.handle, last:c }; redraw(); }
    else if(hit && hs){ draw.sel=hit.id; redraw(); }   // locked: select but don't drag
    else { draw.sel=null; startPan(p); redraw(); }
    return;
  }

  // ── DRAW mode ──
  // If a multi-point shape is mid-placement (e.g. channel waiting for 3rd point),
  // this press adds the next point.
  if(draw.pending && draw.pendingClickMode){ addPendingPoint(c); return; }

  // Resize a handle of the currently-selected shape.
  if(!draw.locked && draw.sel){
    const ss=getShape(draw.sel);
    const hit=hitTest(p);
    if(hit && hit.id===draw.sel && typeof hit.handle==="number" && ss && !ss.locked){
      snapshotDraw(); draw.drag={ id:hit.id, handle:hit.handle, last:c }; redraw(); return;
    }
  }

  // Begin a new shape. The endpoint follows the cursor until release (drag) or
  // until the next click (click-click), whichever the user does.
  if(!draw.pending) startPending(c);
});

// ── Wheel zoom (and shift+wheel pan) ──
// The drawing canvas sits on top of the chart with pointer-events:auto, so the
// chart's own built-in wheel-zoom never sees the gesture. We implement it here:
// scroll = zoom in/out anchored under the cursor; shift+scroll = pan sideways.
dcanvas.addEventListener("wheel", e=>{
  e.preventDefault();
  stopAutoSnap();                                  // user is driving the view now
  const ts = chart.timeScale();
  const range = ts.getVisibleLogicalRange();
  if(!range) return;
  const { from, to } = range;
  const span = to - from;

  // Shift (or horizontal-dominant trackpad) → pan instead of zoom.
  if(e.shiftKey || Math.abs(e.deltaX) > Math.abs(e.deltaY)){
    const delta = (e.shiftKey ? e.deltaY : e.deltaX);
    let shift = (delta / 100) * span * 0.1;         // gentle horizontal pan
    // Same left-edge clamp as doPan: a fast trackpad swipe can push `from` far
    // past the oldest loaded bar into empty negative space (blank chart, then a
    // "bounce" when the lazy prepend lands). Floor `from` at 0 and kick off a
    // deepen when the wall is hit so continued scrolling keeps pulling history.
    if(from + shift < 0){
      shift = -from;
      if(!_loadingOlder && !_historyExhausted) loadOlderHistory();
    }
    ts.setVisibleLogicalRange({ from: from + shift, to: to + shift });
    redraw();
    return;
  }

  // Zoom anchored at the cursor: keep the bar under the pointer fixed.
  const p = evtPt(e);
  const w = dcanvas.clientWidth || 1;
  const frac = Math.min(1, Math.max(0, p.x / w));   // 0=left edge, 1=right edge
  const anchor = from + span * frac;                // logical index under cursor
  const factor = wheelZoomFactor(e);                 // wheel down = zoom out; trackpad-damped
  const { minSpan, maxSpan } = zoomSpanLimits();      // TradingView-style bar-spacing limits
  const newSpan = Math.min(maxSpan, Math.max(minSpan, span * factor));
  if(newSpan === span){ redraw(); return; }          // already at a clamp edge — don't nudge
  ts.setVisibleLogicalRange({
    from: anchor - (anchor - from) * (newSpan/span),
    to:   anchor + (to - anchor) * (newSpan/span),
  });
  redraw();
}, {passive:false});

function startPending(c){
  const tool=draw.tool;
  const need=CLICKS[tool]||2;
  if(need===1){ finishOneClick(tool,c); return; }
  if(need===0){ // freehand (brush) or click-to-add multi-point (polyline)
    draw.pending={ id:newId(), type:tool, pts:[c, {...c}], style:{...DEFAULT_STYLE}, freehand:(tool==="brush") };
    draw.needClicks=99;             // sentinel: ends on dblclick (polyline) / release (brush)
    draw.pendingClickMode=(tool==="polyline");  // polyline waits for clicks; brush tracks the drag
    redraw(); return;
  }
  draw.pending={ id:newId(), type:tool, pts:[c, {...c}], style:{...DEFAULT_STYLE} };
  if(tool==="fib"||tool==="fibext") draw.pending.fib=defaultFibConfig();
  draw.needClicks=need-1;           // points still to set after the first
  draw.pendingClickMode=false;      // becomes true if user releases without dragging
  redraw();
}

// Adds the next point in CLICK-CLICK mode (used for the 3rd point of a channel,
// or when the user clicks instead of drags).
function addPendingPoint(c){
  const pend=draw.pending;
  pend.pts[pend.pts.length-1]=c;
  // Polyline/path: unbounded — each click fixes a vertex and starts a new floating
  // one. Committed by double-click (handled in the dblclick listener).
  if(draw.needClicks===99){ pend.pts.push({...c}); redraw(); return; }
  draw.needClicks--;
  if(draw.needClicks<=0){ commitPending(); }
  else { pend.pts.push({...c}); redraw(); }
}

function commitPending(){
  const pend=draw.pending;
  draw.pending=null; draw.needClicks=0; draw.pendingClickMode=false;
  if(!pend) return;
  // reject a shape whose points are all the same spot (an accidental click)
  const a=pend.pts[0], b=pend.pts[pend.pts.length-1];
  const tooSmall = pend.pts.every(pt=>pt.time===a.time && pt.price===a.price);
  if(tooSmall){ redraw(); return; }
  snapshotDraw();
  const tool=pend.type;
  draw.shapes.push(pend);
  draw.sel=pend.id;
  persist();
  // TradingView default: after placing one drawing, return to the crosshair so the
  // next click SELECTS. With stay-in-drawing-mode on, re-pick the same tool to keep drawing.
  selectTool(draw.stay ? tool : "cross");
  redraw();
}

function finishOneClick(tool,c){
  if(tool==="text" || tool==="callout"){
    const txt=prompt(tool==="callout"?"Note:":"Text:", tool==="callout"?"Note":"Text");
    if(txt==null) return;
    snapshotDraw();
    const s={ id:newId(), type:tool, pts:[c], style:{...DEFAULT_STYLE, color:"#d1d4dc"}, text:txt };
    draw.shapes.push(s); draw.sel=s.id;
  } else {
    snapshotDraw();
    const s={ id:newId(), type:tool, pts:[c], style:{...DEFAULT_STYLE} };
    // Arrow marker points up (bullish) when placed at/below the bar close, down above it.
    if(tool==="arrowmark"){
      let nearest=lastData[0], bd=Infinity;
      for(const d of lastData){ const dd=Math.abs(d.time-c.time); if(dd<bd){bd=dd;nearest=d;} }
      s.dir = (nearest && c.price<=nearest.close) ? "up" : "down";
    }
    draw.shapes.push(s); draw.sel=s.id;
  }
  persist(); selectTool(draw.stay ? tool : "cross"); redraw();
}

dcanvas.addEventListener("mousemove", e=>{
  const p=evtPt(e), c=ptToCoord(p);
  draw.mouse=p;
  // Dragging the right price axis stretches the scale — handle before anything else.
  if(axisDrag){ doAxisDrag(p); return; }
  // Show the resize cursor when merely hovering the axis gutter (not dragging).
  if(!downPt && inPriceAxis(p)){ dcanvas.style.cursor="ns-resize"; return; }
  // The overlay canvas hides the cursor from the chart, so its built-in crosshair
  // (and the price/time axis tags) never move. Forward the cursor position so the
  // crosshair + axis labels track it like TradingView.
  updateCrosshair(p);
  if(downPt && !downMoved && Math.hypot(p.x-downPt.x, p.y-downPt.y)>3){ downMoved=true; clearPillPress(); }

  if(panState){ doPan(p); return; }                       // panning the chart (cross mode)
  // Dragging an alert line to a new price level.
  if(draw.alertDrag){ const da=alerts.find(z=>z.id===draw.alertDrag.id);
    if(da){ const np=yToPrice(p.y); if(np!=null){ da.value=np; da._last=null; redraw(); } }
    dcanvas.style.cursor="ns-resize"; return; }
  // Dragging the sticky price line to a new level.
  if(draw.stickyDrag && draw.stickyLine){ const np=yToPrice(p.y);
    if(np!=null){ draw.stickyLine.price=np; redraw(); }
    dcanvas.style.cursor="ns-resize"; return; }
  if(draw.drag && !draw.locked){ applyDrag(draw.drag, c); redraw(); return; }

  if(draw.pending){
    // Brush: while the button is held, append each sampled point to paint a stroke.
    if(draw.pending.freehand && downPt){ draw.pending.pts.push(c); redraw(); return; }
    draw.pending.pts[draw.pending.pts.length-1]=c;        // endpoint tracks cursor
    redraw(); return;
  }
  // hover feedback
  const hit=hitTest(p);
  const nh=hit?hit.id:null;
  // alert-line hover (shows its delete icon). A shape hover wins over it.
  const na = (!hit && draw.tool==="cross") ? alertHit(p) : null;
  let changed=false;
  if(nh!==draw.hover){ draw.hover=nh; changed=true; }
  if(na!==draw.alertHover){ draw.alertHover=na; changed=true; }
  // Cross mode always repaints so the crosshair ⊕ tracks the cursor (the crosshair-move
  // subscription only redraws when shapes/alerts exist).
  if(changed || draw.tool==="cross") redraw();
  const overTrash=alertTrashHit(p);
  dcanvas.style.cursor = overTrash ? "pointer"
                       : na ? "ns-resize"
                       : hit ? (hit.handle==="body"?"move":"pointer")
                       : (draw.tool==="cross"?(panState?"grabbing":"crosshair"):"crosshair");
});

// Hide the crosshair (and its axis tags) when the cursor leaves the chart.
dcanvas.addEventListener("mouseleave", ()=>{
  draw.mouse=null;
  try{ chart.clearCrosshairPosition(); }catch(e){}
  syncCrosshairToPanes(null, chart);     // drop the shared crosshair off every pane
  relayXhairToGrid(null);                // clear the shared vertical on other grid panels
  updateIndLegendValues(null);           // clear indicator hover readouts
  updateDataWindow(null);                // Data window falls back to the latest bar
  if(lastData.length){ updateOhlcLegend(lastData[lastData.length-1].time); }  // back to latest bar
  if(draw.hover||draw.alertHover){ draw.hover=null; draw.alertHover=null; }
  redraw();   // always repaint so the crosshair ⊕ (and any hover state) clears when the
              // cursor leaves the plot (e.g. moving down into the RSI/indicator pane) —
              // drawCrossPlus() returns early with draw.mouse=null, so this erases it.
});

// ── Touch bridge (phones / the mobile app's WebView) ────────────────────────
// The draw canvas replaced the chart's built-in gestures with MOUSE handlers
// (mousedown/mousemove/wheel above), which left touch completely dead on phones.
// One finger re-dispatches the same mouse events (pan / draw / drag / select all
// reuse the desktop code paths); two fingers pinch-zoom the time scale anchored
// at the pinch midpoint. touch-action:none in CSS keeps the browser from
// hijacking the gesture for page scroll.
let _pinch=null;
function _touchMouse(type, target, t){
  target.dispatchEvent(new MouseEvent(type, {
    clientX:t.clientX, clientY:t.clientY, button:0, buttons:type==="mouseup"?0:1,
    bubbles:true, cancelable:true, view:window,
  }));
}
dcanvas.addEventListener("touchstart", e=>{
  e.preventDefault();
  _touchActive=true;
  if(e.touches.length===1 && !_pinch){
    _touchMouse("mousedown", dcanvas, e.touches[0]);
  } else if(e.touches.length===2){
    // second finger down: abort any 1-finger pan/draw-in-progress, start pinch
    _touchMouse("mouseup", dcanvas, e.touches[0]);
    const [a,b]=e.touches;
    _pinch={ d:Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY)||1,
             range:chart.timeScale().getVisibleLogicalRange(),
             midX:(a.clientX+b.clientX)/2 };
    stopAutoSnap();
  }
}, {passive:false});
dcanvas.addEventListener("touchmove", e=>{
  e.preventDefault();
  if(_pinch && e.touches.length>=2){
    const [a,b]=e.touches;
    const d=Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);
    if(!_pinch.range || !d) return;
    const {from,to}=_pinch.range, span=to-from;
    const rect=dcanvas.getBoundingClientRect();
    const frac=Math.min(1, Math.max(0, (_pinch.midX-rect.left)/(rect.width||1)));
    const anchor=from+span*frac;
    const newSpan=span/(d/_pinch.d);
    chart.timeScale().setVisibleLogicalRange({ from:anchor-newSpan*frac, to:anchor+newSpan*(1-frac) });
    redraw();
  } else if(e.touches.length===1 && !_pinch){
    _touchMouse("mousemove", dcanvas, e.touches[0]);
  }
}, {passive:false});
function _touchEnd(e){
  if(e.touches.length===0){
    _pinch=null;
    // Dispatch on the canvas so the event BUBBLES through document up to window —
    // mouseup listeners live on both. changedTouches carries the lift-off point.
    const t=e.changedTouches && e.changedTouches[0];
    _touchMouse("mouseup", dcanvas, t || {clientX:0, clientY:0});
    // Finger lifted: hide the transient crosshair (touch never fires mouseleave, so
    // without this the dashed cross + axis tags linger at the last touch point). The
    // sticky price line is custom-drawn from draw.stickyLine and survives this.
    try{ chart.clearCrosshairPosition(); }catch(err){}
    draw.mouse=null; redraw();
  } else if(_pinch && e.touches.length<2){
    _pinch=null;
  }
}
dcanvas.addEventListener("touchend", _touchEnd, {passive:false});
dcanvas.addEventListener("touchcancel", _touchEnd, {passive:false});

window.addEventListener("mouseup", e=>{
  clearPillPress();                                     // release before the hold fires
  if(draw.alertDrag){                                   // end alert drag
    // Commit the dragged level rounded (2dp / 5 sig figs) — raw yToPrice floats otherwise
    // leak 10+ decimals into labels and push notifications.
    const da=alerts.find(z=>z.id===draw.alertDrag.id); if(da) da.value=roundAlertAuto(da.value);
    saveAlerts(); renderAlertsPanel(); draw.alertDrag=null; downPt=null; downMoved=false; redraw();
    return;
  }
  if(draw.stickyDrag){                                  // end sticky-line drag
    // Stationary press ON the line (no move) = tap → dismiss it; a real drag commits
    // the new level rounded, same as alert-line drags.
    if(!downMoved) draw.stickyLine=null;
    else if(draw.stickyLine) draw.stickyLine.price=roundAlertAuto(draw.stickyLine.price);
    draw.stickyDrag=false; downPt=null; downMoved=false; redraw();
    return;
  }
  if(axisDrag){ axisDrag=null; downPt=null; downMoved=false; dcanvas.style.cursor="default"; return; }  // end axis stretch
  if(panState){                                          // end chart pan
    // Stationary TOUCH tap on empty plot toggles the sticky price line: tap → dashed
    // level pinned at that price (survives finger-lift; its ⊕ sets an alert there);
    // tap anywhere again → dismissed. Desktop mouse clicks keep plain deselect/pan.
    const tapPt=downPt, wasTap=!downMoved, atePill=_dismissedPill;
    panState=null; downPt=null; downMoved=false; _dismissedPill=false;
    if(wasTap && !atePill && _touchActive && draw.tool==="cross" && tapPt && !inPriceAxis(tapPt)){
      if(draw.stickyLine) draw.stickyLine=null;
      else { const pr=yToPrice(tapPt.y); if(pr!=null) draw.stickyLine={ price:pr }; }
    }
    redraw(); return;
  }
  // finishing a drag-edit of an existing shape. If nothing actually moved (a plain
  // click that started a drag), discard the snapshot pushed at drag-start so undo
  // isn't cluttered with no-op entries.
  if(draw.drag){
    if(_undoStack.length && _undoStack[_undoStack.length-1]===JSON.stringify(draw.shapes)){ _undoStack.pop(); updateUndoButtons(); }
    else persist();
    draw.drag=null; downPt=null; return;
  }

  // finishing the creation gesture for a pending shape
  if(draw.pending){
    const pend=draw.pending;
    const need=CLICKS[pend.type]||2;
    // Brush: a stroke is complete the moment the button is released.
    if(pend.freehand){ if(pend.pts.length>2) commitPending(); else { draw.pending=null; redraw(); } downPt=null; downMoved=false; return; }
    if(downMoved){
      // PRESS-DRAG-RELEASE: the user dragged out the shape in one gesture.
      if(need<=2){
        // 2-point shapes are complete on release.
        commitPending();
      } else {
        // multi-point (channel): first segment set by the drag, remaining points
        // are placed by subsequent CLICKS.
        pend.pts.push({...pend.pts[pend.pts.length-1]});
        draw.needClicks=need-2;
        draw.pendingClickMode=true;
      }
    } else {
      // CLICK (no drag): switch to click-click mode and wait for the next click(s).
      draw.pendingClickMode=true;
    }
  }
  downPt=null; downMoved=false;
});

// double-click finishes a click-click pending (commit with current points) OR
// opens settings on a shape.
dcanvas.addEventListener("dblclick", e=>{
  // Double-click the price axis → reset to auto-scale (TradingView behaviour).
  if(inPriceAxis(evtPt(e))){ resetPriceScale(); return; }
  if(draw.pending){
    // drop the floating endpoint and commit what's placed
    if(draw.pending.pts.length>1) draw.pending.pts.pop();
    commitPending();
    return;
  }
  const hit=hitTest(evtPt(e));
  if(hit){ draw.sel=hit.id; openSettings(hit.id); return; }
  // Double-click empty chart body in crosshair mode → re-fit the price scale,
  // undoing any vertical pan/stretch (matches TradingView's double-click-to-reset).
  if(draw.tool==="cross" && manualPriceRange){ resetPriceScale(); }
});

// keyboard: Esc cancels, Del removes selected, Ctrl+Z/Y undo/redo
window.addEventListener("keydown", e=>{
  const typing = document.activeElement && /INPUT|TEXTAREA/.test(document.activeElement.tagName);
  if(e.key==="Escape"){ draw.pending=null; draw.needClicks=0; draw.sel=null; closeAllPopups(); redraw(); }
  if((e.key==="Delete"||e.key==="Backspace") && draw.sel!=null && !draw.locked){
    if(typing) return;
    const sh=getShape(draw.sel); if(sh && sh.locked) return;   // don't delete a locked drawing
    deleteShape(draw.sel);
  }
  // Undo / redo — Ctrl/Cmd+Z, Ctrl+Y or Ctrl/Cmd+Shift+Z. Skip while typing in a field.
  if((e.ctrlKey||e.metaKey) && !typing){
    const k=e.key.toLowerCase();
    if(k==="z" && !e.shiftKey){ e.preventDefault(); undoDraw(); }
    else if((k==="y") || (k==="z" && e.shiftKey)){ e.preventDefault(); redoDraw(); }
  }
  if(typing || e.ctrlKey || e.metaKey) return;
  const ts=chart.timeScale();
  // Arrow keys pan the time axis; +/- zoom; Alt+H drops a horizontal line at the crosshair.
  if(e.key==="ArrowLeft" || e.key==="ArrowRight"){
    e.preventDefault(); stopAutoSnap();
    const dir = e.key==="ArrowLeft" ? -1 : 1;
    try{ ts.scrollToPosition(ts.scrollPosition() + dir*3, false); }catch(err){}
    redraw();
  }
  else if(e.key==="+" || e.key==="=" || e.key==="-" || e.key==="_"){
    e.preventDefault(); stopAutoSnap();
    const r=ts.getVisibleLogicalRange(); if(!r) return;
    const span=r.to-r.from, mid=(r.from+r.to)/2;
    const zoomIn = (e.key==="+"||e.key==="=");
    const { minSpan, maxSpan }=zoomSpanLimits();   // TradingView-style bar-spacing limits
    const newSpan=Math.min(maxSpan, Math.max(minSpan, span*(zoomIn?1/1.2:1.2)));
    ts.setVisibleLogicalRange({ from:mid-newSpan/2, to:mid+newSpan/2 });
    redraw();
  }
  else if(e.altKey && (e.key==="h"||e.key==="H")){
    e.preventDefault();
    // place a horizontal line at the current crosshair price (or mid of visible range)
    const y = draw.mouse && draw.mouse.y!=null ? draw.mouse.y : dcanvas.clientHeight/2;
    const price = yToPrice(y);
    if(price!=null){
      snapshotDraw();
      const t = lastData.length ? lastData[lastData.length-1].time : Math.floor(Date.now()/1000);
      draw.shapes.push({ id:newId(), type:"hline", pts:[{time:t, price}], style:{...DEFAULT_STYLE} });
      persist(); redraw();
    }
  }
});

// ─────────────────────────────────────────────────────────────────────
//  DRAG / EDIT
// ─────────────────────────────────────────────────────────────────────
function getShape(id){ return draw.shapes.find(s=>s.id===id); }
function deleteShape(id){ snapshotDraw(); draw.shapes=draw.shapes.filter(s=>s.id!==id); if(draw.sel===id) draw.sel=null; persist(); redraw(); }

function applyDrag(drag,c){
  const s=getShape(drag.id); if(!s) return;
  if(typeof drag.handle==="number"){
    s.pts[drag.handle]=c;
  } else { // body: move all points by delta
    const dt=c.time-drag.last.time, dp=c.price-drag.last.price;
    s.pts=s.pts.map(pt=>({time:pt.time+dt, price:pt.price+dp}));
  }
  drag.last=c;
}

// ─────────────────────────────────────────────────────────────────────
//  HIT TESTING
// ─────────────────────────────────────────────────────────────────────
function px(pt){ return {x:timeToX(pt.time), y:priceToY(pt.price)}; }
function hitTest(p){
  for(let i=draw.shapes.length-1;i>=0;i--){
    const s=draw.shapes[i];
    if(s.hidden) continue;           // per-shape hide (Object tree eye)
    // handles first
    for(let h=0;h<s.pts.length;h++){
      const q=px(s.pts[h]);
      if(q.x!=null && q.y!=null && Math.hypot(p.x-q.x,p.y-q.y)<8) return {id:s.id, handle:h};
    }
    if(nearShape(s,p)) return {id:s.id, handle:"body"};
  }
  return null;
}
function nearShape(s,p){
  const a=px(s.pts[0]); if(a.x==null||a.y==null) return false;
  const W=dcanvas.clientWidth, H=dcanvas.clientHeight;
  if(s.type==="hline") return Math.abs(p.y-a.y)<6;
  if(s.type==="hray")  return Math.abs(p.y-a.y)<6 && p.x>=a.x;
  if(s.type==="vline") return Math.abs(p.x-a.x)<6;
  if(s.type==="crossline") return Math.abs(p.y-a.y)<6 || Math.abs(p.x-a.x)<6;
  if(s.type==="flag") return Math.abs(p.x-a.x)<16 && p.y<a.y && p.y>a.y-22;
  if(s.type==="pricelabel") return Math.abs(p.x-a.x)<70 && Math.abs(p.y-a.y)<12;
  if(s.type==="text"||s.type==="callout") return Math.abs(p.x-a.x)<60 && Math.abs(p.y-a.y)<14;
  // multi-point freehand / polygon: near any segment
  if(s.type==="polyline"||s.type==="brush"||s.type==="triangle"||s.type==="elliott"||s.type==="xabcd"||s.type==="headshoulders"){
    const Q=s.pts.map(px).filter(q=>q.x!=null);
    for(let i=0;i<Q.length-1;i++) if(distToSeg(p.x,p.y,Q[i].x,Q[i].y,Q[i+1].x,Q[i+1].y)<6) return true;
    if(s.type==="triangle" && Q.length>=3 && distToSeg(p.x,p.y,Q[Q.length-1].x,Q[Q.length-1].y,Q[0].x,Q[0].y)<6) return true;
    return false;
  }
  if(s.pts.length<2) return false;
  const b=px(s.pts[1]); if(b.x==null) return false;
  if(s.type==="prange") return Math.abs(p.y-a.y)<6 || Math.abs(p.y-b.y)<6;
  if(s.type==="drange") return Math.abs(p.x-a.x)<6 || Math.abs(p.x-b.x)<6;
  if(s.type==="arrow"||s.type==="info"||s.type==="angle") return distToSeg(p.x,p.y,a.x,a.y,b.x,b.y)<6;
  if(s.type==="dprange"){
    const x1=Math.min(a.x,b.x),x2=Math.max(a.x,b.x),y1=Math.min(a.y,b.y),y2=Math.max(a.y,b.y);
    return (p.x>=x1-4&&p.x<=x2+4&&(Math.abs(p.y-y1)<5||Math.abs(p.y-y2)<5))||(p.y>=y1-4&&p.y<=y2+4&&(Math.abs(p.x-x1)<5||Math.abs(p.x-x2)<5));
  }
  if(s.type==="gannfan"||s.type==="fibtbext"||s.type==="pitchfork") return distToSeg(p.x,p.y,a.x,a.y,b.x,b.y)<8;
  if(s.type==="arrowmark") return Math.abs(p.x-a.x)<8 && Math.abs(p.y-a.y)<18;
  if(s.type==="circle"){
    const r=Math.hypot(b.x-a.x,b.y-a.y); if(r<1) return false;
    const d=Math.hypot(p.x-a.x,p.y-a.y);
    return d>r-6 && d<r+6;
  }
  if(s.type==="regression") return distToSeg(p.x,p.y,a.x,a.y,b.x,b.y)<8;
  if(s.type==="rect"||s.type==="long"||s.type==="short"||s.type==="measure"||s.type==="gannbox"){
    const x1=Math.min(a.x,b.x),x2=Math.max(a.x,b.x),y1=Math.min(a.y,b.y),y2=Math.max(a.y,b.y);
    const onEdge = (p.x>=x1-4&&p.x<=x2+4&&(Math.abs(p.y-y1)<5||Math.abs(p.y-y2)<5)) ||
                   (p.y>=y1-4&&p.y<=y2+4&&(Math.abs(p.x-x1)<5||Math.abs(p.x-x2)<5));
    const inside = p.x>=x1&&p.x<=x2&&p.y>=y1&&p.y<=y2;
    return onEdge||inside;
  }
  if(s.type==="ellipse"){
    const cx=(a.x+b.x)/2, cy=(a.y+b.y)/2, rx=Math.abs(b.x-a.x)/2, ry=Math.abs(b.y-a.y)/2;
    if(rx<1||ry<1) return false;
    const v=((p.x-cx)**2)/(rx*rx)+((p.y-cy)**2)/(ry*ry);
    return v>0.7 && v<1.3;
  }
  if(s.type==="ray"){ const [ex,ey]=extend(a.x,a.y,b.x,b.y,W,H); return distToSeg(p.x,p.y,a.x,a.y,ex,ey)<6; }
  if(s.type==="ext"){ const [sx,sy]=extend(b.x,b.y,a.x,a.y,W,H),[ex,ey]=extend(a.x,a.y,b.x,b.y,W,H); return distToSeg(p.x,p.y,sx,sy,ex,ey)<6; }
  // default: segment a-b (trend, fib lines, channel, etc.)
  return distToSeg(p.x,p.y,a.x,a.y,b.x,b.y)<6;
}
function distToSeg(px_,py,x1,y1,x2,y2){
  const dx=x2-x1,dy=y2-y1,l2=dx*dx+dy*dy;
  if(l2===0) return Math.hypot(px_-x1,py-y1);
  let t=((px_-x1)*dx+(py-y1)*dy)/l2; t=Math.max(0,Math.min(1,t));
  return Math.hypot(px_-(x1+t*dx),py-(y1+t*dy));
}

// Swap a pane with its neighbor above (dir −1) or below (dir +1) inside #subPanes —
// TradingView's "Move pane up/down". The date axis re-derives from DOM order via
// allPaneCharts()/updateTimeAxisVisibility.
function movePane(el, dir){
  const wrap=document.getElementById("subPanes"); if(!wrap || el.parentElement!==wrap) return;
  const sib = dir<0 ? el.previousElementSibling : el.nextElementSibling;
  if(!sib) return;
  if(dir<0) wrap.insertBefore(el, sib); else wrap.insertBefore(sib, el);
  setTimeout(()=>{ try{ resize(); sizeCanvas(); alignPriceAxes(); }catch(e){} },0);
}
(function wireRsiPaneControls(){
  const label=document.getElementById("rsiLabel"); if(!label) return;
  // Host the RSI pane inside #subPanes so it participates in pane reordering.
  try{ const wrap=document.getElementById("subPanes");
    wrap.insertBefore(rsiWrapEl, wrap.firstChild); wrap.style.display="flex"; }catch(e){}
  // `cls` overrides the default .subClose (the info button is styled by .infoBtn instead).
  const mk=(txt,title,fn,cls)=>{ const s=document.createElement("span"); s.className=cls||"subClose"; s.textContent=txt; s.title=title; s.onclick=fn; label.appendChild(s); return s; };
  // No ↑/↓ reorder buttons (owner request): the arrow glyphs render as odd vertical
  // dotted strokes on phones. Label keeps info/collapse/settings/close only.
  mk("i","Information — what this indicator does", ()=>openIndicatorInfo("rsi","RSI"), "infoBtn");
  mk("▁","Collapse / restore", rsiCollapse);
  mk("⚙","RSI settings", ()=>openRsiSettings());
  mk("×","Close RSI pane", hideRsiPane);
  // Top-border drag: resize the pane like TradingView (min 70px, max 60% of the window).
  // Updates are coalesced to ONE per animation frame, and within that frame the chart,
  // RSI chart, and drawings overlay are all resized together so nothing repaints out of
  // step (per-mousemove updates made the drawings visibly bounce during the drag).
  // The axis-width recompute (alignPriceAxes, inside resize()) is deferred to mouseup —
  // re-running it mid-drag jitters the plot width.
  const grip=document.createElement("div"); grip.className="paneResize"; grip.title="Drag to resize pane";
  grip.addEventListener("pointerdown", e=>{
    e.preventDefault(); e.stopPropagation();
    try{ grip.setPointerCapture(e.pointerId); }catch(err){}
    const startY=e.clientY, startH=rsiWrapEl.getBoundingClientRect().height;
    let raf=0, lastY=e.clientY;
    const apply=()=>{
      raf=0;
      const h=Math.max(70, Math.min(window.innerHeight*0.6, startH-(lastY-startY)));
      rsiWrapEl.classList.remove("pane-collapsed");
      rsiWrapEl.style.flex="0 0 "+h+"px"; rsiWrapEl.style.height=h+"px";
      try{
        chart.applyOptions({ width:chartEl.clientWidth, height:chartEl.clientHeight });
        rsiChart.applyOptions({ width:rsiEl.clientWidth, height:rsiEl.clientHeight });
        sizeCanvas();
        // LWC applies its coordinate remap a beat after applyOptions — reproject the
        // overlay once more next frame so drawings can't sit on a stale mapping while
        // the mouse is held still mid-drag.
        requestAnimationFrame(()=>{ try{ redraw(); }catch(e){} });
      }catch(err){}
    };
    const onMove=ev=>{ lastY=ev.clientY; if(!raf) raf=requestAnimationFrame(apply); };
    const onUp=()=>{
      document.removeEventListener("pointermove",onMove); document.removeEventListener("pointerup",onUp);
      if(raf){ cancelAnimationFrame(raf); raf=0; }
      try{ resize(); sizeCanvas(); }catch(err){}
    };
    document.addEventListener("pointermove",onMove); document.addEventListener("pointerup",onUp);
  });
  rsiWrapEl.appendChild(grip);
  // Honor a previously-closed pane on boot.
  try{ if(localStorage.getItem("fv_rsi_on")==="0") rsiWrapEl.style.display="none"; }catch(e){}
})();

// Per-tool style capabilities for the generic tabbed settings dialog.
// Flags: fill(has fill+opacity), text(text+color+size), arrow(arrow-head toggle),
// extend(extend dropdown), label:false(hide "Show price label").
const TOOL_CAPS={
  trend:{extend:true}, ray:{}, ext:{}, info:{}, angle:{}, crossline:{}, arrow:{arrow:true}, arrowmark:{arrow:true},
  hline:{}, hray:{}, vline:{label:false},
  rect:{fill:true}, ellipse:{fill:true}, circle:{fill:true}, triangle:{fill:true}, polyline:{}, brush:{label:false},
  gannbox:{fill:true}, gannfan:{}, pitchfork:{fill:true}, regression:{fill:true},

  elliott:{text:true}, xabcd:{text:true}, headshoulders:{text:true},

};

function openSettings(id){
  const s=getShape(id); if(!s) return;
  if(s.type==="fib"||s.type==="fibext"){ openFibSettings(id); return; }
  const st=s.style;
  if(!st.visibility) st.visibility={ ticks:true, seconds:true, minutes:true, hours:true, days:true, weeks:true, months:true, ranges:true };
  const dashOpts=[["Solid",0],["Dashed",6],["Dotted",2]];
  const dashSel=(val)=>dashOpts.map(([n,v])=>`<option value="${v}" ${v===val?"selected":""}>${n}</option>`).join("");
  const caps=TOOL_CAPS[s.type]||{};

  // ── Style tab controls ──
  let style=`
    <div class="field"><label>Line color</label><input type="color" id="f_color" value="${toHex(st.color)}"></div>
    <div class="field"><label>Line width</label><input type="range" id="f_width" min="1" max="6" value="${st.width}"></div>
    <div class="field"><label>Line style</label><select id="f_dash">${dashSel(st.dash)}</select></div>`;
  if(caps.fill)
    style+=`<div class="field"><label>Fill</label><span class="pc"><input type="color" id="f_fillcol" value="${toHex(st.fillColor||st.color)}"><input type="range" id="f_fill" min="0" max="60" value="${fillOpacity(st.fill)}"></span></div>`;
  if(caps.arrow)
    style+=`<div class="field"><label>Arrow heads</label><input type="checkbox" id="f_arrow" ${st.arrow!==false?"checked":""}></div>`;
  if(caps.extend)
    style+=`<div class="field"><label>Extend</label><select id="f_extend">${[["Don't extend","none"],["Right","right"],["Left","left"],["Both","both"]].map(([n,v])=>`<option value="${v}" ${v===(st.extend||"none")?"selected":""}>${n}</option>`).join("")}</select></div>`;
  if(caps.text){
    style+=`<div class="field"><label>Text</label><input type="text" id="f_text" value="${(s.text||"").replace(/"/g,'&quot;')}"></div>`;
    style+=`<div class="field"><label>Text color</label><input type="color" id="f_textcol" value="${toHex(st.textColor||st.color||"#d1d4dc")}"></div>`;
    style+=`<div class="field"><label>Font size</label><input type="range" id="f_fontsize" min="9" max="28" value="${st.fontSize||12}"></div>`;
  }
  if(caps.label!==false)
    style+=`<div class="field"><label>Show price label</label><input type="checkbox" id="f_label" ${st.showLabel?"checked":""}></div>`;

  // ── Coordinates tab: one price/bar row per anchor point ──
  const coords=s.pts.map((p,i)=>`
    <div class="field"><label>#${i+1} (price, bar)</label>
      <span class="pc"><input type="number" class="c-price" data-i="${i}" step="any" value="${p.price!=null?p.price:""}" style="width:110px"><input type="number" class="c-bar" data-i="${i}" step="1" value="${p.time!=null?Math.round(p.time):""}" style="width:80px"></span></div>`).join("");

  // ── Visibility tab: 8 time-scope toggles (TradingView) ──
  const visRows=[["ticks","Ticks"],["seconds","Seconds"],["minutes","Minutes"],["hours","Hours"],
    ["days","Days"],["weeks","Weeks"],["months","Months"],["ranges","Ranges"]]
    .map(([k,lbl])=>`<div class="field"><label><input type="checkbox" class="v-scope" data-k="${k}" ${st.visibility[k]!==false?"checked":""}> ${lbl}</label></div>`).join("");

  dlg.innerHTML=`
    <div class="dh"><span>${prettyType(s.type)}</span><span class="cl" id="dlgClose">×</span></div>
    <div class="dtabs">
      <div class="dtab active" data-p="style">Style</div>
      <div class="dtab" data-p="coords">Coordinates</div>
      <div class="dtab" data-p="vis">Visibility</div>
    </div>
    <div class="db">
      <div class="dpane active" data-p="style">${style}</div>
      <div class="dpane" data-p="coords">${coords||'<div class="field"><label>No coordinates</label></div>'}</div>
      <div class="dpane" data-p="vis">${visRows}</div>
    </div>
    <div class="df">
      <button class="btn ghost" id="dlgDel">Delete</button>
      <button class="btn ghost" id="dlgCancel">Cancel</button>
      <button class="btn primary" id="dlgOk">Ok</button>
    </div>`;
  dlg.classList.remove("fib-dialog"); dlg.classList.add("open"); backdrop.classList.add("open");

  dlg.querySelectorAll(".dtab").forEach(t=>t.onclick=()=>{
    dlg.querySelectorAll(".dtab").forEach(x=>x.classList.remove("active"));
    dlg.querySelectorAll(".dpane").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    dlg.querySelector(`.dpane[data-p="${t.dataset.p}"]`).classList.add("active");
  });

  const g=id=>document.getElementById(id);
  const apply=()=>{
    st.color=g("f_color").value;
    st.width=+g("f_width").value;
    st.dash=+g("f_dash").value;
    if(g("f_fill")){ st.fillColor=g("f_fillcol").value; st.fill=withOpacity(st.fillColor,+g("f_fill").value/100); }
    if(g("f_arrow")) st.arrow=g("f_arrow").checked;
    if(g("f_extend")) st.extend=g("f_extend").value;
    if(g("f_text")!=null && caps.text) s.text=g("f_text").value;
    if(g("f_textcol")) st.textColor=g("f_textcol").value;
    if(g("f_fontsize")) st.fontSize=+g("f_fontsize").value;
    if(g("f_label")) st.showLabel=g("f_label").checked;
    dlg.querySelectorAll(".c-price").forEach(el=>{ const v=parseFloat(el.value); if(!isNaN(v)) s.pts[+el.dataset.i].price=v; });

    dlg.querySelectorAll(".v-scope").forEach(el=>{ st.visibility[el.dataset.k]=el.checked; });
    persist(); redraw();
  };
  dlg.querySelectorAll("input,select").forEach(el=>el.addEventListener("input",apply));
  g("dlgOk").onclick=()=>{ apply(); closeDlg(); };

  g("dlgDel").onclick=()=>{ deleteShape(id); closeDlg(); };
}

function openFibSettings(id){
  const s=getShape(id); if(!s) return;

  // Level pages: fixed 24-per-page slices of cfg.levels (page 1 = 0..1 range checked,
  // page 2 = higher continuation levels, all unchecked). data-i references the
  // original cfg.levels index so edits map back correctly.
  const FIB_PAGES=[];
  for(let i=0;i<cfg.levels.length;i+=FIB_PAGE_SIZE)
    FIB_PAGES.push(cfg.levels.map((_,j)=>j).slice(i,i+FIB_PAGE_SIZE));

  const buildLevelRows=(order)=>order.map(i=>{ const lv=cfg.levels[i]; return `
    <div class="fib-lvl">

      <input type="color" class="fib-lv-col" data-i="${i}" value="${toHex(lv.c)}">
    </div>`; }).join("");
  const levelRows=buildLevelRows(FIB_PAGES[0]);

  const p1=s.pts[0], p2=s.pts[1]||s.pts[0];
  const visRows=[["ticks","Ticks"],["seconds","Seconds"],["minutes","Minutes"],["hours","Hours"],
    ["days","Days"],["weeks","Weeks"],["months","Months"],["ranges","Ranges"]]
    .map(([k,lbl])=>`

  dlg.innerHTML=`
    <div class="dh"><span>${prettyType(s.type)}</span><span class="cl" id="dlgClose">×</span></div>
    <div class="dtabs">
      <div class="dtab active" data-p="style">Style</div>
      <div class="dtab" data-p="coords">Coordinates</div>
      <div class="dtab" data-p="vis">Visibility</div>
    </div>
    <div class="db">
      <div class="dpane active" data-p="style">
        <div class="field"><label><input type="checkbox" id="fib_trend" ${cfg.trendLine?.show!==false?"checked":""}> Trend line</label>
          <span class="pc"><input type="color" id="fib_trend_col" value="${toHex(cfg.trendLine?.color||TV_FIB_GRAY)}"><select id="fib_trend_dash" class="pw">${dashSel(cfg.trendLine?.dash??6)}</select></span></div>
        <div class="field"><label>Levels line</label>
          <span class="pc"><input type="range" id="fib_lw" min="1" max="4" value="${cfg.levelsLine?.width||1}"><select id="fib_ld">${dashSel(cfg.levelsLine?.dash||0)}</select></span></div>
        <div class="field"><label>Extend</label>
          <select id="fib_extend">${extOpts.map(([n,v])=>`<option value="${v}" ${v===cfg.extend?"selected":""}>${n}</option>`).join("")}</select></div>

// a brand-new alert created by right-clicking the chart.
// Auto-set alert values (dialog prefill, line drag) round to 3 decimals for prices ≥ 1 so
// labels/notifications stay short (63866.439, not 63866.43878465). Sub-1 prices keep 5
// significant digits so cheap coins don't collapse to 0.000. Typed input is never re-rounded.
function roundAlertAuto(v){
  if(v==null || !isFinite(v)) return v;
  return Math.abs(v)>=1 ? Math.round(v*1000)/1000 : Number(v.toPrecision(5));
}

function toLocalInput(ms){ const d=new Date(ms - new Date(ms).getTimezoneOffset()*60000); return d.toISOString().slice(0,16); }

// ─────────────────────────────────────────────────────────────────────
//  PERSISTENCE (localStorage, per symbol+timeframe)
// ─────────────────────────────────────────────────────────────────────
// Drawings are keyed per SYMBOL only (not symbol+timeframe): shape points store
// absolute time+price, which are timeframe-independent, so a trendline drawn on
// 1H must also appear on 2H/1D/etc. for the same symbol.
function persistKey(){ return "fv_draw_"+activeSymbol; }
function persist(){ try{ localStorage.setItem(persistKey(), JSON.stringify(draw.shapes)); }catch{} scheduleObjTreeRefresh(); }
// One-time migration: earlier builds keyed drawings per symbol+timeframe
// (fv_draw_<sym>_<tf>). Merge any such legacy entries for this symbol into the
// symbol-only key (deduped by shape id) so existing drawings survive the change.
function migrateLegacyDraw(){
  const sym=activeSymbol, base="fv_draw_"+sym+"_", legacy=[];
  try{
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k && k.indexOf(base)===0) legacy.push(k);
    }
  }catch{ return; }
  if(!legacy.length) return;
  const merged=[], seen=new Set();
  const add=arr=>{ for(const s of arr){ if(s && !seen.has(s.id)){ seen.add(s.id); merged.push(s); } } };
  try{ const cur=localStorage.getItem(persistKey()); if(cur) add(JSON.parse(cur)); }catch{}
  for(const k of legacy){ try{ add(JSON.parse(localStorage.getItem(k))||[]); }catch{} localStorage.removeItem(k); }
  try{ localStorage.setItem(persistKey(), JSON.stringify(merged)); }catch{}
}
function loadPersisted(){
  migrateLegacyDraw();
  try{ const raw=localStorage.getItem(persistKey()); draw.shapes = raw?JSON.parse(raw):[]; }
  catch{ draw.shapes=[]; }
  draw.sel=null;
}

// ── TradingView-parity Fib retracement defaults ──
// Full 26-level default set (value + colour + shown) matching TradingView's
// Fib Retracement "Style" tab. Order matches TV's two-column layout.
const TV_FIB_RED="#e53935", TV_FIB_BLUE="#2962ff", TV_FIB_ORANGE="#ff9800",
      TV_FIB_GRAY="#b0bec5", TV_FIB_INDIGO="#311b92";

  {v:1.5,   c:TV_FIB_INDIGO}, {v:2,     c:TV_FIB_RED},
  {v:1.618, c:TV_FIB_ORANGE}, {v:2.236, c:TV_FIB_BLUE},
  {v:1.65,  c:TV_FIB_ORANGE}, {v:2.5,   c:TV_FIB_INDIGO},
  {v:2.618, c:TV_FIB_ORANGE}, {v:2.65,  c:TV_FIB_ORANGE},

// Page-2 continuation levels — higher extensions, all default UNCHECKED.

const FIB_PAGE2_LEVELS=[

  {v:4.786, c:TV_FIB_BLUE},   {v:5,     c:TV_FIB_RED},
  {v:5.236, c:TV_FIB_BLUE},   {v:5.382, c:TV_FIB_GRAY},
  {v:5.5,   c:TV_FIB_INDIGO}, {v:5.618, c:TV_FIB_ORANGE},
  {v:5.786, c:TV_FIB_BLUE},   {v:6,     c:TV_FIB_RED},
