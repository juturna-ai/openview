const FIB_PAGE_SIZE=24;   // rows per page in the level editor
// Built-in factory defaults (deep-cloned so shapes don't share arrays).
function builtinFibConfig(){
  return {
    trendLine:{ show:true, color:TV_FIB_GRAY, dash:6 },
    levelsLine:{ width:1, dash:0 },
    extend:"none",              // none | right | left | both
    reverse:false,
    useOneColor:false,
    oneColor:"#26a69a",
    // Merge both default sets and sort ascending so the grid reads in order
    // (0, 0.236, 0.382, …). Sorted: page 1 = 0→3.382, page 2 = 3.5→8.
    // Default checked: only levels in 0→1.
    levels: [...FIB_DEFAULT_LEVELS, ...FIB_PAGE2_LEVELS]
      .slice().sort((a,b)=>a.v-b.v)
      .map(l=>({v:l.v, c:l.c, show:(l.v>=0 && l.v<=1)})),
    labels:{ showLevel:true, showPrice:true },
    visibility:{ ticks:true, seconds:true, minutes:true, hours:true, days:true, weeks:true, months:true, ranges:true },
  };
}
// ── Fib templates (localStorage) ──
// fv_fib_default = the user's saved default (applied to NEW fib drawings);
// fv_fib_templates = named templates the user can apply on demand.
function loadFibTemplates(){ try{ return JSON.parse(localStorage.getItem("fv_fib_templates")||"{}"); }catch{ return {}; } }
function saveFibTemplates(t){ try{ localStorage.setItem("fv_fib_templates", JSON.stringify(t)); }catch{} }
function saveFibDefault(cfg){ try{ localStorage.setItem("fv_fib_default", JSON.stringify(cfg)); }catch{} }
function loadFibDefault(){ try{ const r=localStorage.getItem("fv_fib_default"); return r?JSON.parse(r):null; }catch{ return null; } }
// New fibs use the saved default if present, else the factory built-in.
function defaultFibConfig(){ const d=loadFibDefault(); return d?JSON.parse(JSON.stringify(d)):builtinFibConfig(); }

function redraw(){
  const W=dcanvas.clientWidth, H=dcanvas.clientHeight;
  const gw=axisW();                                   // right price-axis gutter width
  dctx.clearRect(0,0,W,H);
  // PASS 1 — plot content, clipped to the plot area so grid lines and drawings never
  // bleed into the transparent right price-axis gutter (the bug: the #draw overlay is
  // see-through, so anything drawn full-width showed the chart behind the axis).
  dctx.save();
  dctx.beginPath(); dctx.rect(0,0,Math.max(0,W-gw),H); dctx.clip();
  _tagQueue = [];                                     // priceTag() collects gutter pills here instead of drawing now
  // try/finally so a throw while drawing a malformed shape can't leave the clip (and an
  // unbalanced save) applied to dctx — that would permanently corrupt every later frame.
  try{
    drawTimeGrid(W,H);                                // sparse vertical grid at round time intervals
    if(window.volProfileOn) drawVolumeProfile(W,H);   // horizontal volume-by-price histogram
    if(draw.sessions!==false) drawSessionBreaks(W,H); // day-boundary lines (intraday only)
    drawAlertLines();
    drawStickyLine();                                 // pinned tap-to-place price line (touch)
    drawCrossPlus();                                  // ⊕ add-alert button on the crosshair
    if(!draw.hidden){
      for(const s of draw.shapes){ if(s.hidden) continue; drawShape(s, s.id===draw.sel, s.id===draw.hover); }
    }
    if(draw.pending) drawShape(draw.pending, true, false);
  } finally {
    dctx.restore();
  }
  // PASS 2 — price-tag pills, unclipped, over the axis gutter. NO background fill here:
  // the overlay sits ABOVE the library's axis canvas, so painting the gutter would hide
  // the axis tick labels. The library's axis is already opaque — clipping pass 1 is what
  // keeps overlay lines/grid from bleeding over it.
  const q=_tagQueue; _tagQueue=null;
  for(const t of q){
    if(t.handle) paintHandle(t.x,t.y);
    else if(t.text!=null) paintGutterTag(t.text,t.y,t.color,W,t.font);
    else paintPriceTag(t.price,t.y,t.color,W);
  }
  syncObjTreeSel();                                   // keep Object tree row highlight in step
}
let _tagQueue = null;

// Volume Profile: horizontal histogram of traded volume by price bucket over the
// VISIBLE bars, drawn on the left edge (TradingView "Volume Profile Visible Range").
// The highest-volume bucket (POC — Point of Control) is highlighted.
function drawVolumeProfile(W,H){
  if(!lastData.length) return;
  const range=chart.timeScale().getVisibleLogicalRange(); if(!range) return;
  const from=Math.max(0,Math.floor(range.from)), to=Math.min(lastData.length-1,Math.ceil(range.to));
  const bars=lastData.slice(from,to+1).filter(b=>b.volume>0);
  if(bars.length<2) return;
  let lo=Infinity, hi=-Infinity;
  for(const b of bars){ if(b.low<lo)lo=b.low; if(b.high>hi)hi=b.high; }
  if(!(hi>lo)) return;
  const BUCKETS=40, span=hi-lo, vol=new Array(BUCKETS).fill(0);
  for(const b of bars){
    const mid=(b.high+b.low)/2;
    let idx=Math.floor((mid-lo)/span*BUCKETS); if(idx<0)idx=0; if(idx>=BUCKETS)idx=BUCKETS-1;
    vol[idx]+=b.volume;
  }
  const maxV=Math.max(...vol); if(maxV<=0) return;
  const pocIdx=vol.indexOf(maxV);
  const maxW=W*0.22;                              // widest bar = 22% of chart width
  dctx.save();
  for(let i=0;i<BUCKETS;i++){
    if(vol[i]<=0) continue;
    const pLo=lo+span*(i/BUCKETS), pHi=lo+span*((i+1)/BUCKETS);
    const y1=priceToY(pHi), y2=priceToY(pLo); if(y1==null||y2==null) continue;
    const bw=maxW*(vol[i]/maxV);
    dctx.fillStyle = i===pocIdx ? "rgba(255,152,0,0.45)" : "rgba(120,123,134,0.30)";
    dctx.fillRect(0, y1, bw, Math.max(1,y2-y1-1));
  }
  dctx.restore();
}

// Session breaks: faint vertical lines at each day boundary (in the selected
// timezone), TradingView-style. Only on intraday timeframes — pointless on 1D+.
// Sparse vertical grid (TradingView-style): pick a round time interval so ~8-12
// lines span the visible range, then draw one line per interval at its true x —
// independent of bar count. Replaces LWC's per-bar vertical grid (disabled above).
const _GRID_STEPS = [
  60, 120, 300, 600, 900, 1800,                 // 1m..30m
  3600, 7200, 10800, 21600, 43200,              // 1h..12h
  86400, 172800, 604800,                        // 1d, 2d, 1w
  1209600, 2592000, 7776000, 15552000, 31536000 // 2w, 1mo, 3mo, 6mo, 1y
];
function drawTimeGrid(W,H){
  if(!lastData.length) return;
  const t0=xToTime(0), t1=xToTime(W);
  if(t0==null||t1==null||!(t1>t0)) return;
  const span=t1-t0;
  const TARGET=10;                               // aim for ~10 vertical lines
  let step=_GRID_STEPS[_GRID_STEPS.length-1];
  for(const s of _GRID_STEPS){ if(span/s <= TARGET*1.5){ step=s; break; } }
  const off=tzOffsetMin*60;                      // align boundaries to the selected tz
  let t=Math.ceil((t0+off)/step)*step - off;     // first round boundary ≥ left edge
  dctx.save();
  dctx.strokeStyle="rgba(120,123,134,0.12)"; dctx.lineWidth=1; dctx.setLineDash([]);
  for(; t<=t1; t+=step){
    const x=timeToX(t);
    if(x==null||x<0||x>W) continue;
    const xi=Math.round(x)+0.5;                  // crisp 1px line
    dctx.beginPath(); dctx.moveTo(xi,0); dctx.lineTo(xi,H); dctx.stroke();
  }
  dctx.restore();
}

function drawSessionBreaks(W,H){
  if(!lastData.length) return;
  if(tfStepSec() >= 86400) return;               // daily+ bars: no intra-day breaks
  // Day separators only when zoomed in enough that they stay sparse — otherwise
  // (4h/6h/12h zoomed out over months) one line per day becomes a grey wall.
  // Beyond that window drawTimeGrid already provides the round-interval grid.
  const t0=xToTime(0), t1=xToTime(W);
  if(t0==null||t1==null||(t1-t0)/86400 > 15) return;
  const dayOf=t=>Math.floor((t + tzOffsetMin*60)/86400);  // tz-adjusted day index
  dctx.save();
  dctx.strokeStyle="rgba(120,123,134,0.18)"; dctx.lineWidth=1; dctx.setLineDash([]);
  let prevDay=null;
  for(const b of lastData){
    const d=dayOf(b.time);
    if(prevDay!==null && d!==prevDay){
      const x=timeToX(b.time);
      if(x!=null && x>=0 && x<=W){ dctx.beginPath(); dctx.moveTo(x,0); dctx.lineTo(x,H); dctx.stroke(); }
    }
    prevDay=d;
  }
  dctx.restore();
}

function strokeLine(x1,y1,x2,y2,st){
  dctx.save();
  dctx.strokeStyle=st.color; dctx.lineWidth=st.width||1.5;
  dctx.setLineDash(st.dash?(st.dash===2?[2,3]:[7,5]):[]);
  dctx.beginPath(); dctx.moveTo(x1,y1); dctx.lineTo(x2,y2); dctx.stroke();
  dctx.restore();
}
// Selection handles must stay visible even when a shape endpoint sits in the right
// price-axis gutter (which pass-1 clips). During redraw they queue and paint in the
// unclipped pass 2, matching the pill-queue pattern; outside redraw they paint now.
function handle(x,y){ if(_tagQueue){ _tagQueue.push({handle:true,x,y}); return; } paintHandle(x,y); }
function paintHandle(x,y){ dctx.save(); dctx.fillStyle="#fff"; dctx.strokeStyle="#2962ff"; dctx.lineWidth=1.5;
  dctx.beginPath(); dctx.arc(x,y,4.5,0,7); dctx.fill(); dctx.stroke(); dctx.restore(); }

function drawShape(s, selected, hovered){
  const st=s.style||DEFAULT_STYLE;
  const W=dcanvas.clientWidth, H=dcanvas.clientHeight;
  const P=s.pts.map(px);
  if(P[0].x==null) return;
  const a=P[0], b=P[1];

  switch(s.type){
    case "trend": if(b){ if(st.extend&&st.extend!=="none"){ let sx=a.x,sy=a.y,ex=b.x,ey=b.y;
        if(st.extend==="right"||st.extend==="both"){const[x,y]=extend(a.x,a.y,b.x,b.y,W,H); ex=x; ey=y;}
        if(st.extend==="left"||st.extend==="both"){const[x,y]=extend(b.x,b.y,a.x,a.y,W,H); sx=x; sy=y;}
        strokeLine(sx,sy,ex,ey,st);} else strokeLine(a.x,a.y,b.x,b.y,st);} break;
    case "ray": if(b){ const[ex,ey]=extend(a.x,a.y,b.x,b.y,W,H); strokeLine(a.x,a.y,ex,ey,st);} break;
    case "ext": if(b){ const[sx,sy]=extend(b.x,b.y,a.x,a.y,W,H),[ex,ey]=extend(a.x,a.y,b.x,b.y,W,H); strokeLine(sx,sy,ex,ey,st);} break;
    case "hline": strokeLine(0,a.y,W,a.y,st); if(st.showLabel) priceTag(s.pts[0].price,a.y,st.color,W); break;
    case "hray":  strokeLine(a.x,a.y,W,a.y,st); arrowHead(W-axisW(),a.y,1,st.color); if(st.showLabel) priceTag(s.pts[0].price,a.y,st.color,W); break;
    case "vline": strokeLine(a.x,0,a.x,H,st); break;
    case "rect": if(b)drawRect(a,b,st); break;
    case "ellipse": if(b)drawEllipse(a,b,st); break;
    case "channel": drawChannel(s,P,st,W,H); break;
    case "fib": if(b)drawFib(s,P,FIB_LEVELS,W); break;
    case "fibext": if(b)drawFib(s,P,FIB_EXT,W); break;
    case "fibfan": if(b)drawFibFan(P,W,H); break;
    case "fibtime": if(b)drawFibTime(P,H); break;
    case "long": case "short": if(b)drawPosition(s,P,st); break;
    case "measure": if(b)drawMeasure(s,P); break;
    case "text": case "callout": drawText(s,a); break;
    // ── Wave 3 ──
    case "info": if(b){ strokeLine(a.x,a.y,b.x,b.y,st); drawInfoLabel(s,a,b); } break;
    case "angle": if(b){ strokeLine(a.x,a.y,b.x,b.y,st); drawAngleLabel(s,a,b); } break;
    case "crossline": strokeLine(0,a.y,W,a.y,st); strokeLine(a.x,0,a.x,H,st); break;
    case "triangle": if(P[2]) drawPolygon(P.slice(0,3),st,true); break;
    case "elliott": drawLabeledPath(P,st,["0","1","2","3","4","5"]); break;
    case "xabcd": drawLabeledPath(P,st,["X","A","B","C","D"]); break;
    case "headshoulders": drawLabeledPath(P,st,["LS","T1","H","T2","RS","","Neck"]); break;
    case "arrow": if(b){ strokeLine(a.x,a.y,b.x,b.y,st); if(st.arrow!==false) arrowHeadAt(a,b,st.color); } break;
    case "polyline": drawPolygon(P,st,false); break;
    case "brush": drawBrush(P,st); break;
    case "prange": if(b)drawPriceRange(s,a,b,W); break;
    case "drange": if(b)drawDateRange(s,a,b,H); break;
    case "dprange": if(b)drawDatePriceRange(s,a,b); break;
    case "fibtbext": if(P[2])drawTrendFibExt(s,P,W); break;
    case "pitchfork": if(P[2])drawPitchfork(P,W,H,st); break;
    case "gannfan": if(b)drawGannFan(a,b,W,H); break;
    case "gannbox": if(b)drawGannBox(a,b,st); break;
    case "circle": if(b)drawCircle(a,b,st); break;
    case "regression": if(b)drawRegression(s,P,st); break;
    case "arrowmark": drawArrowMark(s,a,st); break;
    case "flag": drawFlag(s,a); break;
    case "pricelabel": drawPriceLabelTool(s,a); break;
  }
  if(selected || hovered){
    for(const q of P) if(q.x!=null && (selected)) handle(q.x,q.y);
    if(hovered && !selected && a.x!=null){ /* subtle hover dot */ dctx.save(); dctx.fillStyle="#2962ff"; dctx.beginPath(); dctx.arc(a.x,a.y,3,0,7); dctx.fill(); dctx.restore(); }
  }
}

function extend(x1,y1,x2,y2,W,H){
  const dx=x2-x1,dy=y2-y1; if(dx===0&&dy===0) return [x2,y2];
  const ts=[];
  if(dx>0)ts.push((W-x1)/dx); else if(dx<0)ts.push((0-x1)/dx);
  if(dy>0)ts.push((H-y1)/dy); else if(dy<0)ts.push((0-y1)/dy);
  const t=Math.min(...ts.filter(v=>v>0));
  return [x1+dx*t, y1+dy*t];
}
function drawRect(a,b,st){
  dctx.save(); dctx.fillStyle=st.fill||"rgba(41,98,255,0.10)"; dctx.strokeStyle=st.color; dctx.lineWidth=st.width;
  dctx.setLineDash(st.dash?(st.dash===2?[2,3]:[7,5]):[]);
  dctx.fillRect(a.x,a.y,b.x-a.x,b.y-a.y); dctx.strokeRect(a.x,a.y,b.x-a.x,b.y-a.y); dctx.restore();
}
function drawEllipse(a,b,st){
  dctx.save(); dctx.strokeStyle=st.color; dctx.lineWidth=st.width; dctx.fillStyle=st.fill||"rgba(41,98,255,0.08)";
  dctx.beginPath(); dctx.ellipse((a.x+b.x)/2,(a.y+b.y)/2,Math.abs(b.x-a.x)/2,Math.abs(b.y-a.y)/2,0,0,7);
  dctx.fill(); dctx.stroke(); dctx.restore();
}
// Lazily returns the per-shape fib config, migrating legacy shapes (which had
// no `.fib`) to a default so old drawings still render and become editable.
function getFib(s){
  if(!s.fib) s.fib=defaultFibConfig();
  return s.fib;
}
// Render a Fib retracement/extension from its per-shape config (levels+colors+
// trend line+levels line+extend). `fallback` is the legacy global level array
// used only when a shape somehow has no config array.
function drawFib(s,P,fallback,W){
  const a=P[0], b=P[1];
  const cfg=getFib(s);
  const x1=Math.min(a.x,b.x), x2=Math.max(a.x,b.x);
  // Extend controls where the level lines run horizontally.
  let lx1=x1, lx2=W;
  if(cfg.extend==="none"){ lx1=x1; lx2=x2; }
  else if(cfg.extend==="right"){ lx1=x1; lx2=W; }
  else if(cfg.extend==="left"){ lx1=0; lx2=x2; }
  else if(cfg.extend==="both"){ lx1=0; lx2=W; }
  const lw=cfg.levelsLine?.width||1, ld=cfg.levelsLine?.dash||0;
  const levels = (cfg.levels&&cfg.levels.length)
    ? cfg.levels
    : fallback.map((v,i)=>({v, c:FIB_COLORS[i%FIB_COLORS.length], show:true}));
  levels.forEach((lv)=>{
    if(lv.show===false) return;
    const t=cfg.reverse ? (1-lv.v) : lv.v;
    const y=a.y+(b.y-a.y)*t;
    const col=cfg.useOneColor ? cfg.oneColor : lv.c;
    strokeLine(lx1,y,lx2,y,{color:col,width:lw,dash:ld});
    const price=yToPrice(y);
    const parts=[];
    if(cfg.labels?.showLevel!==false) parts.push(lv.v);
    if(cfg.labels?.showPrice!==false && price!=null) parts.push(`(${fmt(price)})`);
    if(parts.length){
      dctx.save(); dctx.fillStyle=col; dctx.font="10px sans-serif";
      dctx.fillText(parts.join(" "), lx1+4, y-3); dctx.restore();
    }
  });
  if(cfg.trendLine?.show!==false)
    strokeLine(a.x,a.y,b.x,b.y,{color:cfg.trendLine?.color||"#787b86",width:1,dash:cfg.trendLine?.dash??6});
}
function drawFibFan(P,W,H){
  const a=P[0], b=P[1];
  [0,0.382,0.5,0.618,1].forEach((lv,i)=>{
    const ty=a.y+(b.y-a.y)*lv, [ex,ey]=extend(a.x,a.y,b.x,ty,W,H);
    strokeLine(a.x,a.y,ex,ey,{color:FIB_COLORS[i%FIB_COLORS.length],width:1.1,dash:0});
  });
  strokeLine(a.x,a.y,b.x,b.y,{color:"#787b86",width:1,dash:6});
}
function drawFibTime(P,H){
  const a=P[0], b=P[1], step=b.x-a.x;
  [0,1,2,3,5,8,13,21].forEach((n,i)=>{ const x=a.x+step*n; strokeLine(x,0,x,H,{color:FIB_COLORS[i%FIB_COLORS.length],width:1,dash:2}); });
}
function drawChannel(s,P,st,W,H){
  const a=P[0], b=P[1];
  strokeLine(a.x,a.y,b.x,b.y,st);
  if(P[2]){
    const off=P[2].y - lineY(a,b,P[2].x);          // vertical offset of 3rd point from main line
    strokeLine(a.x,a.y+off,b.x,b.y+off,st);
    dctx.save(); dctx.fillStyle=withOpacity(st.color,0.07);
    dctx.beginPath(); dctx.moveTo(a.x,a.y); dctx.lineTo(b.x,b.y); dctx.lineTo(b.x,b.y+off); dctx.lineTo(a.x,a.y+off); dctx.closePath(); dctx.fill(); dctx.restore();
  }
}
function lineY(a,b,x){ if(b.x===a.x) return a.y; return a.y+(b.y-a.y)*(x-a.x)/(b.x-a.x); }
function drawPosition(s,P,st){
  const a=P[0], b=P[1];
  const entry=s.pts[0].price, tgt=s.pts[1].price;
  const isLong=s.type==="long";
  const stop=entry-(tgt-entry)*0.5;
  const sy=priceToY(stop);
  const x1=Math.min(a.x,b.x), x2=Math.max(a.x,b.x);
  dctx.save();
  dctx.fillStyle=isLong?"rgba(38,166,154,0.15)":"rgba(239,83,80,0.15)";
  dctx.fillRect(x1,Math.min(a.y,b.y),x2-x1,Math.abs(b.y-a.y));
  dctx.fillStyle=isLong?"rgba(239,83,80,0.15)":"rgba(38,166,154,0.15)";
  dctx.fillRect(x1,Math.min(a.y,sy),x2-x1,Math.abs(sy-a.y));
  dctx.restore();
  strokeLine(x1,a.y,x2,a.y,{color:"#2962ff",width:1.3,dash:0});
  strokeLine(x1,b.y,x2,b.y,{color:"#26a69a",width:1.1,dash:0});
  strokeLine(x1,sy,x2,sy,{color:"#ef5350",width:1.1,dash:0});
  const rr=(entry-stop)!==0 ? Math.abs((tgt-entry)/(entry-stop)) : 0;

// Arrowhead at b pointing along a→b.

// Andrews Pitchfork: median from p1 through midpoint of p2-p3, plus parallel tines.
function drawPitchfork(P,W,H,st){
  const [p1,p2,p3]=P; const mid={x:(p2.x+p3.x)/2, y:(p2.y+p3.y)/2};

  const dx=mid.x-p1.x, dy=mid.y-p1.y;               // median direction
  // upper tine from p2, lower tine from p3, both parallel to the median

  const [lx,ly]=extend(p3.x,p3.y,p3.x+dx,p3.y+dy,W,H);
  strokeLine(p2.x,p2.y,ux,uy,st); strokeLine(p3.x,p3.y,lx,ly,st);
  strokeLine(p2.x,p2.y,p3.x,p3.y,{color:st.color,width:1,dash:2});  // base

// Gann Fan: rays at the classic 1x1..1x8 / 8x1 angles from p1, scaled by p1→p2.
function drawGannFan(a,b,W,H){

  const ux=(b.x-a.x), uy=(b.y-a.y);                 // unit cell from the two clicks
  ratios.forEach((r,i)=>{
    const dx=ux, dy=uy*r;                            // r = price-units per time-unit
    const [ex,ey]=extend(a.x,a.y,a.x+dx,a.y+dy,W,H);
    strokeLine(a.x,a.y,ex,ey,{color: r===1?"#2962ff":FIB_COLORS[i%FIB_COLORS.length], width: r===1?1.6:1, dash:0});
  });

// Gann Box: a rectangle with the main diagonal, mid horizontal/vertical, and the
// classic Gann fib price/time subdivisions (0.25/0.5/0.75) as light grid lines.
function drawGannBox(a,b,st){

    dctx.beginPath(); dctx.moveTo(xx,y1); dctx.lineTo(xx,y2); dctx.stroke();
  });

  dctx.setLineDash([]); dctx.strokeStyle=st.color; dctx.lineWidth=st.width;

// Circle: an ellipse constrained to a true circle — radius = distance from the

  dctx.setLineDash(st.dash?(st.dash===2?[2,3]:[7,5]):[]);

// Regression trend: least-squares fit over the bar CLOSES between the two anchors,
// with a ±1σ parallel channel (TradingView's Regression Trend).
function drawRegression(s,P,st){
  const a=P[0],b=P[1]; if(a.x==null||b.x==null) return;
  const t1=Math.min(s.pts[0].time,s.pts[1].time), t2=Math.max(s.pts[0].time,s.pts[1].time);
  const bars=lastData.filter(d=>d.time>=t1 && d.time<=t2);
  if(bars.length<2){ strokeLine(a.x,a.y,b.x,b.y,st); return; }
  // fit price = m*time + c via least squares (normalise time to bar index for stability)
  const n=bars.length; let sx=0,sy=0,sxx=0,sxy=0;
  bars.forEach((d,i)=>{ sx+=i; sy+=d.close; sxx+=i*i; sxy+=i*d.close; });
  const denom=(n*sxx - sx*sx)||1;
  const m=(n*sxy - sx*sy)/denom, c=(sy - m*sx)/n;
  // residual stddev for the channel band
  let ss=0; bars.forEach((d,i)=>{ const e=d.close-(m*i+c); ss+=e*e; });
  const sd=Math.sqrt(ss/n);
  const y0=priceToY(c), y1=priceToY(m*(n-1)+c);
  const x0=px(bars[0]).x, xN=px(bars[n-1]).x;
  if(x0==null||xN==null||y0==null||y1==null){ strokeLine(a.x,a.y,b.x,b.y,st); return; }
  strokeLine(x0,y0,xN,y1,{color:st.color,width:Math.max(2,st.width)});
  const up0=priceToY(c+sd),upN=priceToY(m*(n-1)+c+sd),dn0=priceToY(c-sd),dnN=priceToY(m*(n-1)+c-sd);
  strokeLine(x0,up0,xN,upN,{color:st.color,width:1,dash:1});
  strokeLine(x0,dn0,xN,dnN,{color:st.color,width:1,dash:1});
}
// Arrow marker: an up (green) or down (red) arrow anchored at the point. Direction

// Any type missing here falls back to a generic message in openIndicatorInfo().
const IND_INFO = {
  sma:{what:"The unweighted mean of the last N values of the chosen source (usually close). Every bar in the window counts equally.",how:"Price above the line = the average buyer over the window is in profit; below = underwater. The line's slope is the trend; crosses of price through it, or of a fast SMA through a slow one, are the classic signals.",use:"The baseline trend filter. Slow to react and prone to whipsaw in chop, but it lags honestly — good for defining 'the trend' on higher timeframes (50/100/200)."},
  ema:{what:"An exponentially weighted average: recent bars carry more weight, older ones decay away rather than dropping out abruptly.",how:"Read like an SMA, but it turns faster. Price reclaiming/losing the EMA, and fast-over-slow EMA crosses, are the usual triggers.",use:"Preferred over SMA when you want the average to respond quickly to a new move. The 9/21 pair is a common short-term trend gauge; 200 EMA is a widely-watched line."},
  wma:{what:"A weighted average where weights fall off linearly — the newest bar gets weight N, the oldest gets 1.",how:"Sits between SMA and EMA in responsiveness. Same trend/cross reading as any moving average.",use:"When SMA lags too much but EMA's long tail of old data bothers you. Also the building block inside HMA and Coppock."},
  vwma:{what:"A moving average weighted by volume — bars that traded heavily pull the average toward their price.",how:"Compare it against a plain SMA of the same length: VWMA above SMA means the heavy volume printed at higher prices (buyers paid up), below means the volume was distributed lower.",use:"A cheap way to ask 'where did the real money actually transact?' rather than treating a thin bar and a huge bar as equals."},
  hma:{what:"Hull Moving Average — a WMA-of-WMAs construction designed to cut lag while staying smooth.",how:"Turns much sooner than an EMA of the same length. Most people trade the *slope*: rising HMA = long bias, falling = short bias.",use:"Trend-following when you want early turns. The tradeoff: it can overshoot and briefly point the wrong way at a sharp reversal."},
  dema:{what:"Double EMA — 2×EMA minus the EMA of that EMA, which cancels out much of the normal EMA lag.",how:"Same as an EMA, only faster to respond. Slope and price-cross are the readings.",use:"Faster trend confirmation than an EMA of equal length; noisier in ranges."},
  tema:{what:"Triple EMA — a three-stage lag-cancelling construction, faster still than DEMA.",how:"Read as a very responsive moving average. Crosses and slope.",use:"Short-timeframe trend work where lag costs you the move. Most whipsaw-prone of the MA family."},
  alma:{what:"Arnaud Legoux MA — a Gaussian-weighted average whose peak weighting you can slide anywhere in the window (Offset) and whose sharpness you tune (Sigma).",how:"Offset near 1 = responsive/less lag; near 0 = smooth/more lag. Otherwise a standard MA read.",use:"When you want to explicitly dial the smoothness-vs-lag tradeoff instead of accepting an EMA's fixed one."},
  smma:{what:"Smoothed / Running MA (RMA) — an EMA using a 1/N smoothing factor, so it decays much more slowly.",how:"A very slow, very smooth trend line.",use:"Long-horizon trend context, and the internal smoothing used by Wilder's own indicators (RSI, ATR, ADX)."},
  lsma:{what:"Least Squares MA — fits a linear regression line to the last N bars and plots the line's endpoint each bar.",how:"It's the statistical best-fit trend value 'right now'. Price above it = above the fitted trend.",use:"The lowest-lag way to represent the current trend line; also the basis of the regression channel."},
  envel:{what:"A moving average with bands drawn a fixed percentage above and below it.",how:"Price at the upper band = stretched above its average by that % (potentially overbought); lower band = the reverse. In a trend, price can ride a band.",use:"Simple mean-reversion envelope, and a visual sense of 'how far from normal is this?' Unlike Bollinger Bands the width is fixed, not volatility-driven."},
  rsi:{what:"Relative Strength Index — the ratio of average gains to average losses over N bars, mapped to a 0–100 scale.",how:"Above 70 is conventionally overbought, below 30 oversold — but in a strong trend RSI *stays* pinned there, so those levels alone are not signals. The higher-value reads: the 50 line as a bull/bear divider, and divergence (price makes a new high, RSI doesn't).",use:"Momentum strength and exhaustion. Best used as a divergence and 50-line tool rather than a naive 70/30 fade."},
  macd:{what:"Moving Average Convergence Divergence — the fast EMA minus the slow EMA (the MACD line), an EMA of that (the signal line), and the gap between them (the histogram).",how:"MACD crossing above signal = momentum turning up; below = down. The zero line separates bull from bear (fast MA above/below slow). The histogram shrinking is momentum fading *before* the cross happens.",use:"The workhorse momentum + trend indicator. Divergence between price and the MACD line is one of the more reliable reversal warnings."},
  stoch:{what:"Stochastic Oscillator — where the close sits inside the high–low range of the last N bars, as 0–100 (%K), plus a smoothed version of it (%D).",how:"Above 80 = closing near the top of its recent range, below 20 = near the bottom. The %K/%D cross is the trigger; the level tells you where it happened.",use:"Range-bound / mean-reversion trading, and spotting momentum loss. In a trend it saturates and gives repeated bad fade signals."},
  stochrsi:{what:"A Stochastic applied to RSI instead of to price — i.e. where RSI sits inside its own recent range.",how:"Far more sensitive than either parent. 0.8/0.2 (or 80/20) are the extremes; it hits them often.",use:"Timing entries inside a bias you've already established elsewhere. Too twitchy to trade on its own."},
  cci:{what:"Commodity Channel Index — how far price has deviated from its own typical-price average, scaled by mean deviation. Unbounded, but mostly lives in ±100.",how:"Above +100 = unusually strong upside deviation, below −100 = downside. Two schools: fade the extremes (mean reversion) or trade the +100/−100 breakouts (momentum).",use:"Detecting the start of a new trend leg and cyclical turns, on any instrument (the 'commodity' name is historical)."},
  willr:{what:"Williams %R — the close's position inside the last N bars' range, plotted on an inverted −100…0 scale. Effectively an unsmoothed Stochastic.",how:"Above −20 = overbought zone, below −80 = oversold. Because it's unsmoothed, it reaches extremes fast.",use:"Short-term reversal timing and momentum failure. Same trend-saturation caveat as Stochastic."},
  mom:{what:"Momentum — simply price now minus price N bars ago. The raw rate of change, in price units.",how:"Above zero = higher than N bars ago and momentum is positive; the *slope* matters more than the level. Rising price with a falling Momentum line means the advance is decelerating.",use:"The purest read on 'is this move speeding up or running out of gas'. Zero-line crosses are a crude trend signal; divergence is the real value."},
  roc:{what:"Rate of Change — the same idea as Momentum but expressed as a percentage, so it's comparable across instruments and price levels.",how:"Zero line divides gaining from losing over the lookback. Magnitude shows how violent the move is.",use:"Comparing momentum across different symbols, and spotting blow-off/exhaustion where ROC spikes far beyond its normal range."},
  ao:{what:"Awesome Oscillator — the 5-period minus 34-period SMA of each bar's midpoint (high+low)/2, drawn as a histogram.",how:"Above zero = short-term momentum leads the longer term. Bill Williams' patterns: 'saucer' (colour flips back to trend after a shallow dip) and 'twin peaks' (a divergent second peak on the same side of zero).",use:"Measuring the market's driving force independent of the close price. Pairs with AC below."},
  ac:{what:"Accelerator Oscillator — AO minus a 5-period SMA of AO, i.e. the *acceleration* of momentum.",how:"AC turns before AO, and AO turns before price. Bars changing colour are the early warning; zero-line crosses are late.",use:"Bill Williams' earliest warning that a move is losing or gaining force, taken before AO confirms."},
  uo:{what:"Ultimate Oscillator — Larry Williams' blend of buying pressure over three timeframes (fast/medium/slow), weighted 4:2:1, on a 0–100 scale.",how:"Above 70 overbought, below 30 oversold. Its intended use is divergence: price makes a new low, UO doesn't, then you buy the break of the divergence high.",use:"Cutting down the false divergences you get from a single-timeframe oscillator by demanding agreement across three."},
  trix:{what:"The 1-bar rate of change of a triple-smoothed EMA — triple smoothing strips out cycles shorter than the length.",how:"Zero-line crosses signal trend change; the TRIX/signal cross is the earlier, noisier trigger. Divergence works well because the line is so clean.",use:"A low-noise momentum oscillator that filters out short-term wiggles by construction."},
  cmo:{what:"Chande Momentum Oscillator — (sum of up moves − sum of down moves) / (sum of all moves), on a −100…+100 scale. Unlike RSI it doesn't smooth the numerator.",how:"±50 are the conventional extremes. Values near zero mean a genuinely directionless market.",use:"A more responsive RSI alternative; also a decent 'is there any trend at all' meter — a flat CMO near zero means don't trade trend systems."},
  ppo:{what:"Percentage Price Oscillator — MACD expressed as a percentage of the slow EMA rather than in price units.",how:"Read exactly like MACD (line/signal cross, zero line, histogram).",use:"Everything MACD does, but the values are comparable across symbols and across time — a $5 stock and a $500 stock give directly comparable PPO readings."},
  dpo:{what:"Detrended Price Oscillator — price minus a moving average that has been *shifted back* in time, which removes the trend and leaves the cycle.",how:"Peaks and troughs mark the cycle; the distance between them estimates the cycle's length. It is deliberately not a trend indicator and it is shifted, so it doesn't predict the current bar.",use:"Measuring how long the market's short-cycle rhythm is, so you can time entries with that cycle instead of against it."},
  fisher:{what:"Fisher Transform — normalises price into the recent range, then applies a Gaussian transform that turns the distribution's fat tails into sharp, unmistakable spikes.",how:"Extreme spikes mark turning points; the Fisher/trigger crossover is the entry. Turns are far more abrupt than any conventional oscillator.",use:"Making price extremes visually obvious. Its sharpness is the point — and also why it produces false alarms in low-volatility drift."},
  bop:{what:"Balance of Power — (close − open) / (high − low) per bar: who won each bar, buyers or sellers, and by how much of the bar's range.",how:"Persistently positive = buyers closing bars near the highs. Above/below zero is the read; it's noisy bar-to-bar so smoothing helps.",use:"A per-bar read on buyer vs seller dominance that ignores volume entirely — useful where volume data is untrustworthy."},
  coppock:{what:"Coppock Curve — a weighted MA of two summed rates of change (14 and 11 period), originally designed for monthly stock index data.",how:"The classic signal is the curve turning up from *below zero* — that's the buy. It intentionally has no sell signal.",use:"Long-term bottom-fishing on indices. A monthly/weekly tool, not a day-trading one."},
  adx:{what:"Average Directional Index with the Directional Movement pair. +DI measures upward directional movement, −DI downward, and ADX measures how *strong* the trend is regardless of direction.",how:"ADX above ~25 = trending, below ~20 = ranging (and trend systems will get chopped up). Direction comes from which DI line is on top, not from ADX.",use:"The regime filter: it tells you whether to trade trend-following or mean-reversion tools at all. ADX alone never tells you which way."},
  aroon:{what:"Aroon Up/Down — how many bars have passed since the highest high and the lowest low of the lookback, expressed as 0–100.",how:"Aroon Up near 100 = new highs are being made recently (strong uptrend). The Up/Down crossover marks a trend change; both lines low and tangled = no trend.",use:"Identifying the *beginning* of a trend and spotting consolidation, based purely on the timing of extremes rather than price magnitude."},
  supertrend:{what:"A trailing stop line placed an ATR multiple away from price; it flips sides when price closes through it.",how:"Line below price and green = uptrend, hold long; line above and red = downtrend. The flip is the signal, and the line doubles as your stop level.",use:"Mechanical trend-following with a built-in stop. Excellent in trends, painful in ranges where it flips repeatedly."},
  psar:{what:"Parabolic SAR (Stop And Reverse) — dots that trail price and accelerate toward it the longer the trend runs.",how:"Dots below price = long, above = short. When price touches the dots, the system reverses. The acceleration factor controls how tightly it trails.",use:"Trailing stops and exit timing in a trending market. Wilder designed it to always be in the market, so in a range it reverses constantly."},
  ichimoku:{what:"Ichimoku Cloud — a complete system: Conversion (fast) and Base (slow) midpoint lines, a forward-projected Cloud between two spans, and a Lagging Span (close shifted back).",how:"Price above the Cloud = bullish, below = bearish, inside = no trade. Cloud thickness = the strength of that support/resistance. Conversion crossing Base is the trigger; the Lagging Span above past price confirms.",use:"A single glance gives trend, support/resistance, momentum, and a forward-looking view. It works best on liquid, trending markets and clutters badly in chop."},
  vortex:{what:"Two lines (VI+ and VI−) built from the distance between the current high and the prior low, and vice versa — measuring the tug-of-war between upward and downward movement.",how:"VI+ crossing above VI− = uptrend starting; the reverse for downtrends. The wider the separation, the stronger the trend.",use:"Trend-change identification, often as a cleaner alternative to the DI lines in ADX."},
  bb:{what:"Bollinger Bands — a moving average with bands set N standard deviations above and below it, so the bands widen and narrow with volatility.",how:"Bands squeezing tight = volatility contraction, which typically precedes an expansion (the 'squeeze'). Touching a band is NOT a sell signal — in a trend price walks the band. %B and Bandwidth quantify the same thing numerically.",use:"Volatility regime, relative high/low, and squeeze-into-breakout setups. Bollinger himself insisted the bands are not standalone buy/sell triggers."},
  kc:{what:"Keltner Channels — a moving average with channels set an ATR multiple away, so the width tracks true range rather than standard deviation.",how:"Closes outside the channel indicate a genuine breakout (they're rarer than Bollinger touches). The channel slope is the trend.",use:"Breakout confirmation and trend-riding. Compared against Bollinger Bands, BB inside KC is the canonical 'squeeze' setup."},
  donchian:{what:"Donchian Channels — simply the highest high and the lowest low of the last N bars, with the midline between them.",how:"A close at the upper channel is a new N-bar high — that IS the breakout, no smoothing involved.",use:"The original Turtle Traders' breakout system. Blunt, transparent, and the cleanest possible definition of 'a new high'."},
  atr:{what:"Average True Range — the average of each bar's true range (which accounts for gaps), over N bars. A pure volatility measure with no directional information.",how:"Rising ATR = volatility expanding; falling = contracting. The absolute value is in price units, so it's directly usable for sizing.",use:"Position sizing and stop placement (e.g. a stop 2×ATR away adapts to the instrument's own volatility). Never a direction signal."},
  stdev:{what:"The statistical standard deviation of the source over N bars — the dispersion of price around its own mean.",how:"High = price is scattering widely (volatile); low = tight and coiled.",use:"Raw volatility measurement, the ingredient inside Bollinger Bands, and a filter for 'is anything actually happening?'"},
  chop:{what:"Choppiness Index — a 0–100 measure of whether the market is trending or ranging, derived from how much ground price covered versus the total range it travelled.",how:"Above ~61 = choppy/consolidating; below ~38 = strongly trending. It says nothing about direction.",use:"A regime switch: use it to decide whether to deploy trend-following or range-trading strategies. Extended high readings often precede a breakout."},
  bbw:{what:"Bollinger Bandwidth — the width of the Bollinger Bands normalised by the middle band, as a single line.",how:"Multi-month lows in bandwidth = 'The Squeeze' — a volatility contraction that historically resolves in a sharp directional expansion (direction unknown).",use:"Quantifying the squeeze so you can alert on it instead of eyeballing the bands."},
  volume:{what:"The raw number of units traded per bar, coloured by whether the bar closed up or down.",how:"Volume confirms: a breakout on heavy volume is credible, the same breakout on thin volume is suspect. Volume climaxes often mark exhaustion, not continuation.",use:"The reality check on every price move — it tells you whether anyone actually participated."},
  volprofile:{what:"Volume Profile — volume distributed across *price levels* over the visible range rather than across time, drawn as a horizontal histogram.",how:"The fattest bar is the Point of Control (POC) — the price where the most business was done, and a magnet/pivot. Thin areas are low-acceptance zones price tends to move through quickly.",use:"Finding meaningful support/resistance from actual traded volume rather than from drawn lines."},
  vwap:{what:"Volume Weighted Average Price — the session's average transaction price, weighted by volume. Resets each session.",how:"Price above VWAP = buyers are paying more than the session's average (and institutional buy programs are 'behind'); below = the reverse. It acts as a magnet and as intraday support/resistance.",use:"The intraday institutional benchmark — desks are literally measured against it. Primarily an intraday tool; it's meaningless on daily+ charts."},
  obv:{what:"On Balance Volume — a running total that adds the bar's whole volume on an up close and subtracts it on a down close.",how:"The *direction* of the OBV line matters, not its absolute value. OBV making new highs while price stalls means accumulation is happening under the surface; the opposite is distribution.",use:"Granville's original idea that volume precedes price. Divergence between OBV and price is its whole reason for existing."},
  mfi:{what:"Money Flow Index — an RSI that is weighted by volume. Sometimes called 'volume-weighted RSI'. 0–100 scale.",how:"Above 80 overbought, below 20 oversold. Divergence with price is the strong signal.",use:"Everything RSI does, but a move ignored by volume won't push MFI — so it filters out low-conviction momentum RSI would happily register."},
  adl:{what:"Accumulation/Distribution Line — a cumulative total of volume weighted by where each bar closed within its range.",how:"Rising = accumulation (closes near the highs on volume); falling = distribution. Divergence against price is the classic read.",use:"Detecting quiet accumulation or distribution while price is still range-bound. Note: unlike OBV, it ignores gaps between bars."},
  cmf:{what:"Chaikin Money Flow — the same close-location-value idea as ADL, but summed over N bars and normalised by volume, so it oscillates around zero.",how:"Above zero = buying pressure over the window, below = selling pressure. Sustained readings past ±0.25 are meaningful.",use:"A bounded, comparable version of the accumulation/distribution idea — easier to threshold and alert on than the unbounded ADL."},
  chaikin:{what:"Chaikin Oscillator — the MACD (fast EMA minus slow EMA) *of the Accumulation/Distribution Line*.",how:"Crossing above zero = accumulation momentum turning positive. It's a momentum reading on money flow, not on price.",use:"Spotting a change in the buying/selling pressure trend earlier than the raw ADL slope would show it."},
  pvt:{what:"Price Volume Trend — a cumulative line like OBV, except each bar adds volume scaled by the *percentage* price change rather than the whole volume.",how:"Rising = money flowing in, proportional to how much price actually moved. Divergence with price is the signal.",use:"OBV's flaw is treating a 0.01% up-close the same as a 5% one; PVT fixes that by weighting the contribution."},
  fi:{what:"Force Index — price change multiplied by volume, then smoothed. Combines direction, magnitude, and participation into one number.",how:"Above zero = bulls in control. Spikes to extremes mark climaxes; a short-length FI is a trigger, a long-length one is a trend read.",use:"Elder's measure of the raw power behind a move. New FI highs confirm a trend; divergence warns it's hollow."},
  alligator:{what:"Bill Williams' Alligator — three smoothed MAs (Jaw 13, Teeth 8, Lips 5), each shifted forward by a different amount.",how:"Lines intertwined and flat = the alligator is sleeping (no trend, stay out). Lines fanning apart in order = it's feeding (trend, ride it). The wider the fan, the stronger the trend.",use:"A visual go/no-go on whether a trend exists at all, before you commit to a trend strategy."},
  fractals:{what:"Williams Fractals — a marker on any bar whose high is higher than the two bars either side (or low lower than both sides). A five-bar swing point.",how:"Each fractal marks a local swing high or low. They confirm two bars late, by definition — you can't know it's a fractal until the bars after it print.",use:"Objective, mechanical swing points for stop placement, structure (higher-highs/lower-lows), and as the reference level for breakout entries."},
  mcginley:{what:"McGinley Dynamic — a moving average with an automatic speed adjustment: it accelerates when price runs away from it and slows when price hugs it.",how:"Because it self-adjusts, price rarely separates from it violently the way it does from a fixed-length EMA.",use:"A trend line that tries to track price through changing market speeds without you re-tuning the length."},
  kama:{what:"Kaufman Adaptive MA — measures the 'efficiency ratio' (net movement ÷ total movement) and smooths hard when price is choppy, tracks fast when it's trending.",how:"Flat during noise, responsive during real moves. Slope and price-cross are the reads.",use:"One MA that behaves like a fast EMA in trends and a slow one in chop — designed specifically to cut down on whipsaw."},
  ckstop:{what:"Chande Kroll Stop — ATR-based long and short stop lines derived from the recent highs and lows.",how:"The two lines bracket price; the relevant one is your trailing stop for that direction. Price closing through it exits the position.",use:"A systematic ATR trailing stop that adapts to volatility rather than using a fixed percentage."},
  lrc:{what:"Linear Regression Channel — the best-fit line through the last N bars, with parallel channel lines set a standard-deviation multiple away.",how:"The centre line is the statistical trend. Touches of the outer channel are statistically stretched conditions within that trend; a break outside it suggests the trend's character is changing.",use:"Defining a trend channel objectively rather than by hand-drawing lines, and gauging how extended price is inside it."},
  tsi:{what:"True Strength Index — price momentum double-smoothed with two EMAs, which strips most of the noise out while keeping the direction.",how:"Zero line separates bull from bear; the TSI/signal cross triggers. Overbought/oversold zones apply, and its smoothness makes divergence unusually readable.",use:"A cleaner momentum oscillator than raw ROC, well suited to divergence hunting."},
  kst:{what:"Know Sure Thing — Pring's weighted sum of four smoothed rates of change over different lookbacks, plus a signal line.",how:"KST crossing its signal line, and crossing zero, are the signals. Combining four timeframes makes it slow but decisive.",use:"A long-term momentum read that won't fire on every short-term wiggle. Built for weekly/monthly analysis."},
  rvi:{what:"Relative Vigor Index — the ratio of (close − open) to (high − low), smoothed. The premise: in an uptrend, markets close higher than they open.",how:"RVI crossing its signal line is the trigger. Divergence with price warns of exhaustion.",use:"Confirming the conviction inside bars — whether the buying is holding into the close or fading."},
  smi:{what:"Stochastic Momentum Index — like a Stochastic, but it measures the close's distance from the *midpoint* of the range instead of from the low, on a −100…+100 scale.",how:"Above +40 overbought, below −40 oversold. Centred on zero, it's less noisy and gives fewer false extremes than a plain Stochastic.",use:"A refined Stochastic — the same job, with a clearer neutral point and cleaner signals."},
  woodies:{what:"Woodies CCI — a CCI plus a short 'Turbo' CCI, used with Ken Wood's pattern rules.",how:"The zero-line rules dominate: a 'Zero Line Reject' (a pullback to zero that fails to cross) is the flagship setup. The Turbo line times the entry.",use:"A complete discretionary system built around CCI patterns rather than a standalone reading."},
  crsi:{what:"Connors RSI — a composite of three components: a short RSI of price, an RSI of the up/down streak length, and the percentile rank of the recent rate of change.",how:"Extremely aggressive: below 10 is oversold, above 90 overbought. It fires often, on short timeframes.",use:"Short-term mean-reversion systems. Built explicitly for 2–5 day holds, not for trend-following."},
  eom:{what:"Ease of Movement — how far price moved relative to how much volume it took to move it.",how:"High positive = price rose easily on light volume (little resistance above). Near zero = price is grinding, needing heavy volume to go anywhere.",use:"Judging whether a move is effortless (likely to continue) or laboured (likely to stall) — the volume-cost of each point of price."},
  klinger:{what:"Klinger Oscillator — compares 'volume force' (volume signed by trend and scaled by range) across a fast and slow EMA, with a signal line.",how:"Signal-line crosses trigger; the strongest use is divergence between the oscillator and price.",use:"Reconciling short-term money flow against long-term flow — designed to catch turns that volume alone misses."},
  netvol:{what:"Net Volume — volume signed by the bar's direction: positive on an up bar, negative on a down bar, as a histogram.",how:"Persistent positive bars = net buying pressure. Big single bars mark aggressive one-sided participation.",use:"Seeing, per bar, which side is actually doing the volume — the un-cumulated ingredient behind OBV."},
  volosc:{what:"Volume Oscillator — the percentage difference between a fast and a slow moving average of volume.",how:"Above zero = current volume is running above its longer-term norm, which confirms whatever price is doing. Below zero on a breakout is a red flag.",use:"Answering 'is this move actually being participated in?' without worrying about volume's absolute size."},
  twap:{what:"Time Weighted Average Price — the simple average price over the session, with every time slice weighted equally regardless of volume.",how:"Read like VWAP: price above = trading above the period's average.",use:"The benchmark for time-sliced execution algos. Compared with VWAP, the gap between them tells you whether the volume clustered above or below the time-average."},
  bbpct:{what:"Bollinger %B — where price sits relative to the bands, as a single number: 1.0 = at the upper band, 0.0 = at the lower, 0.5 = at the basis.",how:"Above 1 or below 0 means price has closed *outside* the bands. In a strong trend %B can stay above 0.8 for a long time — that's trend strength, not a sell signal.",use:"Making the band position numeric so you can alert on it, backtest it, or feed it into another system."},
  histvol:{what:"Historical Volatility — the annualised standard deviation of logarithmic returns over N bars.",how:"It's a percentage figure directly comparable to option implied volatility. Rising HV = the market is getting rowdier.",use:"Options work (comparing realised vs implied vol), volatility-based position sizing, and spotting volatility regime changes."},
  massidx:{what:"Mass Index — sums the ratio of two EMAs of the high–low range, detecting when the daily *range* is expanding.",how:"The classic signal is the 'reversal bulge': the index rises above 27, then falls back below 26.5 — a reversal is likely, in whatever direction the trend was.",use:"Predicting reversals from range expansion alone, with no reference to price direction. Distinctive precisely because it's direction-blind."},
  ulcer:{what:"Ulcer Index — the root-mean-square of drawdowns from recent highs. It measures downside pain only; upside volatility doesn't register.",how:"Higher = deeper and/or longer drawdowns. Low and flat = a smooth ride up.",use:"A risk metric that matches how investors actually experience risk (drawdown), unlike standard deviation which penalises upside moves equally."},
  bbp:{what:"Bull Bear Power — Bull Power (high − EMA) plus Bear Power (low − EMA): how far bulls can push above, and bears below, the consensus average.",how:"Bull Power positive and rising = buyers are extending highs above the average. Elder's setup: buy when Bear Power is negative but rising within an uptrend.",use:"Separating the two sides' strength instead of netting them into one number — you can see which side is actually gaining ground."},
  ribbon:{what:"Moving Average Ribbon — a series of MAs of increasing length, plotted together.",how:"A widely fanned, correctly-ordered ribbon = a strong trend. Compressed and tangled = consolidation. The ribbon flipping order is a trend change.",use:"An immediate visual read on trend strength and alignment across timeframes, without staring at individual crossovers."},
  hl52:{what:"52 Week High/Low — the highest high and lowest low over the lookback (252 trading days ≈ one year), drawn as levels.",how:"Price near the 52-week high is a widely-tracked momentum condition; near the low, the opposite. Both act as psychological support/resistance.",use:"The single most-cited institutional reference range. Breaking a 52-week high draws attention and flows in a way an arbitrary level does not."},
  pivots:{what:"Pivot Points Standard — the pivot (P) from the previous period's high/low/close, plus symmetric resistance (R1, R2) and support (S1, S2) levels derived from it.",how:"Price above P = bullish bias for the period, below = bearish. R/S levels are where reactions are expected; they're mechanically computed, not drawn.",use:"Pre-computed intraday support/resistance that a very large number of traders watch simultaneously — which is a large part of why they work."},
};
// Line-style options for the Style tab (LWC LineStyle enum values).
const LINE_STYLES = [["Solid",0],["Dotted",1],["Dashed",2]];
// Fallback label when a param has no IND_META entry: title-case the key.
function autoLabel(k){ return k.replace(/([A-Z])/g," $1").replace(/^./,c=>c.toUpperCase()); }

// ── math ──
function emaCalc(data,len){ const out=[]; const k=2/(len+1); let prev=null;
  for(let i=0;i<data.length;i++){ const c=data[i].close; prev=prev==null?c:c*k+prev*(1-k); if(i>=len-1)out.push({time:data[i].time,value:prev}); } return out; }
function smaCalc(data,len){ const out=[]; let sum=0;
  for(let i=0;i<data.length;i++){ sum+=data[i].close; if(i>=len)sum-=data[i-len].close; if(i>=len-1)out.push({time:data[i].time,value:sum/len}); } return out; }
function stddev(arr){ const m=arr.reduce((a,b)=>a+b,0)/arr.length; return Math.sqrt(arr.reduce((a,b)=>a+(b-m)*(b-m),0)/arr.length); }
function bbCalc(data,len,mult){ const mid=[],up=[],lo=[];
  for(let i=len-1;i<data.length;i++){ const win=data.slice(i-len+1,i+1).map(d=>d.close); const m=win.reduce((a,b)=>a+b,0)/len, sd=stddev(win);

function addIndicator(type, opts){
  const cat=IND_CATALOG.find(c=>c.type===type); if(!cat) return;
  const params=Object.assign({},cat.params, (opts&&opts.params)||{});
  const ind={ id:"i"+(indUid++), type, name:cat.name, pane:cat.pane, params, series:[], subChart:null, hidden:!!(opts&&opts.hidden),
    plotStyle:(opts&&opts.plotStyle)||null, plotHidden:(opts&&opts.plotHidden)||null, precision:(opts&&opts.precision!=null)?opts.precision:"" };
  indicators.push(ind);
  // Canvas-overlay indicators (Volume Profile) toggle a redraw flag instead of a LWC series.
  if(cat.pane==="overlay"){
    if(type==="volprofile") window.volProfileOn=true;
    renderIndLegend(); redraw(); toggleIndicatorsMenu(false);
    if(!(opts&&opts.silent)) saveIndicators();
    return ind;
  }
  buildIndicatorSeries(ind); renderIndicator(ind); applyIndicatorStyle(ind); renderIndLegend(); layoutPanes(); toggleIndicatorsMenu(false);
  if(ind.hidden) ind.series.forEach(s=>{ try{ s.applyOptions({visible:false}); }catch(e){} });
  if(!(opts&&opts.silent)) saveIndicators();
  return ind;
}

function loadIndTemplate(name){
  const tpl=indTemplates()[name]; if(!tpl) return;
  [...indicators].forEach(i=>removeIndicator(i.id, true)); indicators.length=0;
  tpl.forEach(r=>addIndicator(r.type,{params:r.params, hidden:r.hidden, silent:true}));
  renderIndLegend(); layoutPanes(); saveIndicators();
}
function loadIndicators(){
  // tear down existing, then rebuild from storage (silent = don't re-save while loading)
  [...indicators].forEach(i=>removeIndicator(i.id, true));
  indicators.length=0;
  try{ const raw=localStorage.getItem(INDICATORS_KEY()); if(raw){ JSON.parse(raw).forEach(r=>addIndicator(r.type,{params:r.params, hidden:r.hidden, plotStyle:r.plotStyle, plotHidden:r.plotHidden, precision:r.precision, silent:true})); } }catch(e){}
  renderIndLegend(); layoutPanes();
}
function removeIndicator(id, silent){
  const idx=indicators.findIndex(i=>i.id===id); if(idx<0) return; const ind=indicators[idx];
  if(ind.pane==="overlay"){
    if(ind.type==="volprofile"){ window.volProfileOn=false; redraw(); }
    indicators.splice(idx,1); renderIndLegend(); if(!silent) saveIndicators(); return;
  }
  if(ind.syncMain){ try{ chart.timeScale().unsubscribeVisibleLogicalRangeChange(ind.syncMain); }catch(e){} }
  // syncSub holds a closure over the MAIN chart; unhook it from the sub-chart's
  // scale before destroying the sub-chart so it can't fire on a torn-down pane.
  if(ind.syncSub && ind.subChart){ try{ ind.subChart.timeScale().unsubscribeVisibleLogicalRangeChange(ind.syncSub); }catch(e){} }
  if(ind.subChart) unregisterPane(ind.subChart);
  ind.series.forEach(s=>{ try{ (ind.subChart||chart).removeSeries(s); }catch(e){} });
  if(ind.subChart){ try{ ind.subChart.remove(); }catch(e){} if(ind.paneEl) ind.paneEl.remove(); }
  indicators.splice(idx,1); renderIndLegend(); layoutPanes();
  if(!silent) saveIndicators();
}
// Hide / show an indicator's plot without removing it (eye toggle in the pane label
// and the main-chart legend). For sub-pane indicators we dim the pane; for overlays
// we just toggle series visibility.
function toggleIndicatorHidden(id){
  const ind=indicators.find(i=>i.id===id); if(!ind) return;
  ind.hidden=!ind.hidden;
  ind.series.forEach(s=>{ try{ s.applyOptions({ visible:!ind.hidden }); }catch(e){} });
  if(ind.paneEl){
    ind.paneEl.classList.toggle("hiddenInd", ind.hidden);
    const eye=ind.paneEl.querySelector(".subEye"); if(eye) eye.textContent=ind.hidden?"🚫":"👁";
  }
  renderIndLegend();
  saveIndicators();
}
// Drag a pane divider to resize. Adjusts the pane's flex-basis (height) live; the
// LWC chart inside is re-sized on each move so its plot fills the new box.
// Collapse a sub-pane to a thin strip (label only) / restore. Maximize expands it.
function resizeSubChart(el){ const ind=indicators.find(i=>i.paneEl===el)||scripts.find(s=>s.paneEl===el); const c=ind&&(ind.subChart); if(c){ try{ c.applyOptions({width:el.clientWidth, height:el.clientHeight}); }catch(e){} } }
function togglePaneCollapse(el){
  const collapsed=el.classList.toggle("pane-collapsed");
  el.style.flex="0 0 "+(collapsed?"22px":"120px"); el.style.height=(collapsed?22:120)+"px";
  setTimeout(()=>{ resizeSubChart(el); if(typeof alignPriceAxes==="function") alignPriceAxes(); },0);
}
function togglePaneMaximize(el){
  const maxed=el.classList.toggle("pane-maxed");
  el.style.flex="0 0 "+(maxed?"70vh":"120px"); el.style.height=(maxed?"70vh":"120px");
  setTimeout(()=>{ resizeSubChart(el); if(typeof alignPriceAxes==="function") alignPriceAxes(); },0);
}
function wirePaneResize(grip, el){
  // rAF-coalesced: one update per frame, resizing the sub-chart AND the main chart +
  // drawings overlay together (growing a sub-pane shrinks #chartWrap, so without the
  // main-chart/overlay resize the drawings bounced during the drag). alignPriceAxes
  // (axis-width recompute) waits for mouseup — mid-drag it jitters the plot width.
  grip.addEventListener("pointerdown", e=>{
    e.preventDefault(); e.stopPropagation();
    try{ grip.setPointerCapture(e.pointerId); }catch(err){}
    const startY=e.clientY, startH=el.getBoundingClientRect().height;
    let raf=0, lastY=e.clientY;
    const apply=()=>{
      raf=0;
      const h=Math.max(70, Math.min(500, startH+(lastY-startY)));
      el.style.flex="0 0 "+h+"px"; el.style.height=h+"px";
      const ind=indicators.find(i=>i.paneEl===el);
      if(ind&&ind.subChart){ try{ ind.subChart.applyOptions({ width:el.clientWidth, height:el.clientHeight }); }catch(e){} }
      try{
        chart.applyOptions({ width:chartEl.clientWidth, height:chartEl.clientHeight });
        rsiChart.applyOptions({ width:rsiEl.clientWidth, height:rsiEl.clientHeight });
        sizeCanvas();
        requestAnimationFrame(()=>{ try{ redraw(); }catch(e){} });   // settle overlay vs LWC remap
      }catch(e){}
    };
    const onMove=ev=>{ lastY=ev.clientY; if(!raf) raf=requestAnimationFrame(apply); };
    const onUp=()=>{
      document.removeEventListener("pointermove",onMove); document.removeEventListener("pointerup",onUp);
      if(raf){ cancelAnimationFrame(raf); raf=0; }
      try{ resize(); sizeCanvas(); }catch(e){}
    };
    document.addEventListener("pointermove",onMove); document.addEventListener("pointerup",onUp);
  });
}
// PLOT DESCRIPTORS: for each type, how many series and of what kind/color.
// kind: "line" | "hist" | "area-top"/"area-bot" (cloud halves). Lets build &
// render stay data-driven for the whole expanded catalog.
function plotSpec(ind){
  const p=ind.params, c=p.color;
  const L=(color,w=1.5)=>({k:"line",color,w});
  switch(ind.type){
    // single-line overlays / oscillators
    case "sma": case "ema": case "wma": case "vwma": case "hma": case "dema":
    case "tema": case "alma": case "smma": case "lsma":
      return [L(c||"#ffeb3b",2)];
    // TV-parity RSI: RSI + RSI-based MA + dashed 70/50/30 bands (s=lineStyle, lv=false hides
    // the bands' axis labels/price lines so only RSI + MA mark the scale, like the built-in pane).
    case "rsi": return [L(c||"#7e57c2",2),{k:"line",color:"#e6b400",w:2},
      {k:"line",color:"rgba(255,255,255,0.75)",w:1,s:1,lv:false},
      {k:"line",color:"#7986cb",w:1,s:3,lv:false},
      {k:"line",color:"rgba(255,255,255,0.75)",w:1,s:1,lv:false},
      {k:"bandfill"}];
    case "cci": case "willr": case "mom": case "roc": case "cmo": case "dpo":
    case "atr": case "stdev": case "chop": case "bbw": case "obv": case "mfi":
    case "adl": case "cmf": case "chaikin": case "pvt": case "fi": case "bop":
    case "coppock": case "vwap": case "supertrend": case "psar": case "fisher": case "uo":
      return [L(c||"#42a5f5",2)];
    // bands (up/mid/lo)
    case "bb": case "kc": case "donchian": case "envel":
      return [L(c||"#26c6da",1),L(c||"#26c6da",1),L(c||"#26c6da",1)];
    // multi-line / hist combos
    case "macd": return [{k:"hist",color:"#26a69a"},L("#2962ff"),L("#ff9800")];
    case "ppo":  return [{k:"hist",color:"#26a69a"},L("#2962ff"),L("#ff9800")];
    case "stoch": case "stochrsi": return [L("#2962ff"),L("#ff9800")];
    case "adx": return [L("#2962ff"),L("#ef5350"),L("#ffb300",2)]; // +DI,-DI,ADX
    case "aroon": return [L("#26a69a"),L("#ef5350")];
    case "vortex": return [L("#26a69a"),L("#ef5350")];
    case "ao": case "ac": return [{k:"hist",color:"#26a69a"}];
    case "trix": return [L("#26c6da"),L("#ff9800")];
    case "volume": return [{k:"hist",color:"#26a69a"}];
    case "ichimoku": return [L("#2962ff"),L("#ef5350"),L("#26a69a",1),L("#ff7043",1),L("#9c6ade",1)]; // conv,base,spanA,spanB,lag
    case "alligator": return [L("#2196f3"),L("#e53935"),L("#43a047")]; // jaw,teeth,lips
    case "fractals": return []; // markers, not series
    case "pivots": return [L("#787b86",1),L("#26a69a",1),L("#ef5350",1),L("#26a69a",1),L("#ef5350",1)];
    // Wave 5 — trend
    case "mcginley": return [L(c||"#ffca28",2)];
    case "kama": return [L(c||"#66bb6a",2)];
    case "ckstop": return [L(c||"#26a69a",1),L("#ef5350",1)]; // long,short
    case "lrc": return [L(c||"#42a5f5",1),L(c||"#42a5f5",1),L(c||"#42a5f5",1)]; // mid,up,lo
    // Wave 5 — momentum
    case "tsi": return [L(c||"#26c6da"),L("#ff9800")];
    case "kst": return [L("#26c6da"),L("#ff9800")];
    case "rvi": return [L("#26c6da"),L("#ff9800")];
    case "smi": return [L("#26c6da"),L("#ff9800")];
    case "woodies": return [L(c||"#ab47bc"),L("#ffa726")];
    case "crsi": return [L(c||"#ff7043",2)];
    // Wave 5 — volume
    case "eom": return [L(c||"#4db6ac",2)];
    case "klinger": return [L("#26c6da"),L("#ff9800")];
    case "netvol": return [{k:"hist",color:"#26a69a"}];
    case "volosc": return [L(c||"#7986cb",2)];
    case "twap": return [L(c||"#ffa726",2)];
    // Wave 5 — volatility
    case "bbpct": return [L(c||"#26c6da",2)];
    case "histvol": return [L(c||"#ff9800",2)];
    case "massidx": return [L(c||"#bdbdbd",2)];
    case "ulcer": return [L(c||"#ce93d8",2)];
    // Wave 5 — other
    case "bbp": return [{k:"hist",color:c||"#26a69a"}];
    case "ribbon": return Array.from({length:p.count||6},(_,i)=>L(c||"#42a5f5", 1+ (i%3)*0.3));
    case "hl52": return [L("#26a69a",1),L("#ef5350",1)];
    default: return [L(c||"#ffeb3b",2)];
  }
}
function buildIndicatorSeries(ind){
  const specs=plotSpec(ind);
  if(ind.pane==="main"){
    ind.series=specs.map(sp=> recordData(sp.k==="hist"
      ? chart.addHistogramSeries({priceLineVisible:false,lastValueVisible:false,autoscaleInfoProvider:overlayScale})
      : chart.addLineSeries({color:sp.color,lineWidth:sp.w,priceLineVisible:false,lastValueVisible:false,autoscaleInfoProvider:overlayScale})));
    return;
  }
  const wrap=document.getElementById("subPanes");
  const el=document.createElement("div"); el.className="subpane";
  const label=document.createElement("div"); label.className="subLabel"; label.textContent=ind.name;
  // No 👁 hide / ↑↓ reorder / ⤢ maximize buttons (owner request) — the sub-pane label
  // matches the built-in RSI pane chrome: collapse, settings, close.
  const info=document.createElement("span"); info.className="infoBtn"; info.textContent="i"; info.title="Information — what this indicator does"; info.onclick=()=>openIndicatorInfo(ind.type, ind.name);
  const collapse=document.createElement("span"); collapse.className="subClose"; collapse.textContent="▁"; collapse.title="Collapse / restore"; collapse.onclick=()=>togglePaneCollapse(el);
  const gear=document.createElement("span"); gear.className="subClose"; gear.textContent="⚙"; gear.title="Settings"; gear.onclick=()=>openIndicatorSettings(ind.id);
  const close=document.createElement("span"); close.className="subClose"; close.textContent="×"; close.onclick=()=>removeIndicator(ind.id);
  label.appendChild(info); label.appendChild(collapse); label.appendChild(gear); label.appendChild(close); el.appendChild(label);
  const grip=document.createElement("div"); grip.className="paneResize"; grip.title="Drag to resize pane"; wirePaneResize(grip,el); el.appendChild(grip);
  wrap.appendChild(el); ind.paneEl=el;
  // Right-click the sub-pane → app menu (Settings / Add alert / Remove), same as
  // the main chart. Alert source = ind.type when it's a recognized ALERT_SOURCES key.
  attachPaneContextMenu(el, {
    settings:()=>openIndicatorSettings(ind.id),
    alertSource: ALERT_SOURCES.some(s=>s.key===ind.type) ? ind.type : null,
    alertLabel: ind.name,
    remove:()=>removeIndicator(ind.id),
  });
  const sc=LightweightCharts.createChart(el,{ layout:{background:{color:"#131722"},textColor:"#d1d4dc",fontFamily:"'Trebuchet MS', Roboto, Ubuntu, sans-serif"},
    grid:{vertLines:{visible:false},horzLines:{color:"#1e222d"}}, rightPriceScale:{borderColor:"#2a2e39",minimumWidth:PRICE_AXIS_W},
    timeScale:{borderColor:"#2a2e39",timeVisible:true,secondsVisible:false,tickMarkFormatter:(t,type)=>tickLabel(t,type)}, crosshair:{mode:0} });
  ind.subChart=sc;
  // Route every pane↔main hop through the one global guard + already-aligned check
  // (see _syncRange) so multiple open panes can't ping-pong the time scale.
  ind.syncMain=r=>_syncRange(sc.timeScale(), r);
  ind.syncSub =r=>_syncRange(chart.timeScale(), r);
  chart.timeScale().subscribeVisibleLogicalRangeChange(ind.syncMain);
  sc.timeScale().subscribeVisibleLogicalRangeChange(ind.syncSub);
  ind.series=specs.map(sp=> recordData(alignSubSeries(
    sp.k==="bandfill"
    ? sc.addBaselineSeries({ baseValue:{type:"price",price:70},
        topFillColor1:"rgba(124,87,194,0.10)", topFillColor2:"rgba(124,87,194,0.10)", topLineColor:"rgba(0,0,0,0)",
        bottomFillColor1:"rgba(124,87,194,0.10)", bottomFillColor2:"rgba(124,87,194,0.10)", bottomLineColor:"rgba(0,0,0,0)",
        priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false })
    : sp.k==="hist"
    ? sc.addHistogramSeries({color:sp.color,priceLineVisible:false})
    : sc.addLineSeries({color:sp.color,lineWidth:sp.w,lineStyle:sp.s||0,
        priceLineVisible:false,   // no dotted last-value line (TV keeps only the axis pill)
        ...(sp.lv===false?{lastValueVisible:false,crosshairMarkerVisible:false}:{})}))));
  registerPane(sc, ind.series[0]);   // share the crosshair with the main chart + other panes
  // New bottom pane → move the date axis down to it (and off the pane now above it).
  setTimeout(()=>{ try{ sc.applyOptions({width:el.clientWidth,height:el.clientHeight}); }catch(e){} alignPriceAxes(); },0);
}
function renderIndicator(ind){
  const d=lastData; if(!d.length) return; const pp=ind.params; const S=ind.series;
  const hist=(arr,pos="#26a69a",neg="#ef5350")=>arr.map(h=>({time:h.time,value:h.value,color:h.value>=0?pos:neg}));
  try{
    switch(ind.type){
      // moving averages
      case "sma": S[0].setData(pair(d,smaA(srcArr(d,pp.src),pp.length))); break;
      case "ema": S[0].setData(pair(d,emaA(srcArr(d,pp.src),pp.length))); break;
      case "wma": S[0].setData(wmaCalc(d,pp.length,pp.src)); break;
      case "vwma": S[0].setData(vwmaCalc(d,pp.length)); break;
      case "hma": S[0].setData(hmaCalc(d,pp.length,pp.src)); break;
      case "dema": S[0].setData(demaCalc(d,pp.length,pp.src)); break;
      case "tema": S[0].setData(temaCalc(d,pp.length,pp.src)); break;
      case "alma": S[0].setData(almaCalc(d,pp.length,pp.offset,pp.sigma,pp.src)); break;
      case "smma": S[0].setData(smmaCalc(d,pp.length,pp.src)); break;
      case "lsma": S[0].setData(lsmaCalc(d,pp.length,pp.src)); break;
      case "envel": { const r=envelCalc(d,pp.length,pp.pct,pp.src); S[0].setData(r.up); S[1].setData(r.mid); S[2].setData(r.lo); break; }
      // oscillators
      case "rsi": { // TV parity: RSI + smoothing MA + constant 70/50/30 band lines + divergence markers
        const r=rsiCalc(d,pp.length,pp.src);
        S[0].setData(r);
        S[1].setData(rsiSmoothMA(r.filter(p=>p.value!=null),pp.smooth||14,pp.maType));
        S[2].setData(d.map(b=>({time:b.time,value:70})));
        S[3].setData(d.map(b=>({time:b.time,value:50})));
        S[4].setData(d.map(b=>({time:b.time,value:30})));
        if(S[5]) S[5].setData(d.map(b=>({time:b.time,value:30})));   // purple 30↔70 wash
        try{ S[0].setMarkers(pp.divergence ? rsiDivergenceMarkers(d, r.filter(p=>p.value!=null)) : []); }catch(e){}
        break; }
      case "macd": { const r=macdCalc(d,pp.fast,pp.slow,pp.signal); S[0].setData(hist(r.hist)); S[1].setData(r.macd); S[2].setData(r.signal); break; }
      case "ppo": { const r=ppoCalc(d,pp.fast,pp.slow,pp.signal); S[0].setData(hist(r.hist)); S[1].setData(r.ppo); S[2].setData(r.signal); break; }
      case "stoch": { const r=stochCalc(d,pp.k,pp.d); S[0].setData(r.k); S[1].setData(r.d); break; }
      case "stochrsi": { const r=stochRsiCalc(d,pp.rsiLen,pp.stochLen,pp.k,pp.d); S[0].setData(r.k); S[1].setData(r.d); break; }
      case "cci": S[0].setData(cciCalc(d,pp.length)); break;
      case "willr": S[0].setData(willrCalc(d,pp.length)); break;
      case "mom": S[0].setData(pair(d,(()=>{const a=srcArr(d,pp.src),o=new Array(a.length).fill(null);for(let i=pp.length;i<a.length;i++)o[i]=a[i]-a[i-pp.length];return o;})())); break;
      case "roc": S[0].setData(rocCalc(d,pp.length,pp.src)); break;
      case "ao": S[0].setData(hist(aoMomColor(aoCalc(d,pp.fast,pp.slow)))); break;
      case "ac": S[0].setData(hist(aoMomColor(acCalc(d)))); break;
      case "uo": S[0].setData(uoCalc(d,pp.l1,pp.l2,pp.l3)); break;
      case "trix": { const r=trixCalc(d,pp.length,pp.signal); S[0].setData(r.trix); S[1].setData(r.signal); break; }
      case "cmo": S[0].setData(cmoCalc(d,pp.length,pp.src)); break;
      case "dpo": S[0].setData(dpoCalc(d,pp.length,pp.src)); break;
      case "fisher": S[0].setData(fisherCalc(d,pp.length)); break;
      case "bop": S[0].setData(bopCalc(d)); break;
      case "coppock": S[0].setData(coppockCalc(d,pp.roc1,pp.roc2,pp.wma)); break;
      // trend
      case "adx": { const r=adxCalc(d,pp.di,pp.adx); S[0].setData(r.plus); S[1].setData(r.minus); S[2].setData(r.adx); break; }
      case "aroon": { const r=aroonCalc(d,pp.length); S[0].setData(r.up); S[1].setData(r.dn); break; }
      case "supertrend": S[0].setData(supertrendCalc(d,pp.atr,pp.factor)); break;
      case "psar": S[0].applyOptions({lineWidth:1,lineStyle:0,pointMarkersVisible:true,lineVisible:false}); S[0].setData(psarCalc(d,pp.start,pp.step,pp.max)); break;
      case "ichimoku": { const r=ichimokuCalc(d,pp.conv,pp.base,pp.spanB,pp.disp); S[0].setData(r.conv); S[1].setData(r.base); S[2].setData(r.spanA); S[3].setData(r.spanB); S[4].setData(r.lag); break; }
      case "vortex": { const r=vortexCalc(d,pp.length); S[0].setData(r.plus); S[1].setData(r.minus); break; }
      // volatility
      case "bb": { const r=bbCalc2(d,pp.length,pp.mult,pp.src); S[0].setData(r.up); S[1].setData(r.mid); S[2].setData(r.lo); break; }
      case "kc": { const r=kcCalc(d,pp.length,pp.mult,pp.atr); S[0].setData(r.up); S[1].setData(r.mid); S[2].setData(r.lo); break; }
      case "donchian": { const r=donchianCalc(d,pp.length); S[0].setData(r.up); S[1].setData(r.mid); S[2].setData(r.lo); break; }
      case "atr": S[0].setData(pair(d,rmaA(trA(d),pp.length))); break;
      case "stdev": S[0].setData(stdevCalc(d,pp.length,pp.src)); break;
      case "chop": S[0].setData(chopCalc(d,pp.length)); break;
      case "bbw": S[0].setData(bbwCalc(d,pp.length,pp.mult,pp.src)); break;
      // volume
      case "volume": S[0].setData(d.map(b=>({time:b.time, value:b.volume||0, color: b.close>=b.open?"#26a69a88":"#ef535088"}))); break;
      case "vwap": S[0].setData(vwapCalc(d)); break;
      case "obv": S[0].setData(obvCalc(d)); break;
      case "mfi": S[0].setData(mfiCalc(d,pp.length)); break;
      case "adl": S[0].setData(adlCalc(d)); break;
      case "cmf": S[0].setData(cmfCalc(d,pp.length)); break;
      case "chaikin": S[0].setData(chaikinCalc(d,pp.fast,pp.slow)); break;
      case "pvt": S[0].setData(pvtCalc(d)); break;
      case "fi": S[0].setData(fiCalc(d,pp.length)); break;
      // bill williams
      case "alligator": { const r=alligatorCalc(d); S[0].setData(r.jaw); S[1].setData(r.teeth); S[2].setData(r.lips); break; }
      case "fractals": { const r=fractalsCalc(d); const m=[...r.up,...r.dn].sort((a,b)=>a.time-b.time); try{ candle.setMarkers(mergeMarkers(m)); }catch(e){} break; }
      case "pivots": { const r=pivotsCalc(d); S[0].setData(r.P); S[1].setData(r.R1); S[2].setData(r.S1); S[3].setData(r.R2); S[4].setData(r.S2); break; }
      // Wave 5 — trend
      case "mcginley": S[0].setData(mcginleyCalc(d,pp.length,pp.src)); break;
      case "kama": S[0].setData(kamaCalc(d,pp.length,pp.fast,pp.slow,pp.src)); break;
      case "ckstop": { const r=ckstopCalc(d,pp.length,pp.mult,pp.stopLen); S[0].setData(r.long); S[1].setData(r.short); break; }
      case "lrc": { const r=lrcCalc(d,pp.length,pp.mult,pp.src); S[0].setData(r.mid); S[1].setData(r.up); S[2].setData(r.lo); break; }
      // Wave 5 — momentum
      case "tsi": { const r=tsiCalc(d,pp.long,pp.short,pp.signal,pp.src); S[0].setData(r.tsi); S[1].setData(r.signal); break; }
      case "kst": { const r=kstCalc(d,pp.signal,pp.src); S[0].setData(r.kst); S[1].setData(r.signal); break; }
      case "rvi": { const r=rviCalc(d,pp.length,pp.signal); S[0].setData(r.rvi); S[1].setData(r.signal); break; }
      case "smi": { const r=smiCalc(d,pp.length,pp.smooth1,pp.smooth2,pp.signal); S[0].setData(r.smi); S[1].setData(r.signal); break; }
      case "woodies": { const r=woodiesCalc(d,pp.length,pp.turboLen); S[0].setData(r.cci); S[1].setData(r.turbo); break; }
      case "crsi": S[0].setData(crsiCalc(d,pp.rsiLen,pp.streakLen,pp.rocLen)); break;
      // Wave 5 — volume
      case "eom": S[0].setData(eomCalc(d,pp.length,pp.div)); break;
      case "klinger": { const r=klingerCalc(d,pp.fast,pp.slow,pp.signal); S[0].setData(r.kvo); S[1].setData(r.signal); break; }
      case "netvol": S[0].setData(hist(netvolCalc(d))); break;
      case "volosc": S[0].setData(voloscCalc(d,pp.fast,pp.slow)); break;
      case "twap": S[0].setData(twapCalc(d)); break;
      // Wave 5 — volatility
      case "bbpct": S[0].setData(bbpctCalc(d,pp.length,pp.mult,pp.src)); break;
      case "histvol": S[0].setData(histvolCalc(d,pp.length)); break;
      case "massidx": S[0].setData(massIdxCalc(d,pp.length,pp.sumLen)); break;
      case "ulcer": S[0].setData(ulcerCalc(d,pp.length)); break;
      // Wave 5 — other
      case "bbp": S[0].setData(hist(bbpCalc(d,pp.length))); break;
      case "ribbon": { const lines=ribbonCalc(d,pp.length,pp.step,pp.count,pp.src); lines.forEach((ln,i)=>{ if(S[i]) S[i].setData(ln); }); break; }
      case "hl52": { const r=hl52Calc(d,pp.length); S[0].setData(r.hi); S[1].setData(r.lo); break; }
    }
  }catch(e){}
}

// Stochastic RSI: %K/%D of stochastic applied to RSI values.
function stochRsiCalc(data,rsiLen,stochLen,kSmooth,dSmooth){
  const rsi=rsiCalc(data,rsiLen,"close"); const map={}; rsi.forEach(p=>map[p.time]=p.value);
  const r=data.map(d=>map[d.time]); const raw=new Array(data.length).fill(null);
  for(let i=0;i<data.length;i++){ if(r[i]==null)continue; let hi=-Infinity,lo=Infinity,ok=true; for(let j=0;j<stochLen;j++){ const v=r[i-j]; if(v==null){ok=false;break;} hi=Math.max(hi,v); lo=Math.min(lo,v);} if(ok&&hi!==lo) raw[i]=(r[i]-lo)/(hi-lo)*100; else if(ok) raw[i]=0; }
  const kA=smaA(raw.map(v=>v==null?0:v),kSmooth).map((v,i)=>raw[i]==null?null:v);
  const dA=smaA(kA.map(v=>v==null?0:v),dSmooth).map((v,i)=>kA[i]==null?null:v);
  return { k:pair(data,kA), d:pair(data,dA) }; }

// Wrap a series' setData so we can look up its value at a crosshair time later
// (lightweight-charts has no getData). The last array set is stashed on the series.
function recordData(series){
  const orig=series.setData.bind(series);
  series.setData=arr=>{ series._data=arr; return orig(arr); };
  return series;
}
// Nearest {time,value} in a recorded series at/around `time`.
function valueAtTime(series, time){
  const d=series&&series._data; if(!d||!d.length) return null;
  let best=null, bd=Infinity;
  for(const p of d){ if(p.value==null) continue; const gap=Math.abs(p.time-time); if(gap<bd){bd=gap;best=p;} }
  return best?best.value:null;
}

const FLOAT_PARAMS=new Set(["mult","factor","offset","sigma","start","step","max","pct","div"]);
// Per-plot style/visibility. ind.plotStyle[i]={color,width,style}; ind.plotHidden[i]=bool.
// Seeded from plotSpec()'s defaults the first time so existing indicators keep their look.
function ensurePlotState(ind){
  const specs=plotSpec(ind);
  // LWC lineWidth wants an integer 1–6; plotSpec defaults may be fractional (e.g. 1.5).
  const w0=sp=>Math.max(1, Math.round(sp.w||1));
  if(!ind.plotStyle) ind.plotStyle = specs.map(sp=>({ color:sp.color, width:w0(sp), style:sp.s||0 }));
  if(!ind.plotHidden) ind.plotHidden = specs.map(()=>false);
  // keep arrays in sync if the plot count changed (e.g. ribbon count param)
  while(ind.plotStyle.length < specs.length){ const sp=specs[ind.plotStyle.length]; ind.plotStyle.push({color:sp.color,width:w0(sp),style:sp.s||0}); }
  while(ind.plotHidden.length < specs.length) ind.plotHidden.push(false);
  return specs;
}
// Apply stored plot styles + visibility + precision onto the live LWC series.
function applyIndicatorStyle(ind){
  if(!ind.series) return;
  ensurePlotState(ind);
  const specs=plotSpec(ind);
  ind.series.forEach((s,i)=>{
    if(!s) return;
    const st=ind.plotStyle[i]||{}; const hidden=ind.hidden || ind.plotHidden[i];
    const opt={ visible:!hidden };
    if(st.color) opt.color=st.color;
    if(specs[i] && specs[i].k!=="hist"){ opt.lineWidth=st.width||1; opt.lineStyle=st.style||0; }
    if(ind.precision!=null && ind.precision!=="") opt.priceFormat={ type:"price", precision:+ind.precision, minMove:Math.pow(10,-(+ind.precision)) };
    try{ s.applyOptions(opt); }catch(e){}
  });
}

// Read-only explainer for an indicator, opened by the ⓘ button on the pane label /
// legend row. Reuses the shared #settingsDlg element (like every other dialog here),
// so it must not collide with an open settings dialog — closeDlg() clears both.
// `type` is an IND_CATALOG type key; `name` is the display name (falls back to the
// catalog name). Any type without an IND_INFO entry still gets a usable dialog.
function openIndicatorInfo(type, name){
  const cat = IND_CATALOG.find(c=>c.type===type);
  const title = name || (cat && cat.name) || type || "Indicator";
  const info = IND_INFO[type];
  const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  // The IND_INFO prose uses *asterisks* for emphasis. Convert to <em> AFTER escaping so the
  // markup we inject is only ever the <em> tags we added ourselves — never anything from the text.
  const em  = s => esc(s).replace(/\*([^*]+)\*/g, '<em>$1</em>');
  const sec = (h,b) => '<div class="dsec">'+h+'</div><div class="infotext">'+em(b)+'</div>';
  const body = info
    ? sec("What it is", info.what) + sec("How to read it", info.how) + sec("What it's for", info.use)

  const catLine = cat ? '<div class="infocat">'+esc(cat.cat)+' · '+(cat.pane==="main"?"Overlay on price":cat.pane==="overlay"?"Chart overlay":"Separate pane")+'</div>' : "";

  dlg.innerHTML='<div class="dh"><span>'+esc(title)+'</span><span class="cl" id="dlgClose">×</span></div>'
    +'<div class="db">'+catLine+body+'</div>'
    +'<div class="df"><button class="btn primary" id="dlgOk">Close</button></div>';

  // usable while it's open (owner request). It's draggable by its header instead.
