    ? '<svg viewBox="0 0 24 24"><path d="M3 3l18 18M10.6 10.7a2 2 0 0 0 2.8 2.8M9.4 5.2A9.6 9.6 0 0 1 12 5c5 0 9 4.5 9 7a11 11 0 0 1-2.2 3.1M6.2 6.3A11.6 11.6 0 0 0 3 12c0 2.5 4 7 9 7 1.4 0 2.7-.3 3.9-.9"/></svg>'
    : '<svg viewBox="0 0 24 24"><path d="M3 12s3.5-7 9-7 9 7 9 7-3.5 7-9 7-9-7-9-7z"/><circle cx="12" cy="12" r="2.5"/></svg>';
}
// Toggle masking for ONE symbol; mask its live cells immediately and refresh its eye.
function toggleWlPrice(sym){

      if(l) l.textContent=WL_MASK; if(a){ a.textContent=WL_MASK; a.className="chgabs"; } if(c){ c.textContent=WL_MASK; c.className="chg"; }
    }
  });
  if(!hidden) refreshPrices();   // reveal → repaint real values
}

// Remove a symbol from a specific group, persist, and rebuild. If the removed
// symbol was active, fall back to the first remaining symbol.
function removeSymbol(groupName, sym){
  const g = GROUPS.find(x=>x.name===groupName);
  if(!g) return;
  const i = g.symbols.indexOf(sym);
  if(i<0) return;
  g.symbols.splice(i,1);
  delete rowMap[sym];                       // rebuilt below; stale refs would otherwise leak
  saveGroups();
  if(activeSymbol===sym && !allSymbols().includes(sym)){
    const next = allSymbols()[0];
    if(next){
      activeSymbol = next;
      if(typeof loadPersisted==="function") loadPersisted();
      if(typeof loadAlerts==="function") loadAlerts();
      if(typeof loadScripts==="function") loadScripts();
      if(typeof loadIndicators==="function") loadIndicators();
      loadChart(next, activeTF);
    }
  }
  buildWatchlist();
  refreshPrices();                          // repaint prices on the rebuilt rows
}

// ── Drag to reorder ──
// HTML5 drag-and-drop. We move the (group,symbol) entry within GROUPS, allowing
// moves across groups too, then persist and rebuild.
let wlDrag = null;   // { group, sym } of the row being dragged
function wlDragWire(row){
  row.addEventListener("dragstart", e=>{
    wlDrag = { group: row.dataset.group, sym: row.dataset.sym };
    row.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
    try{ e.dataTransfer.setData("text/plain", row.dataset.sym); }catch{}
  });
  row.addEventListener("dragend", ()=>{
    row.classList.remove("dragging");
    document.querySelectorAll(".row.drop-above,.row.drop-below")
      .forEach(r=>r.classList.remove("drop-above","drop-below"));
    wlDrag = null;
  });
  row.addEventListener("dragover", e=>{
    if(!wlDrag) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    const before = (e.clientY - row.getBoundingClientRect().top) < row.offsetHeight/2;
    row.classList.toggle("drop-above", before);
    row.classList.toggle("drop-below", !before);
  });
  row.addEventListener("dragleave", ()=>row.classList.remove("drop-above","drop-below"));
  row.addEventListener("drop", e=>{
    if(!wlDrag) return;
    e.preventDefault();
    const before = row.classList.contains("drop-above");
    moveSymbol(wlDrag.group, wlDrag.sym, row.dataset.group, row.dataset.sym, before);
  });
}

// Move (fromGroup,fromSym) to sit before/after (toGroup,toSym) — possibly into
// another group. No-op when dropped on itself.
function moveSymbol(fromGroup, fromSym, toGroup, toSym, before){
  if(fromGroup===toGroup && fromSym===toSym) return;   // dropped on self
  const gf = GROUPS.find(x=>x.name===fromGroup);
  const gt = GROUPS.find(x=>x.name===toGroup);
  if(!gf || !gt) return;
  const fi = gf.symbols.indexOf(fromSym);
  if(fi<0) return;
  gf.symbols.splice(fi,1);                  // remove from source first
  let ti = gt.symbols.indexOf(toSym);
  if(ti<0) ti = gt.symbols.length;          // target vanished → append
  gt.symbols.splice(before ? ti : ti+1, 0, fromSym);
  saveGroups();
  buildWatchlist();
  refreshPrices();
}

// ── Sections (groups) ──
// Section identity is its name, so names are kept unique. Right-click a header
// for Rename / Remove section / Add symbol; click the header to collapse it.
function escHtml(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function uniqueGroupName(name, exceptGroup){
  let base = (name||"SECTION").trim() || "SECTION", out = base, n = 2;
  while(GROUPS.some(g=>g!==exceptGroup && g.name===out)) out = base+" "+(n++);
  return out;
}

function toggleGroupCollapse(name){
  const g = GROUPS.find(x=>x.name===name); if(!g) return;
  g.collapsed = !g.collapsed;
  saveGroups();
  buildWatchlist();
  refreshPrices();
}

function renameGroup(name){
  const g = GROUPS.find(x=>x.name===name); if(!g) return;
  const v = prompt("Rename section:", g.name);
  if(v==null) return;                       // cancelled
  g.name = uniqueGroupName(v, g);
  saveGroups();
  buildWatchlist();
  refreshPrices();
}

function removeGroup(name){
  const i = GROUPS.findIndex(x=>x.name===name); if(i<0) return;
  const g = GROUPS[i];
  if(g.symbols.length && !confirm(`Remove section "${g.name}" and its ${g.symbols.length} symbol(s)?`)) return;
  const removed = g.symbols.slice();
  GROUPS.splice(i,1);
  removed.forEach(sym=>{ if(!allSymbols().includes(sym)) delete rowMap[sym]; });
  saveGroups();
  // if the active symbol no longer exists anywhere, fall back to the first one left
  if(!allSymbols().includes(activeSymbol)){
    const next = allSymbols()[0];
    if(next){
      activeSymbol = next;
      if(typeof loadPersisted==="function") loadPersisted();
      if(typeof loadAlerts==="function") loadAlerts();
      if(typeof loadScripts==="function") loadScripts();
      if(typeof loadIndicators==="function") loadIndicators();
      loadChart(next, activeTF);
    }
  }
  buildWatchlist();
  refreshPrices();
}

// Add a section after the given one (or at the end when name is null).
function addGroup(afterName){
  const name = uniqueGroupName("NEW SECTION");
  const at = afterName!=null ? GROUPS.findIndex(x=>x.name===afterName)+1 : GROUPS.length;
  GROUPS.splice(at<=0?GROUPS.length:at, 0, { name, symbols:[] });
  saveGroups();
  buildWatchlist();
  renameGroup(name);                        // immediately prompt for a real name
}

// Add a symbol to a section. Accepts "BTC", "BTC-USD", "btc/usd"… normalises to
// Coinbase's BASE-QUOTE form (defaulting quote to USD) and ratio A/B form.
function normSym(input){
  let s = (input||"").trim().toUpperCase();
  if(!s) return null;
  if(s.includes("/")){
    const parts = s.split("/").map(p=>normSym(p));
    return parts.every(Boolean) ? parts.join("/") : null;
  }
  // Allowlist: real tickers only use A–Z 0–9 and these separators (Coinbase "-",
  // venue prefix ":", Yahoo "." / "=" / "^"). Stripping everything else keeps hostile
  // input (e.g. "<img onerror=…>") out of the symbol, which is later interpolated raw
  // into a logo <img src> — closing a stored-XSS vector at the source.
  s = s.replace(/[^A-Z0-9:.=^\-]/g, "");
  if(!s) return null;
  if(!s.includes("-") && !s.includes(":")) s = s + "-USD";   // bare base → assume USD quote
  return s;
}
// Add a normalised symbol to a group by name. Returns "added" | "dupe" | "nogroup".
function pushSymbol(groupName, sym){
  const g = GROUPS.find(x=>x.name===groupName); if(!g) return "nogroup";
  if(g.symbols.includes(sym)) return "dupe";
  g.symbols.push(sym);
  saveGroups();
  buildWatchlist();
  refreshPrices();
  return "added";
}

// ── Add-symbol search dialog (TradingView-style) ──
// Lazily fetches Coinbase's full product list once and caches it, then live-filters
// it as you type. Click a row (or press Enter on the highlight) to add it to the
// target section. The ＋ in the watchlist header opens this against the first
// section; the section context-menu opens it against that section.
const symDlg = document.getElementById("symDlg");
// Cached unified product list across venues. Each record:
//   { leg, id, base, quote, name, exLabel, isPerp }
// leg     = string stored in the watchlist (BTC-USD | BINANCE:BTCUSDT | BYBIT:BTCUSDT.P)
// id      = human display ticker (BTC-USD | BTCUSDT | BTCUSDT.P)
// exLabel = "Coinbase" | "Binance" | "Bybit"  (perp also flagged via isPerp)
let PRODUCTS = null;
let productsLoading = null;   // in-flight promise, so concurrent opens share one fetch

async function fetchCoinbaseProducts(){
  const r = await fetch(`${API}/products`);
  if(!r.ok) throw new Error("coinbase "+r.status);
  const raw = await r.json();
  return raw
    .filter(p=>!p.trading_disabled && p.status==="online" && !p.id.includes("delisted"))
    .map(p=>({ leg:p.id, id:p.id, base:p.base_currency, quote:p.quote_currency,
               name:(p.display_name||p.id), exLabel:"Coinbase", isPerp:false }));
}
async function fetchBinanceProducts(isPerp){
  const host = isPerp ? "https://fapi.binance.com/fapi/v1" : "https://api.binance.com/api/v3";
  const r = await fetch(`${host}/exchangeInfo`);
  if(!r.ok) throw new Error("binance "+r.status);
  const d = await r.json();
  return (d.symbols||[])
    .filter(s=> isPerp ? (s.contractType==="PERPETUAL" && s.status==="TRADING")
                       : (s.status==="TRADING" && !s.symbol.includes("_")))
    .map(s=>({ leg:`BINANCE:${s.symbol}${isPerp?".P":""}`, id:`${s.symbol}${isPerp?".P":""}`,
               base:s.baseAsset, quote:s.quoteAsset,
               name:`${s.baseAsset} / ${s.quoteAsset}${isPerp?" Perp":""}`,
               exLabel:"Binance", isPerp }));
}
async function fetchBybitProducts(isPerp){
  const cat = isPerp ? "linear" : "spot";
  // spot/linear instrument lists are paged (cursor); pull all pages.
  let cursor = "", out = [], guard = 0;
  do{
    const url = `https://api.bybit.com/v5/market/instruments-info?category=${cat}&limit=1000${cursor?`&cursor=${encodeURIComponent(cursor)}`:""}`;
    const r = await fetch(url);
    if(!r.ok) throw new Error("bybit "+r.status);
    const d = await r.json();
    const list = (d.result && d.result.list) || [];
    for(const s of list){
      if(s.status && s.status!=="Trading") continue;
      if(isPerp && s.contractType && s.contractType!=="LinearPerpetual") continue;
      out.push({ leg:`BYBIT:${s.symbol}${isPerp?".P":""}`, id:`${s.symbol}${isPerp?".P":""}`,
                 base:s.baseCoin, quote:s.quoteCoin,
                 name:`${s.baseCoin} / ${s.quoteCoin}${isPerp?" Perp":""}`,
                 exLabel:"Bybit", isPerp });
    }
    cursor = (d.result && d.result.nextPageCursor) || "";
  } while(cursor && ++guard < 10);
  return out;
}

async function loadProducts(){
  if(PRODUCTS) return PRODUCTS;
  if(productsLoading) return productsLoading;
  productsLoading = (async ()=>{
    // Fetch every venue in parallel; a venue that fails (geo-block, rate limit)
    // is skipped, never blocking the others. allSettled → keep what succeeded.
    const jobs = [
      fetchCoinbaseProducts(),
      fetchBinanceProducts(false),
      fetchBinanceProducts(true),
      fetchBybitProducts(false),
      fetchBybitProducts(true),
    ];
    const settled = await Promise.allSettled(jobs);
    const merged = [];
    for(const s of settled){ if(s.status==="fulfilled") merged.push(...s.value); }
    if(!merged.length) throw new Error("no products from any venue");
    merged.sort((a,b)=> a.base.localeCompare(b.base) || a.id.localeCompare(b.id));
    PRODUCTS = merged;
    return PRODUCTS;
  })();
  try{ return await productsLoading; }
  finally{ productsLoading = null; }
}

// ── Global market search (Yahoo Finance) ────────────────────────────────
// Yahoo's search endpoint returns matches across every non-crypto asset class
// TradingView lists — stocks, ETFs, forex (CURRENCY), commodities/metals
// (FUTURE), indices (INDEX) — across global exchanges. Crucially the symbol it
// returns IS the symbol its chart endpoint charts, so no translation is needed:
// the leg is simply YF:<symbol>. Routed through the CORS proxy; cached per query.
const YF_SEARCH = "https://query1.finance.yahoo.com/v1/finance/search?newsCount=0&quotesCount=30&q=";
const tvCache = new Map();     // query → product[]   (session-lived)
let tvSeq = 0;                 // guards against out-of-order async renders

// Yahoo quoteType → short asset-class label for the row's right tag.
const YF_TYPE_LABEL = {
  EQUITY:"Stock", ETF:"ETF", MUTUALFUND:"Fund", FUTURE:"Futures",
  CURRENCY:"Forex", INDEX:"Index", CRYPTOCURRENCY:"Crypto", OPTION:"Option",
};
// Fetch & normalise Yahoo search matches into our product-record shape. Kept the
// fetchTVResults/tv* names so the dialog wiring is unchanged; the "TradingView"
// tab now means "everything beyond the crypto venues", served by Yahoo.
async function fetchTVResults(q){
  const key = q.trim().toLowerCase();
  if(!key) return [];
  if(tvCache.has(key)) return tvCache.get(key);
  let raw;
  try{ raw = await proxyJSON(YF_SEARCH + encodeURIComponent(q.trim())); }
  catch{ return []; }                                  // proxy/network failure → no remote rows
  const arr = (raw && Array.isArray(raw.quotes)) ? raw.quotes : [];
  const out = [];
  const seen = new Set();
  for(const h of arr){
    const sym  = h.symbol;
    const type = (h.quoteType||"").toUpperCase();
    if(!sym) continue;
    if(type==="CRYPTOCURRENCY") continue;              // crypto already covered by exchange tabs
    if(seen.has(sym)) continue;
    seen.add(sym);
    const name  = h.shortname || h.longname || h.shortName || sym;
    const venue = h.exchDisp || h.exchange || "";
    out.push({
      leg:`YF:${sym}`, id:sym, base:sym, quote:"",
      name, exLabel:"TradingView", isPerp:false,
      tvType:(YF_TYPE_LABEL[type] || (type ? type[0]+type.slice(1).toLowerCase() : "")),
      tvVenue:venue,
    });
    if(out.length>=40) break;                          // cap remote rows per query
  }
  tvCache.set(key, out);
  return out;
}

let symDlgState = null;  // {group, results, cur} while open

function openAddSymbolDlg(groupName){
  if(IS_EMBED) return;   // mobile app supplies its own symbol search in embed mode
  // default target = first section; create one if the list is somehow empty
  if(groupName==null){
    if(!GROUPS.length){ GROUPS.push({name:uniqueGroupName("SECTION"), symbols:[]}); saveGroups(); }
    groupName = GROUPS[0].name;
  }
  closeAllPopups();
  symDlgState = { group:groupName, results:[], cur:0, ex:"ALL", tv:[], tvQuery:"", tvLoading:false,
                  spread:{ a:null, b:null, slot:"a" } };
  const tabs = [["ALL","All"],["Coinbase","Coinbase"],["Binance","Binance"],["Bybit","Bybit"],["TradingView","Stocks & more"],["Spread","Spread"]]
    .map(([id,label])=>`<button class="symtab${id==="ALL"?" cur":""}" data-ex="${id}">${label}</button>`).join("");
  symDlg.innerHTML =
    `<div class="dh"><span>Add symbol <span class="exch" style="color:var(--muted);font-weight:400;font-size:12px">· ${escHtml(groupName)}</span></span><span class="cl" id="symClose">×</span></div>`
   +`<div class="db">`
   +  `<div class="symsearch">`
   +    `<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>`
   +    `<input id="symInput" type="text" placeholder="Search anything — crypto, stocks, ETFs, gold, FX, indices (e.g. AAPL, SPY, XAUUSD, EURUSD, SPX)" autocomplete="off" spellcheck="false">`
   +  `</div>`
   +  `<div class="symtabs" id="symTabs">${tabs}</div>`
   +  `<div class="symlist" id="symList"><div class="symempty">Loading symbols…</div></div>`
   +`</div>`
   +`<div class="symfoot"><kbd>↑</kbd><kbd>↓</kbd> navigate <kbd>Enter</kbd> add <kbd>Esc</kbd> close</div>`;
  symDlg.classList.add("open");
  document.getElementById("dlgBackdrop").classList.add("open");
  document.getElementById("symClose").onclick = closeSymDlg;

  const input = document.getElementById("symInput");
  input.oninput = ()=>renderSymResults(input.value);
  input.onkeydown = onSymKey;
  input.focus();

  // Exchange tabs filter the result list to one venue (or All).
  document.getElementById("symTabs").querySelectorAll(".symtab").forEach(tab=>{
    tab.onclick = ()=>{
      symDlgState.ex = tab.dataset.ex;
      symDlgState.cur = 0;
      document.querySelectorAll("#symTabs .symtab").forEach(t=>t.classList.toggle("cur", t===tab));
      renderSymResults(input.value);
      input.focus();
    };
  });

  // first paint once products are ready (or surface an error)
  loadProducts().then(()=>{ if(symDlg.classList.contains("open")) renderSymResults(input.value); })
    .catch(()=>{ const l=document.getElementById("symList");
      if(l) l.innerHTML = `<div class="symempty">Couldn't load symbols. You can still type an exact id (e.g. BTC-USD) and press Enter.</div>`; });
}

// Venue display order: crypto exchanges first, then TradingView (stocks/etc.)
// last as a tiebreak so the same ticker clusters predictably.
const EX_ORDER = { Coinbase:0, Binance:1, Bybit:2, TradingView:3 };

function symMatches(q){
  const exFilter = symDlgState ? symDlgState.ex : "ALL";
  // Candidate pool: local crypto products + any TradingView results fetched for
  // this query. The TradingView tab shows ONLY remote rows; other tabs filter the
  // crypto pool; All blends both.
  const tv = (symDlgState && symDlgState.tv) || [];
  let pool;
  if(exFilter==="TradingView")      pool = tv;
  // Spread builder searches every venue (both legs can come from anywhere), like All.
  else if(exFilter && exFilter!=="ALL" && exFilter!=="Spread") pool = (PRODUCTS || []).filter(p=>p.exLabel===exFilter);
  else                              pool = [...(PRODUCTS || []), ...tv];

  q = q.trim().toUpperCase();
  if(!q){                                          // starter list before typing
    return [...pool].sort((a,b)=> (EX_ORDER[a.exLabel]-EX_ORDER[b.exLabel]) || a.id.localeCompare(b.id)).slice(0, 80);
  }
  const norm = q.replace(/\//g,"-");              // treat ETH/BTC like ETH-BTC for matching
  const compact = q.replace(/[-/]/g,"");          // BTCUSDT-style query w/o separators
  const scored = [];
  for(const p of pool){
    const id = p.id.toUpperCase(), nm = (p.name||"").toUpperCase(), ex = p.exLabel.toUpperCase();
    const idc = id.replace(/[-.]/g,"");
    const base = (p.base||"").toUpperCase();
    // TradingView already ranked its hits by relevance for this query; give them a
    // solid baseline so good remote matches aren't buried under loose crypto ones.
    let score = p.exLabel==="TradingView" ? 50 : -1;
    if(id===norm || id===q) score = 100;
    else if(base===q) score = 90;                 // exact base ticker
    else if(id.startsWith(norm) || idc.startsWith(compact)) score = 80;
    else if(base.startsWith(q)) score = 70;
    else if(ex.startsWith(q)) score = 55;         // "binance"/"bybit"/"trading" → that venue
    else if(nm.includes(q)) score = Math.max(score, 40);   // match on display name
    else if(id.includes(norm) || idc.includes(compact)) score = Math.max(score, 30);
    if(score>=0) scored.push([score, p]);
  }
  scored.sort((a,b)=> b[0]-a[0]
                   || (EX_ORDER[a[1].exLabel]-EX_ORDER[b[1].exLabel])
                   || a[1].id.localeCompare(b[1].id));
  return scored.slice(0, 80).map(s=>s[1]);
}

// Kick off (debounced) the remote TradingView search for `q`. When it lands and
// is still the current query + dialog, merge it into state and re-render. Crypto
// rows are already on screen, so this just enriches the list with stocks/ETFs/etc.
let tvDebounce = null;
function scheduleTVSearch(q){
  if(!symDlgState) return;
  const key = q.trim();
  if(key.length < 1){ symDlgState.tv = []; symDlgState.tvQuery=""; return; }
  if(symDlgState.tvQuery === key) return;          // already have/fetching this query
  clearTimeout(tvDebounce);
  tvDebounce = setTimeout(async ()=>{
    if(!symDlgState) return;
    const myKey = key, mySeq = ++tvSeq;
    symDlgState.tvLoading = true; paintSymStatus();
    const res = await fetchTVResults(myKey);
    if(!symDlgState || mySeq!==tvSeq) return;       // dialog closed or newer query won
    symDlgState.tv = res; symDlgState.tvQuery = myKey; symDlgState.tvLoading = false;
    const input = document.getElementById("symInput");
    renderSymResults(input ? input.value : myKey);
  }, 220);
}
// Tiny "searching markets…" hint while the remote call is in flight.
function paintSymStatus(){
  const list = document.getElementById("symList"); if(!list || !symDlgState) return;
  let bar = list.parentNode.querySelector(".symstatus");
  if(symDlgState.tvLoading){
    if(!bar){ bar = document.createElement("div"); bar.className="symstatus"; list.parentNode.insertBefore(bar, list); }
    bar.textContent = "Searching global markets…";
  } else if(bar){ bar.remove(); }
}

function renderSymResults(q){
  if(!symDlgState) return;
  const list = document.getElementById("symList"); if(!list) return;
  if(symDlgState.ex==="Spread"){ renderSpreadBuilder(q); return; }
  scheduleTVSearch(q);                              // enrich with global markets (async)
  paintSymStatus();
  const g = GROUPS.find(x=>x.name===symDlgState.group);
  const have = new Set(g ? g.symbols : []);
  const res = symMatches(q);
  symDlgState.results = res;
  if(symDlgState.cur >= res.length) symDlgState.cur = 0;

  if(!res.length){
    const loading = symDlgState.tvLoading;
    let msg;
    if(loading) msg = "Searching global markets…";
    else if(symDlgState.ex==="TradingView" && !q.trim())
      msg = "Type to search stocks, ETFs, gold, forex, indices…";
    else msg = `No matches${q.trim()?` for “${escHtml(q.trim())}”`:""}.`;
    list.innerHTML = `<div class="symempty">${msg}</div>`;
    return;
  }
  list.innerHTML = res.map((p,i)=>{
    const added = have.has(p.leg);
    const base  = (p.base||"?").toUpperCase();
    const icon  = NO_LOGO.has(base)
      ? `<span class="ic" style="background:#2962ff">${escHtml(base[0]||"?")}</span>`
      : `<img class="ic" src="${logoForBase(base)}" alt="${escHtml(base)}" onerror="this.outerHTML='<span class=\\'ic\\' style=\\'background:#2962ff\\'>${escHtml(base[0]||"?")}</span>'">`;
    const exTag = p.exLabel==="TradingView"
      ? [p.tvVenue, p.tvType].filter(Boolean).join(" · ") || "TradingView"
      : p.exLabel + (p.isPerp ? " · Perp" : "");
    return `<div class="symrow${i===symDlgState.cur?" cur":""}${added?" added":""}" data-i="${i}">`
         +   icon
         +   `<span class="meta"><span class="id">${escHtml(p.id)}</span><span class="nm">${escHtml(p.name)}</span></span>`
         +   `<span class="exch">${escHtml(exTag)}</span>`
         +   `<span class="plus">${added?"✓":"＋"}</span>`
         + `</div>`;
  }).join("");

  list.querySelectorAll(".symrow").forEach(rowEl=>{
    const i = +rowEl.dataset.i;
    rowEl.onmouseenter = ()=>{ symDlgState.cur = i; highlightSymRow(); };
    rowEl.onclick = ()=>chooseSym(i);
  });
}

// ── Spread builder ──
// Two-slot composer (A / B) that writes an A/B ratio leg into the section. Reuses
// the same product pool + TradingView enrichment as the flat search; picking a row
// fills the active slot (A first, then B). "Add spread" pushes "<legA>/<legB>".
function spreadIcon(base){
  base = (base||"?").toUpperCase();
  return NO_LOGO.has(base)
    ? `<span class="ic" style="background:#2962ff">${escHtml(base[0]||"?")}</span>`
    : `<img class="ic" src="${logoForBase(base)}" alt="${escHtml(base)}" onerror="this.outerHTML='<span class=\\'ic\\' style=\\'background:#2962ff\\'>${escHtml(base[0]||"?")}</span>'">`;
}
function spreadSlotChip(which){
  const sp = symDlgState.spread, p = sp[which], active = sp.slot===which;
  const label = which==="a" ? "Numerator (A)" : "Denominator (B)";
  const inner = p
    ? `${spreadIcon(p.base)}<span class="sp-id">${escHtml(p.id)}</span><span class="sp-x" data-clear="${which}" title="Clear">×</span>`
    : `<span class="sp-ph">Pick ${which.toUpperCase()}…</span>`;
  return `<div class="sp-slot${active?" active":""}${p?" filled":""}" data-slot="${which}"><span class="sp-lab">${label}</span><div class="sp-chip">${inner}</div></div>`;
}
function renderSpreadBuilder(q){
  const list = document.getElementById("symList"); if(!list) return;
  scheduleTVSearch(q);                              // enrich picker with global markets
  paintSymStatus();
  const sp = symDlgState.spread;
  const res = symMatches(q);
  symDlgState.results = res;
  if(symDlgState.cur >= res.length) symDlgState.cur = 0;

  const ready = sp.a && sp.b;
  const spreadLeg = ready ? `${sp.a.leg}/${sp.b.leg}` : "";
  const g = GROUPS.find(x=>x.name===symDlgState.group);
  const dupe = ready && g && g.symbols.includes(spreadLeg);

  const rows = res.length
    ? res.map((p,i)=>{
        const exTag = p.exLabel==="TradingView"
          ? [p.tvVenue, p.tvType].filter(Boolean).join(" · ") || "TradingView"
          : p.exLabel + (p.isPerp ? " · Perp" : "");
        return `<div class="symrow${i===symDlgState.cur?" cur":""}" data-i="${i}">`
             +   spreadIcon(p.base)
             +   `<span class="meta"><span class="id">${escHtml(p.id)}</span><span class="nm">${escHtml(p.name)}</span></span>`
             +   `<span class="exch">${escHtml(exTag)}</span>`
             +   `<span class="plus">＋</span>`
             + `</div>`;
      }).join("")
    : `<div class="symempty">${symDlgState.tvLoading?"Searching global markets…":`No matches${q.trim()?` for “${escHtml(q.trim())}”`:""}.`}</div>`;

  list.innerHTML =
      `<div class="sp-build">`
    +   `<div class="sp-slots">`
    +     spreadSlotChip("a")
    +     `<span class="sp-div">/</span>`
    +     spreadSlotChip("b")
    +   `</div>`
    +   `<div class="sp-preview">${ready?`Spread: <b>${escHtml(sp.a.id)} / ${escHtml(sp.b.id)}</b>`:"Search below and click a symbol to fill the active slot."}</div>`
    +   `<button class="sp-add" id="spAdd"${ready&&!dupe?"":" disabled"}>${dupe?"Already added ✓":"Add spread"}</button>`
    + `</div>`
    + `<div class="sp-pickhint">Fill slot <b>${sp.slot.toUpperCase()}</b> — type to search any market:</div>`
    + rows;

  list.querySelectorAll(".sp-slot").forEach(el=>{
    el.onclick = e=>{
      if(e.target.dataset.clear){ sp[e.target.dataset.clear]=null; sp.slot=e.target.dataset.clear; renderSpreadBuilder(document.getElementById("symInput").value); return; }
      sp.slot = el.dataset.slot; renderSpreadBuilder(document.getElementById("symInput").value);
    };
  });
  list.querySelectorAll(".symrow").forEach(rowEl=>{
    const i = +rowEl.dataset.i;
    rowEl.onmouseenter = ()=>{ symDlgState.cur = i; highlightSymRow(); };
    rowEl.onclick = ()=>chooseSpreadLeg(i);
  });
  const addBtn = document.getElementById("spAdd");
  if(addBtn) addBtn.onclick = ()=>{
    if(!(sp.a && sp.b)) return;
    const leg = `${sp.a.leg}/${sp.b.leg}`;
    const r = pushSymbol(symDlgState.group, leg);
    if(r==="added") closeSymDlg();
  };
}
function chooseSpreadLeg(i){
  if(!symDlgState) return;
  const p = symDlgState.results[i]; if(!p) return;
  const sp = symDlgState.spread;
  sp[sp.slot] = p;
  sp.slot = sp.slot==="a" ? "b" : "a";              // advance to the next empty-ish slot
  renderSpreadBuilder(document.getElementById("symInput").value);
}

function highlightSymRow(){
  const list = document.getElementById("symList"); if(!list) return;
  list.querySelectorAll(".symrow").forEach(r=>r.classList.toggle("cur", +r.dataset.i===symDlgState.cur));
  const cur = list.querySelector(".symrow.cur");
  if(cur) cur.scrollIntoView({block:"nearest"});
}

function chooseSym(i){
  if(!symDlgState) return;
  const p = symDlgState.results[i]; if(!p) return;
  const r = pushSymbol(symDlgState.group, p.leg);
  if(r==="dupe"){ flashSymRow(i); return; }        // already there → just nudge, keep dialog open
  renderSymResults(document.getElementById("symInput").value);  // repaint so the ✓ shows
}

function flashSymRow(i){
  const row = document.querySelector(`#symList .symrow[data-i="${i}"]`);
  if(row){ row.classList.add("added"); row.querySelector(".plus").textContent="✓"; }
}

function onSymKey(e){
  if(!symDlgState) return;
  const n = symDlgState.results.length;
  if(e.key==="ArrowDown"){ e.preventDefault(); if(n){ symDlgState.cur=(symDlgState.cur+1)%n; highlightSymRow(); } }
  else if(e.key==="ArrowUp"){ e.preventDefault(); if(n){ symDlgState.cur=(symDlgState.cur-1+n)%n; highlightSymRow(); } }
  else if(e.key==="Enter"){
    e.preventDefault();
    if(symDlgState.ex==="Spread"){ if(n) chooseSpreadLeg(symDlgState.cur); return; }
    if(n){ chooseSym(symDlgState.cur); }
    else {                                          // no list (e.g. products failed) → accept raw text
      const sym = normSym(document.getElementById("symInput").value);
      if(sym){ pushSymbol(symDlgState.group, sym); closeSymDlg(); }
    }
  }
}

function closeSymDlg(){
  symDlgState = null;

// A modal card with as much detail as the public APIs expose: price, 24h change,
// 24h high/low/volume, spread/exchange/type, plus indicators computed from candles
// (RSI 14, SMA 20/50, range position). Numbers come from the venue's ticker
// (fetchRichStats) and a daily candle fetch; everything degrades gracefully to "—".
const pairCard = document.getElementById("pairCard");

// Rich single-leg 24h stats. Returns {last, open, high, low, vol, quoteVol, extra{}} or null.
async function fetchRichStats(leg){
  const r = resolveLeg(leg), ex = r.exchange.id;
  try{
    if(ex==="COINBASE"){
      const s = await (await fetchTimeout(`${API}/products/${r.rest}/stats`)).json();
      if(!s || s.last==null) return null;
      return { last:+s.last, open:+s.open, high:+s.high, low:+s.low, vol:+s.volume };
    }
    if(ex==="BINANCE"){
      const host = r.isPerp ? "https://fapi.binance.com/fapi/v1" : "https://api.binance.com/api/v3";
      const t = await (await fetchTimeout(`${host}/ticker/24hr?symbol=${r.rest}`)).json();
      if(!t || t.lastPrice==null) return null;
      return { last:+t.lastPrice, open:+t.openPrice, high:+t.highPrice, low:+t.lowPrice,
               vol:+t.volume, quoteVol:+t.quoteVolume,
               extra:{ "Weighted avg": +t.weightedAvgPrice, "Trades (24h)": +t.count } };
    }
    if(ex==="BYBIT"){
      const cat = r.isPerp ? "linear" : "spot";
      const d = await (await fetchTimeout(`https://api.bybit.com/v5/market/tickers?category=${cat}&symbol=${r.rest}`)).json();
      const t = d && d.result && d.result.list && d.result.list[0];
      if(!t || t.lastPrice==null) return null;
      return { last:+t.lastPrice, open:+t.prevPrice24h, high:+t.highPrice24h, low:+t.lowPrice24h,
               vol:+t.volume24h, quoteVol:+t.turnover24h,
               extra: r.isPerp ? { "Funding rate": t.fundingRate!=null?(+t.fundingRate*100).toFixed(4)+"%":null,
                                   "Open interest": t.openInterest!=null?(+t.openInterest).toLocaleString():null } : {} };
    }
    if(ex==="YAHOO"){
      const d = await proxyJSON(`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(r.rest)}?interval=1d&range=5d`);
      const m = d && d.chart && d.chart.result && d.chart.result[0] && d.chart.result[0].meta;
      if(!m || m.regularMarketPrice==null) return null;
      return { last:+m.regularMarketPrice, open:+(m.chartPreviousClose??m.previousClose),
               high:+m.regularMarketDayHigh, low:+m.regularMarketDayLow, vol:+m.regularMarketVolume,
               extra:{ "52-wk high": m.fiftyTwoWeekHigh, "52-wk low": m.fiftyTwoWeekLow, "Currency": m.currency } };
    }
  }catch(e){}
  return null;
}

// Build a synthetic-ratio OR single-leg daily candle series for indicator math.
async function fetchCardCandles(sym){
  try{
    if(sym.includes("/")){
      const [a,b] = sym.split("/");
      const [pa,pb] = await Promise.all([fetchKlines(a,"1d"), fetchKlines(b,"1d")]);
      return (pa.length && pb.length) ? makeRatio(pa, pb) : [];
    }
    return await fetchKlines(sym, "1d");
  }catch(e){ return []; }
}

// Plain-language explanations shown as a hover help box on each stat cell.
const PC_HELP = {
  "24h High":"Highest traded price over the last 24 hours.",
  "24h Low":"Lowest traded price over the last 24 hours.",
  "24h Volume":"Amount of the base asset traded in the last 24 hours.",
  "Quote volume":"Total value traded in the last 24 hours, in the quote currency (e.g. USDT).",
  "Range position":"Where the current price sits between the 24h low (0%) and high (100%).",
  "Prev close / open":"The reference price 24 hours ago, used to compute today's change.",
  "RSI (14, 1D)":"Relative Strength Index over 14 daily bars. Above 70 = overbought, below 30 = oversold.",
  "SMA 20":"20-day Simple Moving Average — the average closing price of the last 20 days.",
  "SMA 50":"50-day Simple Moving Average — the average closing price of the last 50 days.",
  "Trend":"Bullish when the 20-day average is above the 50-day average; bearish when below.",
  "ATR (14)":"Average True Range (14 days) — typical daily price movement, a measure of volatility.",
  "1Y High":"Highest price over roughly the last year of daily bars.",
  "1Y Low":"Lowest price over roughly the last year of daily bars.",
  "Weighted avg":"Volume-weighted average price over the last 24 hours (Binance).",
  "Trades (24h)":"Number of individual trades executed in the last 24 hours.",
  "Funding rate":"Periodic payment between long and short perpetual holders; positive = longs pay shorts.",
  "Open interest":"Total value of open perpetual contracts currently outstanding.",
  "52-wk high":"Highest price over the last 52 weeks.",
  "52-wk low":"Lowest price over the last 52 weeks.",
  "Currency":"The currency this instrument is priced in.",
  "Symbol":"The ticker used to fetch and chart this instrument.",
  "Type":"Spot, Perpetual future, or a synthetic A/B spread (ratio).",
  "Exchange":"The venue this price data comes from.",
  "Numerator":"The top leg (A) of the A/B spread ratio.",
  "Denominator":"The bottom leg (B) of the A/B spread ratio.",
};
function pcCell(k,v){
  const help = PC_HELP[k];
  const attr = help ? ` data-help="${escHtml(help)}"` : "";
  // Escape the value: some callers pass raw API strings (e.g. Yahoo's currency code),
  // so this is the single choke-point that keeps untrusted data out of innerHTML.
  const val = (v==null||v==="") ? "—" : escHtml(String(v));
  return `<div class="pc-cell${help?" has-help":""}"${attr}><div class="pc-k">${escHtml(k)}</div><div class="pc-v">${val}</div></div>`;
}
// Wrap a list of pcCell() strings in a .pc-grid, padding the final row with blank
// filler cells so a partially-filled row never leaves a dark gap. `cols` = grid width.
function pcGrid(cells, cols=3){
  const list = cells.filter(Boolean);
  const rem = list.length % cols;
  const pad = rem ? cols - rem : 0;
  return `<div class="pc-grid">${list.join("")}${'<div class="pc-cell pc-fill"></div>'.repeat(pad)}</div>`;
}
function fmtVol(v){ if(v==null||!isFinite(v)) return "—";
  const a=Math.abs(v);
  if(a>=1e9) return (v/1e9).toFixed(2)+"B";
  if(a>=1e6) return (v/1e6).toFixed(2)+"M";
  if(a>=1e3) return (v/1e3).toFixed(2)+"K";
  return v.toLocaleString(undefined,{maximumFractionDigits:2}); }

function renderPairCard(sym, stats, data, isSpread){
  const cached = PRICE_CACHE[sym] || {};
  // Price + change: prefer live ticker, fall back to the watchlist cache, then candles.
  // Use isFinite (not !=null): API fields are coerced with +x, so a missing field is NaN,
  // and NaN!=null is true — an isFinite check is what actually rejects bad numbers.
  const num = x => (x!=null && isFinite(x)) ? x : null;
  let last = num(stats && stats.last) ?? num(cached.price) ?? (data.length?data[data.length-1].close:null);
  let open = num(stats && stats.open);
  let chgPct = (open!=null && open!==0 && last!=null) ? (last/open-1)*100
             : num(cached.chgPct);
  let chgAbs = (open!=null && last!=null) ? (last-open) : num(cached.chgAbs);
  const up = (chgAbs??0) >= 0;

  document.getElementById("pcLast").textContent = last!=null ? fmtPrice(last) : "—";
  const chgEl = document.getElementById("pcChg");
  if(chgAbs!=null && chgPct!=null){
    chgEl.className = "pc-chg "+(up?"up":"down");
    chgEl.textContent = `${up?"+":"−"}${fmtPrice(Math.abs(chgAbs))}  (${up?"+":"−"}${Math.abs(chgPct).toFixed(2)}%) · 24h`;
  } else chgEl.textContent = "";

  // Brief asset description + official site (single symbols only), centered under price.
  const descEl = document.getElementById("pcDesc");
  if(descEl){
    const info = (!isSpread) ? ASSET_INFO[legBase(sym)] : null;
    if(info){
      let host=""; try{ host=new URL(info.w).host.replace(/^www\./,""); }catch(_){}
      descEl.innerHTML = escHtml(info.d)
        + (info.w?`<a class="pc-site" href="${escHtml(info.w)}" target="_blank" rel="noopener noreferrer">${escHtml(host||info.w)} ↗</a>`:"");
      descEl.style.display = "";
    } else { descEl.innerHTML = ""; descEl.style.display = "none"; }
  }

  // 24h high/low/volume from the ticker; fall back to the last ~24h of daily candles.
  let high = stats && isFinite(stats.high) ? stats.high : null;
  let low  = stats && isFinite(stats.low)  ? stats.low  : null;
  if((high==null||low==null) && data.length){ const d=data[data.length-1]; high=high??d.high; low=low??d.low; }

  // Indicators from the daily series.
  let rsi=null, sma20=null, sma50=null, hi52=null, lo52=null, atr=null;
  if(data.length){
    const closes = data.map(d=>d.close);
    const rs = rsiCalc(data,14,"close"); for(let i=rs.length-1;i>=0;i--){ if(rs[i]&&rs[i].value!=null){ rsi=rs[i].value; break; } }
    const s20=smaA(closes,20), s50=smaA(closes,50);
    sma20 = s20[s20.length-1]; sma50 = s50[s50.length-1];
    const yr = data.slice(-365);
    hi52 = Math.max(...yr.map(d=>d.high)); lo52 = Math.min(...yr.map(d=>d.low));
    // ATR(14) on daily bars → rough daily volatility
    if(data.length>15){ let s=0,n=0; for(let i=data.length-14;i<data.length;i++){ const p=data[i-1];
      const tr=Math.max(data[i].high-data[i].low, Math.abs(data[i].high-p.close), Math.abs(data[i].low-p.close)); s+=tr; n++; } atr=n?s/n:null; }
  }
  const rsiTxt = rsi!=null ? rsi.toFixed(1)+(rsi>=70?" · Overbought":rsi<=30?" · Oversold":"") : "—";
  const trend = (sma20!=null&&sma50!=null) ? (sma20>sma50?"Bullish (20>50)":"Bearish (20<50)") : null;
  // Position of last within the 24h range.
  let rangePos=null;
  if(last!=null && high!=null && low!=null && high>low) rangePos = ((last-low)/(high-low)*100);

  const rsiBar = rsi!=null
    ? `<div class="pc-cell has-help" style="grid-column:1/-1" data-help="${escHtml(PC_HELP["RSI (14, 1D)"])}"><div class="pc-k">RSI (14, 1D)</div>`
      +`<div class="pc-v">${rsiTxt}</div><div class="pc-rsi-bar"><span class="pc-rsi-dot" style="left:${Math.max(0,Math.min(100,rsi))}%"></span></div></div>`
    : "";

  const extraCellsArr = (stats && stats.extra) ? Object.entries(stats.extra)
      .filter(([k,v])=>v!=null && v!=="" && !(typeof v==="number"&&!isFinite(v)))
      .map(([k,v])=>pcCell(k, typeof v==="number"?fmtPrice(v):v)) : [];
  const extraCells = extraCellsArr.length;

  const pairCells = [
    pcCell("Symbol", symLabel(sym)),                 // pcCell escapes the value itself
    pcCell("Type", isSpread?"Spread / Ratio":(resolveLeg(sym).isPerp?"Perpetual":"Spot")),
    ...(isSpread
        ? [pcCell("Numerator", legShort(sym.split("/")[0])), pcCell("Denominator", legShort(sym.split("/")[1]))]
        : [pcCell("Exchange", resolveLeg(sym).exchange.label)]),
  ];
  // Technicals: rsiBar spans the full row, then 6 stat cells (grid-fills evenly).
  const techTail = pcGrid([
    pcCell("SMA 20", sma20!=null?fmtPrice(sma20):null),
    pcCell("SMA 50", sma50!=null?fmtPrice(sma50):null),
    (trend?pcCell("Trend", trend):""),
    pcCell("ATR (14)", atr!=null?fmtPrice(atr):null),
    pcCell("1Y High", hi52!=null&&isFinite(hi52)?fmtPrice(hi52):null),
    pcCell("1Y Low",  lo52!=null&&isFinite(lo52)?fmtPrice(lo52):null),
  ]);

  document.getElementById("pcBody").innerHTML =
      `<div class="pc-sec">Market · 24h</div>`
    + pcGrid([
        pcCell("24h High", high!=null?fmtPrice(high):null),
        pcCell("24h Low",  low!=null?fmtPrice(low):null),
        pcCell("24h Volume", stats?fmtVol(stats.vol):null),
        pcCell("Quote volume", stats&&stats.quoteVol!=null?fmtVol(stats.quoteVol):null),
        (rangePos!=null?pcCell("Range position", rangePos.toFixed(0)+"% of 24h range"):""),
        pcCell("Prev close / open", open!=null?fmtPrice(open):null),
      ])
    + `<div class="pc-sec">Technicals · Daily</div>`
    + (rsiBar ? `<div class="pc-grid">${rsiBar}</div>` : "")
    + techTail
    + (extraCells?`<div class="pc-sec">Exchange</div>`+pcGrid(extraCellsArr):"")
    + `<div class="pc-sec">Pair</div>`
    + pcGrid(pairCells);
}

const PC_SMA_PERIODS = [7,25,99,150,200,300];
const PC_PAGES = 3;
let _pcPage = 0;
function rsiClass(v){ return v>=70?"ob":v<=30?"os":"nt"; }
function rsiTag(v){ return v>=70?" · Overbought":v<=30?" · Oversold":""; }
function wirePairCardNav(sym, isSpread){

// Compute RSI(14) for every timeframe, filling each row as its fetch lands.
let _rsiPageSym = null;
function loadRsiPage(sym, isSpread){
  if(_rsiPageSym===sym) return;      // already loading/loaded for this symbol
  _rsiPageSym = sym;
  const rows = document.getElementById("pcRsiRows"); if(!rows) return;
  rows.innerHTML = PC_RSI_TFS.map(tf=>

    +`<span class="pc-rsi-val">…</span><div class="pc-rsi-track"><span class="d" style="left:0%"></span></div></div>`).join("");
  const seq = _pairCardSeq;          // tie to the currently-open card
  PC_RSI_TFS.forEach(tf=>{
    (isSpread ? fetchSpreadRsi(sym, tf) : fetchKlines(sym, tf).then(d=>rsiFromBars(d)))
      .then(v=>{
        if(seq!==_pairCardSeq) return;                 // card changed/closed

function rsiFromBars(data){
  if(!data || !data.length) return null;
  const rs = rsiCalc(data,14,"close");
  for(let i=rs.length-1;i>=0;i--){ if(rs[i]&&rs[i].value!=null) return rs[i].value; }
  return null;
}
async function fetchSpreadRsi(sym, tf){
  const [a,b] = sym.split("/");
  const [pa,pb] = await Promise.all([fetchKlines(a,tf), fetchKlines(b,tf)]);
  if(!pa.length || !pb.length) return null;
  return rsiFromBars(makeRatio(pa, pb));
}
// Bars for one timeframe (single leg or spread ratio) — shared by the SMA page.
async function fetchTfBars(sym, tf, isSpread){
  if(isSpread){
    const [a,b] = sym.split("/");
    const [pa,pb] = await Promise.all([fetchKlines(a,tf), fetchKlines(b,tf)]);
    return (pa.length && pb.length) ? makeRatio(pa,pb) : [];
  }
  return await fetchKlines(sym, tf);
}
// Compute SMA(7/25/99/150/200/300) for every timeframe → a TF×period matrix, each
// cell colored by last-close vs that SMA. Rows fill as each TF's fetch lands.
let _smaPageSym = null;
function loadSmaPage(sym, isSpread){
  if(_smaPageSym===sym) return;
  _smaPageSym = sym;
  const wrap = document.getElementById("pcSmaWrap"); if(!wrap) return;
  const head = `<tr><th>TF</th>${PC_SMA_PERIODS.map(p=>{
    const ma = MAS.find(m=>m.p===p);
    return `<th${ma?` style="color:${ma.color}"`:""}>${p}</th>`;
  }).join("")}</tr>`;
  const body = PC_RSI_TFS.map(tf=>
    `<tr data-tf="${tf}"><td>${(TF[tf]||{}).label||tf}</td>`
    + PC_SMA_PERIODS.map(()=>`<td class="pending">…</td>`).join("") + `</tr>`).join("");
  wrap.innerHTML = `<table class="pc-sma-tbl"><thead>${head}</thead><tbody>${body}</tbody></table>`;
  const seq = _pairCardSeq;
  PC_RSI_TFS.forEach(tf=>{
    fetchTfBars(sym, tf, isSpread).then(data=>{
      if(seq!==_pairCardSeq) return;
      const tr = document.querySelector(`#pcSmaWrap tr[data-tf="${tf}"]`); if(!tr) return;
      const tds = tr.querySelectorAll("td"); // [0]=TF label, then one per period
      if(!data || !data.length){ PC_SMA_PERIODS.forEach((p,i)=>{ tds[i+1].textContent="—"; tds[i+1].className=""; }); return; }
      const closes = data.map(d=>d.close);
      const last = closes[closes.length-1];
      PC_SMA_PERIODS.forEach((p,i)=>{
        const cell = tds[i+1];
        if(data.length < p){ cell.textContent="—"; cell.className=""; return; }
        const s = smaA(closes, p); const v = s[s.length-1];
        if(v==null){ cell.textContent="—"; cell.className=""; return; }
        cell.textContent = fmtPrice(v);
        cell.className = last>v ? "above" : last<v ? "below" : "";
        cell.title = `Price ${last>v?"above":last<v?"below":"at"} SMA${p}`;
      });
    }).catch(()=>{ const tr=document.querySelector(`#pcSmaWrap tr[data-tf="${tf}"]`);
      if(tr) tr.querySelectorAll("td").forEach((td,i)=>{ if(i>0){ td.textContent="—"; td.className=""; } }); });
  });
}

// Drag the card by its header. On first drag we switch from the centered transform to
// absolute left/top so the card follows the cursor and stays where dropped (clamped
// to the viewport). Ignores drags that start on the ×, arrows, or dots.
function pcDragWire(){
  const head = pairCard.querySelector(".pc-head"); if(!head) return;
  head.style.cursor = "move";
  head.onpointerdown = e=>{
    if(e.button!==0 || e.target.closest(".pc-x, .pc-arrow, .pc-dot")) return;
    const rect = pairCard.getBoundingClientRect();
    // pin to pixel coords (drop the translate centering) at the current position
    pairCard.style.transform = "none";
    pairCard.style.left = rect.left + "px";
    pairCard.style.top  = rect.top  + "px";
    const dx = e.clientX - rect.left, dy = e.clientY - rect.top;
    const w = rect.width, h = rect.height;
    head.setPointerCapture(e.pointerId);
    const move = ev=>{
      const nx = Math.max(0, Math.min(window.innerWidth  - w, ev.clientX - dx));
      const ny = Math.max(0, Math.min(window.innerHeight - h, ev.clientY - dy));
      pairCard.style.left = nx + "px"; pairCard.style.top = ny + "px";
    };
    const up = ()=>{ head.removeEventListener("pointermove", move); head.removeEventListener("pointerup", up); };
    head.addEventListener("pointermove", move);
    head.addEventListener("pointerup", up);
    e.preventDefault();
  };
}

// Let a dragged symbol be dropped onto a section header (appends to that group).
function sectionDropWire(el, name){
  el.addEventListener("dragover", e=>{
    if(!wlDrag) return;
    e.preventDefault(); e.dataTransfer.dropEffect="move";
    el.classList.add("drop-into");
  });
  el.addEventListener("dragleave", ()=>el.classList.remove("drop-into"));
  el.addEventListener("drop", e=>{
    if(!wlDrag) return;
    e.preventDefault(); el.classList.remove("drop-into");
    // append to end of this group: target the last symbol "after", or empty → moveSymbol appends
    const g = GROUPS.find(x=>x.name===name);
    const lastSym = g && g.symbols.length ? g.symbols[g.symbols.length-1] : null;
    moveSymbol(wlDrag.group, wlDrag.sym, name, lastSym, /*before=*/false);
  });
}

// ── Drag whole sections to reorder ──
// Grab a section HEADER and drop it above/below another header to move the entire
// group up or down. Distinct from wlDrag (a single symbol row); guarded so the two
// drop paths never fire on the same gesture. A completed drag suppresses the click
// that would otherwise collapse/expand the header.
let wlGroupDrag = null;      // name of the section being dragged
let _groupDragged = false;   // set on drop so the trailing click doesn't toggle collapse
function groupDragWire(el, name){
  el.addEventListener("dragstart", e=>{
    // Only start a section drag when NOT dragging a symbol row (rows sit inside body,
    // headers are separate elements, so this is just belt-and-suspenders).
    wlGroupDrag = name;
    el.classList.add("gdragging");
    e.dataTransfer.effectAllowed = "move";
    try{ e.dataTransfer.setData("text/plain", name); }catch{}
  });
  el.addEventListener("dragend", ()=>{
    el.classList.remove("gdragging");
    document.querySelectorAll(".section.gdrop-above,.section.gdrop-below")
      .forEach(s=>s.classList.remove("gdrop-above","gdrop-below"));
    wlGroupDrag = null;
  });
  el.addEventListener("dragover", e=>{
    if(!wlGroupDrag || wlGroupDrag===name) return;   // no symbol drag, and not over itself
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    const before = (e.clientY - el.getBoundingClientRect().top) < el.offsetHeight/2;
    el.classList.toggle("gdrop-above", before);
    el.classList.toggle("gdrop-below", !before);
  });
  el.addEventListener("dragleave", ()=>el.classList.remove("gdrop-above","gdrop-below"));
  el.addEventListener("drop", e=>{
    if(!wlGroupDrag) return;
    e.preventDefault(); e.stopPropagation();
    const before = el.classList.contains("gdrop-above");
    el.classList.remove("gdrop-above","gdrop-below");
    _groupDragged = true;                     // swallow the click that follows a drop
    moveGroup(wlGroupDrag, name, before);
  });
}
// Move section `fromName` to sit before/after section `toName`. No-op on self.
function moveGroup(fromName, toName, before){
  if(fromName===toName) return;
  const fi = GROUPS.findIndex(g=>g.name===fromName);
  if(fi<0) return;
  const [moved] = GROUPS.splice(fi,1);        // pull the section out
  let ti = GROUPS.findIndex(g=>g.name===toName);
  if(ti<0) ti = GROUPS.length;                // target vanished → append
  GROUPS.splice(before ? ti : ti+1, 0, moved);
  saveGroups();
  buildWatchlist();
  refreshPrices();
}

// Coinbase has no bulk 24hr endpoint; use per-product /stats (24h open/last).
async function fetchStats(product){
  try{
    const r = await fetch(`${API}/products/${product}/stats`);
    const s = await r.json();
    if(!s || !s.last) return null;
    return { last:+s.last, open:+s.open };
  }catch{ return null; }
}

// Binance/Bybit DO have bulk 24h ticker endpoints — one call covers every leg on
// that venue. Cache per refresh cycle so spot+perp on the same host share a call.
// Each returns a { restSymbol: {last, open} } map.
async function fetchBulkBinance(isPerp){
  const host = isPerp ? "https://fapi.binance.com/fapi/v1" : "https://api.binance.com/api/v3";
  try{
    const r = await fetch(`${host}/ticker/24hr`);
    const arr = await r.json();
    if(!Array.isArray(arr)) return {};
    const m = {};
    for(const t of arr) m[t.symbol] = { last:+t.lastPrice, open:+t.openPrice };
    return m;
  }catch{ return {}; }
}
async function fetchBulkBybit(isPerp){
  const cat = isPerp ? "linear" : "spot";
  try{
    const r = await fetch(`https://api.bybit.com/v5/market/tickers?category=${cat}`);
    const d = await r.json();
    const list = d && d.result && d.result.list;
    if(!Array.isArray(list)) return {};
    const m = {};
    for(const t of list) m[t.symbol] = { last:+t.lastPrice, open:+t.prevPrice24h };
    return m;
  }catch{ return {}; }
}
// Yahoo has no bulk endpoint here; a 1d/5d chart call carries meta.regularMarketPrice
// and meta.chartPreviousClose, giving {last, open} (open = prior close, so Chg% is the
// daily move — matching how TradingView shows stock change).
async function fetchStatsYahoo(sym){
  try{
    const d = await proxyJSON(`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=5d`);
    const meta = d && d.chart && d.chart.result && d.chart.result[0] && d.chart.result[0].meta;
    if(!meta || meta.regularMarketPrice==null) return null;
    const last = +meta.regularMarketPrice;
    const open = meta.chartPreviousClose!=null ? +meta.chartPreviousClose
               : (meta.previousClose!=null ? +meta.previousClose : last);
    return { last, open };
  }catch{ return null; }
}

// Run async tasks with a concurrency cap. The watchlist has ~40 legs; firing
// them all at once saturates the browser's 6-connections-per-host limit and
// starves the chart's own fetches (that was the ~30s blank-chart stall). A
// small cap keeps a few connections free for the chart.
async function mapLimit(items, limit, fn){
  const out = new Array(items.length);
  let i = 0;
  async function worker(){
    while(i < items.length){
      const idx = i++;
      out[idx] = await fn(items[idx], idx);
    }
  }
  await Promise.all(Array.from({length:Math.min(limit, items.length)}, worker));
  return out;
}

async function refreshPrices(){
  // resolve every leg we need (plain symbols + both sides of any ratio)
  const all = allSymbols();
  const legs = new Set();
  all.forEach(sym=> sym.split("/").forEach(s=>legs.add(s)) );

  // Bucket legs by venue: Coinbase legs hit per-product /stats; Binance/Bybit
  // legs are answered from one bulk ticker call per (venue, market).
  const cbLegs = [], biSpot = [], biPerp = [], bySpot = [], byPerp = [], yfLegs = [];
  for(const leg of legs){
    const r = resolveLeg(leg);
    if(r.exchange.id==="BINANCE") (r.isPerp?biPerp:biSpot).push(leg);
    else if(r.exchange.id==="BYBIT") (r.isPerp?byPerp:bySpot).push(leg);
    else if(r.exchange.id==="YAHOO") yfLegs.push(leg);
    else cbLegs.push(leg);
  }
  const stats = {};
  // fire the bulk calls (only those actually needed) alongside the Coinbase sweep
  const bulkJobs = [];
  if(biSpot.length) bulkJobs.push(fetchBulkBinance(false).then(m=>biSpot.forEach(l=>{ const v=m[resolveLeg(l).rest]; if(v) stats[l]=v; })));
  if(biPerp.length) bulkJobs.push(fetchBulkBinance(true ).then(m=>biPerp.forEach(l=>{ const v=m[resolveLeg(l).rest]; if(v) stats[l]=v; })));
  if(bySpot.length) bulkJobs.push(fetchBulkBybit(false).then(m=>bySpot.forEach(l=>{ const v=m[resolveLeg(l).rest]; if(v) stats[l]=v; })));
  if(byPerp.length) bulkJobs.push(fetchBulkBybit(true ).then(m=>byPerp.forEach(l=>{ const v=m[resolveLeg(l).rest]; if(v) stats[l]=v; })));
  const cbJob = mapLimit(cbLegs, 4, async p=>[p, await fetchStats(resolveLeg(p).rest)])
    .then(entries=>entries.forEach(([l,v])=>{ if(v) stats[l]=v; }));
  // Yahoo: one proxied call per leg, concurrency-capped (proxies rate-limit harder
  // than exchanges, so keep this small).
  const yfJob = mapLimit(yfLegs, 3, async p=>[p, await fetchStatsYahoo(resolveLeg(p).rest)])
    .then(entries=>entries.forEach(([l,v])=>{ if(v) stats[l]=v; }));
  await Promise.all([...bulkJobs, cbJob, yfJob]);

  all.forEach(sym=>{
    let price, prev;
    if(sym.includes("/")){
      const [a,b] = sym.split("/");
      const sa = stats[a], sb = stats[b];
      if(!sa || !sb) return;
      // Guard against a zero/NaN denominator leg (degenerate/illiquid ticker) — an
      // Infinity/NaN ratio would corrupt watchlist sort and change values.
      if(!(sa.last>0) || !(sb.last>0)) return;
      price = sa.last / sb.last;
      prev  = (sa.open>0 && sb.open>0) ? sa.open/sb.open : price;
    } else {
      const s = stats[sym];
      if(!s) return;
      price = s.last;
      prev  = s.open || price;
    }
    const chgAbs = price - prev;                 // absolute change
    const chgPct = prev ? (price/prev - 1)*100 : 0;
    PRICE_CACHE[sym] = { price, chgAbs, chgPct };   // for column sorting
    if(isPriceHidden(sym)) return;                  // masked (eye off) → keep "••••••", don't paint
    const up = chgAbs >= 0;
    const txt    = fmtPrice(price);
    const absTxt = (up?"+":"−") + fmtPrice(Math.abs(chgAbs));
    const pctTxt = (up?"+":"−") + Math.abs(chgPct).toFixed(2) + "%";

    (rowMap[sym]||[]).forEach(row=>{
      const lastEl = row.querySelector("[data-last]");
      const absEl  = row.querySelector("[data-chgabs]");
      const pctEl  = row.querySelector("[data-chg]");
      if(lastEl.textContent !== txt){
        row.classList.remove("flash-up","flash-down"); void row.offsetWidth;
        row.classList.add(up?"flash-up":"flash-down");
      }
      lastEl.textContent = txt;
      absEl.textContent = absTxt; absEl.className = "chgabs "+(up?"up":"down");
      pctEl.textContent = pctTxt; pctEl.className = "chg "+(up?"up":"down");
    });
  });
}

// Price formatting that preserves small-decimal precision like TradingView
// (e.g. 0.00000424, 0.05233, 1.813, 59,716.00).
function fmtPrice(v){
  if(v==null || !isFinite(v)) return "—";   // guard undefined/NaN/±Infinity (missing API fields)
  const a = Math.abs(v);
  if(a === 0) return "0";
  if(a >= 1000) return v.toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2});
  if(a >= 1)    return v.toFixed(a>=100?2:3);
  if(a >= 0.001) return v.toFixed(a>=0.1?4:5);
  // very small: show enough significant digits (e.g. BONK 0.00000424). Strip trailing
  // zeros, and a trailing dot too — values under 1e-8 round to "0.00000000" and would
  // otherwise render as the malformed "0.".
  return v.toFixed(8).replace(/0+$/,"").replace(/\.$/,"");
}

// Build the menu from TF{}: a section header per group, then one option per timeframe in TF order.

  let html = `<div class="tf-custom"><input id="tfCustom" type="text" placeholder="Custom  e.g. 45m, 3h, 10d" autocomplete="off" spellcheck="false"></div>`;
  let lastSec = null;

    html += `<div class="tf-opt" data-i="${key}">${t.menu}</div>`;

// Native granularities Coinbase/Binance/Bybit serve (sec). A custom bucket must be
// an integer multiple of one of these so aggregate() can roll base bars up cleanly.
const TF_BASES = [86400, 21600, 3600, 900, 300, 60];
// Parse "45m"/"3h"/"10d"/"90" into seconds; bare number = minutes.
function parseCustomTF(raw){
  const s = String(raw||"").trim().toLowerCase();
  const m = s.match(/^(\d+(?:\.\d+)?)\s*(m|h|d|w|min|hour|hr|day|week)?$/);
  if(!m) return null;
  const n = parseFloat(m[1]); if(!(n>0)) return null;
  const unit = m[2]||"m";
  const mult = unit[0]==="w"?604800 : unit[0]==="d"?86400 : unit[0]==="h"?3600 : 60;
  const sec = Math.round(n*mult);
  if(sec < 60 || sec > 604800*4) return null;   // 1m … 4w sane bounds
  // largest native base that evenly divides the requested bucket
  const base = TF_BASES.find(b => sec % b === 0 && b <= sec);
  if(!base) return null;
  return { sec, base };
}
// Build/lookup a dynamic TF entry for a custom bucket and select it.
function applyCustomTF(raw){
  const p = parseCustomTF(raw);
  if(!p){ const el=document.getElementById("tfCustom"); if(el){ el.classList.add("bad"); setTimeout(()=>el.classList.remove("bad"),700);} return false; }
  // human label: normalise to the largest whole unit
  const sec=p.sec;
  const label = sec%604800===0?`${sec/604800}W` : sec%86400===0?`${sec/86400}D` : sec%3600===0?`${sec/3600}H` : `${sec/60}m`;
  const key = "c"+sec;   // e.g. c2700
  if(!TF[key]) TF[key] = { label, menu:label+" (custom)", sec:"CUSTOM", base:p.base, bucket:sec, pages:20 };
  closeTfMenu();
  selectTF(key);
  return true;
}

// Reflect activeTF in the button label and the highlighted menu option.
function syncTfUI(){
  tfSelLabel.textContent = (TF[activeTF]||{}).label || activeTF;
  tfMenu.querySelectorAll(".tf-opt").forEach(o=>
    o.classList.toggle("active", o.dataset.i === activeTF));
}

function selectTF(key){
  if(!TF[key]) return;
  activeTF = key;
  saveActiveState();
  syncTfUI();
  // Grid mode: apply the timeframe to the SELECTED panel instead of the hidden host chart.
  if(typeof gridTargetTf==="function" && gridTargetTf(key)) return;
  applyTimeGranularity();
  if(typeof loadPersisted==="function") loadPersisted();   // drawings are per symbol+tf
  loadChart(activeSymbol, activeTF);
}

function openTfMenu(){
  tfSel.classList.add("open");

}

// Close the TF menu AND restore chart size. In embed/WebView mode, focusing the custom
// input can shrink the visual viewport (keyboard) without firing a settled window 'resize',
// leaving the canvas narrower than its container (black gutter on the right). Re-run the
// same deferred resize idiom used for grid/fullscreen changes so the canvas reflows back.
function closeTfMenu(){
  if(!tfSel.classList.contains("open")) return;
  tfSel.classList.remove("open");
  setTimeout(()=>{ resize(); sizeCanvas(); },50);
}

  e.stopPropagation();

});

  const opt = e.target.closest(".tf-opt"); if(!opt) return;
  closeTfMenu();
  selectTF(opt.dataset.i);
});
// Custom timeframe: Enter applies it.
tfMenu.addEventListener("keydown", e=>{
  if(e.target.id==="tfCustom" && e.key==="Enter"){ e.preventDefault(); applyCustomTF(e.target.value); }

const tzSel=document.getElementById("tzSel"), tzSelBtn=document.getElementById("tzSelBtn"),
      tzSelLabel=document.getElementById("tzSelLabel"), tzMenu=document.getElementById("tzMenu");
const TZ_KEY="fv_tz";           // persists the selected TIMEZONES index (was: raw offset)
let tzIdx=0;                     // which TIMEZONES entry is active
tzMenu.innerHTML = TIMEZONES.map((z,i)=>`<div class="tf-opt" data-tz="${i}">${z.label}</div>`).join("");
// Bottom-bar chip label: TV shows a compact "UTC±N" (or the plain name for UTC/
// Exchange/Local); strip the "(UTC±N) City" prefix down to the offset part.
function tzChipLabel(z){
  if(/^(UTC|Exchange|Local)$/.test(z.label)) return z.label;
  const m=z.label.match(/^\(([^)]+)\)/);
  return m ? m[1] : z.label;
}
function syncTzUI(){
  const z=TIMEZONES[tzIdx]||TIMEZONES[0];
  tzSelLabel.textContent = "🕓 "+tzChipLabel(z);
  tzMenu.querySelectorAll(".tf-opt").forEach(o=>o.classList.toggle("active", +o.dataset.tz===tzIdx));
}
function applyTz(idx){
  tzIdx=idx;
  tzOffsetMin=TIMEZONES[idx].off;
  try{ localStorage.setItem(TZ_KEY, String(idx)); }catch(e){}
  // Force every pane's time axis to relabel by re-applying its formatter.
  (typeof charts!=="undefined"?charts:[chart]).forEach(c=>{ try{
    c.applyOptions({ timeScale:{ tickMarkFormatter:(t,type)=>tickLabel(t,type) }, localization:{ timeFormatter:crosshairTimeFmt } });
  }catch(e){} });
  // Sub-panes (RSI + indicator charts) share the same axis — relabel them too.
  if(typeof rsiChart!=="undefined"){ try{ rsiChart.applyOptions({ timeScale:{ tickMarkFormatter:(t,type)=>tickLabel(t,type) }, localization:{ timeFormatter:crosshairTimeFmt } }); }catch(e){} }
  if(typeof panes!=="undefined") panes.forEach(pn=>{ try{ pn.chart.applyOptions({ timeScale:{ tickMarkFormatter:(t,type)=>tickLabel(t,type) }, localization:{ timeFormatter:crosshairTimeFmt } }); }catch(e){} });
  syncTzUI();
}
// Open the tz menu as a fixed-position popover parented to <body>, so it escapes
// #main's overflow:hidden clip and the drawing-canvas stacking context (see CSS note).
// Anchored to the button: opens upward (bottom bar sits at the screen's bottom edge),
// right edge aligned to the button's right edge, clamped into the viewport.
function openTzMenu(){
  tzSel.classList.add("open"); closeTfMenu();
  document.body.appendChild(tzMenu);           // re-parent out of the clipped/trapped ancestors
  tzMenu.classList.add("tz-fixed");
  tzMenu.style.visibility="hidden"; tzMenu.style.display="block";   // measure before placing
  const r=tzSelBtn.getBoundingClientRect(), mh=tzMenu.offsetHeight, mw=tzMenu.offsetWidth;
  let top=r.top-4-mh;                           // above the button
  if(top<4) top=4;                              // clamp to viewport top
  let left=r.right-mw;                          // right-align to the button
  if(left<4) left=4;
  tzMenu.style.top=top+"px"; tzMenu.style.left=left+"px"; tzMenu.style.visibility="";
  const a=tzMenu.querySelector(".tf-opt.active"); if(a) a.scrollIntoView({block:"center"});
}
function closeTzMenu(){ tzSel.classList.remove("open"); tzMenu.classList.remove("tz-fixed"); tzMenu.style.cssText=""; tzSel.appendChild(tzMenu); }
tzSelBtn.addEventListener("click", e=>{ e.stopPropagation(); if(tzSel.classList.contains("open")) closeTzMenu(); else openTzMenu(); });
tzMenu.addEventListener("click", e=>{ const o=e.target.closest(".tf-opt"); if(!o) return; applyTz(+o.dataset.tz); closeTzMenu(); });
document.addEventListener("click", e=>{ if(tzSel.classList.contains("open") && !e.target.closest("#tzSel") && !e.target.closest("#tzMenu")) closeTzMenu(); });
// restore persisted tz (index). Back-compat: an old build stored the raw offset —
// if the saved value isn't a valid index but matches an offset, map it to the first
// TIMEZONES entry with that offset.
try{
  const saved=localStorage.getItem(TZ_KEY);
  if(saved!=null && !isNaN(+saved)){
    const n=+saved;
    if(n>=0 && n<TIMEZONES.length && Number.isInteger(n)){ tzIdx=n; }
    else { const j=TIMEZONES.findIndex(z=>z.off===n); if(j>=0) tzIdx=j; }
    tzOffsetMin=TIMEZONES[tzIdx].off;
  }
}catch(e){}
syncTzUI();

const draw = {
  tool:"cross", magnet:false, locked:false, hidden:false, stay:false,
  shapes:[],          // {id,type,pts:[{time,price}],style:{...},text}
  pending:null,       // shape being created
  needClicks:2,       // clicks remaining to finish pending
  pendingClickMode:false, // true once a press without drag puts us in click-click mode
  sel:null,           // selected shape id
  hover:null,         // hovered shape id
  alertHover:null,    // id of alert line currently hovered (shows its delete icon)
  alertDrag:null,     // {id} of alert line being dragged to a new price level
  drag:null,          // {id, handle:int|'body', last:{time,price}}
  mouse:{x:0,y:0},
  stickyLine:null,    // {price} — touch: stationary tap pins a price line that survives

// ── Undo / redo ──
// Snapshot-based history of draw.shapes. snapshotDraw() is called BEFORE any
// mutation (add/delete/move/style/clone/reorder); undo/redo swap between stacks.
const _undoStack=[], _redoStack=[], UNDO_MAX=100;
// Enable/disable the toolbar ↩/↪ buttons to reflect whether history exists —
// TradingView greys them out when there's nothing to undo/redo.
function updateUndoButtons(){
  const u=document.getElementById("btnUndo"), r=document.getElementById("btnRedo");
  if(u) u.disabled=!_undoStack.length;
  if(r) r.disabled=!_redoStack.length;
}
function snapshotDraw(){
  _undoStack.push(JSON.stringify(draw.shapes));
  if(_undoStack.length>UNDO_MAX) _undoStack.shift();
  _redoStack.length=0;   // a fresh mutation invalidates the redo branch
  updateUndoButtons();
}
function restoreShapes(json){
  try{ draw.shapes = JSON.parse(json); }catch(e){ draw.shapes=[]; }
  if(!draw.shapes.find(s=>s.id===draw.sel)) draw.sel=null;
  persist(); redraw(); updateUndoButtons();
}
function undoDraw(){
  if(!_undoStack.length) return;
  _redoStack.push(JSON.stringify(draw.shapes));
  restoreShapes(_undoStack.pop());
}
function redoDraw(){
  if(!_redoStack.length) return;
  _undoStack.push(JSON.stringify(draw.shapes));
  restoreShapes(_redoStack.pop());
}
