// Drag a dialog by its .dh header. The dialog is centred with translate(-50%,-50%), which
// can't coexist with explicit coords — so on first drag we bake the current on-screen box
// into left/top and drop the transform. closeDlg() clears both so the next dialog re-centres.
function makeDialogDraggable(d){
  const head = d.querySelector(".dh"); if(!head) return;
  head.classList.add("dh-drag");
  // With no backdrop there is nothing shielding the chart underneath, so events that land on
  // the dialog would otherwise also reach the chart's pan/zoom/crosshair handlers. Swallow
  // them at the dialog. Wired once per element (guarded) since the dialog node is reused.
  if(!d._eventShield){
    d._eventShield = true;
    ["pointerdown","mousedown","wheel","touchstart","dblclick","contextmenu"].forEach(t=>
      d.addEventListener(t, e=>{ e.stopPropagation(); }, {passive:false}));
  }
  head.addEventListener("pointerdown", e=>{
    if(e.button!==0 || e.target.closest(".cl")) return;   // ignore the × close button
    const r = d.getBoundingClientRect();
    d.style.transform="none"; d.style.left=r.left+"px"; d.style.top=r.top+"px";
    const dx=e.clientX-r.left, dy=e.clientY-r.top;
    head.setPointerCapture(e.pointerId);
    const move=ev=>{
      // Keep the header on-screen: never let it be dragged fully out of reach.
      const maxX=window.innerWidth-40, maxY=window.innerHeight-30;
      d.style.left=Math.max(40-r.width, Math.min(maxX, ev.clientX-dx))+"px";
      d.style.top =Math.max(0,          Math.min(maxY, ev.clientY-dy))+"px";
    };
    const up=()=>{ head.removeEventListener("pointermove",move); head.removeEventListener("pointerup",up); };
    head.addEventListener("pointermove",move); head.addEventListener("pointerup",up);
    e.preventDefault();
  });
}

function maTag(m){ return (m.type||"sma").toUpperCase().replace("RMA","SMMA"); }
// Each legend entry carries its own eye toggle for that MA (same `on` flag the settings

// dimmed, value omitted, slashed-eye icon — so they can be re-shown without the dialog.
// Flat white stroke SVGs (same paths as the watchlist eye), not the 3D emoji glyphs.
const MA_EYE_STYLE='width:11px;height:11px;vertical-align:-1px;fill:none;stroke:#d1d4dc;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round';
function icMaEye(on){
  return on
    ? `<svg viewBox="0 0 24 24" style="${MA_EYE_STYLE}"><path d="M3 12s3.5-7 9-7 9 7 9 7-3.5 7-9 7-9-7-9-7z"/><circle cx="12" cy="12" r="2.5"/></svg>`
    : `<svg viewBox="0 0 24 24" style="${MA_EYE_STYLE}"><path d="M3 3l18 18M10.6 10.7a2 2 0 0 0 2.8 2.8M9.4 5.2A9.6 9.6 0 0 1 12 5c5 0 9 4.5 9 7a11 11 0 0 1-2.2 3.1M6.2 6.3A11.6 11.6 0 0 0 3 12c0 2.5 4 7 9 7 1.4 0 2.7-.3 3.9-.9"/></svg>`;

function renderMaLegend(data){
  const legend=[];
  maSeries.forEach((s,i)=>{
    const m = MAS[i]; if(!m) return;
    const sd = maLine(data, m);
    s.setData(sd);
    s.applyOptions({ color:m.color, lineWidth:m.w||1, lineStyle:m.ls||0, visible:m.on!==false });
    const on = m.on!==false;
    const val = on && sd.length ? " "+fmt(sd[sd.length-1].value) : "";
    legend.push(`<span style="color:${m.color}${on?"":";opacity:.45"}">${maTag(m)}${m.p}${val}`
      + `<span class="maeye" data-i="${i}" title="${on?"Hide":"Show"} ${maTag(m)}${m.p}"`
      + ` style="cursor:pointer;opacity:.75;margin:0 0 0 3px">${icMaEye(on)}</span></span>`);
  });
  // Break the legend into rows of 4 so seven MAs don't run in one long line.
  let rows="";
  legend.forEach((h,i)=>{ rows += h; if((i+1)%4===0 && i!==legend.length-1) rows+="<br>"; });

  box.innerHTML = rows
    + '<span id="maGear" title="MA settings" style="cursor:pointer;opacity:.65;margin-right:0">⚙</span>';

  });
}

// ════════════════════════════════════════════════════════════════════
//  FREEVIEW SCRIPT  — sandboxed custom-indicator mini-language
//  A pragmatic, Pine-flavored scripting layer. The user writes a JS body
//  with curated series inputs (close/open/.../volume) + a `ta.*` library +
//  plot()/plotHist() calls. We run it against the current bars, collect
//  the plots, and render them as their own series (main overlay or sub
//  pane). Scripts persist per-symbol so they survive reloads.
//  Security note: this is a local single-file app evaluating the user's
//  OWN code on their OWN machine. We still sandbox via new Function with
//  only the curated API in scope (no window/fetch/localStorage) and wrap
//  every run in try/catch so a bad script can't break the app.
// ════════════════════════════════════════════════════════════════════
const scripts = [];          // {id,name,code,plots:[{series,pane,...}],subChart,paneEl,...}
let scriptUid = 1;
const SCRIPTS_KEY = ()=>"fv_scripts_"+activeSymbol;

const DEFAULT_SCRIPT =
`// OpenView Script — write a custom indicator (JS, or paste basic Pine v5).
// Pine: //@version=5 scripts transpile automatically — indicator(), input.*,
//       ta.*, series math, plot/plotshape/hline. (No if/for/functions yet.)
// Inputs (arrays aligned to bars): open, high, low, close, volume, hl2, hlc3, ohlc4
// Library: ta.sma/ema/wma/rma/rsi/atr/stdev/highest/lowest/change/roc/
//          crossover/crossunder/cross  ·  Math.*  ·  na (=NaN)
// Output:  plot(array, {color, pane, width})  ·  plotHist(array, {pane})
//
// Example: a fast/slow EMA cross with a momentum histogram.
const fast = ta.ema(close, 12);
const slow = ta.ema(close, 26);
plot(fast, { color:"#26a69a", pane:"main", width:2 });
plot(slow, { color:"#ef5350", pane:"main", width:2 });
plotHist(ta.change(close), { pane:"sub" });`;

// The `ta` library operates on number[] aligned to bars, reusing the Wave-1
// array primitives where possible. Returns null-padded arrays (null = no value).
function makeTA(data){
  const closeArr=data.map(d=>d.close);
  return {
    sma:(a,n)=>smaA(a,n), ema:(a,n)=>emaA(a,n), wma:(a,n)=>wmaA(a,n), rma:(a,n)=>rmaA(a,n),
    stdev:(a,n)=>stdevA(a,n), highest:(a,n)=>highestA(a,n), lowest:(a,n)=>lowestA(a,n),
    rsi:(n=14)=>{ const r=rsiCalc(data,n,"close"); const map={}; r.forEach(p=>map[p.time]=p.value); return data.map(d=> map[d.time]==null?null:map[d.time]); },
    atr:(n=14)=>{ const r=rmaA(trA(data),n); return r; },
    change:(a,n=1)=>a.map((v,i)=> (i>=n&&a[i-n]!=null&&v!=null)?v-a[i-n]:null),
    roc:(a,n=1)=>a.map((v,i)=> (i>=n&&a[i-n])?((v-a[i-n])/a[i-n])*100:null),
    crossover:(a,b)=>a.map((v,i)=> (i>0&&a[i-1]!=null&&b[i-1]!=null&&v!=null&&b[i]!=null)?(a[i-1]<=b[i-1]&&v>b[i]?1:0):0),
    crossunder:(a,b)=>a.map((v,i)=> (i>0&&a[i-1]!=null&&b[i-1]!=null&&v!=null&&b[i]!=null)?(a[i-1]>=b[i-1]&&v<b[i]?1:0):0),
    cross:(a,b)=>a.map((v,i)=> (i>0)?((a[i-1]-b[i-1])*(v-b[i])<0?1:0):0),
  };
}
// ── Pine Script v5 subset → JS transpiler ──
// Detects Pine source (//@version=5 header or indicator()/strategy() decl) and
// transpiles a BASIC subset onto the OpenView Script JS API: variable assignment
// (= and :=), series arithmetic/comparisons/ternary (element-wise via __op),
// history refs close[1], ta.*, math.*, input.*() (collapses to the default),
// indicator(title, overlay=…) (sets the default pane), plot/plotshape/hline,
// color.* constants + color.new(). Control flow (if/for), user functions, multi-
// timeframe and tuples are OUT of the subset and raise a clear error.
function looksLikePine(code){
  return /^\s*\/\/@version\s*=\s*5/m.test(code) || /\b(indicator|strategy)\s*\(\s*["']/.test(code);
}
const PINE_COLORS={red:"#f7525f",green:"#26a69a",blue:"#2962ff",orange:"#ff9800",purple:"#9c27b0",yellow:"#ffeb3b",white:"#ffffff",black:"#000000",gray:"#787b86",grey:"#787b86",teal:"#26a69a",lime:"#00e676",aqua:"#00bcd4",fuchsia:"#e040fb",maroon:"#880e4f",navy:"#1a237e",olive:"#827717",silver:"#b2b5be"};
function transpilePine(src){
  // -- tokenizer --
  const toks=[]; let i=0; const N=src.length;
  const isId=c=>/[A-Za-z_]/.test(c), isIdc=c=>/[A-Za-z0-9_.]/.test(c), isNum=c=>/[0-9]/.test(c);
  while(i<N){
    const c=src[i];
    if(c==="\n"){ toks.push({t:"nl"}); i++; continue; }
    if(c===" "||c==="\t"||c==="\r"){ i++; continue; }
    if(c==="/"&&src[i+1]==="/"){ while(i<N&&src[i]!=="\n") i++; continue; }
    if(c==='"'||c==="'"){ let j=i+1,v=""; while(j<N&&src[j]!==c){ if(src[j]==="\\")j++; v+=src[j]; j++; } toks.push({t:"str",v}); i=j+1; continue; }
    if(isNum(c)||(c==="."&&isNum(src[i+1]))){ let j=i,v=""; while(j<N&&/[0-9.eE]/.test(src[j])){ v+=src[j]; j++; } toks.push({t:"num",v}); i=j; continue; }
    if(isId(c)){ let j=i,v=""; while(j<N&&isIdc(src[j])){ v+=src[j]; j++; } toks.push({t:"id",v}); i=j; continue; }
    if(c==="#"){ let j=i+1,v="#"; while(j<N&&/[0-9a-fA-F]/.test(src[j])){ v+=src[j]; j++; } toks.push({t:"str",v}); i=j; continue; }   // Pine hex color literal
    const three=src.slice(i,i+3), two=src.slice(i,i+2);
    if(two===":="||two==="=="||two==="!="||two==="<="||two===">="||two==="=>"){ toks.push({t:"op",v:two}); i+=2; continue; }
    if("+-*/%<>=?:,()[]".includes(c)){ toks.push({t:"op",v:c}); i++; continue; }
    throw new Error("Pine: unexpected character '"+c+"'");
  }
  toks.push({t:"eof"});
  // -- parser --
  let p=0;
  const peek=()=>toks[p], next=()=>toks[p++];
  const eat=(t,v)=>{ const k=toks[p]; if(k.t!==t||(v!==undefined&&k.v!==v)) throw new Error("Pine: expected "+(v||t)+" got "+(k.v||k.t)); return toks[p++]; };
  const UNSUPPORTED=["if","for","while","switch","var","varip","import","export","method","type","request.security"];
  function mapId(v){
    if(v==="na") return "null";
    if(v==="true"||v==="false") return v;
    if(v.startsWith("color.")){ const k=v.slice(6); if(PINE_COLORS[k]) return JSON.stringify(PINE_COLORS[k]); if(k==="new") return "__colorNew"; }
    if(v.startsWith("math.")) return "Math."+v.slice(5);
    if(v.startsWith("ta.")) return "__pta."+v.slice(3);
    if(v.startsWith("input.")||v==="input") return "__input";
    if(v.startsWith("shape.")||v.startsWith("location.")||v.startsWith("plot.")||v.startsWith("display.")) return JSON.stringify(v);
    if(UNSUPPORTED.includes(v)) throw new Error("Pine: '"+v+"' is outside the supported basic subset (assignment, series math, ta.*, plot/plotshape/hline, input.*)");
    return v;
  }
  function primary(){
    const k=next();
    if(k.t==="num") return k.v;
    if(k.t==="str") return JSON.stringify(k.v);
    if(k.t==="op"&&k.v==="("){ const e=expr(); eat("op",")"); return "("+e+")"; }
    if(k.t==="op"&&k.v==="-") return "__neg("+primaryPost()+")";
    if(k.t==="id"&&k.v==="not") return "__not("+primaryPost()+")";
    if(k.t==="id") return postfix(mapId(k.v), k.v);
    throw new Error("Pine: unexpected "+(k.v||k.t));
  }
  function primaryPost(){ const k=peek(); if(k.t==="id") { next(); return postfix(mapId(k.v),k.v); } return primary(); }
  function postfix(js, orig){
    for(;;){
      const k=peek();
      if(k.t==="op"&&k.v==="("){ next(); js=call(js,orig); }
      else if(k.t==="op"&&k.v==="["){ next(); const idx=expr(); eat("op","]"); js="__hist("+js+","+idx+")"; }
      else break;
    }
    return js;
  }
  function call(fnJs, orig){
    const pos=[], named={};
    if(!(peek().t==="op"&&peek().v===")")){

// ── Strategy backtester ──
// Long-only sim: enter at next bar's open when entry fires & flat, exit at next
// open when exit fires & long. Returns trades + net %, win rate, equity curve.
function runBacktest(data, signals){
  if(!signals || !signals.entry) return null;
  const trades=[]; let pos=null; const equity=[]; let eq=1;
  for(let i=1;i<data.length;i++){
    // act on the PREVIOUS bar's signal at this bar's open (no look-ahead)
    if(pos===null && signals.entry[i-1]){ pos={ entryIdx:i, entryPrice:data[i].open, entryTime:data[i].time }; }
    else if(pos && signals.exit && signals.exit[i-1]){
      const ret=(data[i].open/pos.entryPrice)-1;
      eq*=(1+ret);
      trades.push({ entryTime:pos.entryTime, exitTime:data[i].time, entry:pos.entryPrice, exit:data[i].open, retPct:ret*100 });
      pos=null;
    }
    equity.push({ time:data[i].time, value:(pos? eq*(data[i].close/pos.entryPrice) : eq) });
  }
  // close any open position at the last bar
  if(pos){ const last=data[data.length-1]; const ret=(last.close/pos.entryPrice)-1; eq*=(1+ret);
    trades.push({ entryTime:pos.entryTime, exitTime:last.time, entry:pos.entryPrice, exit:last.close, retPct:ret*100 }); }
  const wins=trades.filter(t=>t.retPct>0).length;
  return {
    trades, netPct:(eq-1)*100, winRate: trades.length? (wins/trades.length*100):0,
    numTrades:trades.length, equity,
  };
}

// Embed → host: notify the mobile app whenever alerts change (drag, delete, toggle,
// edit) so it can persist the new target price. No-op outside embed. `_alertsFromHost`
// suppresses the echo when the change was just pushed in by the host itself.
function emitAlertsChanged(){
  if(!IS_EMBED || _alertsFromHost) return;
  const payload={ fvx:"alertsChanged", symbol:activeSymbol,
    alerts: alerts.map(a=>({ id:a.id, source:a.source, op:a.op, target:a.target, value:a.value, interval:a.interval||null,
      trigger:a.trigger, expiry:a.expiry, message:a.message, notify:a.notify, sound:a.sound, active:a.active })) };
  // iframe host (web) listens on window 'message'…
  try{ parent.postMessage(payload, "*"); }catch(e){}

  try{ if(window.ReactNativeWebView) window.ReactNativeWebView.postMessage(JSON.stringify(payload)); }catch(e){}

let _alertsFromHost=false;
function loadAlerts(){ alerts.length=0;

  // otherwise the next new alert reuses "a1" and ids collide.
  alerts.forEach(a=>{ const m=/^a(\d+)$/.exec(a.id||""); if(m) alertUid=Math.max(alertUid, +m[1]+1); });

  const seen=new Set(); let healed=false;

  alerts.forEach(a=>{ if(a.interval==null && a.source!=="price" && !(a.source||"").startsWith("draw:")){ a.interval=activeTF; healed=true; } });

// Series sources available as alert operands, computed from lastData.
const ALERT_SOURCES = [
  { key:"price", label:"Price" },
  ...MAS.map(m=>({ key:"ma"+m.p, label:"MA "+m.p })),
  { key:"rsi", label:"RSI 14" },
  { key:"macd", label:"MACD line" },
  { key:"macdsig", label:"MACD signal" },
  { key:"atr", label:"ATR 14" },
  { key:"cci", label:"CCI 20" },
  { key:"vwap", label:"VWAP" },
  { key:"willr", label:"Williams %R" },
  { key:"volume", label:"Volume" },

// ALERT_SOURCES plus any line drawings on the chart (for "alert on drawing").
function alertSourcesWithDrawings(){
  const drawSrcs = draw.shapes
    .filter(s=>["hline","hray","trend","ray","ext"].includes(s.type))
    .map((s,i)=>({ key:"draw:"+s.id, label:"◈ "+({hline:"H-Line",hray:"H-Ray",trend:"Trend",ray:"Ray",ext:"Ext-Line"}[s.type])+" #"+(i+1) }));

function sourceLabel(k){
  if(k && k.indexOf("draw:")===0){ const f=alertSourcesWithDrawings().find(s=>s.key===k); return f?f.label:"Drawing"; }
  const s=ALERT_SOURCES.find(s=>s.key===k); return s?s.label:k;
}
// Latest value of a source (null if not enough data). `data` defaults to the visible
// chart's bars; interval-pinned alerts pass their own timeframe's bars instead.
function sourceValue(key, data){
  data = data || lastData;
  if(!data.length) return null;
  if(key==="price") return data[data.length-1].close;
  if(key==="rsi"){ const r=rsiSeries(data,RSI_PARAMS.len,RSI_PARAMS.src); return r.length?r[r.length-1].value:null; }
  // Alert on a drawing: horizontal line = its level; trend/ray = value at the last bar.
  if(key && key.indexOf("draw:")===0){
    const s=draw.shapes.find(x=>x.id===key.slice(5)); if(!s||!s.pts||!s.pts.length) return null;
    if(s.type==="hline"||s.type==="hray") return s.pts[0].price;
    if((s.type==="trend"||s.type==="ray"||s.type==="ext") && s.pts.length>=2){
      const [a,b]=s.pts, t=data[data.length-1].time;
      if(b.time===a.time) return b.price;
      return a.price + (b.price-a.price)*((t-a.time)/(b.time-a.time));   // linear extrapolation
    }
    return s.pts[0].price;
  }
  const m=MAS.find(m=>("ma"+m.p)===key);
  if(m){ const sd=smaSeries(data,m.p); return sd.length?sd[sd.length-1].value:null; }
  const last=arr=>{ for(let i=arr.length-1;i>=0;i--){ if(arr[i]!=null&&isFinite(arr[i])) return arr[i]; } return null; };
  const lastP=pts=>pts&&pts.length?pts[pts.length-1].value:null;

    if(key==="volume") return data[data.length-1].volume||0;
    if(key==="atr"){ return last(rmaA(trA(data),14)); }
    if(key==="vwap"){ return lastP(vwapCalc(data)); }
    if(key==="cci"){ const src=data.map(d=>(d.high+d.low+d.close)/3); const sm=smaA(src,20); const arr=src.map((tp,i)=>{ if(sm[i]==null) return null; let md=0; for(let j=0;j<20;j++) md+=Math.abs(src[i-j]-sm[i]); md/=20; return md?(tp-sm[i])/(0.015*md):0; }); return last(arr); }
    if(key==="willr"){ const hh=highestA(data.map(d=>d.high),14), ll=lowestA(data.map(d=>d.low),14); const arr=data.map((d,i)=>(hh[i]!=null&&ll[i]!=null&&hh[i]!==ll[i])?((hh[i]-d.close)/(hh[i]-ll[i]))*-100:null); return last(arr); }

// ── Per-alert interval evaluation ────────────────────────────────────
// An alert pinned to e.g. '1h' evaluates its indicator on 1h candles even while the
// chart shows another TF. Bars come from fetchTfBars, cached per SYM|tf, refreshed
// stale-while-revalidate (≤ every 30s, and only while such an alert is being checked);
// between refetches the forming bar is patched with the live tick so evaluation stays
// tick-fresh. A completed refetch re-runs checkAlerts() once.
const _alertTfBars=new Map();      // "SYM|tf" -> {bars, at}
const _alertTfPending=new Set();
const ALERT_TF_CACHE_MAX=12;
function alertIntervalBars(tf){
  const key=activeSymbol+"|"+tf;
  const hit=_alertTfBars.get(key);
  const bucket=(TF[tf]&&TF[tf].bucket)||3600;
  const ttl=Math.min(bucket,30)*1000;
  if(hit && Date.now()-hit.at<ttl) return hit.bars;
  if(!_alertTfPending.has(key)){
    _alertTfPending.add(key);
    fetchTfBars(activeSymbol, tf, activeSymbol.includes("/"))
      .then(bars=>{
        if(bars && bars.length){
          _alertTfBars.set(key,{bars,at:Date.now()});
          while(_alertTfBars.size>ALERT_TF_CACHE_MAX) _alertTfBars.delete(_alertTfBars.keys().next().value);
        }
      })
      .catch(()=>{})
      .finally(()=>{ _alertTfPending.delete(key); try{ checkAlerts(); }catch(e){} });
  }
  return hit?hit.bars:null;   // stale-while-revalidate: keep using old bars while refetching
}
// Patch the cached series' forming bar with the live price so intra-bar RSI/MA etc.
// move with the tape between refetches. Valid because chart alerts are always on the
// active symbol, whose live price is lastData's forming bar.
function withLiveTail(bars){
  if(!bars||!bars.length||!lastData.length) return bars;
  const px=lastData[lastData.length-1].close;
  const lb=bars[bars.length-1];
  if(px==null||!isFinite(px)) return bars;
  return bars.slice(0,-1).concat([{...lb, close:px, high:Math.max(lb.high,px), low:Math.min(lb.low,px)}]);
}
// A source's value honoring the alert's pinned interval (null/current TF → chart bars).
function alertSourceValue(a, key){
  const tf=a&&a.interval;
  if(!tf || tf===activeTF || !TF[tf] || key==="price" || (key&&key.indexOf("draw:")===0))
    return sourceValue(key);
  const bars=alertIntervalBars(tf);
  return bars ? sourceValue(key, withLiveTail(bars)) : null;
}
// The RHS scalar an alert compares against right now.
function alertTargetValue(a){ return a.target==="value" ? a.value : alertSourceValue(a, a.target); }
function opLabel(op){ return ({crossing:"Crossing", crossUp:"Crossing Up", crossDown:"Crossing Down", gt:"Greater Than", lt:"Less Than"})[op]||op; }

function defaultAlertMessage(a){
  const rhs=a.target==="value" ? fmt(a.value) : sourceLabel(a.target);

  // NEARUSDT/INJUSDT) — the pill/notification names the asset, not the exchange.
  const sym=symLabel(activeSymbol);
  // Lowercase raw tf key (e.g. "1h"), not the [1H] bracket form.
  const iv=a.interval ? `, ${a.interval}` : "";
  // Indicator alerts (RSI/MACD/…) lead with the indicator, short-form:
  //   "RSI 14, Crossing 38.55 BTCUSDT, 1h"
  // Plain price alerts keep symbol-first (the symbol already implies "price"):
  //   "BTCUSDT Crossing 38.55"

      // rather than just the bare number).
      const label=defaultAlertMessage(a); dctx.font="10px sans-serif";
      const lw=dctx.measureText(label).width;
      const padL=7, gap=6, iconW=14, boxH=16;

      dctx.fillStyle="#d1d4dc"; dctx.textBaseline="middle"; dctx.fillText(label,bx+padL,y+0.5);

// A small vector trash-can glyph centered at (cx,cy). Drawn instead of the 🗑
// emoji so it renders crisply and identically across platforms.
function drawTrashIcon(cx, cy, color, highlight){
  dctx.save();
  if(highlight){ dctx.fillStyle="rgba(154,160,170,0.18)"; dctx.beginPath(); dctx.arc(cx,cy,10,0,7); dctx.fill(); }
  dctx.strokeStyle=color; dctx.fillStyle=color; dctx.lineWidth=1.4;
  dctx.lineCap="round"; dctx.lineJoin="round";
  const w=8, h=9, top=cy-4;
  // lid
  dctx.beginPath(); dctx.moveTo(cx-w/2-1, top); dctx.lineTo(cx+w/2+1, top); dctx.stroke();
  // handle
  dctx.beginPath(); dctx.moveTo(cx-2, top); dctx.lineTo(cx-2, top-2); dctx.lineTo(cx+2, top-2); dctx.lineTo(cx+2, top); dctx.stroke();

  dctx.beginPath();

// One-tap alert from the ⊕ menu: price crossing the given level, all defaults.
function addQuickAlert(price){

    trigger:"every", expiry:null, message:"",

// Evaluate one alert against the latest tick. Uses the previous LHS-vs-RHS
// difference (a._last) to detect crossings; level ops (gt/lt) fire on state.
function alertTriggered(a, lhs, rhs){
  if(lhs==null || rhs==null) return false;
  const diff = lhs - rhs;                       // sign tells us which side we're on
  const prevDiff = a._last;                     // null on first eval → no cross yet
  switch(a.op){
    case "gt": return lhs > rhs;
    case "lt": return lhs < rhs;
    case "crossUp":   return prevDiff!=null && prevDiff < 0 && diff >= 0;
    case "crossDown": return prevDiff!=null && prevDiff > 0 && diff <= 0;
    case "crossing":  return prevDiff!=null && ((prevDiff < 0 && diff >= 0) || (prevDiff > 0 && diff <= 0));
    default: return false;
  }
}
function checkAlerts(){
  if(!lastData.length) return;
  const now = Date.now();
  alerts.forEach(a=>{
    if(!a.active) return;
    if(a.expiry && now > a.expiry){ a.active=false; saveAlerts(); renderAlertsPanel(); redraw(); return; }
    const lhs = alertSourceValue(a, a.source), rhs = alertTargetValue(a);
    if(alertTriggered(a, lhs, rhs)){
      // "once per bar": suppress additional fires within the same forming bar.
      const curBar = lastData[lastData.length-1].time;
      if(a.trigger==="perbar" && a._lastBar===curBar){ /* already fired this bar */ }
      else {
        fireAlert(a, lhs, rhs);
        a._lastBar = curBar;
        if(a.trigger==="once"){ a.active=false; }
        saveAlerts(); renderAlertsPanel(); redraw();
      }
    }
    if(lhs!=null && rhs!=null) a._last = lhs - rhs;   // remember side for next cross test
  });
}
// Persistent alert history log (last 100 fires), per symbol.
let ALERT_LOG = [];

function logAlert(entry){ ALERT_LOG.unshift(entry); if(ALERT_LOG.length>100) ALERT_LOG.length=100; try{ localStorage.setItem("fv_alert_log", JSON.stringify(ALERT_LOG)); }catch(e){} try{ updateNotifBadge(); }catch(e){} }
function fireAlert(a, lhs, rhs){
  const base = a.message && a.message.trim() ? a.message : defaultAlertMessage(a);
  const msg = `${base} — now ${fmt(lhs)}`;
  logAlert({ ts: Date.now(), symbol: activeSymbol, text: msg });   // history
  const n = a.notify || ALERT_DEFAULT_NOTIFY;
  // Embed → host: the mobile app turns this into a phone notification (banner + sound +
  // badge — see openviewapp ChartWebView/notifications). Same dual bridge as
  // emitAlertsChanged. Always emitted; the host applies the alert's notify prefs.
  if(IS_EMBED){
    const fired={ fvx:"alertFired", symbol:activeSymbol, message:msg,
      sound:a.sound||{kind:"sound",id:"beep"}, notify:n };
    try{ parent.postMessage(fired, "*"); }catch(e){}
    try{ if(window.ReactNativeWebView) window.ReactNativeWebView.postMessage(JSON.stringify(fired)); }catch(e){}
  }
  if(n.browser && window.Notification && Notification.permission==="granted"){ try{ new Notification("OpenView Alert",{body:msg}); }catch(e){} }
  // Chosen alert tone (defaults to a short beep). Ringtones loop ≥10s and are
  // stopped when the popup is dismissed (click or timeout).
  const sound = a.sound || {kind:"sound", id:"beep"};
  let ring=null;
  if(n.sound){ try{ ring=playAlertSound(sound); }catch(e){} }
  // `playFull` ringtones must finish on their own — the popup timeout closes the toast
  // but must NOT cut the audio (only an explicit user click stops it early).
  const playFull = !!(ring && ring.playFull);
  if(n.popup){
    const t=document.createElement("div"); t.innerHTML=icBell(); t.appendChild(document.createTextNode(msg));
    t.querySelector("svg").style.cssText="width:15px;height:15px;flex:none;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;";
    // Desktop: sit left of the watchlist panel (right:320px). Phone-width viewports
    // (mobile WebView) have no panel and no room for that offset — span the screen.
    const _pos = window.innerWidth < 700 ? "left:10px;right:10px;" : "right:320px;max-width:320px;";
    t.style.cssText="position:fixed;top:60px;"+_pos+"z-index:500;background:#f7525f;color:#fff;padding:10px 16px;border-radius:6px;box-shadow:0 4px 16px #0008;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;";
    const dismiss=()=>{ t.remove(); if(ring) ring.stop(); };   // click = stop audio too
    t.onclick=dismiss;
    document.body.appendChild(t);
    setTimeout(()=>{ t.remove(); if(ring && !playFull) ring.stop(); }, 7000);   // auto-close toast; keep playFull audio going
  } else if(ring && sound.kind==="ringtone" && !playFull){
    // No popup to dismiss it → auto-stop the long looping ringtone after its first pass.
    setTimeout(()=>ring.stop(), 12000);

  // needed — the browser fetch() does it. Fire-and-forget (no-cors so cross-origin
  // endpoints like Discord/Slack/Zapier accept it without a preflight).
  if(a.webhook){
    try{
      fetch(a.webhook, {
        method:"POST", mode:"no-cors", keepalive:true,
        headers:{ "Content-Type":"application/json" },

          source: a.source, op: a.op, target: a.target,
          time: new Date().toISOString(),

      }).catch(()=>{});
    }catch(e){}
  }

  // kept for parity but does nothing here.
}

// ─────────────────────────────────────────────────────────────────────
//  ALERT SOUND ENGINE  (WebAudio synth — no external files, works offline)
// ─────────────────────────────────────────────────────────────────────
// Two families:
//   • SOUNDS   — short one-shots (< ~1.5s), 20 of them.
//   • RINGTONES — looping melodies, each ≥10s before repeat, 20 of them.
// Each entry is a pure generator: given an AudioContext + master gain + startTime,
// it schedules oscillators and returns the total scheduled duration (seconds).
// A single shared AudioContext is reused; a handle lets long ringtones be stopped.
let _alertAC=null;
function alertAC(){ if(!_alertAC) _alertAC=new (window.AudioContext||window.webkitAudioContext)(); if(_alertAC.state==="suspended") _alertAC.resume(); return _alertAC; }
let _activeRing=null;   // { stop() } for the currently-playing ringtone (only one at a time)

// One note. type: sine|square|triangle|sawtooth. Returns note end time.
function _tone(ac, dst, t, freq, dur, {type="sine", vol=0.18, attack=0.008, release=0.06}={}){
  const o=ac.createOscillator(), g=ac.createGain();
  o.type=type; o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t+attack);
  g.gain.setValueAtTime(vol, t+Math.max(attack, dur-release));
  g.gain.linearRampToValueAtTime(0.0001, t+dur);
  o.connect(g); g.connect(dst); o.start(t); o.stop(t+dur+0.02);
  return t+dur;
}
// Note-name → frequency (equal temperament, A4=440).
const _NF={C:-9,"C#":-8,D:-7,"D#":-6,E:-5,F:-4,"F#":-3,G:-2,"G#":-1,A:0,"A#":1,B:2};
function _hz(name){ const m=/^([A-G]#?)(\d)$/.exec(name); if(!m) return 440; return 440*Math.pow(2,(_NF[m[1]]+(+m[2]-4)*12)/12); }
// Play a melody: [[note,beat],...]. Loops to fill `minDur` for ringtones.
function _melody(ac, dst, t0, seq, {bpm=120, type="sine", vol=0.16, gap=0.02, minDur=0}={}){
  const beat=60/bpm; let end=t0;
  const one=()=>{ let t=end; seq.forEach(([n,b])=>{ const d=b*beat; if(n) _tone(ac,dst,t,_hz(n),Math.max(0.05,d-gap),{type,vol}); t+=d; }); return t; };
  end=one();
  while(end-t0<minDur){ end=one(); }
  return end;
}

const RINGTONE_MIN_SEC=10;
function _soundById(id){ return ALERT_SOUNDS.find(s=>s.id===id)||ALERT_SOUNDS[0]; }
function _ringById(id){ return ALERT_RINGTONES.find(s=>s.id===id)||ALERT_RINGTONES[0]; }

// Stop any ringtone currently looping (called when a popup is dismissed).
function stopAlertSound(){ if(_activeRing){ try{ _activeRing.stop(); }catch(e){} _activeRing=null; } }

// Play the sound described by {kind,id}. Ringtones loop for `loopSec` (default:
// one full pass, ≥10s) and are stoppable. Returns a handle with .stop().
function playAlertSound(sound, {loopSec}={}){
  const s = sound || {kind:"sound", id:"beep"};
  const ac = alertAC();
  const master = ac.createGain(); master.gain.value=1; master.connect(ac.destination);
  const t0 = ac.currentTime + 0.02;
  if(s.kind==="ringtone"){
    stopAlertSound();
    const r=_ringById(s.id);
    // File-based ringtone: real audio file. Default loops until dismissed; `playFull`
    // plays once through to the end (self-clears _activeRing when it finishes).
    if(r.src){
      const el=new Audio(r.src); el.loop=!r.playFull; el.volume=0.9;
      el.play().catch(()=>{});
      const handle={ stop:()=>{ try{ el.pause(); el.currentTime=0; }catch(e){} }, playFull:!!r.playFull };
      if(r.playFull) el.onended=()=>{ if(_activeRing===handle) _activeRing=null; };
      _activeRing=handle;
      return handle;
    }
    const dur=_melody(ac, master, t0, r.seq, {bpm:r.bpm||150, type:r.type||"sine", vol:r.vol||0.15, minDur:Math.max(RINGTONE_MIN_SEC, loopSec||RINGTONE_MIN_SEC)});
    const handle={ stop:()=>{ try{ master.gain.cancelScheduledValues(ac.currentTime); master.gain.setValueAtTime(master.gain.value, ac.currentTime); master.gain.linearRampToValueAtTime(0.0001, ac.currentTime+0.05); }catch(e){} } };
    _activeRing=handle;
    setTimeout(()=>{ if(_activeRing===handle) _activeRing=null; }, (dur-t0+0.2)*1000);
    return handle;
  }
  _soundById(s.id).gen(ac, master, t0);
  return { stop:()=>{} };
}

// ── Screenshot export ──
// Composite the main chart's own canvas (via LWC takeScreenshot) with the drawing
// overlay canvas, then download as PNG. Sub-panes aren't included (main chart only).
function saveScreenshot(){
  try{
    const base = chart.takeScreenshot();           // HTMLCanvasElement of the main chart
    const out = document.createElement("canvas");
    out.width = base.width; out.height = base.height;
    const ctx = out.getContext("2d");
    ctx.drawImage(base, 0, 0);
    // overlay (drawings) is a separate canvas the same CSS size; scale to match
    try{ ctx.drawImage(dcanvas, 0, 0, out.width, out.height); }catch(e){}
    out.toBlob(blob=>{
      if(!blob) return;
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url; a.download="freeview-"+activeSymbol.replace(/[^\w-]/g,"_")+"-"+activeTF+".png";
      document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
      if(typeof toast==="function") toast("Screenshot saved 📷","ok");
    },"image/png");
  }catch(e){ alert("Screenshot failed: "+e.message); }
}
document.getElementById("btnSnap").onclick=saveScreenshot;

function otStartRename(row, id){

  inp.type="text"; inp.maxLength=60; inp.value=s.name||prettyType(s.type);
  nm.textContent=""; nm.appendChild(inp); inp.focus(); inp.select();
  let doneOnce=false;
  const done=(save)=>{ if(doneOnce) return; doneOnce=true;
    if(save){ const v=inp.value.trim(); snapshotDraw(); s.name=v&&v!==prettyType(s.type)?v:null; persist(); }
    renderObjectTree(); };
  inp.onkeydown=e=>{ e.stopPropagation(); if(e.key==="Enter") done(true); else if(e.key==="Escape") done(false); };
  inp.onblur=()=>done(true);

}
function moveShapeZ(id, where){

function updateDataWindow(time){
  _dwTime=time;
  if(_dockKind!=="objtree"||_otTab!=="data") return;
  if(time==null && lastData.length) time=lastData[lastData.length-1].time;  // TV shows latest bar when not hovering
  const setv=(id,v,color)=>{ const el=document.getElementById(id); if(!el) return; el.textContent=v; el.style.color=color||""; };
  if(time==null||!lastData.length) return;
  let best=lastData[0], bi=0, bd=Infinity;
  for(let i=0;i<lastData.length;i++){ const d=Math.abs(lastData[i].time-time); if(d<bd){ bd=d; best=lastData[i]; bi=i; } }
  const dt=new Date(best.time*1000);
  setv("dwDate", dt.toISOString().slice(0,10));
  setv("dwTimeV", dt.toISOString().slice(11,16)+" UTC");
  setv("dwO", fmt(best.open)); setv("dwH", fmt(best.high)); setv("dwL", fmt(best.low));
  setv("dwC", fmt(best.close), best.close>=best.open?"var(--green)":"var(--red)");
  const prevClose=bi>0?lastData[bi-1].close:best.open;
  const chg=best.close-prevClose, pct=prevClose?(chg/prevClose*100):0;
  setv("dwChg", (chg>=0?"+":"−")+fmt(Math.abs(chg))+" ("+pct.toFixed(2)+"%)", chg>=0?"var(--green)":"var(--red)");
  try{
    const rv=valueAtTime(rsiLine, best.time), rm=valueAtTime(rsiMa, best.time);
    setv("dwRsi", rv!=null?rv.toFixed(2):"—"); setv("dwRsiMa", rm!=null?rm.toFixed(2):"—");
  }catch(e){}
  indicators.forEach(ind=>ind.series.forEach((s,i)=>{
    let v=null; try{ v=valueAtTime(s, best.time); }catch(e){}
    setv("dw_"+ind.id+"_"+i, v!=null?fmt(v):"—");
  }));
}

// ── Technicals gauge (TV "Technicals" tab summary) ──
// Real votes from the loaded bars: 12 MA checks (SMA/EMA 10/20/30/50/100/200,
// close above = Buy, below = Sell) + 6 oscillators (RSI/MACD/Stoch/CCI/Momentum/
// Williams %R with their classic thresholds). Verdict by net score like TV:
// Strong Buy / Buy / Neutral / Sell / Strong Sell.
function technicalsVotes(data){
  const last=v=>{ for(let i=v.length-1;i>=0;i--){ const x=v[i]; const val=(x&&typeof x==="object")?x.value:x; if(val!=null&&isFinite(val)) return val; } return null; };
  const close=data[data.length-1].close, closes=srcArr(data,"close");
  const rows=[];
  [10,20,30,50,100,200].forEach(len=>{
    if(data.length<=len) return;
    const s=last(smaA(closes,len)), e=last(emaA(closes,len));
    if(s!=null) rows.push({name:"SMA "+len, value:s, vote: close>s?"buy":close<s?"sell":"neutral", grp:"ma"});
    if(e!=null) rows.push({name:"EMA "+len, value:e, vote: close>e?"buy":close<e?"sell":"neutral", grp:"ma"});
  });
  const r=last(rsiCalc(data,14,"close"));
  if(r!=null) rows.push({name:"RSI (14)", value:r, vote: r<30?"buy":r>70?"sell":"neutral", grp:"osc"});
  try{ const m=macdCalc(data,12,26,9); const ml=last(m.macd), sg=last(m.signal);
    if(ml!=null&&sg!=null) rows.push({name:"MACD (12,26)", value:ml, vote: ml>sg?"buy":ml<sg?"sell":"neutral", grp:"osc"}); }catch(e){}
  try{ const st=stochCalc(data,14,3); const k=last(st.k);
    if(k!=null) rows.push({name:"Stoch %K (14,3)", value:k, vote: k<20?"buy":k>80?"sell":"neutral", grp:"osc"}); }catch(e){}
  const cci=last(cciCalc(data,20));
  if(cci!=null) rows.push({name:"CCI (20)", value:cci, vote: cci<-100?"buy":cci>100?"sell":"neutral", grp:"osc"});
  const mo=last(momCalc(data,10));
  if(mo!=null) rows.push({name:"Momentum (10)", value:mo, vote: mo>0?"buy":mo<0?"sell":"neutral", grp:"osc"});
  const wr=last(willrCalc(data,14));
  if(wr!=null) rows.push({name:"Williams %R (14)", value:wr, vote: wr<-80?"buy":wr>-20?"sell":"neutral", grp:"osc"});
  return rows;
}
function technicalsVerdict(rows){
  const buy=rows.filter(r=>r.vote==="buy").length, sell=rows.filter(r=>r.vote==="sell").length;
  const n=rows.length||1, score=(buy-sell)/n;
  const label = score>0.5?"Strong Buy": score>0.1?"Buy": score<-0.5?"Strong Sell": score<-0.1?"Sell":"Neutral";
  return {buy, sell, neutral:rows.length-buy-sell, score, label};
}

// ── Bar replay mode ──
// Rewind to a chosen bar, then step / play forward. renderData() slices lastData to
// _replay.idx while active. Entering arms a one-shot "click a bar to start" picker.
const _replay = { active:false, picking:false, idx:0, full:[], timer:null };
const rbBar=document.getElementById("replayBar");
function replayEnter(){
  if(!lastData.length) return;
  _replay.picking=true; _replay.full=lastData.slice();
  rbBar.classList.add("picking");
  document.getElementById("rbHint").style.display="";
  document.getElementById("btnReplay").classList.add("active");
}
function replayStartAt(idx){
  _replay.active=true; _replay.picking=false;
  _replay.idx=Math.max(2, Math.min(idx, _replay.full.length));
  document.getElementById("rbHint").style.display="none";
  rbBar.classList.add("active");
  renderData(_replay.full, true); updateReplayPos();
}
function replayExit(){
  replayPause();
  _replay.active=false; _replay.picking=false;
  rbBar.classList.remove("active","picking");
  document.getElementById("btnReplay").classList.remove("active");
  if(_replay.full.length){ const full=_replay.full; _replay.full=[]; renderData(full, false); }  // reveal all + re-snap
}
function updateReplayPos(){ const el=document.getElementById("rbPos"); if(el) el.textContent=_replay.idx+" / "+_replay.full.length; }
function replayStep(dir){
  if(!_replay.active) return;
  _replay.idx=Math.max(2, Math.min(_replay.idx+dir, _replay.full.length));
  renderData(_replay.full, true); updateReplayPos();
  if(_replay.idx>=_replay.full.length) replayPause();
}
function replayPlay(){
  if(!_replay.active || _replay.timer) return;
  document.getElementById("rbPlay").textContent="⏸";
  _replay.timer=setInterval(()=>replayStep(1), 400);
}
function replayPause(){ if(_replay.timer){ clearInterval(_replay.timer); _replay.timer=null; } const b=document.getElementById("rbPlay"); if(b) b.textContent="▶"; }
// ── Multi-chart grid (iframe panels) ──
// Each panel is an independent Freeview instance loaded as ?embed=1&sym=&tf=. Grid
// layouts: 1 (single, normal app), 2h/2v (two), 4 (quad). The chosen layout +
// per-panel symbols persist in localStorage["fv_layout"].
let _gridPanels = [];          // [{sym, tf}]
let _gridLayout = "1";
let _gridSyncCrosshair = true; // relay crosshair between panels
// Host relays a panel's crosshair time to all OTHER panels (crosshair sync).
if(!IS_EMBED){
  window.addEventListener("message", e=>{
    const d=e.data; if(!d||!d.fvx) return;
    const others=cb=>document.querySelectorAll("#chartGrid iframe").forEach(f=>{
      if(f.contentWindow!==e.source){ try{ cb(f); }catch(err){} }
    });
    if(d.fvx==="crosshair" && _gridSyncCrosshair){ others(f=>f.contentWindow.postMessage(d,"*")); return; }
    // SYNC IN LAYOUT — a panel changed symbol/tf: relay per the toggles + keep
    // _gridPanels bookkeeping current so the layout persists what's on screen.
    if(d.fvx==="panechange"){
      const src=[...document.querySelectorAll("#chartGrid iframe")].find(f=>f.contentWindow===e.source);
      if(src && _gridPanels[+src.dataset.panel]){
        const p=_gridPanels[+src.dataset.panel];
        if(d.sym) p.sym=d.sym; if(d.tf) p.tf=d.tf; persistLayout();
      }
      if(_gridSync.symbol && d.sym) others(f=>{ const i=+f.dataset.panel; if(_gridPanels[i]) _gridPanels[i].sym=d.sym; f.contentWindow.postMessage({fvx:"setsym", sym:d.sym},"*"); });
      if(_gridSync.interval && d.tf) others(f=>{ const i=+f.dataset.panel; if(_gridPanels[i]) _gridPanels[i].tf=d.tf; f.contentWindow.postMessage({fvx:"settf", tf:d.tf},"*"); });
      if((_gridSync.symbol&&d.sym)||(_gridSync.interval&&d.tf)) persistLayout();
      return;
    }
    // Time / Date-range sync: mirror the source panel's visible time range.
    if(d.fvx==="range" && (_gridSync.time || _gridSync.range)){
      others(f=>f.contentWindow.postMessage({fvx:"setrange", from:d.from, to:d.to},"*"));
    }
    // Panel selection: interaction inside an iframe → highlight it; host toolbar
    // actions (symbol / timeframe) then target the selected panel.
    if(d.fvx==="focus"){
      const src=[...document.querySelectorAll("#chartGrid iframe")].find(f=>f.contentWindow===e.source);
      if(src) selectGridPanel(+src.dataset.panel);
    }
  });
}
// Selected panel (grid mode): .gsel accent border, target of host toolbar actions.

  targets.forEach(f=>{ const i=+f.dataset.panel; if(_gridPanels[i]) _gridPanels[i].sym=sym;
    try{ f.contentWindow.postMessage({fvx:"setsym", sym},"*"); }catch(e){} });

}
function gridTargetTf(tf){

  const frames=[...document.querySelectorAll("#chartGrid iframe")]; if(!frames.length) return false;

  targets.forEach(f=>{ const i=+f.dataset.panel; if(_gridPanels[i]) _gridPanels[i].tf=tf;

// Layout registry — TV's full picker set, grouped by chart count (1–16).
// Each entry: n panels, cols×rows template; `areas` (grid-template-areas rows)
// for mixed/asymmetric splits, with panel i occupying area "p{i}".
// Old keys "2h"/"2v"/"4" kept so persisted fv_layout values keep working.
const LAYOUTS = {
  "1":  {n:1,  cols:1, rows:1},
  "2h": {n:2,  cols:2, rows:1},
  "2v": {n:2,  cols:1, rows:2},
  "3h": {n:3,  cols:3, rows:1},
  "3v": {n:3,  cols:1, rows:3},
  "3l": {n:3,  cols:2, rows:2, areas:['"p0 p1"','"p0 p2"']},   // 1 big left + 2 right
  "3t": {n:3,  cols:2, rows:2, areas:['"p0 p0"','"p1 p2"']},   // 1 big top + 2 bottom
  "4":  {n:4,  cols:2, rows:2},
  "4h": {n:4,  cols:4, rows:1},
  "4v": {n:4,  cols:1, rows:4},
  "4l": {n:4,  cols:2, rows:3, areas:['"p0 p1"','"p0 p2"','"p0 p3"']},  // 1 tall left + 3 right
  "5t": {n:5,  cols:6, rows:2, areas:['"p0 p0 p0 p1 p1 p1"','"p2 p2 p3 p3 p4 p4"']}, // 2 top + 3 bottom
  "5l": {n:5,  cols:3, rows:2, areas:['"p0 p1 p2"','"p0 p3 p4"']},      // 1 big left + 4
  "6":  {n:6,  cols:3, rows:2},
  "6v": {n:6,  cols:2, rows:3},
  "7t": {n:7,  cols:12,rows:2, areas:['"p0 p0 p0 p0 p1 p1 p1 p1 p2 p2 p2 p2"','"p3 p3 p3 p4 p4 p4 p5 p5 p5 p6 p6 p6"']}, // 3 top + 4 bottom
  "8":  {n:8,  cols:4, rows:2},
  "8v": {n:8,  cols:2, rows:4},
  "9":  {n:9,  cols:3, rows:3},
  "10": {n:10, cols:5, rows:2},
  "10v":{n:10, cols:2, rows:5},
  "12": {n:12, cols:4, rows:3},
  "12v":{n:12, cols:3, rows:4},
  "14": {n:14, cols:7, rows:2},
  "16": {n:16, cols:4, rows:4},
};
// Picker rows in TV order (chart count → variant keys).
const LAYOUT_GROUPS = [
  ["1",["1"]], ["2",["2h","2v"]], ["3",["3h","3v","3l","3t"]], ["4",["4","4h","4v","4l"]],
  ["5",["5t","5l"]], ["6",["6","6v"]], ["7",["7t"]], ["8",["8","8v"]], ["9",["9"]],
  ["10",["10","10v"]], ["12",["12","12v"]], ["14",["14"]], ["16",["16"]],
];
function buildGrid(layout){
  const spec = LAYOUTS[layout] || LAYOUTS["1"];
  _gridLayout = layout;
  const grid=document.getElementById("chartGrid");
  const n = spec.n;
  if(layout==="1"){
    document.documentElement.classList.remove("grid-on");
    grid.innerHTML=""; grid.removeAttribute("data-layout");
    grid.style.gridTemplateColumns=grid.style.gridTemplateRows=grid.style.gridTemplateAreas="";
    setTimeout(()=>{ resize(); sizeCanvas(); },50);
    persistLayout(); syncLayoutUI(); return;
  }
  // seed panel symbols: first = current active symbol, rest from watchlist / repeats
  const wl = allSymbols();
  while(_gridPanels.length < n){
    const i=_gridPanels.length;
    _gridPanels.push({ sym: i===0?activeSymbol : (wl[i%wl.length]||activeSymbol), tf: activeTF });
  }
  _gridPanels = _gridPanels.slice(0,n);
  grid.setAttribute("data-layout", layout);
  // Track weights: keep persisted sizes when they match this layout's track counts,
  // else reset to uniform 1fr.
  if(!_gridSizes || _gridSizes.cols.length!==spec.cols || _gridSizes.rows.length!==spec.rows)
    _gridSizes = { cols:Array(spec.cols).fill(1), rows:Array(spec.rows).fill(1) };
  grid.style.gridTemplateColumns = _gridSizes.cols.map(w=>w+"fr").join(" ");
  grid.style.gridTemplateRows    = _gridSizes.rows.map(w=>w+"fr").join(" ");
  grid.style.gridTemplateAreas   = spec.areas ? spec.areas.join(" ") : "";
  grid.innerHTML="";
  _gridPanels.forEach((p,i)=>{
    const f=document.createElement("iframe");
    f.src = "index.html?embed=1&sym="+encodeURIComponent(p.sym)+"&tf="+encodeURIComponent(p.tf);
    f.dataset.panel=i;
    if(spec.areas) f.style.gridArea = "p"+i;
    f.onload=()=>{ /* panel ready */ };
    grid.appendChild(f);
  });
  document.documentElement.classList.add("grid-on");
  _gridMax=null; grid.classList.remove("maxed");
  try{ selectGridPanel(Math.min(_gridSelPanel||0, n-1)); }catch(e){}
  buildGridDividers(spec);
  persistLayout(); syncLayoutUI();
}
function persistLayout(){ try{ localStorage.setItem("fv_layout", JSON.stringify({layout:_gridLayout, panels:_gridPanels, sizes:_gridSizes})); }catch(e){} }
// ── Panel dividers: drag to resize grid tracks; weights persist with the layout ──
// _gridSizes = {cols:[fr…], rows:[fr…]} for the CURRENT layout. Dividers are
// absolute strips overlaid on #chartGrid at each internal track boundary; a drag
// shifts weight between the two adjacent tracks (min 15% each) and reapplies the
// inline grid template. Iframes get pointer-events:none during the drag so the
// gesture isn't swallowed.
let _gridSizes = null;
function applyGridSizes(){
  const grid=document.getElementById("chartGrid"); if(!grid||!_gridSizes) return;
  grid.style.gridTemplateColumns=_gridSizes.cols.map(w=>w+"fr").join(" ");
  grid.style.gridTemplateRows   =_gridSizes.rows.map(w=>w+"fr").join(" ");
  positionGridDividers();
}
function positionGridDividers(){
  const grid=document.getElementById("chartGrid"); if(!grid||!_gridSizes) return;
  const totC=_gridSizes.cols.reduce((a,b)=>a+b,0), totR=_gridSizes.rows.reduce((a,b)=>a+b,0);
  grid.querySelectorAll(".grid-div.v").forEach(d=>{
    const i=+d.dataset.i; const frac=_gridSizes.cols.slice(0,i+1).reduce((a,b)=>a+b,0)/totC;
    d.style.left=(frac*100)+"%";
  });
  grid.querySelectorAll(".grid-div.h").forEach(d=>{
    const i=+d.dataset.i; const frac=_gridSizes.rows.slice(0,i+1).reduce((a,b)=>a+b,0)/totR;
    d.style.top=(frac*100)+"%";
  });
}
function buildGridDividers(spec){
  const grid=document.getElementById("chartGrid");
  grid.querySelectorAll(".grid-div").forEach(d=>d.remove());
  const mk=(axis,i)=>{
    const d=document.createElement("div");
    d.className="grid-div "+axis; d.dataset.i=i;
    d.addEventListener("mousedown", e=>{
      e.preventDefault();
      const rect=grid.getBoundingClientRect();
      const sizes=_gridSizes[axis==="v"?"cols":"rows"];
      const tot=sizes.reduce((a,b)=>a+b,0);
      const startPos=axis==="v"?e.clientX:e.clientY;
      const span=axis==="v"?rect.width:rect.height;
      const a0=sizes[i], b0=sizes[i+1];
      grid.classList.add("resizing"); d.classList.add("dragging");
      const move=ev=>{
        const df=((axis==="v"?ev.clientX:ev.clientY)-startPos)/span*tot;
        const min=tot*0.15/sizes.length;
        let a=a0+df, b=b0-df;
        if(a<min){ b-= (min-a); a=min; } if(b<min){ a-= (min-b); b=min; }
        sizes[i]=a; sizes[i+1]=b;
        applyGridSizes();
      };
      const up=()=>{ document.removeEventListener("mousemove",move); document.removeEventListener("mouseup",up);
        grid.classList.remove("resizing"); d.classList.remove("dragging"); persistLayout(); positionGridMaxButtons(); };
      document.addEventListener("mousemove",move); document.addEventListener("mouseup",up);
    });
    grid.appendChild(d);
  };
  for(let i=0;i<spec.cols-1;i++) mk("v",i);
  for(let i=0;i<spec.rows-1;i++) mk("h",i);
  positionGridDividers();
  buildGridMaxButtons();
}
// ── Maximize a single panel: hover ⛶ on each panel toggles it full-grid; the
// same button (now ❐) restores the grid. Session-only state (not persisted). ──
let _gridMax = null;   // maximized panel index or null
function buildGridMaxButtons(){
  const grid=document.getElementById("chartGrid");
  grid.querySelectorAll(".grid-max").forEach(b=>b.remove());
  grid.querySelectorAll("iframe").forEach(f=>{
    const b=document.createElement("div");
    b.className="grid-max"; b.dataset.panel=f.dataset.panel; b.title="Maximize panel";
    b.textContent="⛶";
    b.onclick=()=>toggleGridMax(+f.dataset.panel);
    grid.appendChild(b);
  });
  positionGridMaxButtons();
}
function positionGridMaxButtons(){
  const grid=document.getElementById("chartGrid");
  grid.querySelectorAll(".grid-max").forEach(b=>{
    const f=grid.querySelector('iframe[data-panel="'+b.dataset.panel+'"]'); if(!f) return;
    if(_gridMax!=null && +b.dataset.panel!==_gridMax){ b.style.display="none"; return; }
    b.style.display="flex";
    const x = (_gridMax!=null) ? grid.clientWidth-30 : f.offsetLeft+f.offsetWidth-30;
    const y = (_gridMax!=null) ? 8 : f.offsetTop+8;
    b.style.left=x+"px"; b.style.top=y+"px";
  });
}
function toggleGridMax(i){
  const grid=document.getElementById("chartGrid");
  if(_gridMax===i){         // restore
    _gridMax=null;
    grid.classList.remove("maxed");
    grid.querySelectorAll("iframe").forEach(f=>f.classList.remove("gmax"));
    grid.querySelectorAll(".grid-max").forEach(b=>{ b.textContent="⛶"; b.title="Maximize panel"; });
  } else {                  // maximize panel i
    _gridMax=i;
    grid.classList.add("maxed");
    grid.querySelectorAll("iframe").forEach(f=>f.classList.toggle("gmax", +f.dataset.panel===i));
    const b=grid.querySelector('.grid-max[data-panel="'+i+'"]'); if(b){ b.textContent="❐"; b.title="Restore grid"; }
    selectGridPanel(i);
  }
  positionGridMaxButtons();
}
// Named layouts: save the current grid (layout + panel symbols) under a name, reload later.
function savedLayouts(){ try{ return JSON.parse(localStorage.getItem("fv_layouts_named")||"{}"); }catch(e){ return {}; } }
function saveNamedLayout(){
  const name=prompt("Save layout as:", "Layout "+ (Object.keys(savedLayouts()).length+1));
  if(!name) return;
  // Capture per-panel indicator sets. Embeds persist indicators per symbol in the
  // SHARED same-origin localStorage (fv_indicators_<sym>), so snapshot that — a
  // cross-frame `contentWindow.indicators` read doesn't work (top-level let isn't
  // a window property). Two panels on the same symbol share one set (documented).
  const panels=_gridPanels.map(p=>{
    let inds=null;
    try{ const raw=localStorage.getItem("fv_indicators_"+p.sym); if(raw) inds=JSON.parse(raw).map(x=>({type:x.type, params:x.params, hidden:!!x.hidden})); }catch(e){}
    return Object.assign({}, p, inds?{inds}:{});
  });
  const all=savedLayouts(); all[name]={ layout:_gridLayout, panels, sizes:_gridSizes, sync:Object.assign({},_gridSync) };
  try{ localStorage.setItem("fv_layouts_named", JSON.stringify(all)); }catch(e){}
  rebuildLayoutMenu();
}
function loadNamedLayout(name){
  const l=savedLayouts()[name]; if(!l) return;
  _gridPanels = (l.panels||[]).slice();
  if(l.sizes) _gridSizes = l.sizes;
  if(l.sync){ Object.keys(l.sync).forEach(k=>setGridSync(k, !!l.sync[k])); rebuildLayoutMenu(); }
  buildGrid(l.layout||"1");
  // Push each saved indicator set into its panel once the iframe app has booted.
  document.querySelectorAll("#chartGrid iframe").forEach(f=>{
    const p=_gridPanels[+f.dataset.panel];
    if(!p||!p.inds) return;
    f.addEventListener("load", ()=>setTimeout(()=>{
      try{ f.contentWindow.postMessage({fvx:"setinds", inds:p.inds}, "*"); }catch(e){}
    }, 600), {once:true});
  });
}
// SYNC IN LAYOUT toggles (TV parity): which properties propagate across panels.
// Persisted fv_grid_sync. Crosshair maps onto the existing _gridSyncCrosshair relay;
// symbol/interval/time/date-range application across panels lands in the next item.
let _gridSync = { symbol:false, interval:false, crosshair:true, time:false, range:false };
try{ const raw=localStorage.getItem("fv_grid_sync"); if(raw) Object.assign(_gridSync, JSON.parse(raw)); }catch(e){}
_gridSyncCrosshair = _gridSync.crosshair;
const GRID_SYNC_DEFS = [
  ["symbol","Symbol","Load the same symbol in every panel when one changes"],
  ["interval","Interval","Match every panel's timeframe to the active panel"],
  ["crosshair","Crosshair","Mirror the crosshair position across all panels"],
  ["time","Time","Align the visible time position across panels"],
  ["range","Date range","Align the visible date range across panels"],
];
function setGridSync(key,on){
  _gridSync[key]=on;
  if(key==="crosshair") _gridSyncCrosshair=on;
  try{ localStorage.setItem("fv_grid_sync", JSON.stringify(_gridSync)); }catch(e){}
}
// Mini thumbnail preview of a layout: a scaled-down grid of the same template.
function layoutThumb(key){
  const s=LAYOUTS[key];
  let style='grid-template-columns:repeat('+s.cols+',1fr);grid-template-rows:repeat('+s.rows+',1fr);';
  if(s.areas) style+='grid-template-areas:'+s.areas.join(" ")+';';
  let cells='';
  for(let i=0;i<s.n;i++) cells+='<i'+(s.areas?' style="grid-area:p'+i+'"':'')+'></i>';
  return '<div class="lp-item" data-layout="'+key+'" title="'+s.n+' chart'+(s.n>1?'s':'')+'" style="'+style+'">'+cells+'</div>';
}
function rebuildLayoutMenu(){
  const menu=document.getElementById("layoutMenu"); if(!menu) return;
  menu.classList.add("layout-pick");
  // TV-style picker: variants grouped by chart count 1–16, thumbnail previews.
  let html='';
  LAYOUT_GROUPS.forEach(([count,keys])=>{
    html+='<div class="lp-count">'+count+' CHART'+(count!=="1"?'S':'')+'</div>'
        +'<div class="lp-group">'+keys.map(layoutThumb).join("")+'</div>';
  });
  html+='<div class="tf-sec">SYNC IN LAYOUT</div>';
  GRID_SYNC_DEFS.forEach(([k,label,tip])=>{
    html+='<div class="lp-sync-row'+(_gridSync[k]?' on':'')+'" data-sync="'+k+'">'
        +'<span>'+label+' <span class="info" title="'+escHtml(tip)+'">ⓘ</span></span>'
        +'<span class="lp-switch"></span></div>';
  });
  html+='<div class="tf-sec">SAVED LAYOUTS</div>';
  const names=Object.keys(savedLayouts());
  html += names.length ? names.map(n=>'<div class="tf-opt" data-named="'+escHtml(n)+'">💾 '+escHtml(n)+'</div>').join("")
                       : '<div class="tf-opt" style="color:var(--muted)">none yet</div>';
  html += '<div class="tf-opt" data-save="1">＋ Save current…</div>';
  menu.innerHTML=html;
  syncLayoutUI();
}

// ── Compare / overlay symbols ──
// Each compared symbol is plotted as a % -normalized line (change from its first
// visible bar) on its OWN hidden price scale, so assets at very different price
// levels overlay comparably (TradingView "Compare"). Re-fetched on symbol/TF change.
const COMPARE = {};   // sym → { series, color }
const COMPARE_COLORS = ["#ff9800","#26c6da","#ab47bc","#66bb6a","#ec407a"];
function addCompare(sym){
  sym=(sym||"").trim().toUpperCase(); if(!sym || COMPARE[sym]) return;
  const color=COMPARE_COLORS[Object.keys(COMPARE).length % COMPARE_COLORS.length];
  const series=chart.addLineSeries({ color, lineWidth:2, priceScaleId:"compare"+Object.keys(COMPARE).length,
    priceLineVisible:false, lastValueVisible:true, crosshairMarkerVisible:false });
  try{ series.priceScale().applyOptions({ visible:false, scaleMargins:{top:0.1,bottom:0.1} }); }catch(e){}
  COMPARE[sym]={ series, color };
  loadCompareData(sym);
  renderCompareLegend();
}
async function loadCompareData(sym){
  const c=COMPARE[sym]; if(!c) return;
  try{
    const bars=await fetchKlines(sym, activeTF);
    // The compare series can be removed (removeCompare) or replaced (re-added) while
    // this fetch is in flight. Re-read COMPARE[sym] after the await: if it's gone or
    // now a different series, our `c.series` is disposed/stale — writing to it throws
    // in Lightweight Charts (or clobbers the fresh series), so bail.
    if(COMPARE[sym]!==c) return;
    if(!bars.length){ c.series.setData([]); return; }
    const base=bars[0].close||1;
    c.series.setData(bars.map(b=>({ time:b.time, value:(b.close/base-1)*100 })));  // % change
  }catch(e){ /* leave empty on fetch failure */ }
}
function removeCompare(sym){
  const c=COMPARE[sym]; if(!c) return;
  try{ chart.removeSeries(c.series); }catch(e){}
  delete COMPARE[sym]; renderCompareLegend();
}
function reloadAllCompares(){ Object.keys(COMPARE).forEach(loadCompareData); }
function renderCompareLegend(){
  // show compared symbols as chips in the floating legend (below indicators)
  let box=document.getElementById("compareLegend");
  if(!box){ box=document.createElement("div"); box.id="compareLegend"; document.getElementById("chartLegend").appendChild(box); }
  box.innerHTML="";
  Object.entries(COMPARE).forEach(([sym,c])=>{
    const row=document.createElement("div"); row.className="indrow";
    row.innerHTML='<span class="nm" style="color:'+c.color+'">'+sym+' (%)</span><span class="x" title="Remove">×</span>';
    row.querySelector(".x").onclick=()=>removeCompare(sym);
    box.appendChild(row);
  });
}

function exportWatchlist(){
  let txt="";
  GROUPS.forEach(g=>{ txt+="###"+g.name+"\n"+g.symbols.join("\n")+"\n"; });
  const blob=new Blob([txt],{type:"text/plain"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download="freeview-watchlist.txt";
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
function importWatchlistText(txt){
  const groups=[]; let cur=null;
  txt.split(/\r?\n/).forEach(line=>{
    const s=line.trim(); if(!s) return;
    if(s.startsWith("###")){ cur={ name:s.slice(3).trim()||"IMPORTED", symbols:[] }; groups.push(cur); }
    else { if(!cur){ cur={ name:"IMPORTED", symbols:[] }; groups.push(cur); } cur.symbols.push(s.toUpperCase()); }
  });
  if(!groups.length || !groups.some(g=>g.symbols.length)){ alert("No symbols found in that file."); return; }
  GROUPS = groups;
  saveGroups(); buildWatchlist();
}

// ── Real-time WebSocket (Coinbase ticker) ──
// Live ticks update the forming bar's close/high/low between the 20s poll refreshes,
// so the last candle moves without waiting. Coinbase's public ws-feed needs no auth.
// The 20s poll stays as the source of truth / reconnect safety net (and covers
// Binance/Bybit/ratio legs the WS doesn't handle). Auto-reconnects with backoff.
const CB_WS = "wss://ws-feed.exchange.coinbase.com";
let _ws=null, _wsSyms=[], _wsRetry=0, _wsLast={}, _wsLastTickAt=0;
function wsProductsForActive(){
  // Only Coinbase spot legs get a live socket; ratios subscribe to both legs.
  const legs = activeSymbol.includes("/") ? activeSymbol.split("/") : [activeSymbol];
  return legs.map(l=>{ const r=resolveLeg(l); return r.exchange.id==="COINBASE"? r.rest : null; }).filter(Boolean);
}
function applyTick(prodPrice){
  // prodPrice: {product:price}. For a single Coinbase symbol, drive the last bar.
  if(!lastData.length) return;
  const prods=wsProductsForActive();
  let price=null;
  if(activeSymbol.includes("/")){
    const [a,b]=activeSymbol.split("/");
    const pa=_wsLast[resolveLeg(a).rest], pb=_wsLast[resolveLeg(b).rest];
    if(pa&&pb) price=pa/pb;
  } else {
    price=_wsLast[prods[0]];
  }
  if(price==null || !isFinite(price)) return;
  const bar=lastData[lastData.length-1];
  const prevClose=bar.close;
  bar.close=price; if(price>bar.high)bar.high=price; if(price<bar.low)bar.low=price;
  // Evaluate alerts FIRST — before the (heavy) full-series repaint below — so the
  // tick→alert latency is effectively zero. The bar mutation above is all
  // checkAlerts needs (sourceValue("price") reads lastData's final close).
  if(typeof checkAlerts==="function") checkAlerts();
  try{
    // Re-route the live tick through applyChartType so the ~4-month future
    // whitespace tail is re-supplied every update. Calling candle.update()
    // directly throws ("cannot update oldest data") because the series' last
    // point is the future whitespace, NOT the bar we're updating — and that
    // failed update TRUNCATES the whitespace tail, which leaves the time scale
    // scrolled into a now-empty future region and blanks the visible candles.
    applyChartType(lastData);
  }catch(e){}
  updateOhlcLegend(bar.time);
}
function wsConnect(){
  const prods=wsProductsForActive();
  if(!prods.length){ if(_ws){ try{_ws.close();}catch(e){} _ws=null; } return; }  // no Coinbase legs → rely on poll
  try{ if(_ws){ _ws.close(); } }catch(e){}
  _wsSyms=prods;
  let ws; try{ ws=new WebSocket(CB_WS); }catch(e){ return; }
  _ws=ws;
  ws.onopen=()=>{ _wsRetry=0; _wsLastTickAt=Date.now(); try{ ws.send(JSON.stringify({type:"subscribe", product_ids:prods, channels:["ticker"]})); }catch(e){} };
  ws.onmessage=(ev)=>{
    let m; try{ m=JSON.parse(ev.data); }catch(e){ return; }
    if(m.type==="ticker" && m.product_id && m.price){ _wsLast[m.product_id]=+m.price; _wsLastTickAt=Date.now(); applyTick(); }
  };
  ws.onclose=()=>{ if(_ws===ws){ _ws=null; _wsRetry=Math.min(_wsRetry+1,6); setTimeout(()=>{ if(!_ws) wsConnect(); }, 1000*Math.pow(2,_wsRetry)); } };
  ws.onerror=()=>{ try{ ws.close(); }catch(e){} };
}

// ─────────────────────────────────────────────────────────────────────
//  LLM AGENT BRIDGE — see mcp/README.md
// ─────────────────────────────────────────────────────────────────────
// Long-polls the local mcp/server.mjs so an LLM (Claude over MCP, or the REST
// API) can READ chart data and manage ITS OWN drawings. Deliberately narrow:
// a fixed command map, no eval/code surface, alerts+indicators are read-only,
// and the LLM may only delete drawings it created (s.agent). LLM drawings go
// through snapshotDraw/persist/redraw like user ones — visible instantly, in
// the object tree, undoable with Ctrl+Z. Enabled when the page runs on
// localhost / file:// or with ?agent=1 / localStorage fv_agent="1"; never in
// embeds (grid iframes + mobile WebView — the host page owns the bridge).
const AGENT_PORT = (()=>{ try{ return +(localStorage.getItem("fv_agent_port")||"") || 8787; }catch(e){ return 8787; } })();
const AGENT_ON = !IS_EMBED && (
  ["localhost","127.0.0.1","[::1]"].includes(location.hostname) ||
  location.protocol==="file:" ||
  _params.get("agent")==="1" ||
  (()=>{ try{ return localStorage.getItem("fv_agent")==="1"; }catch(e){ return false; } })()
);
const AGENT_MAX_SHAPES_PER_CALL = 40, AGENT_MAX_SHAPES = 400, AGENT_MAX_PTS = 200;
const agentClean = (v,max)=> String(v).replace(/[<>]/g,"").slice(0,max);
const AGENT_SYM_RE = /^[A-Za-z0-9:.\-=^]{1,32}(\/[A-Za-z0-9:.\-=^]{1,32})?$/;

async function agentExec(cmd, params){
  params = params || {};
  switch(cmd){

    case "chart.info": {
      const last = lastData[lastData.length-1] || null;
      let vr=null; try{ vr = chart.timeScale().getVisibleRange(); }catch(e){}
      return {
        symbol: activeSymbol, displaySymbol: symLabel(activeSymbol),
        timeframe: activeTF, timeframeLabel: (TF[activeTF]||{}).label || activeTF,
        chartType, barCount: lastData.length,
        firstBarTime: lastData.length ? lastData[0].time : null,
        lastBar: last ? { time:last.time, open:last.open, high:last.high, low:last.low, close:last.close, volume:last.volume } : null,
        visibleRange: vr ? { from:vr.from, to:vr.to } : null,
        drawingCount: draw.shapes.length,
        llmDrawingCount: draw.shapes.filter(s=>s.agent).length,
      };
    }

    case "chart.bars": {
      const sym = params.symbol || activeSymbol;
      const tf  = params.timeframe || activeTF;
      if(!AGENT_SYM_RE.test(sym)) throw new Error("invalid symbol");
      if(!TF[tf]) throw new Error("unknown timeframe '"+tf+"' — valid: "+Object.keys(TF).join(", "));
      const limit = Math.max(1, Math.min(Math.floor(+params.limit)||300, 1500));
      let bars = (sym===activeSymbol && tf===activeTF && lastData.length)
        ? lastData
        : await fetchTfBars(sym, tf, sym.includes("/"));
      bars = (bars||[]).slice(-limit);
      return { symbol:sym, timeframe:tf, count:bars.length,
        bars: bars.map(b=>({ time:b.time, open:b.open, high:b.high, low:b.low, close:b.close, volume:b.volume })) };
    }

    case "chart.indicators": {
      const mas = MAS.filter(m=>m.on!==false).map(m=>{
        let v=null; try{ const l=maLine(lastData,m); if(l.length) v=l[l.length-1].value; }catch(e){}
        return { kind:(m.type||"sma").toUpperCase(), period:m.p, source:m.src||"close", value:v };
      });
      let rsiV=null; const rl=(RSI_PARAMS&&RSI_PARAMS.len)||14;
      try{ const r=rsiSeries(lastData, rl, (RSI_PARAMS&&RSI_PARAMS.src)||"close"); if(r.length) rsiV=r[r.length-1].value; }catch(e){}
      return { movingAverages:mas, rsi:{ period:rl, value:rsiV },
        indicators: indicators.map(i=>({ type:i.type, params:i.params, hidden:!!i.hidden })) };
    }

    case "alerts.list":
      return { symbol:activeSymbol, alerts: alerts.map(a=>({
        id:a.id, source:a.source, op:a.op, target:a.target, value:a.value,
        interval:a.interval||null, trigger:a.trigger, message:a.message||"", active:!!a.active })) };

    case "draw.list":
      return { symbol:activeSymbol, drawings: draw.shapes.map(s=>({
        id:s.id, type:s.type, name:s.name||null, points:s.pts,
        color:s.style&&s.style.color, width:s.style&&s.style.width, dash:(s.style&&s.style.dash)||0,
        text:s.text||null, locked:!!s.locked, hidden:!!s.hidden, llm:!!s.agent })) };

    case "draw.add": {
      const list = Array.isArray(params.drawings) ? params.drawings : [];
      if(!list.length) throw new Error("drawings[] is empty");
      if(list.length > AGENT_MAX_SHAPES_PER_CALL) throw new Error("max "+AGENT_MAX_SHAPES_PER_CALL+" drawings per call");
      if(draw.shapes.filter(s=>s.agent).length + list.length > AGENT_MAX_SHAPES)
        throw new Error("LLM drawing cap ("+AGENT_MAX_SHAPES+") reached — remove_drawings first");
      // validate everything BEFORE mutating: all-or-nothing
      for(const d of list){
        if(!d || !(d.type in CLICKS)) throw new Error("unknown drawing type '"+(d&&d.type)+"' — valid: "+Object.keys(CLICKS).join(", "));
        const need = CLICKS[d.type]===0 ? 2 : CLICKS[d.type];
        const pts = Array.isArray(d.points) ? d.points : [];
        if(pts.length < need || pts.length > AGENT_MAX_PTS)
          throw new Error(d.type+" needs "+need+(CLICKS[d.type]===0?"+":"")+" points (got "+pts.length+")");
        if(pts.some(p=>!p || !isFinite(+p.time) || !isFinite(+p.price)))
          throw new Error("each point must be {time: unix seconds, price: number}");
      }
      snapshotDraw();
      const added=[];
      for(const d of list){
        const s = { id:newId(), type:d.type, agent:true,
          pts: d.points.map(p=>({ time:+p.time, price:+p.price })),
          style: { ...DEFAULT_STYLE,
            ...(d.color ? { color:agentClean(d.color,32) } : {}),
            ...(isFinite(+d.width) && +d.width>0 ? { width:Math.min(+d.width,6) } : {}),
            ...(d.dash!=null ? { dash:[0,1,2].includes(+d.dash)?+d.dash:0 } : {}) } };
        if(d.text) s.text = agentClean(d.text,300);
        if(d.name) s.name = agentClean(d.name,80);
        draw.shapes.push(s); added.push(s.id);
      }
      persist(); redraw();
      return { added };
    }

    case "draw.remove": {
      const ids = new Set(Array.isArray(params.ids) ? params.ids : []);
      if(!ids.size && !params.llmOnly) throw new Error("pass ids[] or llmOnly:true");
      // only LLM-created shapes are removable — never the user's own drawings
      const keep = draw.shapes.filter(s=> !(s.agent && (params.llmOnly || ids.has(s.id))));
      const removed = draw.shapes.length - keep.length;
      if(removed){
        snapshotDraw();
        draw.shapes = keep;
        if(draw.sel && !draw.shapes.find(s=>s.id===draw.sel)) draw.sel=null;
        persist(); redraw();
      }
      return { removed };
    }

    default: throw new Error("unknown command: "+cmd);
  }
}

async function agentLoop(){
  // hello=1 on the first poll after (re)connect: the server answers it
  // immediately instead of parking 25s, so _agentLinked flips right away.
  let results=[], backoff=3000, hello=true;
  for(;;){
    let resp;
    try{
      const r = await fetch("http://127.0.0.1:"+AGENT_PORT+"/bridge/poll", {
        method:"POST", headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(hello ? { results, hello:1 } : { results }),
      });
      if(!r.ok) throw new Error("bridge "+r.status);
      resp = await r.json();
      backoff = 3000; hello = false;
      window._agentLinked = true;   // shown in the Help panel's AI-assistant status
    }catch(e){
      window._agentLinked = false;
      hello = true;   // ack fast again when the server comes back
      results=[];   // server gone — those results have no waiter anymore
      await new Promise(res=>setTimeout(res, backoff));
      backoff = Math.min(backoff*1.5, 30000);
      continue;
    }
    results=[];
    for(const c of (Array.isArray(resp.commands)?resp.commands:[])){
      if(!c || typeof c.id!=="string" || typeof c.cmd!=="string") continue;
      try{ results.push({ id:c.id, ok:true, result: await agentExec(c.cmd, c.params) }); }
      catch(err){ results.push({ id:c.id, ok:false, error: String(err && err.message || err) }); }
    }
  }
}
if(AGENT_ON) agentLoop();
</script>
