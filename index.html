const chart = LightweightCharts.createChart(chartEl, common);
// Manual price-scale range, set by dragging the right axis (TradingView-style).
// null ⇒ auto-scale (the default). When set, candle.autoscaleInfoProvider pins the
// scale to it so the whole price axis (candles + MAs + aux series) honors the drag.
let manualPriceRange = null;
// Autoscale providers for the right price scale. The candle is the anchor: when
// manualPriceRange is set it returns exactly that range. Every OTHER overlay
// (MAs, aux chart-type series, compare) must NOT contribute its own data extent
// while a manual range is active — otherwise LWC merges them in and floors the
// visible span (blocking zoom-in). They return null (excluded from autoscale)
// when manualPriceRange is set, and defer to their default extent otherwise.
const candleScale  = orig => manualPriceRange
  ? { priceRange:{ minValue:manualPriceRange.min, maxValue:manualPriceRange.max } }
  : orig();
const overlayScale = orig => manualPriceRange ? null : orig();
const candle = chart.addCandlestickSeries({
  upColor:"#26a69a", downColor:"#ef5350", borderVisible:false,
  wickUpColor:"#26a69a", wickDownColor:"#ef5350",
  autoscaleInfoProvider: candleScale,
});

// ── Chart type + scale ──────────────────────────────────────────────
// `candle` stays the canonical OHLC + coordinate anchor (every coord helper and
// the crosshair legend reference it). For non-candle styles we hide the candle
// series and feed an auxiliary series of the chosen type that shares the same
// price scale, so coordinates and drawings still line up. Heikin Ashi / Hollow
// are just the candle series with transformed data / per-bar colors.
let chartType = "candles";   // candles|hollow|heikin|bars|line|area|baseline
let scaleMode = 0;           // 0 Normal · 1 Log · 2 Percentage
const aux = {};              // lazily-created auxiliary series keyed by type
function auxSeries(type){
  if(aux[type]) return aux[type];
  // Every aux series IS the primary price series for its chart type (candle is
  // hidden), so it honors the manual price range via candleScale — same as candle.
  if(type==="line")     aux[type]=chart.addLineSeries({ color:"#2962ff", lineWidth:2, priceLineVisible:true, lastValueVisible:true, autoscaleInfoProvider:candleScale });
  else if(type==="linemark") aux[type]=chart.addLineSeries({ color:"#2962ff", lineWidth:2, priceLineVisible:true, lastValueVisible:true, pointMarkersVisible:true, pointMarkersRadius:3, autoscaleInfoProvider:candleScale });
  else if(type==="step") aux[type]=chart.addLineSeries({ color:"#2962ff", lineWidth:2, priceLineVisible:true, lastValueVisible:true, lineType:1 /* LineType.WithSteps */, autoscaleInfoProvider:candleScale });
  else if(type==="area")aux[type]=chart.addAreaSeries({ lineColor:"#2962ff", topColor:"rgba(41,98,255,0.30)", bottomColor:"rgba(41,98,255,0.02)", lineWidth:2, autoscaleInfoProvider:candleScale });
  else if(type==="baseline") aux[type]=chart.addBaselineSeries({ baseValue:{type:"price",price:0}, topLineColor:"#26a69a", bottomLineColor:"#ef5350", topFillColor1:"rgba(38,166,154,0.20)", bottomFillColor1:"rgba(239,83,80,0.20)", autoscaleInfoProvider:candleScale });
  else if(type==="columns") aux[type]=chart.addHistogramSeries({ color:"#26a69a", priceLineVisible:false, lastValueVisible:true, autoscaleInfoProvider:candleScale });
  else if(type==="bars"||type==="hlcbars") aux[type]=chart.addBarSeries({ upColor:"#26a69a", downColor:"#ef5350", thinBars:false, openVisible:type==="bars", autoscaleInfoProvider:candleScale });
  else if(type==="highlow") aux[type]=chart.addBarSeries({ upColor:"#787b86", downColor:"#787b86", thinBars:false, openVisible:false, autoscaleInfoProvider:candleScale });
  // renko / kagi / pnf / linebreak render through a candlestick aux series fed
  // transformed "brick"/"box"/"line" data, so they share candle coordinate anchoring.
  else if(type==="renko"||type==="kagi"||type==="pnf"||type==="linebreak")
    aux[type]=chart.addCandlestickSeries({ upColor:"#26a69a", downColor:"#ef5350", borderUpColor:"#26a69a", borderDownColor:"#ef5350", wickUpColor:"#26a69a", wickDownColor:"#ef5350", priceLineVisible:true, lastValueVisible:true, autoscaleInfoProvider:candleScale });
  return aux[type];
}
// Heikin Ashi transform: HA-Close=(O+H+L+C)/4; HA-Open=(prevHAO+prevHAC)/2;
// HA-High=max(H,HAO,HAC); HA-Low=min(L,HAO,HAC). First bar bootstrap uses raw O/C.
function heikinAshi(data){
  const out=[]; let pO=null,pC=null;
  for(const b of data){
    const c=(b.open+b.high+b.low+b.close)/4;
    const o=(pO==null)?(b.open+b.close)/2:(pO+pC)/2;
    const h=Math.max(b.high,o,c), l=Math.min(b.low,o,c);
    out.push({time:b.time, open:o, high:h, low:l, close:c}); pO=o; pC=c;
  }
  return out;
}
// Hollow candles: hollow body on an up-close (close≥open), filled on a down-close;
// colored green/red by the bar vs the previous close (TradingView convention).
function hollowData(data){
  return data.map((b,i)=>{
    const prev=i>0?data[i-1].close:b.open;
    const col=(b.close>=prev)?"#26a69a":"#ef5350";
    return { time:b.time, open:b.open, high:b.high, low:b.low, close:b.close,
      color: b.close>=b.open ? "rgba(0,0,0,0)" : col,   // hollow when close≥open
      borderColor:col, wickColor:col };
  });
}
// ── Price-transform chart styles ──
// These rebuild the series from price *movement* rather than time, so bar count
// differs from the source. To keep them anchored to the real time axis (drawings,
// crosshair, coordinate helpers all key off `candle`'s timestamps), each emitted
// brick/box/line borrows the timestamp of the source bar that produced it. When
// multiple bricks fall on one source bar we nudge later ones by +1s so timestamps
// stay strictly increasing (lightweight-charts requires ascending unique times).
function boxStep(data){
  // ATR-ish box size: a fraction of the median bar range, so it adapts per symbol.
  const ranges=data.map(b=>Math.abs(b.high-b.low)).filter(v=>v>0).sort((a,b)=>a-b);
  const med=ranges.length?ranges[ranges.length>>1]:0;
  const px = med>0 ? med*0.75 : (data.length?data[data.length-1].close*0.01:1);
  return px>0?px:1;
}
function tsPusher(){ let last=-1; return t=>{ let x=t<=last?last+1:t; last=x; return x; }; }

// Renko: fixed-size bricks; a new brick only when price moves ≥ box in one direction.
function renkoData(data){
  if(!data.length) return [];
  const box=boxStep(data), out=[], next=tsPusher();
  let base=data[0].close, dir=0;
  for(const b of data){
    let p=b.close;
    while(p-base>=box){ const o=base,c=base+box; out.push({time:next(b.time),open:o,high:c,low:o,close:c}); base=c; dir=1; }
    while(base-p>=box){ const o=base,c=base-box; out.push({time:next(b.time),open:o,high:o,low:c,close:c}); base=c; dir=-1; }
  }
  return out;
}
// Line Break (3-line break): a new line when close breaks the extreme of the prior N lines.
function lineBreakData(data, n=3){
  const out=[], next=tsPusher();
  for(const b of data){
    const c=b.close;
    if(!out.length){ out.push({time:next(b.time),open:b.open,high:Math.max(b.open,c),low:Math.min(b.open,c),close:c,_d:c>=b.open?1:-1}); continue; }
    const recent=out.slice(-n);
    const hi=Math.max(...recent.map(x=>Math.max(x.open,x.close)));
    const lo=Math.min(...recent.map(x=>Math.min(x.open,x.close)));
    const prev=out[out.length-1];
    if(c>hi){ const o=Math.max(prev.open,prev.close); out.push({time:next(b.time),open:o,high:c,low:o,close:c,_d:1}); }
    else if(c<lo){ const o=Math.min(prev.open,prev.close); out.push({time:next(b.time),open:o,high:o,low:c,close:c,_d:-1}); }
  }
  return out.map(({_d,...x})=>x);
}
// Kagi: a zig-zag that reverses only on a ≥box counter-move. We trace each completed
// leg as a candle from the leg's start price to its extreme (up leg = green, down = red).
function kagiData(data){
  if(!data.length) return [];
  const box=boxStep(data), out=[], next=tsPusher();
  let legStart=data[0].close;   // price where the current leg began
  let ext=data[0].close;        // running extreme of the current leg
  let dir=0;                    // 0 undecided, 1 up, -1 down
  const emit=(t)=>out.push({time:next(t),open:legStart,high:Math.max(legStart,ext),low:Math.min(legStart,ext),close:ext});
  for(const b of data){
    const p=b.close;
    if(dir===0){
      if(p-ext>=box){ dir=1; ext=p; }
      else if(ext-p>=box){ dir=-1; ext=p; }
      else { ext=p; }            // still within first box, drift the extreme
      continue;
    }
    if(dir===1){
      if(p>ext){ ext=p; }                          // extend the up leg
      else if(ext-p>=box){ emit(b.time); legStart=ext; ext=p; dir=-1; }  // reversed down
    } else {
      if(p<ext){ ext=p; }                          // extend the down leg
      else if(p-ext>=box){ emit(b.time); legStart=ext; ext=p; dir=1; }   // reversed up
    }
  }
  emit(data[data.length-1].time);                  // flush the final open leg
  return out;
}
// Point & Figure: columns of X (up) / O (down); reversal after ≥ reversal·box counter-move.
function pnfData(data, reversal=3){
  if(!data.length) return [];
  const box=boxStep(data), out=[], next=tsPusher();
  let dir=0, top=data[0].close, bot=data[0].close;
  for(const b of data){
    const p=b.close;
    if(dir>=0){
      if(p>=top+box){ top=Math.floor((p-bot)/box)*box+bot; dir=1; }
      else if(top-p>=reversal*box){ out.push({time:next(b.time),open:bot,high:top,low:bot,close:top}); dir=-1; bot=top-Math.floor((top-p)/box)*box; }
    } else {
      if(p<=bot-box){ bot=top-Math.floor((top-p)/box)*box; dir=-1; }
      else if(p-bot>=reversal*box){ out.push({time:next(b.time),open:top,high:top,low:bot,close:bot}); dir=1; top=bot+Math.floor((p-bot)/box)*box; }
    }
  }
  out.push({time:next(data[data.length-1].time),open:Math.min(top,bot),high:top,low:bot,close:Math.max(top,bot)});
  return out;
}

// Route the current data into whatever representation chartType selects.
function applyChartType(data){
  const d = data || lastData;
  const showCandle = (chartType==="candles"||chartType==="hollow"||chartType==="heikin");
  candle.applyOptions({ visible:showCandle });
  Object.entries(aux).forEach(([k,s])=> s.applyOptions({ visible: k===chartType }));
  // Price-transform styles (renko/kagi/pnf/linebreak) rebuild their own price/time
  // series, so the time-based MA overlays don't align and are meaningless on them —
  // hide the MAs (TradingView does the same) and re-fit the view to the new series.
  const isTransform = (chartType==="renko"||chartType==="kagi"||chartType==="pnf"||chartType==="linebreak");
  if(typeof maSeries!=="undefined") maSeries.forEach((s,i)=>{ try{ s.applyOptions({ visible: !isTransform && (MAS[i]?MAS[i].on!==false:true) }); }catch(e){} });
  if(isTransform){ try{ chart.timeScale().fitContent(); }catch(e){} }
  if(!d || !d.length) return;
  // Pad every style's timeline with ~4 months of future whitespace so the time
  // scale, grey grid lines and date axis extend past the last real bar.
  if(chartType==="heikin")      candle.setData(withFuture(d, heikinAshi(d)));
  else if(chartType==="hollow") candle.setData(withFuture(d, hollowData(d)));
  else if(showCandle)           candle.setData(withFuture(d, d));   // plain candles
  else {
    candle.setData(withFuture(d, d));  // keep candle data (invisible) so coordinates stay valid
    const s=auxSeries(chartType);
    if(chartType==="bars"||chartType==="hlcbars")
      // HLC bars = OHLC bars with the open tick hidden (openVisible:false set on the series).
      s.setData(withFuture(d, d.map(b=>({time:b.time,open:b.open,high:b.high,low:b.low,close:b.close}))));
    else if(chartType==="baseline"){
      const base=d.length?d[0].close:0;
      s.applyOptions({ baseValue:{type:"price",price:base} });
      s.setData(withFuture(d, d.map(b=>({time:b.time,value:b.close}))));
    }
    else if(chartType==="columns")
      // green when close≥prev close, red otherwise (TradingView column coloring).
      s.setData(withFuture(d, d.map((b,i)=>({time:b.time,value:b.close,color:(b.close>=(i>0?d[i-1].close:b.open))?"#26a69a":"#ef5350"}))));
    else if(chartType==="highlow")
      // High-Low: vertical bar from low to high per period (no open/close ticks).
      s.setData(withFuture(d, d.map(b=>({time:b.time,open:b.low,high:b.high,low:b.low,close:b.high}))));
    else if(chartType==="renko")    s.setData(renkoData(d));
    else if(chartType==="kagi")     s.setData(kagiData(d));
    else if(chartType==="pnf")      s.setData(pnfData(d));
    else if(chartType==="linebreak")s.setData(lineBreakData(d));
    else s.setData(withFuture(d, d.map(b=>({time:b.time,value:b.close}))));  // line / linemark / step
  }
}
function setChartType(t){ chartType=t; applyChartType(); if(typeof syncChartTypeUI==="function") syncChartTypeUI(); }
function setScaleMode(m){ scaleMode=m; try{ chart.priceScale("right").applyOptions({ mode:m }); }catch(e){} if(typeof syncScaleUI==="function") syncScaleUI(); }

// Compute one MA line as {time,value}[] honoring type + source column.
function maLine(data, m){
  const a = data.map(d=>{
    switch(m.src){
      case "open": return d.open; case "high": return d.high; case "low": return d.low;
      case "hl2": return (d.high+d.low)/2;
      case "hlc3": return (d.high+d.low+d.close)/3;
      case "ohlc4": return (d.open+d.high+d.low+d.close)/4;
      default: return d.close;
    }
  });
  const fn = m.type==="ema"?emaA : m.type==="wma"?wmaA : m.type==="rma"?rmaA : smaA;
  const o = fn(a, m.p);
  const out=[]; for(let i=0;i<data.length;i++) if(o[i]!=null) out.push({ time:data[i].time, value:o[i] });
  return out;
}
const maSeriesOpts = m => ({ color:m.color, lineWidth:m.w, lineStyle:m.ls||0, priceLineVisible:false, lastValueVisible:true, crosshairMarkerVisible:false, visible:m.on!==false, autoscaleInfoProvider:overlayScale });

// Tear down + recreate the MA line series to match the current MAS[] (after add/remove).
function rebuildMaSeries(){
  maSeries.forEach(s=>{ try{ chart.removeSeries(s); }catch(e){} });
  maSeries = MAS.map(m => chart.addLineSeries(maSeriesOpts(m)));

  topLineColor:"rgba(0,0,0,0)",
  bottomFillColor1:"rgba(0,0,0,0)", bottomFillColor2:"rgba(0,0,0,0)",

// Overbought / oversold fills (TradingView-style): the area between the RSI line and
// the 70 band tints GREEN when RSI > 70, and between the line and 30 tints RED when

const band30  = rsiChart.addLineSeries({ color:"rgba(255,255,255,0.75)", lineWidth:1, lineStyle:1, priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false, autoscaleInfoProvider:rsiScale });
const band50  = rsiChart.addLineSeries({ color:"#7986cb", lineWidth:1, lineStyle:3, priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false, autoscaleInfoProvider:rsiScale });

// sync the two time scales
let _rsiSyncing=false;   // reentrancy guard so the two scales don't ping-pong
// Only re-apply when the target range actually differs — pushing an identical
// range still emits a change event, and tiny float drift between the two scales
// can otherwise echo back and forth (the visible "bouncing" on zoom).
function _rangesDiffer(a,b){ return !b || Math.abs(a.from-b.from)>1e-4 || Math.abs(a.to-b.to)>1e-4; }
function _syncRange(target, r){
  if(_rsiSyncing || !r) return;
  const cur = target.getVisibleLogicalRange();
  if(!_rangesDiffer(r, cur)) return;   // already aligned — don't nudge, don't echo
  _rsiSyncing=true;
  try{ target.setVisibleLogicalRange(r); }catch(e){}
  _rsiSyncing=false;
}
chart.timeScale().subscribeVisibleLogicalRangeChange(r=>_syncRange(rsiChart.timeScale(), r));
rsiChart.timeScale().subscribeVisibleLogicalRangeChange(r=>_syncRange(chart.timeScale(), r));

// ── Crosshair sync hub ──────────────────────────────────────────────
// TradingView shows one crosshair across every pane: hover an indicator/RSI pane
// and the vertical line + the main chart's price/time tags + OHLC legend all
// follow. Each sub-pane is a separate chart instance, so a hover only fires its
// own crosshairMove — we relay that time to every other pane here.
// A pane = { chart, series } where `series` is any series on that chart we can
// anchor setCrosshairPosition() to (only the time/x matters for the vertical line).
const panes = [];                  // registered sub-panes (RSI + indicator/script charts)
let _xhairSyncing = false;         // reentrancy guard so relays don't loop forever
// Draw the shared vertical crosshair at `time` on every pane except `source`.
// `source===chart` means the hover originated on the main chart.
function syncCrosshairToPanes(time, source){
  if(_xhairSyncing) return;
  _xhairSyncing = true;
  try{
    for(const p of panes){
      if(p.chart === source || !p.series) continue;
      try{
        if(time == null) p.chart.clearCrosshairPosition();
        else p.chart.setCrosshairPosition(0, time, p.series);  // price ignored — vertical line only
      }catch(e){}
    }
    // mirror onto the main chart too (unless the hover came from there)
    if(source !== chart){
      try{
        if(time == null) chart.clearCrosshairPosition();
        else { chart.setCrosshairPosition(0, time, candle); updateOhlcLegend(time); }
      }catch(e){}
    }
    // Fill the RSI pane legend for the hovered bar (setCrosshairPosition on rsiChart
    // doesn't reliably fire its crosshairMove, so we drive the legend from here).
    try{ updateRsiLegend(time); }catch(e){}
  } finally { _xhairSyncing = false; }
}
// Register a sub-pane so hovering it relays the crosshair to all other panes.
function registerPane(pchart, series){
  if(panes.some(p=>p.chart===pchart)){ if(series) setPaneSeries(pchart, series); return; }
  const entry = { chart:pchart, series };
  panes.push(entry);
  entry.handler = p=>{ if(_xhairSyncing) return; syncCrosshairToPanes(p && p.time, pchart); };
  pchart.subscribeCrosshairMove(entry.handler);
  return entry;
}
// Point a registered pane at a current series — the only thing setCrosshairPosition
// needs to draw the shared vertical line on that pane. (Script panes rebuild their
// series on every render, so the anchor must be refreshed.)
function setPaneSeries(pchart, series){
  const e = panes.find(p=>p.chart===pchart); if(e) e.series = series;
}
function unregisterPane(pchart){
  const i = panes.findIndex(p=>p.chart===pchart);
  if(i<0) return;
  try{ panes[i].chart.unsubscribeCrosshairMove(panes[i].handler); }catch(e){}
  panes.splice(i,1);
}
// The static RSI pane is always present.
registerPane(rsiChart, rsiLine);

// RSI legend value lookup (filled on each render in renderChart). The crosshair
// legend reads these by time — see updateRsiLegend.
let RSI_LEGEND_MAP = new Map();
let RSI_MA_LEGEND_MAP = new Map();
// Fill the RSI pane's legend (RSI + RSI-MA values) for the bar at `time`.
// time==null → reset to the latest bar's values. Called from syncCrosshairToPanes
// so every hover (main chart OR any sub-pane) updates it, since setCrosshairPosition
// on the RSI pane doesn't reliably fire its own crosshairMove.
function updateRsiLegend(time){
  const vEl = document.getElementById("rsiVal");
  const mEl = document.getElementById("rsiMaVal");
  if(!vEl || !mEl) return;
  let v, m;
  if(time != null && RSI_LEGEND_MAP.has(time)){ v = RSI_LEGEND_MAP.get(time); m = RSI_MA_LEGEND_MAP.get(time); }
  else {
    // latest available value
    const rv = [...RSI_LEGEND_MAP.values()]; v = rv.length ? rv[rv.length-1] : null;
    const mv = [...RSI_MA_LEGEND_MAP.values()]; m = mv.length ? mv[mv.length-1] : null;
  }
  vEl.textContent = (v==null || isNaN(v)) ? "—" : v.toFixed(2);
  mEl.textContent = (m==null || isNaN(m)) ? "—" : m.toFixed(2);
}

// Force every pane's right-axis gutter to the SAME width so the plot areas line
// up horizontally — a candle sits directly above its RSI/indicator bar. minimumWidth
// is only a floor, so a pane with wider labels (RSI "98.51" vs price "0.42") would
// still grow past it; here we measure the widest actual gutter and pin them all to it.
function allPaneCharts(){
  // Top-to-bottom VISUAL order. Panes (built-in RSI + indicator/script sub-panes) all
  // live in #subPanes and can be reordered with the ↑/↓ pane buttons, so the order is
  // read from the DOM — the date axis must follow the bottom-most VISIBLE pane.
  const list=[chart];
  try{
    const byEl=new Map();
    byEl.set(document.getElementById("rsiWrap"), rsiChart);
    indicators.forEach(i=>{ if(i.subChart&&i.paneEl) byEl.set(i.paneEl, i.subChart); });
    scripts.forEach(s=>{ if(s.subChart&&s.paneEl) byEl.set(s.paneEl, s.subChart); });
    const wrap=document.getElementById("subPanes");
    if(wrap) [...wrap.children].forEach(el=>{
      const c=byEl.get(el); if(c && el.style.display!=="none") list.push(c);
    });
    // Anything not hosted in #subPanes (defensive) keeps the legacy order.
    byEl.forEach((c,el)=>{ if(!list.includes(c) && el && el.parentElement!==document.getElementById("subPanes") && el.style.display!=="none") list.push(c); });
  }catch(e){ return [chart, rsiChart,
    ...indicators.filter(i=>i.subChart).map(i=>i.subChart),
    ...scripts.filter(s=>s.subChart).map(s=>s.subChart)]; }
  return list;
}
function alignPriceAxes(){
  const charts=allPaneCharts();
  let w=PRICE_AXIS_W;
  for(const c of charts){ try{ const cw=c.priceScale("right").width(); if(cw>w) w=cw; }catch(e){} }
  w=Math.ceil(w);
  for(const c of charts){ try{ c.priceScale("right").applyOptions({ minimumWidth:w }); }catch(e){} }
  updateTimeAxisVisibility();
}

// Stacked panes share one synced time scale, but each chart renders its OWN date
// axis — so the months print once between every pane. TradingView shows them only
// once, under the bottom-most pane. allPaneCharts() is already in top-to-bottom
// visual order, so hide the time axis on every pane except the last.
function updateTimeAxisVisibility(){
  const charts=allPaneCharts();
  charts.forEach((c,i)=>{ try{ c.timeScale().applyOptions({ visible: i===charts.length-1 }); }catch(e){} });
}

// ── Indicator math ──
function smaSeries(data, period){
  const out=[]; let sum=0;
  for(let i=0;i<data.length;i++){
    sum+=data[i].close;
    if(i>=period) sum-=data[i-period].close;
    if(i>=period-1) out.push({ time:data[i].time, value:sum/period });
  }
  return out;
}
function rsiSeries(data, period=14, src="close"){
  const out=[]; let gain=0, loss=0;
  const px = srcArr(data, src);
  for(let i=1;i<data.length;i++){
    const d = px[i] - px[i-1];
    const up = Math.max(d,0), dn = Math.max(-d,0);
    if(i<=period){ gain+=up; loss+=dn;
      if(i===period){ gain/=period; loss/=period;
        out.push({ time:data[i].time, value: loss===0?100:100-100/(1+gain/loss) }); }
    } else {
      gain=(gain*(period-1)+up)/period;
      loss=(loss*(period-1)+dn)/period;
      out.push({ time:data[i].time, value: loss===0?100:100-100/(1+gain/loss) });
    }
  }
  return out;
}
// simple MA over an arbitrary {time,value} series (for RSI smoothing)
function maOfSeries(series, period){
  const out=[]; let sum=0;
  for(let i=0;i<series.length;i++){
    sum+=series[i].value;
    if(i>=period) sum-=series[i-period].value;
    if(i>=period-1) out.push({ time:series[i].time, value:sum/period });
  }
  return out;
}
// RSI smoothing MA, type-aware (TradingView parity). Operates on the RSI {time,value}[]
// series. "Bollinger Bands" uses an SMA basis (bands are drawn separately if needed).
function rsiSmoothMA(series, period, type){
  if(!series.length) return [];
  const vals=series.map(p=>p.value);
  let out;
  switch((type||"SMA")){
    case "EMA": out=emaA(vals,period); break;
    case "WMA": out=wmaA(vals,period); break;
    case "RMA": out=rmaA(vals,period); break;
    // VWMA needs volume we don't have per-RSI-point; fall back to SMA (same as basis).
    case "VWMA": out=smaA(vals,period); break;
    case "Bollinger Bands": out=smaA(vals,period); break;
    default: out=smaA(vals,period);
  }
  const res=[]; for(let i=0;i<series.length;i++){ if(out[i]!=null&&isFinite(out[i])) res.push({time:series[i].time, value:out[i]}); }
  return res;
}
// Regular RSI divergence markers. Compares consecutive price pivots vs RSI pivots:
// bullish = price lower-low + RSI higher-low; bearish = price higher-high + RSI lower-high.
function rsiDivergenceMarkers(data, rsi){
  const markers=[]; if(rsi.length<6) return markers;
  const rMap=new Map(rsi.map(p=>[p.time,p.value]));
  const bars=data.filter(b=>rMap.has(b.time));
  const L=2;  // pivot lookback/forward
  const isPivotLow =i=>{ for(let j=1;j<=L;j++){ if(bars[i].low>=bars[i-j].low||bars[i].low>=bars[i+j].low) return false; } return true; };
  const isPivotHigh=i=>{ for(let j=1;j<=L;j++){ if(bars[i].high<=bars[i-j].high||bars[i].high<=bars[i+j].high) return false; } return true; };
  let lastLow=null,lastHigh=null;
  for(let i=L;i<bars.length-L;i++){
    const t=bars[i].time, rv=rMap.get(t);
    if(isPivotLow(i)){
      if(lastLow && bars[i].low<lastLow.price && rv>lastLow.rsi)
        markers.push({time:t, position:"belowBar", color:"#26a69a", shape:"arrowUp", text:"Bull"});
      lastLow={price:bars[i].low, rsi:rv};
    }
    if(isPivotHigh(i)){
      if(lastHigh && bars[i].high>lastHigh.price && rv<lastHigh.rsi)
        markers.push({time:t, position:"aboveBar", color:"#ef5350", shape:"arrowDown", text:"Bear"});
      lastHigh={price:bars[i].high, rsi:rv};
    }
  }
  return markers;
}

// ── Data loading (Coinbase) ──
// Coinbase candle = [time(s), low, high, open, close, volume], newest-first, ≤300 per call.
// Native granularities only: 1m,5m,15m,1h,6h,1d. 4h/12h/1w are AGGREGATED from a base.
//   base   = native granularity (sec) we actually fetch
//   bucket = target bar size (sec); if === base, no aggregation
//   pages  = how many ≤300-bar windows to paginate for depth
// pages tuned to Coinbase's real max depth per granularity (loop stops early on empty,
// so slightly over-asking is harmless). Every TF now pulls far more history than before.
// menu = long label shown in the dropdown; sec = section header it lives under.
const TF = {
  "1m":  { label:"1m",  menu:"1 minute",   sec:"MINUTES", base:60,    bucket:60,     pages:26 },  // ~7k bars (Coinbase caps 1m history)
  "5m":  { label:"5m",  menu:"5 minutes",  sec:"MINUTES", base:300,   bucket:300,    pages:36 },  // ~10k bars (~1 month)
  "15m": { label:"15m", menu:"15 minutes", sec:"MINUTES", base:900,   bucket:900,    pages:18 },  // ~5k bars
  "30m": { label:"30m", menu:"30 minutes", sec:"MINUTES", base:900,   bucket:1800,   pages:18 },  // 2×15m
  "1h":  { label:"1H",  menu:"1 hour",     sec:"HOURS",   base:3600,  bucket:3600,   pages:36 },  // ~10k bars (back to 2025)
  "2h":  { label:"2H",  menu:"2 hours",    sec:"HOURS",   base:3600,  bucket:7200,   pages:36 },  // 2×1h, deep
  "4h":  { label:"4H",  menu:"4 hours",    sec:"HOURS",   base:3600,  bucket:14400,  pages:36 },  // 4×1h, deep
  "6h":  { label:"6H",  menu:"6 hours",    sec:"HOURS",   base:21600, bucket:21600,  pages:20 },  // ~5.5k bars (to 2022)
  "12h": { label:"12H", menu:"12 hours",   sec:"HOURS",   base:21600, bucket:43200,  pages:20 },  // 2×6h, to 2022
  "1d":  { label:"1D",  menu:"1 day",      sec:"DAYS",    base:86400, bucket:86400,   pages:9 },  // ~1.4k bars (to 2022)
  "1w":  { label:"1W",  menu:"1 week",     sec:"DAYS",    base:86400, bucket:604800,  pages:9 },  // 7×1d, Monday-anchored (bucketStart)
  "2w":  { label:"2W",  menu:"2 weeks",    sec:"DAYS",    base:86400, bucket:1209600, pages:9 },  // 14×1d, Monday-anchored
  "1M":  { label:"1M",  menu:"1 month",    sec:"DAYS",    base:86400, bucket:2592000, pages:9 },  // calendar months (bucketStart special-cases this width)
  "1Y":  { label:"1Y",  menu:"1 year",     sec:"DAYS",    base:86400, bucket:31536000,pages:9 },  // calendar years
};
// A restored activeTF may be a custom bucket ("c<sec>") not yet in TF{}. Rebuild its
// entry from the encoded seconds; if it's neither built-in nor a valid custom key,
// fall back to the default so boot never charts an undefined timeframe.
(function validateRestoredTF(){
  if(TF[activeTF]) return;
  const m=/^c(\d+)$/.exec(activeTF);
  if(m){
    const sec=+m[1], bases=[86400,21600,3600,900,300,60], base=bases.find(b=>sec%b===0&&b<=sec);
    if(base){
      const label = sec%604800===0?`${sec/604800}W` : sec%86400===0?`${sec/86400}D` : sec%3600===0?`${sec/3600}H` : `${sec/60}m`;
      TF[activeTF]={ label, menu:label+" (custom)", sec:"CUSTOM", base, bucket:sec, pages:20 };
      return;
    }
  }
  activeTF="1d";
})();

function parseCandlesAgg(raw){
  if(!Array.isArray(raw)) return [];
  // Coinbase candle = [time, low, high, open, close, volume]; keep volume for VWAP/Volume.
  return raw.map(k=>({ time:k[0], low:+k[1], high:+k[2], open:+k[3], close:+k[4], volume:+k[5]||0 }));
}

// Bucket-start boundary for a timestamp. Intraday buckets stay epoch-aligned, but
// calendar TFs must match TradingView/Binance: weeks (any multiple of 7d) open
// Monday 00:00 UTC — epoch day (1970-01-01) was a THURSDAY, so a plain floor makes
// Thu→Wed weeks with different OHLC than every charting platform — months are true
// calendar months (not fixed 30-day blocks), years true calendar years.
const WEEK_ANCHOR = 4*86400;   // Monday 1970-01-05 00:00 UTC
function bucketStart(time, bucket){
  if(bucket % 604800 === 0) return Math.floor((time - WEEK_ANCHOR)/bucket)*bucket + WEEK_ANCHOR;
  if(bucket === 2592000){ const d=new Date(time*1000); return Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), 1)/1000; }
  if(bucket === 31536000){ return Date.UTC(new Date(time*1000).getUTCFullYear(), 0, 1)/1000; }
  return Math.floor(time/bucket)*bucket;
}
// When the bucket containing `time` closes (start of the NEXT bucket) — calendar
// months/years advance by calendar, everything else by fixed width.
function bucketClose(time, bucket){
  if(bucket === 2592000){ const d=new Date(time*1000); return Date.UTC(d.getUTCFullYear(), d.getUTCMonth()+1, 1)/1000; }
  if(bucket === 31536000){ return Date.UTC(new Date(time*1000).getUTCFullYear()+1, 0, 1)/1000; }
  return bucketStart(time, bucket) + bucket;
}
// Roll base bars up into target buckets (calendar-aware via bucketStart).
function aggregate(bars, base, bucket){
  if(bucket === base) return bars;
  const groups = {};
  for(const b of bars){
    const t = bucketStart(b.time, bucket);            // bucket start
    const g = groups[t] || (groups[t] = { time:t, open:b.open, high:b.high, low:b.low, close:b.close, volume:0, _first:b.time, _last:b.time });
    if(b.time <= g._first){ g.open = b.open; g._first = b.time; }
    if(b.time >= g._last ){ g.close = b.close; g._last = b.time; }
    if(b.high > g.high) g.high = b.high;
    if(b.low  < g.low ) g.low  = b.low;
    g.volume += b.volume||0;
  }
  return Object.values(groups)
    .map(({_first,_last,...g})=>g)
    .sort((a,b)=>a.time-b.time);
}


// ── Bad-print filter ──
// Exchange feeds occasionally emit a single corrupt candle with an impossible
// high/low (e.g. INJ 2025-11-08 printed a 14.75 high on a day it opened 7.68 /
// closed 7.44). Dividing that into a ratio creates a fake spike. We clamp any
// wick that exceeds ~4× the LOCAL-median wick of its neighbors (genuine
// volatility is allowed; lone glitches are pulled back in line).
function median(arr){
  if(!arr.length) return 0;
  const s=[...arr].sort((a,b)=>a-b), m=s.length>>1;
  return s.length%2 ? s[m] : (s[m-1]+s[m])/2;
}
function sanitize(bars){
  const N=bars.length, W=10, K=4, MINW=0.15;   // window radius, slack factor, min allowed wick
  if(N<6) return bars;
  const upW=bars.map(k=>{const t=Math.max(k.open,k.close); return t? (k.high-t)/t : 0;});
  const dnW=bars.map(k=>{const b=Math.min(k.open,k.close); return b? (b-k.low)/b : 0;});
  const out=bars.map(k=>({...k}));
  for(let i=0;i<N;i++){
    const lo=Math.max(0,i-W), hi=Math.min(N,i+W+1);
    const u=[],d=[]; for(let j=lo;j<hi;j++) if(j!==i){ u.push(upW[j]); d.push(dnW[j]); }
    const top=Math.max(out[i].open,out[i].close), bot=Math.min(out[i].open,out[i].close);
    const upCap=top*(1+Math.max(median(u)*K, MINW));
    const dnFloor=bot*(1-Math.max(median(d)*K, MINW));
    if(out[i].high>upCap)  out[i].high=upCap;
    if(out[i].low<dnFloor) out[i].low=dnFloor;
  }
  return out;
}

// ── Per-exchange candle pages ──────────────────────────────────────────
// Each returns an oldest-first page in the common shape
// {time(sec), low, high, open, close, volume}, or [] on error/empty. `end` is an
// epoch-seconds upper bound (exclusive-ish) to page backward through history;
// `end===null` means "newest".

// Coinbase: [time(s), low, high, open, close, volume], ≤300/page.
// Coinbase throttles hard (HTTP 429) when a deep TF fans out ~168 pages back-to-back.
// A 429 previously fell through to [] and looked like "end of history", so the very
// first page could silently fail and NOTHING painted — the switch appeared to hang.
// Retry 429/5xx a few times with backoff so at least the first page reliably lands.
async function fetchPageCoinbase(product, g, span, end){
  const qs = end===null
    ? `granularity=${g}`
    : `granularity=${g}&start=${end-span}&end=${end}`;
  const url = `${API}/products/${product}/candles?${qs}`;
  for(let attempt=0; attempt<3; attempt++){
    try{
      const res = await fetchTimeout(url, 8000);
      if(res.status===429 || res.status>=500){
        await new Promise(r=>setTimeout(r, 250*(attempt+1)));   // 250ms, 500ms backoff
        continue;
      }
      return parseCandlesAgg(await res.json());
    }catch{ /* network error — retry */ await new Promise(r=>setTimeout(r, 200)); }
  }
  return [];
}

// Binance spot (api) or USDⓈ-M futures (fapi): kline =
// [openTime(ms), open, high, low, close, volume, …], ≤1000/page, oldest-first.
async function fetchPageBinance(rest, g, span, end, isPerp){
  const host = isPerp ? "https://fapi.binance.com/fapi/v1" : "https://api.binance.com/api/v3";
  const iv = BINANCE_IV[g] || "1d";
  let url = `${host}/klines?symbol=${rest}&interval=${iv}&limit=1000`;
  if(end!==null) url += `&endTime=${end*1000}`;
  try{
    const res = await fetchTimeout(url, 8000);
    const raw = await res.json();
    if(!Array.isArray(raw)) return [];
    return raw.map(k=>({ time:Math.floor(k[0]/1000), open:+k[1], high:+k[2], low:+k[3], close:+k[4], volume:+k[5]||0 }));
  }catch{ return []; }
}

// Bybit v5 kline: result.list = [[start(ms), open, high, low, close, volume, turnover], …]
// newest-first, ≤1000/page. category linear (perp) or spot.
async function fetchPageBybit(rest, g, span, end, isPerp){
  const cat = isPerp ? "linear" : "spot";
  const iv = BYBIT_IV[g] || "D";
  let url = `https://api.bybit.com/v5/market/kline?category=${cat}&symbol=${rest}&interval=${iv}&limit=1000`;
  if(end!==null) url += `&end=${end*1000}`;
  try{
    const res = await fetchTimeout(url, 8000);
    const d = await res.json();
    const list = d && d.result && d.result.list;
    if(!Array.isArray(list)) return [];
    return list.map(k=>({ time:Math.floor(+k[0]/1000), open:+k[1], high:+k[2], low:+k[3], close:+k[4], volume:+k[5]||0 }));
  }catch{ return []; }
}

// Yahoo Finance chart: one call returns the whole series for the (interval,range)
// — there's no backward paging cursor, so we serve the full series on the first
// page (end===null) and return [] for any deeper page request. Result shape:
// chart.result[0].{timestamp[], indicators.quote[0].{open,high,low,close,volume}}.
async function fetchPageYahoo(sym, g, end){
  if(end!==null) return [];                       // single-shot series; no deeper pages
  const cfg = YAHOO_IV[g] || YAHOO_IV[86400];
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=${cfg.iv}&range=${cfg.range}`;
  try{
    const d = await proxyJSON(url);
    const res = d && d.chart && d.chart.result && d.chart.result[0];
    const ts = res && res.timestamp;
    const q  = res && res.indicators && res.indicators.quote && res.indicators.quote[0];
    if(!Array.isArray(ts) || !q) return [];
    const out = [];
    for(let i=0;i<ts.length;i++){
      const o=q.open[i], h=q.high[i], l=q.low[i], c=q.close[i];
      if(o==null||h==null||l==null||c==null) continue;   // Yahoo emits null gaps (holidays/halts)
      out.push({ time:ts[i], open:+o, high:+h, low:+l, close:+c, volume:+(q.volume[i]||0) });
    }
    return out;
  }catch{ return []; }
}

// Route one page fetch to the right exchange for this leg.
async function fetchPage(leg, g, span, end){
  const r = resolveLeg(leg);
  if(r.exchange.id==="BINANCE") return fetchPageBinance(r.rest, g, span, end, r.isPerp);
  if(r.exchange.id==="BYBIT")   return fetchPageBybit(r.rest, g, span, end, r.isPerp);
  if(r.exchange.id==="YAHOO")   return fetchPageYahoo(r.rest, g, end);
  return fetchPageCoinbase(r.rest, g, span, end);
}

// Clean + roll up an oldest-first bar list to the target bucket. Shared by the
// progressive loader so every partial render goes through the same pipeline.
// Hard ceiling on how far back any timeframe can be viewed.
const MAX_BARS = 50000;

function finalizeBars(all, tf){
  const seen = {};
  const out = [];
  for(const k of all){ if(seen[k.time]) continue; seen[k.time]=1; out.push(k); }
  out.sort((a,b)=>a.time-b.time);
  const clean = sanitize(out);                  // strip corrupt bad-print wicks
  const agg = aggregate(clean, tf.base, tf.bucket);  // roll up to 4h/12h/1w if needed
  return agg.length > MAX_BARS ? agg.slice(agg.length - MAX_BARS) : agg;  // keep newest 50k
}

// Progressive history loader. Calls `onPage(barsSoFar)` after EACH page so the
// chart can paint the newest candles immediately, then keeps deepening history
// in the background. Pages were previously fetched all-then-render, which meant
// up to 36 sequential round-trips before anything appeared on screen.
async function fetchKlinesProgressive(leg, tfKey, onPage){
  const tf = TF[tfKey] || TF["1d"];
  const g = tf.base;
  const ex = resolveLeg(leg).exchange.id;
  // Coinbase caps pages at ≤300 bars and needs many pages for depth; Binance/Bybit
  // return ≤1000 per page, so far fewer round-trips reach the same history.
  const pageMax = ex==="COINBASE" ? 300 : 1000;
  const span = pageMax * g;             // seconds covered by one full page
  // Enough pages to reach MAX_BARS (50k) output candles. Each output bar rolls up
  // bucket/base raw base-bars, so raw bars needed = MAX_BARS * bucket/base.
  const rollup = Math.max(1, Math.round(tf.bucket / tf.base));
  const fullPages = Math.max(2, Math.ceil(MAX_BARS * rollup / pageMax) + 1);
  // Cap the EAGER load. Fetching all ~334 pages up front on every TF switch took
  // seconds and hammered Coinbase into HTTP 429 (which looked like a hang). We fetch
  // only enough to fill the initial ~420-bar view plus scrollback headroom, then let
  // loadOlderHistory() deepen the rest on demand as the user pans left. Enough raw
  // bars for ~2000 output candles is plenty for the first screen and a few pans.
  const initialPages = Math.min(fullPages, Math.max(2, Math.ceil(2000 * rollup / pageMax) + 1));
  const maxPages = initialPages;
  let end = null;                       // null = newest
  const all = [];
  for(let i=0; i<maxPages; i++){
    const page = await fetchPage(leg, g, span, end);
    if(!page.length) break;
    all.push(...page);
    if(onPage) onPage(all);                        // render what we have so far
    if(ex==="YAHOO") break;                         // Yahoo returns the whole series in one page
    end = Math.min(...page.map(k=>k.time)) - g;   // step strictly before the oldest bar we got
    if(page.length < pageMax*0.66) break;          // short page = reached start of history; stop early
  }
  if(!all.length) throw new Error("No data for "+legShort(leg));
  return finalizeBars(all, tf);
}

// Non-progressive variant (single combined result), used where a caller just
// wants the full series without incremental callbacks.
async function fetchKlines(product, tfKey){
  return fetchKlinesProgressive(product, tfKey, null);
}

// Fetch a batch of bars OLDER than `beforeTime` for one leg (a few pages deep).
async function fetchOlderPages(leg, tfKey, beforeTime, pages){
  const tf=TF[tfKey]||TF["1d"], g=tf.base;
  const ex=resolveLeg(leg).exchange.id;
  if(ex==="YAHOO") return [];                     // Yahoo returns whole series; no incremental older fetch
  const pageMax=ex==="COINBASE"?300:1000, span=pageMax*g;
  let end=beforeTime-g; const all=[];
  for(let i=0;i<pages;i++){
    const page=await fetchPage(leg, g, span, end);
    if(!page.length) break;
    all.push(...page);
    end=Math.min(...page.map(k=>k.time))-g;
    if(page.length<pageMax*0.66) break;           // reached start of history
  }
  return all;
}

// ── Infinite scroll-back ──
// When the user pans near the left edge of loaded history, lazily fetch older bars
// and prepend them. Guarded by a fetching flag + "reached start" flag so it can't
// spam requests. Preserves the view (keepView) so the chart doesn't jump.
let _loadingOlder=false, _historyExhausted=false;
async function loadOlderHistory(){
  if(_loadingOlder || _historyExhausted || !lastData.length) return;
  if(lastData.length >= MAX_BARS){ _historyExhausted=true; return; }  // 50k-bar ceiling reached
  _loadingOlder=true;
  const sym=activeSymbol, tf=activeTF, oldest=lastData[0].time;
  const tfMeta=TF[tf]||TF["1d"];
  try{
    let older=[];
    // Fetch depth is venue-aware so the prepend lands FAST. Binance/Bybit return
    // 1000 bars/page, so 2 pages = 2000 older bars — plenty per swipe and it lands
    // in ~half the round-trips. Coinbase caps at 300/page, so it needs more pages
    // to add a meaningful chunk. Repeated triggers (fired by the pan clamp when the
    // user keeps dragging into the wall) deepen further on demand.
    const _firstLeg = sym.includes("/") ? sym.split("/")[0] : sym;
    const _pageBig = resolveLeg(_firstLeg).exchange.id === "COINBASE";
    const _pages = _pageBig ? 4 : 2;
    if(sym.includes("/")){
      const [a,b]=sym.split("/");
      const [pa,pb]=await Promise.all([ fetchOlderPages(a,tf,oldest,_pages), fetchOlderPages(b,tf,oldest,_pages) ]);
      if(pa.length && pb.length) older=makeRatio(finalizeBars(pa,tfMeta), finalizeBars(pb,tfMeta));
    } else {
      const raw=await fetchOlderPages(sym,tf,oldest,_pages);
      if(raw.length) older=finalizeBars(raw,tfMeta);
    }
    // keep only bars strictly older than what we already have
    older=older.filter(b=>b.time<oldest);
    if(!older.length){ _historyExhausted=true; return; }
    // user switched symbol/TF mid-fetch — abort so we never prepend the previous
    // TF's bars onto the new chart (the "glitch"). Deliberately NOT keyed on
    // loadToken: the silent 20s poll also bumps the token (it calls loadChart with
    // keepView), and aborting on that silently discarded ~1-in-4 scroll-back
    // prepends mid-fetch — the user hit the history wall, waited, and nothing
    // loaded ("loading slow"). The sym/tf comparison alone catches real switches.
    if(sym!==activeSymbol || tf!==activeTF) return;
    // don't prepend past the 50k ceiling — trim the older batch if it would overflow
    const room = MAX_BARS - lastData.length;
    if(older.length > room){ older = older.slice(older.length - room); _historyExhausted=true; }
    if(!older.length){ _historyExhausted=true; return; }
    // preserve the visible range across the prepend (indices shift by older.length)
    const ts=chart.timeScale(); const before=ts.getVisibleLogicalRange();
    lastData = older.concat(lastData);
    renderData(lastData, true);                        // keepView
    if(before){ try{ ts.setVisibleLogicalRange({ from:before.from+older.length, to:before.to+older.length }); }catch(e){} }
  }catch(e){ /* transient; will retry on next pan */ }
  finally{ _loadingOlder=false; }
}
// Trigger while the left edge is still ~200 bars away from loaded history, so the
// (multi-second, on slow networks) older-history fetch starts BEFORE the user pans
// into the wall — the batch is usually prepended by the time they reach the edge,
// so scrolling back feels continuous instead of "hit a wall, wait, then it loads".
chart.timeScale().subscribeVisibleLogicalRangeChange(r=>{
  if(r && r.from < 200 && !_loadingOlder && !_historyExhausted) loadOlderHistory();
});

// Build synthetic A/B ratio (spread) by aligning candles on matching timestamps
function makeRatio(a, b){
  const bm = {}; b.forEach(k=>bm[k.time]=k);
  const out=[];
  for(const k of a){
    const q = bm[k.time];
    if(!q || !q.open || !q.close || !q.high || !q.low) continue;
    // TradingView spread = component-wise division (NOT high/low cross terms,
    // which falsely assume A peaks the instant B bottoms → fake giant wicks).
    const o = k.open/q.open;
    const c = k.close/q.close;
    let hi = k.high/q.high;
    let lo = k.low/q.low;
    if(lo > hi) [lo, hi] = [hi, lo];          // guard if division flips order
    // wick must still envelope the real open & close
    hi = Math.max(hi, o, c);
    lo = Math.min(lo, o, c);
    out.push({ time:k.time, open:o, high:hi, low:lo, close:c, volume:k.volume||0 });
  }
  return out;
}

function fmt(v){ return v>=100 ? v.toFixed(2) : v>=1 ? v.toFixed(3) : v.toPrecision(4); }

// How far the empty "future" region extends to the right of the last real bar.
// ~4 months — the user wants room to draw/project well past the latest candle.
const FUTURE_DAYS = 120;

// Per-bar spacing (seconds) for the active timeframe. `bucket` is the rolled-up
// granularity, so e.g. 4h = 14400, 1w = 604800.
function tfStepSec(){ return (TF[activeTF] || TF["1d"]).bucket || 86400; }
// TradingView draws far fewer vertical grid lines on daily+ charts because it
// weights ticks at day/week/month granularity. Lightweight-charts only does the
// same when timeVisible is OFF — with it ON, it weights every bar at minute
// granularity and packs a grid line onto nearly every day when zoomed out.
// So: intraday (bucket < 1 day) keeps the clock; daily+ turns it off.
function applyTimeGranularity(){
  const intraday = tfStepSec() < 86400;
  (typeof allPaneCharts==="function"?allPaneCharts():[chart]).forEach(c=>{ try{
    c.applyOptions({ timeScale:{ timeVisible:intraday } });
  }catch(e){} });
}

// ── Countdown to bar close ──
// Shows how long until the current (forming) bar closes, as a pill on the right
// price axis at the last close — matching TradingView. Epoch-aligned to the TF
// bucket (same alignment aggregate() uses), updated once per second.
function fmtCountdown(sec){
  sec=Math.max(0,Math.floor(sec));
  const d=Math.floor(sec/86400), h=Math.floor(sec%86400/3600), m=Math.floor(sec%3600/60), s=sec%60;
  if(d>0) return `${d}d ${h}h`;
  if(h>0) return `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  return `${m}:${String(s).padStart(2,"0")}`;
}
function updateCountdown(){
  const el=document.getElementById("barCountdown"); if(!el) return;
  if(!lastData || !lastData.length){ el.style.display="none"; return; }
  const step=tfStepSec();
  const now=Date.now()/1000;
  const closeAt=bucketClose(now, step);          // next bucket boundary (calendar-aware for 1W/1M/1Y)
  el.textContent=fmtCountdown(closeAt-now);
  // Pin to the top of the price axis; in embed (phone) sit below the topmost axis
  // label so the pill doesn't cover it on the narrow frame.
  el.style.top = IS_EMBED ? "26px" : "8px";
  el.style.display="block";
}

// Build whitespace bars ({time} only — no OHLC) stepping from just after the last
// real bar out to ~FUTURE_DAYS ahead. Whitespace extends the time scale so the
// grey grid lines, date-axis labels and the future region all render, and drawings
// (rays / horizontal lines) have somewhere to project into — without painting
// fake candles. Capped so an intraday TF can't emit a runaway number of slots.
// Memoized: renderData fans the same tail out to ~10 series (candle, RSI x7, every
// sub-pane indicator) per paint. The tail only changes when the last bar's time,
// the step (timeframe) or the bar count changes — so cache on those and rebuild
// only then, instead of allocating an identical ≤2000-element array per series.
let _fwCache = { key:null, tail:[] };
function futureWhitespace(data){
  if(!data || !data.length) return [];
  const step = tfStepSec();
  const last = data[data.length-1].time;
  const key  = last + "/" + step + "/" + data.length;
  if(_fwCache.key === key) return _fwCache.tail;
  // Extend at least FUTURE_DAYS ahead, but never fewer than ~6 bars — so
  // coarse timeframes (1M/1Y, whose step exceeds FUTURE_DAYS) still get room
  // to project drawings into instead of ending flush with the last candle.
  const end  = last + Math.max(FUTURE_DAYS*86400, step*6);
  const out=[]; let t=last+step;
  while(t<=end && out.length<2000){ out.push({time:t}); t+=step; }
  _fwCache = { key, tail:out };
  return out;
}

// Append the future-whitespace tail to a real series so its timeline reaches
// ~4 months ahead in lockstep with the candle series.
function withFuture(data, pts){ return pts.concat(futureWhitespace(data)); }

// Like withFuture, but the future tail carries a constant VALUE instead of
// whitespace — so horizontal RSI band lines / band fills keep painting across
// the whole pane (right to the edge) instead of dying at the last real bar,
// matching TradingView.
function withFutureConst(data, pts, value){
  return pts.concat(futureWhitespace(data).map(w=>({time:w.time, value})));
}

// Push a finished bar series into every series + indicator. Called on each
// progressive page as well as on the final result, so the chart stays live
// while history keeps deepening underneath it.
function renderData(data, keepView){
  // Lightweight Charts REQUIRES strictly-ascending, unique bar times; a series with
  // an out-of-order or duplicate timestamp trips its internal "Value is null" render
  // race (most visibly during rapid zoom-out, which permanently wedges the chart).
  // Spread ratios and history-prepend merges can occasionally emit a bar out of order,
  // so normalise here — the one chokepoint every paint path routes through.
  if(data && data.length > 1){
    let ordered = true;
    for(let i=1;i<data.length;i++){ if(data[i].time <= data[i-1].time){ ordered=false; break; } }
    if(!ordered){
      const seen = new Set(); const norm = [];
      for(const b of [...data].sort((a,b)=>a.time-b.time)){
        if(seen.has(b.time)) continue;   // drop duplicate-time bars (keep first after sort)
        seen.add(b.time); norm.push(b);
      }
      data = norm;
    }
  }
  // Bar replay: when active, keep the full series but only reveal up to _replayIdx.
  if(_replay.active){
    _replay.full = data;                                  // remember the complete series
    const n = Math.min(_replay.idx||data.length, data.length);
    data = data.slice(0, n);
  }
  // On the silent 20s poll refresh (keepView), the WS feed has been driving the
  // forming bar's high/low/close in real time, but Coinbase's candle endpoint
  // lags — so the incoming snapshot's last bar can report a high/low BELOW the
  // intrabar wick the WS already captured. Merge (max-high / min-low) so the
  // live wick survives the poll instead of vanishing.
  if(keepView && !_replay.active && lastData.length && data.length){
    const prev = lastData[lastData.length-1], cur = data[data.length-1];
    if(prev && cur && prev.time === cur.time){
      if(prev.high > cur.high) cur.high = prev.high;
      if(prev.low  < cur.low ) cur.low  = prev.low;
      // Trust the WS close over the (lagging) poll ONLY while ticks are actually flowing.
      // Mobile WebViews can stall the socket without firing close; unconditional trust
      // pinned the price at the last stale tick and the poll could never correct it
      // (spread charts hit hardest — they need BOTH legs ticking to move at all).
      if(Date.now()-_wsLastTickAt < 15000) cur.close = prev.close;
    }
  }
  lastData = data;                 // expose to the drawing engine (magnet/measure/extrapolation)
  applyChartType(data);            // route into the active chart style (candles/HA/line/…)
  if(typeof redraw==="function") redraw();
  if(data.length) updateOhlcLegend(data[data.length-1].time);   // default legend = latest bar

  // moving averages
  renderMaLegend(data);

  // RSI + smoothing MA + TradingView-style fills.
  // rsiSeries/maOfSeries drop the warmup bars, so they're SHORTER than `data`.
  // The RSI pane is logical-range-synced to the main chart by bar INDEX, so a
  // shorter series lands at a different index than the candle of the same time —
  // shifting the whole RSI plot left. Re-key every RSI series onto the full `data`
  // timeline, emitting whitespace ({time} only) for the warmup gap so each bar
  // keeps its index and the panes stay aligned.
  const r = rsiSeries(data, RSI_PARAMS.len, RSI_PARAMS.src);
  const rm = rsiSmoothMA(r, RSI_PARAMS.smooth, RSI_PARAMS.maType);
  const rMap = new Map(r.map(d=>[d.time, d.value]));
  const rmMap = new Map(rm.map(d=>[d.time, d.value]));
  // Expose value-by-time so the crosshair legend can read RSI/MA at the hovered bar.
  // (setCrosshairPosition on the RSI pane doesn't reliably fire crosshairMove, so the
  // legend can't rely on that event — syncCrosshairToPanes reads these maps instead.)
  RSI_LEGEND_MAP = rMap;
  RSI_MA_LEGEND_MAP = rmMap;
  const rFull  = data.map(b=> rMap.has(b.time)  ? {time:b.time, value:rMap.get(b.time)}  : {time:b.time});
  const rmFull = data.map(b=> rmMap.has(b.time) ? {time:b.time, value:rmMap.get(b.time)} : {time:b.time});
  // Extend each RSI series with the same future whitespace so the indicator pane
  // reaches ~4 months ahead in lockstep with the main chart (kept index-aligned).
  // Solid faint-purple block across the 30–70 band: constant series at 30 with
  // baseValue 70 fills the whole region regardless of the RSI value.
  rsiOver.setData(withFutureConst(data, data.map(b=>({time:b.time, value:30})), 30));
  rsiUnder.setData(withFuture(data, rFull));           // transparent no-op
  // Overbought/oversold fills track the RSI line itself (green above 70, red below 30).
  rsiOB.setData(withFuture(data, rFull));
  rsiOS.setData(withFuture(data, rFull));
  band70.setData(withFutureConst(data, data.map(b=>({time:b.time, value:70})), 70));
  band50.setData(withFutureConst(data, data.map(b=>({time:b.time, value:50})), 50));
  band30.setData(withFutureConst(data, data.map(b=>({time:b.time, value:30})), 30));
  rsiLine.setData(withFuture(data, rFull));
  rsiMa.setData(withFuture(data, rmFull));
  // Calculate Divergence: mark regular bullish/bearish RSI divergences at pivots.
  try{ rsiLine.setMarkers(RSI_PARAMS.divergence ? rsiDivergenceMarkers(data, r) : []); }catch(e){}
  // Default legend = latest bar (crosshair hover overrides via updateRsiLegend).
  updateRsiLegend(null);

  // user indicators + custom scripts + alerts (engine defined later in file; guard for first paint)
  if(typeof renderAllIndicators==="function") renderAllIndicators();
  if(typeof renderAllScripts==="function") renderAllScripts();
  if(typeof checkAlerts==="function") checkAlerts();

  // Snap to the most recent ~420 bars on a fresh load, re-snapping as each
  // progressive page reindexes the scale — but only until the user pans/zooms
  // (stopAutoSnap clears _autoSnap on the first wheel/drag) and never on the
  // 20s background refresh (keepView).
  if(!keepView && _autoSnap){
    const view = Math.min(data.length, 420);
    // Show a slice of the new ~4-month future region on the right (about a third of
    // the visible width) so the user can see it exists, while keeping the recent
    // candles readable. The full future tail is still pannable beyond this.
    const future = Math.min(futureWhitespace(data).length, Math.round(view*0.35));
    chart.timeScale().setVisibleLogicalRange({ from: data.length-view, to: data.length+future });
  }
  document.getElementById("status").innerHTML = `<span class="dot"></span>Live · ${activeVenueLabel()} · ${data.length} bars`;
  // Equalize the right-axis gutters once the new labels have laid out, so the main
  // chart and every sub-pane keep their candles/bars vertically aligned.
  setTimeout(alignPriceAxes, 0);
}

// Token guards against a stale in-flight load clobbering a newer one (e.g. the
// user switches symbol/TF while pages from the previous request are still
// streaming in via progressive callbacks).
let loadToken = 0;

// ── Series cache (per symbol+timeframe) ──
// Every TF/symbol switch previously re-fetched the whole series from the network
// before ANYTHING appeared — the first-page round-trip alone cost 1.5–4s, so a
// switch felt sluggish. We cache the last finalized series per (symbol, tf) and
// paint it INSTANTLY on switch, then still fetch in the background to refresh with
// live bars. Bounded LRU so memory can't grow unbounded across many symbols/TFs.
const _seriesCache = new Map();          // key "SYM|tf" → finalized bar array
const _SERIES_CACHE_MAX = 40;
function _cacheKey(sym, tf){ return sym + "|" + tf; }
function cacheSeries(sym, tf, data){
  if(!data || !data.length) return;
  const k = _cacheKey(sym, tf);
  if(_seriesCache.has(k)) _seriesCache.delete(k);       // refresh LRU position
  _seriesCache.set(k, data);
  while(_seriesCache.size > _SERIES_CACHE_MAX){ _seriesCache.delete(_seriesCache.keys().next().value); }
}
function getCachedSeries(sym, tf){
  const k = _cacheKey(sym, tf);
  const v = _seriesCache.get(k);
  if(v){ _seriesCache.delete(k); _seriesCache.set(k, v); }  // LRU touch
  return v;
}

// Auto-snap state. While a fresh load streams pages in, each page prepends older
// history and reindexes the logical scale, so we re-snap to the latest candle
// on every page to keep it centred. But the SECOND the user pans/zooms we must
// stop snapping or we'd yank their view back (the "bounces back" bug).
//   _autoSnap – are we still allowed to auto-snap this load?
// stopAutoSnap() is called from the real gesture handlers (the dcanvas mousedown
// pan and the dcanvas wheel-zoom defined later), so it never interferes with the
// chart's own input handling.
let _autoSnap = false;
function stopAutoSnap(){ _autoSnap = false; }

async function loadChart(symbol, tf, keepView){
  const myToken = ++loadToken;
  if(!keepView){ _historyExhausted=false; _loadingOlder=false; }   // new symbol/TF → history can be deepened again
  // A fresh load (symbol/TF switch) discards any manual axis stretch — a price range
  // pinned for one asset (e.g. BTC ~60k) is meaningless for the next (NEAR ~0.4).
  // Also restore the default margins a manual pan/stretch may have zeroed.
  if(!keepView){ manualPriceRange=null; _manualMargins=false;
    try{ chart.priceScale("right").applyOptions({ autoScale:true, scaleMargins:{ top:0.2, bottom:0.1 } }); }catch(e){} }
  activeSymbol = symbol;   // the symbol being charted = the active one (keeps status/venue labels in sync)
  if(typeof saveActiveState==="function") saveActiveState();   // remember symbol+tf across reloads
  // Embed panel: tell the grid host what we loaded so SYNC IN LAYOUT can relay it
  // to sibling panels. Guards: changes applied FROM the host must not echo, and the
  // panel's own BOOT load must not emit — otherwise with symbol/interval sync ON the
  // last panel to boot would overwrite every sibling's symbol (last-boot-wins).
  if(IS_EMBED && typeof _syncFromParent!=="undefined" && !_syncFromParent){
    if(window._fvBootLoadDone) try{ parent.postMessage({fvx:"panechange", sym:symbol, tf:tf}, "*"); }catch(e){}
    window._fvBootLoadDone = true;
  }
  document.getElementById("symName").textContent = symLabel(symbol);
  // venue label: for a ratio, show both sides' venues if they differ
  const exEl = document.getElementById("exName");
  if(exEl){
    if(symbol.includes("/")){
      const exs = [...new Set(symbol.split("/").map(s=>resolveLeg(s).exchange.label))];
      exEl.textContent = exs.join(" / ");
    } else {
      const r = resolveLeg(symbol);
      exEl.textContent = r.exchange.label + (r.isPerp ? " Perp" : "");
    }
  }
  document.getElementById("tfName").textContent = (TF[tf]||{}).label || tf;
  // Mirror symbol/tf/exchange into the floating on-chart legend row.
  const legSym=document.getElementById("legSym"), legMeta=document.getElementById("legMeta");
  if(legSym) legSym.textContent = symLabel(symbol);
  if(legMeta) legMeta.textContent = "· "+((TF[tf]||{}).label||tf)+" · "+(document.getElementById("exName").textContent||"");
  // clear any stale "No data" error from the previous symbol and show progress.
  let paintedFromCache = false;
  if(!keepView){
    document.getElementById("ohlc").innerHTML = "";
    _autoSnap = true;   // a fresh load may snap to the latest candle until the user pans/zooms
    // Instant switch: if we've charted this symbol+tf before, paint the cached
    // series NOW so the TF change is immediate, then refresh from the network below.
    const cached = getCachedSeries(symbol, tf);
    if(cached && cached.length){
      renderData(cached, false);   // false ⇒ snap to latest, matches a fresh switch
      paintedFromCache = true;
      document.getElementById("status").innerHTML = `<span class="dot"></span>Updating ${escHtml(symbol)}…`;
    } else {
      document.getElementById("status").innerHTML = `<span class="dot"></span>Loading ${escHtml(symbol)}…`;
    }
  }
  const fresh = ()=> myToken===loadToken;       // still the active load?
  // On a fresh (non-keepView) load, snap to the latest candle on EVERY
  // progressive page — not just the first. Each new page prepends older history,
  // which reindexes the logical scale; a one-time snap would then drift off the
  // latest bar as history backfills, leaving the recent candles off-screen.
  const paint = (data)=>{
    if(!fresh() || !data.length) return;
    renderData(data, keepView);   // keepView=false ⇒ re-snap to the latest bar
  };
  // First-page-then-final paint. A single Coinbase intraday TF streams ~168
  // pages (50k bars ÷ 300/page); painting each one fired ~168 full re-renders
  // (candle + 6 MAs + RSI) back-to-back. That render thrash both froze the UI
  // for ~20s AND intermittently tripped the Lightweight Charts "Value is null"
  // race that permanently wedges the chart — so switching a timeframe often
  // looked like it "didn't change". We paint ONLY the first page (instant switch
  // + snap to latest) here; the loop's trailing paint(data) below renders the
  // complete series once. History still deepens in the background between them,
  // just without repainting on every page. Mirrors the spread path's fix.
  // Skip the first-page progressive paint when it would visibly disturb the chart:
  //  - paintedFromCache: the full series is already on screen.
  //  - keepView (the silent 20s background refresh): painting one partial page would
  //    momentarily shrink the series and jolt the user's zoomed/panned view — the
  //    "out of nowhere it bounces and goes blank for ~2s" symptom. A background refresh
  //    must never touch the view, so only the final complete series is painted.
  // In both cases we let ONLY the trailing paintFinal(data) land.
  let _painted = (paintedFromCache || keepView) ? 1 : 0;
  const paintProgressive = (data)=>{
    if(_painted || !fresh() || !data.length) return;
    _painted = 1; paint(data);   // first page only
  };
  // When refreshing over a cached paint, keep the user's view instead of re-snapping
  // to latest — the cache paint already snapped, and the user may have panned since.
  const paintFinal = (data)=>{
    if(!fresh() || !data.length) return;
    // Preserve lazily-deepened history on a background refresh. loadOlderHistory()
    // may have prepended thousands of older bars as the user scrolled back; a fresh
    // fetch only reaches the DEFAULT depth, so replacing lastData wholesale would
    // discard those older bars, shrink the series, and strand the user's view off
    // the (now shorter) left end — the "it bounces back to the start" bug. Instead,
    // splice the fresh recent bars onto the deeper older tail we already hold.
    if(keepView && lastData.length > data.length && data.length){
      const freshOldest = data[0].time;
      const olderTail = lastData.filter(b=>b.time < freshOldest);   // bars older than the fresh fetch
      if(olderTail.length) data = olderTail.concat(data);
    }
    renderData(data, paintedFromCache ? true : keepView);
  };
  try{
    if(symbol.includes("/")){
      const [a,b] = symbol.split("/");
      // Render the spread as each side's pages arrive. Re-derive the ratio from
      // whatever both sides have so far; the chart fills out as history deepens.
      let lastA=[], lastB=[];
      const tfMeta = TF[tf] || TF["1d"];
      // Spread symbols paint the FIRST combined page immediately (so the TF switch
      // is instant), then paint ONCE more at the end — never per progressive page.
      // Both legs stream ~28 pages each; per-page repaints fire dozens of full
      // re-renders (candle + 6 MAs + RSI) back-to-back, and that thrash trips an
      // intermittent Lightweight Charts race ("Value is null") that freezes the
      // chart. First-page-only paint (guarded by paintProgressive's _painted flag)
      // gives instant feedback with a single early render, then one clean final
      // render — no thrash. Without this, a spread showed nothing until ALL pages
      // for BOTH legs finished (~3s), which read as "the TF change hangs".
      const tryFirstPaint = ()=>{
        if(!fresh() || lastA.length<2 || lastB.length<2) return;
        const d = makeRatio(finalizeBars(lastA, tfMeta), finalizeBars(lastB, tfMeta));
        if(d.length) paintProgressive(d);   // paints only once (first combined page)
      };
      const [ka,kb] = await Promise.all([
        fetchKlinesProgressive(a, tf, raw=>{ lastA=raw; tryFirstPaint(); }),
        fetchKlinesProgressive(b, tf, raw=>{ lastB=raw; tryFirstPaint(); }),
      ]);
      const data = makeRatio(ka, kb);
      if(!data.length) throw new Error("No overlapping data for "+symbol);
      cacheSeries(symbol, tf, data);   // remember for instant re-switch
      paintFinal(data);
    } else {
      const data = await fetchKlinesProgressive(symbol, tf, raw=>{
        if(fresh()) paintProgressive(finalizeBars(raw, TF[tf]||TF["1d"]));
      });
      cacheSeries(symbol, tf, data);   // remember for instant re-switch
      paintFinal(data);   // final, complete series
    }
    if(fresh() && typeof reloadAllCompares==="function") reloadAllCompares();  // refresh overlays for new TF
  }catch(e){
    if(fresh()) document.getElementById("ohlc").innerHTML = `<span class="down">⚠ ${escHtml(e.message)}</span>`;
  }
}

// crosshair → OHLC legend
chart.subscribeCrosshairMove(p=>{
  const c = p.seriesData.get(candle);
  if(!c) return;
  const col = c.close>=c.open ? "var(--green)":"var(--red)";
  document.getElementById("ohlc").innerHTML =
    `O<b>${fmt(c.open)}</b> H<b>${fmt(c.high)}</b> L<b>${fmt(c.low)}</b> C<b style="color:${col}">${fmt(c.close)}</b>`;
  // NOTE: cross-panel crosshair sync is NOT relayed from here. The overlay canvas eats
  // the real mousemove and drives the crosshair PROGRAMMATICALLY via updateCrosshair →
  // setCrosshairPosition, so this callback fires identically for a genuine local hover
  // AND for a host-driven set — relaying here couldn't tell them apart and bounced
  // (A→host→B→host→A). The relay lives in updateCrosshair / the dcanvas mouseleave
  // (genuine-hover paths only); see relayXhairToGrid().
});
// Embed→host crosshair relay, called ONLY from the genuine local-hover paths (the
// overlay canvas mousemove/leave). A panel that merely received a crosshair from the
// host never runs these, so the shared vertical can't echo back and bounce.
function relayXhairToGrid(time){
  if(!IS_EMBED) return;
  try{ parent.postMessage({fvx:"crosshair", time:time==null?null:time}, "*"); }catch(e){}
}
// Grid-panel message sync: receive crosshair (draw a matching vertical) + symbol /
// interval / visible-range changes (SYNC IN LAYOUT). _syncFromParent guards echo
// loops: a change applied FROM the host must not re-emit back to it.
let _syncFromParent=false;
window.addEventListener("message", e=>{
  const d=e.data; if(!d||!d.fvx) return;
  if(d.fvx==="crosshair" && IS_EMBED){
    // Draw the shared vertical at the host-relayed time. Safe to just set it: this
    // panel relays ONLY from its own overlay-canvas hover (relayXhairToGrid), never
    // from a host-driven set, so this can't echo back and bounce.
    try{ if(d.time==null) chart.clearCrosshairPosition(); else chart.setCrosshairPosition(0, d.time, candle); }catch(err){}
  }
  if(d.fvx==="setsym" && IS_EMBED && d.sym){ _syncFromParent=true; activeSymbol=d.sym; loadChart(d.sym, activeTF).finally(()=>{ _syncFromParent=false; }); }
  if(d.fvx==="settf" && IS_EMBED && d.tf){ _syncFromParent=true; activeTF=d.tf; loadChart(activeSymbol, d.tf).finally(()=>{ _syncFromParent=false; }); }
  if(d.fvx==="setrange" && IS_EMBED && d.from!=null && d.to!=null){
    _syncFromParent=true;
    try{ chart.timeScale().setVisibleRange({from:d.from, to:d.to}); }catch(err){}
    setTimeout(()=>{ _syncFromParent=false; },0);
  }
  // Named-layout restore: replace this panel's indicator set (mirrors loadIndTemplate).
  // Cap the batch — window messages are untrusted, an unbounded list is a tab-DoS.
  if(d.fvx==="setinds" && IS_EMBED && Array.isArray(d.inds)){
    try{
      [...indicators].forEach(i=>removeIndicator(i.id, true)); indicators.length=0;
      d.inds.slice(0,24).forEach(r=>addIndicator(r.type,{params:r.params, hidden:r.hidden, silent:true}));
      renderIndLegend(); layoutPanes(); saveIndicators();
    }catch(err){}
  }
  // Host → embed: activate a drawing tool (the mobile app's own toolbar drives this
  // engine, since its native drawing toolbar is hidden in embed mode). Only accept real
  // TOOLS keys — an unknown key would set draw.tool to garbage and the next chart click
  // silently pushes an invisible unknown-type shape into draw.shapes/localStorage.
  if(d.fvx==="settool" && IS_EMBED && typeof d.tool==="string" && TOOLS.some(t=>t.key===d.tool)){
    try{ selectTool(d.tool); }catch(err){}
  }
  // Host → embed: open the symbol/pair details card (mobile app "View details" action).
  // Falls back to the current chart symbol when the host doesn't pass one.
  if(d.fvx==="details" && IS_EMBED){ try{ openPairInfoCard(d.sym || activeSymbol); }catch(err){} }
  // Host → embed: open the engine's own Indicators menu (mobile ƒ button). Indicators
  // are engine-owned in embed mode — full catalog, settings dialog, per-symbol persistence.
  if(d.fvx==="indmenu" && IS_EMBED){ try{ toggleIndicatorsMenu(); }catch(err){} }
  // Host → embed: open the engine's alert dialog (mobile app bell → single alert editor).
  if(d.fvx==="alertdialog" && IS_EMBED){ try{ openAlertDialog(d.existing?{existing:d.existing}:{}); }catch(err){} }
  // Host → embed: replace a symbol's alerts (mobile Alerts tab edits). Active symbol →
  // replace in-memory + persist + redraw + evaluate immediately. Other symbols → write
  // straight to that symbol's localStorage key so the engine picks them up on next load.
  // The _alertsFromHost guard stops saveAlerts() from echoing this straight back.
  if(d.fvx==="setalerts" && IS_EMBED && Array.isArray(d.alerts)){
    const sym = d.symbol || activeSymbol;
    if(sym===activeSymbol){
      try{
        _alertsFromHost=true;
        alerts.length=0;
        d.alerts.slice(0,100).forEach(a=>alerts.push(Object.assign(migrateAlert(a),{_last:null})));
        // Keep alertUid ahead of pushed ids so the next dialog-created alert is unique.
        alerts.forEach(a=>{ const m=/^a(\d+)$/.exec(a.id||""); if(m) alertUid=Math.max(alertUid, +m[1]+1); });
        saveAlerts(); redraw(); renderAlertsPanel();
      }catch(err){}
      finally{ _alertsFromHost=false; }
      // Instant eval: an already-true gt/lt fires now, not on the next tick.
      try{ checkAlerts(); }catch(err){}
    } else if(typeof sym==="string" && sym){
      try{ localStorage.setItem("fv_alerts_"+sym, JSON.stringify(d.alerts.slice(0,100).map(a=>migrateAlert(a)).map(a=>({
        id:a.id, source:a.source, op:a.op, target:a.target, value:a.value, interval:a.interval||null,
        trigger:a.trigger, expiry:a.expiry, message:a.message, notify:a.notify, sound:a.sound, webhook:a.webhook, active:a.active,
      })))); }catch(err){}
    }
  }
});

// ── Watchlist ──
const rowMap = {};
const PRICE_CACHE = {};          // {sym: {price, chgAbs, chgPct}} — updated by refreshPrices
let wlSort = null;               // {key:"sym"|"last"|"chg"|"chgpct", dir:1|-1} or null (manual order)
// Sort each group's symbols by the chosen column (TradingView sorts within sections).
// Non-destructive: GROUPS order is never mutated; buildWatchlist applies wlSort at
// render time via sortedSymbols(), so the saved layout is preserved.
function sortWatchlist(key){
  if(wlSort && wlSort.key===key){ wlSort = wlSort.dir===1 ? {key,dir:-1} : null; }  // asc→desc→off
  else wlSort={key, dir:1};
  buildWatchlist();
  document.querySelectorAll("#wlCols span").forEach(s=>s.classList.toggle("sorted", wlSort&&s.dataset.sort===wlSort.key));
}
// A group's symbols in display order (sorted copy if wlSort is active, else as-is).
function sortedSymbols(symbols){
  if(!wlSort) return symbols;
  const key=wlSort.key;
  const val=(sym)=>{
    if(key==="sym") return symLabel(sym).toLowerCase();
    const p=PRICE_CACHE[sym]||{};
    return key==="last"?(p.price??-Infinity) : key==="chg"?(p.chgAbs??-Infinity) : (p.chgPct??-Infinity);
  };
  return [...symbols].sort((a,b)=>{ const va=val(a),vb=val(b); return (va<vb?-1:va>vb?1:0)*wlSort.dir; });
}
function buildWatchlist(){
  const body = document.getElementById("wlBody");
  body.innerHTML = "";
  GROUPS.forEach(g=>{
    const s = document.createElement("div");
    s.className = "section" + (g.collapsed ? " collapsed" : "");
    s.dataset.group = g.name;
    s.innerHTML = `<span class="caret" title="${g.collapsed?'Expand':'Collapse'} section">${g.collapsed?'+':'−'}</span><span class="gname">${escHtml(g.name)}</span>`
      + `<span class="gdel" title="Remove section">${icTrashWl()}</span>`;
    s.onclick = (e)=>{ if(e.target.closest(".gdel")) return; if(_groupDragged){ _groupDragged=false; return; } toggleGroupCollapse(g.name); };
    s.querySelector(".gdel").onclick = (e)=>{ e.stopPropagation(); removeGroup(g.name); };
    s.oncontextmenu = (e)=>{ e.preventDefault(); e.stopPropagation(); showSectionMenu(g.name, e.clientX, e.clientY); };
    sectionDropWire(s, g.name);     // allow dropping a symbol onto the header (esp. when collapsed)
    s.draggable = true;
    groupDragWire(s, g.name);       // drag the header itself to reorder whole sections
    body.appendChild(s);
    if(g.collapsed) return;         // header only; rows hidden while collapsed
    sortedSymbols(g.symbols).forEach(sym=>{
      const row = document.createElement("div");
      row.className="row"+(sym===activeSymbol?" active":"");
      row.dataset.sym = sym;
      const isRatio = sym.includes("/");
      const base = legBase(sym).toUpperCase();
      // logo: real coin icon, or a letter circle for ratios / coins with no icon
      let icon;
      if(isRatio){
        icon = splitIconHtml(sym);
      } else if(NO_LOGO.has(base)){
        icon = `<span class="ic" style="background:#2962ff">${escHtml(base[0]||"")}</span>`;
      } else {
        // <img>; if it 404s, swap to a letter circle on error. Escape the derived base
        // (same discipline as the pair card) so a tampered/odd stored symbol can't
        // inject markup into the watchlist row or the inline onerror handler.
        const initial = escHtml(base[0]||"");
        icon = `<img class="ic" src="${logoForBase(base)}" alt="${escHtml(base)}"
          onerror="this.outerHTML='<span class=\\'ic\\' style=\\'background:#2962ff\\'>${initial}</span>'">`;
      }
      row.dataset.group = g.name;           // a symbol may live in >1 group; key edits by group+sym
      row.draggable = true;
      // Cleaner display: ratios verbatim; otherwise the venue ticker + a small
      // exchange tag (Binance/Bybit; Coinbase implied so left untagged).
      const exMeta = isRatio ? null : resolveLeg(sym).exchange;
      const nmLabel = symLabel(sym);
      const exBadge = (exMeta && exMeta.id!=="COINBASE")
        ? `<span class="exbadge">${exMeta.label}</span>` : "";
      const flagCol = SYMBOL_FLAGS[sym];
      const flag = `<span class="flag" title="Flag color">${flagCol?`<svg width="11" height="12" viewBox="0 0 11 12" fill="${flagCol}"><path d="M0 1h11L7.5 6 11 11H0z"/></svg>`:""}</span>`;
      const masked = isPriceHidden(sym);
      const cell = masked ? WL_MASK : "—";
      if(masked) row.classList.add("masked");
      if(flagCol) row.classList.add("flagged");
      row.innerHTML = `${flag}<span class="sym">${icon}<span class="nm">${escHtml(nmLabel)}</span>${exBadge}</span>
        <span class="last" data-last>${cell}</span><span class="chgabs" data-chgabs>${cell}</span><span class="chg" data-chg>${cell}</span>
        <span class="eye" title="Hide / show this asset's price">${icEyeWl(sym)}</span>
        <span class="del" title="Remove from watchlist">${icTrashWl()}</span>`;
      row.oncontextmenu = (e)=>{ e.preventDefault(); e.stopPropagation(); showRowMenu(sym, e.clientX, e.clientY); };
      row.onclick = ()=>{
        // Grid mode: route the symbol to the SELECTED panel instead of the hidden host chart.
        if(typeof gridTargetSym==="function" && gridTargetSym(sym)){
          document.querySelectorAll(".row").forEach(r=>r.classList.remove("active"));
          document.querySelectorAll(`.row[data-sym="${cssEsc(sym)}"]`).forEach(r=>r.classList.add("active"));
          return;
        }
        activeSymbol = sym;
        document.querySelectorAll(".row").forEach(r=>r.classList.remove("active"));
        document.querySelectorAll(`.row[data-sym="${cssEsc(sym)}"]`).forEach(r=>r.classList.add("active"));
        if(typeof loadPersisted==="function") loadPersisted();   // drawings are per symbol+tf
        if(typeof loadAlerts==="function") loadAlerts();         // alerts are per symbol
        if(typeof loadScripts==="function") loadScripts();       // custom scripts are per symbol
        if(typeof loadIndicators==="function") loadIndicators(); // indicators are per symbol
        loadChart(sym, activeTF);
      };
      row.querySelector(".del").onclick = (e)=>{ e.stopPropagation(); removeSymbol(g.name, sym); };
      row.querySelector(".eye").onclick = (e)=>{ e.stopPropagation(); toggleWlPrice(sym); };
      wlDragWire(row);
      body.appendChild(row);
      (rowMap[sym] = rowMap[sym]||[]).push(row);
    });
  });
}

// CSS.escape isn't on very old browsers; this is enough for our symbol set ("/", "-").
function cssEsc(s){ return (window.CSS && CSS.escape) ? CSS.escape(s) : s.replace(/["\\]/g,"\\$&"); }

// Small trash glyph for the per-row remove button.

// ── Per-symbol price masking (the eye toggle) ──

const WL_MASK = "•".repeat(6);

try{ const raw=localStorage.getItem("fv_wl_hidden"); if(raw) WL_HIDDEN=new Set(JSON.parse(raw)||[]); }catch(e){}

function saveWlHidden(){ try{ localStorage.setItem("fv_wl_hidden", JSON.stringify([...WL_HIDDEN])); }catch(e){} }
// Eye glyph for the per-row "hide/show this asset's price" toggle; slashed when hidden.
