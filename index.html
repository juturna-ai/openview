// Open the dialog. existing = an alert object to edit; price = pre-fill value for
// a brand-new alert created by right-clicking the chart.
function openAlertDialog(opts={}){
  const editing = opts.existing || null;
  const cur = lastData.length ? lastData[lastData.length-1].close : 0;
  // working copy (committed to `alerts` only on Create/Save)
  const a = editing ? {...editing, notify:{...editing.notify}} : {
    id:"a"+(alertUid++), source:"price", op:"crossing", target:"value",
    value: opts.price!=null ? opts.price : cur,
    trigger:"once", expiry:defaultExpiry(), message:"", notify:{...ALERT_DEFAULT_NOTIFY}, active:true, _last:null,
  };
  const srcOpts = ALERT_SOURCES.map(s=>`<option value="${s.key}" ${s.key===a.source?"selected":""}>${s.label}</option>`).join("");
  const opOpts = [["crossing","Crossing"],["crossUp","Crossing Up"],["crossDown","Crossing Down"],["gt","Greater Than"],["lt","Less Than"]]
    .map(([v,l])=>`<option value="${v}" ${v===a.op?"selected":""}>${l}</option>`).join("");
  // target = "Value" + every series (so price-vs-MA, MA-vs-MA, etc. all work)
  const tgtOpts = `<option value="value" ${a.target==="value"?"selected":""}>Value</option>`+
    ALERT_SOURCES.map(s=>`<option value="${s.key}" ${s.key===a.target?"selected":""}>${s.label}</option>`).join("");
  const expVal = a.expiry ? toLocalInput(a.expiry) : "";

  alertDlg.innerHTML=`
    <div class="dh"><span class="sym">Create alert on <span style="color:var(--accent)">${activeSymbol}</span></span><span class="cl" id="adClose">×</span></div>
    <div class="db">
      <div class="arow"><div class="alabel">Condition</div><div class="actl">
        <select id="ad_source">${srcOpts}</select>
        <select id="ad_op">${opOpts}</select>
        <div class="twocol">
          <select id="ad_target">${tgtOpts}</select>
          <input type="number" id="ad_value" step="any" value="${a.value??""}" placeholder="Value">
        </div>
      </div></div>
      <div class="asep"></div>
      <div class="arow"><div class="alabel">Trigger</div><div class="actl">
        <select id="ad_trigger">
          <option value="once" ${a.trigger==="once"?"selected":""}>Once only</option>
          <option value="every" ${a.trigger==="every"?"selected":""}>Every time</option>
        </select>
      </div></div>
      <div class="arow"><div class="alabel">Expiration</div><div class="actl">
        <input type="datetime-local" id="ad_expiry" value="${expVal}">
        <div class="hint">Leave blank for no expiration.</div>
      </div></div>
      <div class="arow"><div class="alabel">Message</div><div class="actl">
        <input type="text" id="ad_message" value="${(a.message||"").replace(/"/g,'&quot;')}" placeholder="${defaultAlertMessage(a).replace(/"/g,'&quot;')}">
      </div></div>
      <div class="arow"><div class="alabel">Notifications</div><div class="actl">
        <div class="notif">
          <label><input type="checkbox" id="ad_n_popup" ${a.notify.popup?"checked":""}> App popup</label>
          <label><input type="checkbox" id="ad_n_sound" ${a.notify.sound?"checked":""}> Sound</label>
          <label><input type="checkbox" id="ad_n_browser" ${a.notify.browser?"checked":""}> Browser</label>
          <label title="Requires a backend — not available on a local file"><input type="checkbox" id="ad_n_email" ${a.notify.email?"checked":""}> Email</label>
        </div>
        <div class="hint" id="ad_email_hint" style="display:${a.notify.email?"block":"none"}">Email needs a server; it won't send from a local file.</div>
      </div></div>
    </div>
    <div class="df">
      <button class="btn ghost" id="adCancel">Cancel</button>
      <button class="btn primary" id="adOk">${editing?"Save":"Create"}</button>
    </div>`;
  alertDlg.classList.add("open"); backdrop.classList.add("open");

  const $=id=>alertDlg.querySelector("#"+id);
  // Value input only applies when target = "Value"; disable it otherwise.
  const syncTargetUI=()=>{ const isVal=$("ad_target").value==="value"; $("ad_value").style.display=isVal?"":"none"; };
  syncTargetUI();
  $("ad_target").onchange=syncTargetUI;
  $("ad_n_email").onchange=e=>{ $("ad_email_hint").style.display=e.target.checked?"block":"none"; };

  $("adClose").onclick=closeAlertDlg;
  $("adCancel").onclick=closeAlertDlg;
  $("adOk").onclick=()=>{
    a.source=$("ad_source").value;
    a.op=$("ad_op").value;
    a.target=$("ad_target").value;
    a.value=a.target==="value" ? parseFloat($("ad_value").value) : null;
    if(a.target==="value" && isNaN(a.value)){ $("ad_value").focus(); return; }
    a.trigger=$("ad_trigger").value;
    const ev=$("ad_expiry").value; a.expiry=ev ? new Date(ev).getTime() : null;
    a.message=$("ad_message").value.trim();
    a.notify={ popup:$("ad_n_popup").checked, sound:$("ad_n_sound").checked, browser:$("ad_n_browser").checked, email:$("ad_n_email").checked };
    a.active=true; a._last=null;
    if(editing){ Object.assign(editing, a); }
    else { alerts.push(a); }
    if(a.notify.browser) requestNotifPermission();
    saveAlerts(); redraw(); renderAlertsPanel(); closeAlertDlg();
  };
}
// Default expiration = 30 days out, like TradingView's default.
function defaultExpiry(){ return Date.now() + 30*24*3600*1000; }
function toLocalInput(ms){ const d=new Date(ms - new Date(ms).getTimezoneOffset()*60000); return d.toISOString().slice(0,16); }

function persistKey(){ return "fv_draw_"+activeSymbol+"_"+activeTF; }

function loadPersisted(){

  catch{ draw.shapes=[]; }

// ─────────────────────────────────────────────────────────────────────
//  RENDERING
// ─────────────────────────────────────────────────────────────────────
const FIB_LEVELS=[0,0.236,0.382,0.5,0.618,0.786,1];
const FIB_EXT=[0,0.618,1,1.618,2.618];
const FIB_COLORS=["#787b86","#ef5350","#ff9800","#4caf50","#26a69a","#26c6da","#2962ff","#9c6ade"];

function redraw(){
  const W=dcanvas.clientWidth, H=dcanvas.clientHeight;
  dctx.clearRect(0,0,W,H);
  drawAlertLines();
  if(!draw.hidden){
    for(const s of draw.shapes) drawShape(s, s.id===draw.sel, s.id===draw.hover);
  }
  if(draw.pending) drawShape(draw.pending, true, false);
}

function strokeLine(x1,y1,x2,y2,st){
  dctx.save();
  dctx.strokeStyle=st.color; dctx.lineWidth=st.width||1.5;
  dctx.setLineDash(st.dash?(st.dash===2?[2,3]:[7,5]):[]);
  dctx.beginPath(); dctx.moveTo(x1,y1); dctx.lineTo(x2,y2); dctx.stroke();
  dctx.restore();
}
function handle(x,y){ dctx.save(); dctx.fillStyle="#fff"; dctx.strokeStyle="#2962ff"; dctx.lineWidth=1.5;
  dctx.beginPath(); dctx.arc(x,y,4.5,0,7); dctx.fill(); dctx.stroke(); dctx.restore(); }

function drawShape(s, selected, hovered){
  const st=s.style||DEFAULT_STYLE;
  const W=dcanvas.clientWidth, H=dcanvas.clientHeight;
  const P=s.pts.map(px);
  if(P[0].x==null) return;
  const a=P[0], b=P[1];

  switch(s.type){
    case "trend": if(b)strokeLine(a.x,a.y,b.x,b.y,st); break;
    case "ray": if(b){ const[ex,ey]=extend(a.x,a.y,b.x,b.y,W,H); strokeLine(a.x,a.y,ex,ey,st);} break;
    case "ext": if(b){ const[sx,sy]=extend(b.x,b.y,a.x,a.y,W,H),[ex,ey]=extend(a.x,a.y,b.x,b.y,W,H); strokeLine(sx,sy,ex,ey,st);} break;
    case "hline": strokeLine(0,a.y,W,a.y,st); if(st.showLabel) priceTag(s.pts[0].price,a.y,st.color,W); break;
    case "hray":  strokeLine(a.x,a.y,W,a.y,st); arrowHead(W-axisW(),a.y,1,st.color); if(st.showLabel) priceTag(s.pts[0].price,a.y,st.color,W); break;
    case "vline": strokeLine(a.x,0,a.x,H,st); break;
    case "rect": if(b)drawRect(a,b,st); break;
    case "ellipse": if(b)drawEllipse(a,b,st); break;
    case "channel": drawChannel(s,P,st,W,H); break;
    case "fib": if(b)drawFib(s,P,FIB_LEVELS,W); break;
    case "fibext": if(b)drawFib(s,P,FIB_EXT,W); break;
    case "fibfan": if(b)drawFibFan(P,W,H); break;
    case "fibtime": if(b)drawFibTime(P,H); break;
    case "long": case "short": if(b)drawPosition(s,P,st); break;
    case "measure": if(b)drawMeasure(s,P); break;
    case "text": case "callout": drawText(s,a); break;
  }
  if(selected || hovered){
    for(const q of P) if(q.x!=null && (selected)) handle(q.x,q.y);
    if(hovered && !selected && a.x!=null){ /* subtle hover dot */ dctx.save(); dctx.fillStyle="#2962ff"; dctx.beginPath(); dctx.arc(a.x,a.y,3,0,7); dctx.fill(); dctx.restore(); }
  }
}

function extend(x1,y1,x2,y2,W,H){
  const dx=x2-x1,dy=y2-y1; if(dx===0&&dy===0) return [x2,y2];
  const ts=[];
  if(dx>0)ts.push((W-x1)/dx); else if(dx<0)ts.push((0-x1)/dx);
  if(dy>0)ts.push((H-y1)/dy); else if(dy<0)ts.push((0-y1)/dy);
  const t=Math.min(...ts.filter(v=>v>0));
  return [x1+dx*t, y1+dy*t];
}
function drawRect(a,b,st){
  dctx.save(); dctx.fillStyle=st.fill||"rgba(41,98,255,0.10)"; dctx.strokeStyle=st.color; dctx.lineWidth=st.width;
  dctx.setLineDash(st.dash?(st.dash===2?[2,3]:[7,5]):[]);
  dctx.fillRect(a.x,a.y,b.x-a.x,b.y-a.y); dctx.strokeRect(a.x,a.y,b.x-a.x,b.y-a.y); dctx.restore();
}
function drawEllipse(a,b,st){
  dctx.save(); dctx.strokeStyle=st.color; dctx.lineWidth=st.width; dctx.fillStyle=st.fill||"rgba(41,98,255,0.08)";
  dctx.beginPath(); dctx.ellipse((a.x+b.x)/2,(a.y+b.y)/2,Math.abs(b.x-a.x)/2,Math.abs(b.y-a.y)/2,0,0,7);
  dctx.fill(); dctx.stroke(); dctx.restore();
}
function drawFib(s,P,levels,W){
  const a=P[0], b=P[1];
  const x1=Math.min(a.x,b.x);
  levels.forEach((lv,i)=>{
    const y=a.y+(b.y-a.y)*lv, col=FIB_COLORS[i%FIB_COLORS.length];
    strokeLine(x1,y,W,y,{color:col,width:1.1,dash:0});
    const price=yToPrice(y);
    dctx.save(); dctx.fillStyle=col; dctx.font="10px sans-serif";
    dctx.fillText(`${lv}  ${price!=null?fmt(price):""}`, x1+4, y-3); dctx.restore();
  });
  strokeLine(a.x,a.y,b.x,b.y,{color:"#787b86",width:1,dash:6});
}
function drawFibFan(P,W,H){
  const a=P[0], b=P[1];
  [0,0.382,0.5,0.618,1].forEach((lv,i)=>{
    const ty=a.y+(b.y-a.y)*lv, [ex,ey]=extend(a.x,a.y,b.x,ty,W,H);
    strokeLine(a.x,a.y,ex,ey,{color:FIB_COLORS[i%FIB_COLORS.length],width:1.1,dash:0});
  });
  strokeLine(a.x,a.y,b.x,b.y,{color:"#787b86",width:1,dash:6});
}
function drawFibTime(P,H){
  const a=P[0], b=P[1], step=b.x-a.x;
  [0,1,2,3,5,8,13,21].forEach((n,i)=>{ const x=a.x+step*n; strokeLine(x,0,x,H,{color:FIB_COLORS[i%FIB_COLORS.length],width:1,dash:2}); });
}
function drawChannel(s,P,st,W,H){
  const a=P[0], b=P[1];
  strokeLine(a.x,a.y,b.x,b.y,st);
  if(P[2]){
    const off=P[2].y - lineY(a,b,P[2].x);          // vertical offset of 3rd point from main line
    strokeLine(a.x,a.y+off,b.x,b.y+off,st);
    dctx.save(); dctx.fillStyle=withOpacity(st.color,0.07);
    dctx.beginPath(); dctx.moveTo(a.x,a.y); dctx.lineTo(b.x,b.y); dctx.lineTo(b.x,b.y+off); dctx.lineTo(a.x,a.y+off); dctx.closePath(); dctx.fill(); dctx.restore();
  }
}
function lineY(a,b,x){ if(b.x===a.x) return a.y; return a.y+(b.y-a.y)*(x-a.x)/(b.x-a.x); }
function drawPosition(s,P,st){
  const a=P[0], b=P[1];
  const entry=s.pts[0].price, tgt=s.pts[1].price;
  const isLong=s.type==="long";
  const stop=entry-(tgt-entry)*0.5;
  const sy=priceToY(stop);
  const x1=Math.min(a.x,b.x), x2=Math.max(a.x,b.x);
  dctx.save();
  dctx.fillStyle=isLong?"rgba(38,166,154,0.15)":"rgba(239,83,80,0.15)";
  dctx.fillRect(x1,Math.min(a.y,b.y),x2-x1,Math.abs(b.y-a.y));
  dctx.fillStyle=isLong?"rgba(239,83,80,0.15)":"rgba(38,166,154,0.15)";
  dctx.fillRect(x1,Math.min(a.y,sy),x2-x1,Math.abs(sy-a.y));
  dctx.restore();
  strokeLine(x1,a.y,x2,a.y,{color:"#2962ff",width:1.3,dash:0});
  strokeLine(x1,b.y,x2,b.y,{color:"#26a69a",width:1.1,dash:0});
  strokeLine(x1,sy,x2,sy,{color:"#ef5350",width:1.1,dash:0});
  const rr=(entry-stop)!==0 ? Math.abs((tgt-entry)/(entry-stop)) : 0;
  dctx.save(); dctx.fillStyle="#d1d4dc"; dctx.font="10px sans-serif";
  dctx.fillText(`Entry ${fmt(entry)}`,x1+4,a.y-3);
  dctx.fillText(`Target ${fmt(tgt)}  (RR ${rr.toFixed(1)})`,x1+4,b.y-3);
  dctx.fillText(`Stop ${fmt(stop)}`,x1+4,sy-3); dctx.restore();
}
function drawMeasure(s,P){
  const a=P[0], b=P[1];
  const up=s.pts[1].price>=s.pts[0].price;
  dctx.save();
  dctx.fillStyle=up?"rgba(38,166,154,0.15)":"rgba(239,83,80,0.15)";
  dctx.fillRect(a.x,a.y,b.x-a.x,b.y-a.y);
  dctx.strokeStyle=up?"#26a69a":"#ef5350"; dctx.lineWidth=1.2; dctx.strokeRect(a.x,a.y,b.x-a.x,b.y-a.y);

function emaCalc(data,len){ const out=[]; const k=2/(len+1); let prev=null;

  for(let i=0;i<arr.length;i++){ prev=prev==null?arr[i]:arr[i]*k+prev*(1-k); if(i>=len-1)out[i]=prev; } return out; }

function srcArr(data,s){
  switch(s){
    case "open":  return data.map(d=>d.open);
    case "high":  return data.map(d=>d.high);
    case "low":   return data.map(d=>d.low);
    case "hl2":   return data.map(d=>(d.high+d.low)/2);
    case "hlc3":  return data.map(d=>(d.high+d.low+d.close)/3);

const SRC_OPTS=["close","open","high","low","hl2","hlc3","ohlc4"];

function addIndicator(type){
  const cat=IND_CATALOG.find(c=>c.type===type); if(!cat) return;
  const ind={ id:"i"+(indUid++), type, name:cat.name, pane:cat.pane, params:Object.assign({},cat.params), series:[], subChart:null };

}
function removeIndicator(id){
  const idx=indicators.findIndex(i=>i.id===id); if(idx<0) return; const ind=indicators[idx];
  if(ind.syncMain){ try{ chart.timeScale().unsubscribeVisibleLogicalRangeChange(ind.syncMain); }catch(e){} }
  ind.series.forEach(s=>{ try{ (ind.subChart||chart).removeSeries(s); }catch(e){} });
  if(ind.subChart){ try{ ind.subChart.remove(); }catch(e){} if(ind.paneEl) ind.paneEl.remove(); }

// PLOT DESCRIPTORS: for each type, how many series and of what kind/color.
// kind: "line" | "hist" | "area-top"/"area-bot" (cloud halves). Lets build &
// render stay data-driven for the whole expanded catalog.
function plotSpec(ind){
  const p=ind.params, c=p.color;
  const L=(color,w=1.5)=>({k:"line",color,w});
  switch(ind.type){
    // single-line overlays / oscillators
    case "sma": case "ema": case "wma": case "vwma": case "hma": case "dema":
    case "tema": case "alma": case "smma": case "lsma":
      return [L(c||"#ffeb3b",2)];
    case "rsi": return [L(c||"#9c6ade")];
    case "cci": case "willr": case "mom": case "roc": case "cmo": case "dpo":
    case "atr": case "stdev": case "chop": case "bbw": case "obv": case "mfi":
    case "adl": case "cmf": case "chaikin": case "pvt": case "fi": case "bop":
    case "coppock": case "vwap": case "supertrend": case "psar": case "fisher": case "uo":
      return [L(c||"#42a5f5",2)];
    // bands (up/mid/lo)
    case "bb": case "kc": case "donchian": case "envel":
      return [L(c||"#26c6da",1),L(c||"#26c6da",1),L(c||"#26c6da",1)];
    // multi-line / hist combos
    case "macd": return [{k:"hist",color:"#26a69a"},L("#2962ff"),L("#ff9800")];
    case "ppo":  return [{k:"hist",color:"#26a69a"},L("#2962ff"),L("#ff9800")];
    case "stoch": case "stochrsi": return [L("#2962ff"),L("#ff9800")];
    case "adx": return [L("#2962ff"),L("#ef5350"),L("#ffb300",2)]; // +DI,-DI,ADX
    case "aroon": return [L("#26a69a"),L("#ef5350")];
    case "vortex": return [L("#26a69a"),L("#ef5350")];
    case "ao": case "ac": return [{k:"hist",color:"#26a69a"}];
    case "trix": return [L("#26c6da"),L("#ff9800")];
    case "volume": return [{k:"hist",color:"#26a69a"}];
    case "ichimoku": return [L("#2962ff"),L("#ef5350"),L("#26a69a",1),L("#ff7043",1),L("#9c6ade",1)]; // conv,base,spanA,spanB,lag
    case "alligator": return [L("#2196f3"),L("#e53935"),L("#43a047")]; // jaw,teeth,lips
    case "fractals": return []; // markers, not series
    case "pivots": return [L("#787b86",1),L("#26a69a",1),L("#ef5350",1),L("#26a69a",1),L("#ef5350",1)];

// AO/AC histogram colors are by rising/falling vs previous bar, not sign.
function aoMomColor(arr){ return arr.map((p,i)=>({time:p.time, value:p.value})); }
// Stochastic RSI: %K/%D of stochastic applied to RSI values.
function stochRsiCalc(data,rsiLen,stochLen,kSmooth,dSmooth){
  const rsi=rsiCalc(data,rsiLen,"close"); const map={}; rsi.forEach(p=>map[p.time]=p.value);
  const r=data.map(d=>map[d.time]); const raw=new Array(data.length).fill(null);
  for(let i=0;i<data.length;i++){ if(r[i]==null)continue; let hi=-Infinity,lo=Infinity,ok=true; for(let j=0;j<stochLen;j++){ const v=r[i-j]; if(v==null){ok=false;break;} hi=Math.max(hi,v); lo=Math.min(lo,v);} if(ok&&hi!==lo) raw[i]=(r[i]-lo)/(hi-lo)*100; else if(ok) raw[i]=0; }
  const kA=smaA(raw.map(v=>v==null?0:v),kSmooth).map((v,i)=>raw[i]==null?null:v);
  const dA=smaA(kA.map(v=>v==null?0:v),dSmooth).map((v,i)=>kA[i]==null?null:v);
  return { k:pair(data,kA), d:pair(data,dA) }; }

const alerts=[];
let alertUid=1;
function alertsKey(){ return "fv_alerts_"+activeSymbol; }

// Persisted alert fields (TradingView-style). Backward compatible: old alerts
// only had {price,dir} — migrateAlert() upgrades them on load.
//   source : "price" | "ma7" | "ma25" | ... | "rsi"   (the LHS series)
//   op     : "crossing" | "crossUp" | "crossDown" | "gt" | "lt"
//   target : "value" | "ma7" | ... | "rsi"             (RHS: a number or a series)
//   value  : number (used when target === "value")
//   trigger: "once" | "every"
//   expiry : epoch ms (or null = never)
//   message: string
//   notify : { popup, sound, browser, email }
const ALERT_DEFAULT_NOTIFY = { popup:true, sound:true, browser:false, email:false };
function migrateAlert(a){
  if(a.source) return a;                       // already new-format
  // legacy {price,dir,active}
  return {
    id:a.id||("a"+(alertUid++)), source:"price", op:"crossing",
    target:"value", value:a.price,
    trigger:"once", expiry:null,
    message:"", notify:{...ALERT_DEFAULT_NOTIFY},
    active:a.active!==false, _last:null,
  };
}
function saveAlerts(){
  try{ localStorage.setItem(alertsKey(), JSON.stringify(alerts.map(a=>({
    id:a.id, source:a.source, op:a.op, target:a.target, value:a.value,
    trigger:a.trigger, expiry:a.expiry, message:a.message, notify:a.notify, active:a.active,
  })))); }catch(e){}
}
function loadAlerts(){ alerts.length=0;
  try{ const raw=localStorage.getItem(alertsKey()); if(raw) JSON.parse(raw).forEach(a=>alerts.push(Object.assign(migrateAlert(a),{_last:null}))); }catch(e){}
  redraw(); renderAlertsPanel();
}

// Series sources available as alert operands, computed from lastData.
const ALERT_SOURCES = [
  { key:"price", label:"Price" },
  ...MAS.map(m=>({ key:"ma"+m.p, label:"MA "+m.p })),
  { key:"rsi", label:"RSI 14" },
];
function sourceLabel(k){ const s=ALERT_SOURCES.find(s=>s.key===k); return s?s.label:k; }
// Latest value of a source (null if not enough data).
function sourceValue(key){
  if(!lastData.length) return null;
  if(key==="price") return lastData[lastData.length-1].close;
  if(key==="rsi"){ const r=rsiSeries(lastData,14); return r.length?r[r.length-1].value:null; }
  const m=MAS.find(m=>("ma"+m.p)===key);
  if(m){ const sd=smaSeries(lastData,m.p); return sd.length?sd[sd.length-1].value:null; }
  return null;
}
// The RHS scalar an alert compares against right now.
function alertTargetValue(a){ return a.target==="value" ? a.value : sourceValue(a.target); }
function opLabel(op){ return ({crossing:"Crossing", crossUp:"Crossing Up", crossDown:"Crossing Down", gt:"Greater Than", lt:"Less Than"})[op]||op; }

function defaultAlertMessage(a){
  const lhs=sourceLabel(a.source);

// Pixel hitboxes for the alert lines + their delete icons, rebuilt every draw.
// Used by mouse handlers so the user can hover a line and click the 🗑 to delete it.
let alertHitboxes=[];
function drawAlertLines(){
  alertHitboxes=[];
  alerts.forEach(a=>{
    // Only price-vs-value alerts map to a fixed horizontal line.
    if(a.source!=="price" || a.target!=="value") return;
    const y=priceToY(a.value); if(y==null) return; const W=dcanvas.clientWidth;
    const col=a.active?"#f7525f":"#555";
    dctx.save(); dctx.strokeStyle=col; dctx.setLineDash([6,4]); dctx.lineWidth=1;
    dctx.beginPath(); dctx.moveTo(0,y); dctx.lineTo(W,y); dctx.stroke(); dctx.setLineDash([]);
    // right-edge price tag (over the axis)
    const txt="🔔 "+fmt(a.value); dctx.font="10px sans-serif"; const w=dctx.measureText(txt).width+10;
    dctx.fillStyle=col; dctx.fillRect(W-w-2,y-8,w,16); dctx.fillStyle="#fff"; dctx.fillText(txt,W-w+2,y+3);

    let trash=null;
    if(draw.alertHover===a.id){
      // TradingView-style hover pill on the line with a clickable trash icon.
      const label=fmt(a.value); dctx.font="11px sans-serif";
      const lw=dctx.measureText(label).width;
      const padL=10, gap=8, iconW=16, boxH=20;
      const boxW=padL+lw+gap+iconW+padL;
      const bx=70, by=y-boxH/2;
      dctx.fillStyle="#1e222d"; dctx.strokeStyle=col; dctx.lineWidth=1;
      if(dctx.roundRect){ dctx.beginPath(); dctx.roundRect(bx,by,boxW,boxH,4); dctx.fill(); dctx.stroke(); }
      else { dctx.fillRect(bx,by,boxW,boxH); dctx.strokeRect(bx,by,boxW,boxH); }
      dctx.fillStyle="#d1d4dc"; dctx.textBaseline="middle"; dctx.fillText(label,bx+padL,y+0.5);
      dctx.textBaseline="alphabetic";
      // crisp vector trash icon inside a circular hit area
      const tcx=bx+padL+lw+gap+iconW/2;
      const onIcon = draw.mouse && Math.hypot(draw.mouse.x-tcx, draw.mouse.y-y)<=11;
      drawTrashIcon(tcx, y, onIcon?"#ff6b6b":"#ef5350", onIcon);
      trash={ x:tcx, y:y, r:11 };
    }
    dctx.restore();
    alertHitboxes.push({ id:a.id, y, trash });
  });
}
// A small vector trash-can glyph centered at (cx,cy). Drawn instead of the 🗑
// emoji so it renders crisply and identically across platforms.
function drawTrashIcon(cx, cy, color, highlight){
  dctx.save();
  if(highlight){ dctx.fillStyle="rgba(239,83,80,0.18)"; dctx.beginPath(); dctx.arc(cx,cy,10,0,7); dctx.fill(); }
  dctx.strokeStyle=color; dctx.fillStyle=color; dctx.lineWidth=1.4;
  dctx.lineCap="round"; dctx.lineJoin="round";
  const w=8, h=9, top=cy-4;
  // lid
  dctx.beginPath(); dctx.moveTo(cx-w/2-1, top); dctx.lineTo(cx+w/2+1, top); dctx.stroke();
  // handle
  dctx.beginPath(); dctx.moveTo(cx-2, top); dctx.lineTo(cx-2, top-2); dctx.lineTo(cx+2, top-2); dctx.lineTo(cx+2, top); dctx.stroke();
  // can body
  dctx.beginPath();
  dctx.moveTo(cx-w/2+1, top+1.5); dctx.lineTo(cx-w/2+2, top+h);
  dctx.lineTo(cx+w/2-2, top+h);   dctx.lineTo(cx+w/2-1, top+1.5);
  dctx.stroke();
  // ribs
  dctx.lineWidth=1;
  for(const dx of [-2,0,2]){ dctx.beginPath(); dctx.moveTo(cx+dx, top+3); dctx.lineTo(cx+dx, top+h-1.5); dctx.stroke(); }
  dctx.restore();
}
// Is point p on an alert line? Returns the alert id or null.
function alertHit(p){
  for(const h of alertHitboxes){ if(Math.abs(p.y-h.y)<6) return h.id; }
  return null;
}
// Is point p on a (currently shown) alert delete icon? Returns id or null.
function alertTrashHit(p){
  for(const h of alertHitboxes){ if(h.trash && Math.hypot(p.x-h.trash.x,p.y-h.trash.y)<=h.trash.r) return h.id; }
  return null;
}

// Evaluate one alert against the latest tick. Uses the previous LHS-vs-RHS
// difference (a._last) to detect crossings; level ops (gt/lt) fire on state.
function alertTriggered(a, lhs, rhs){
  if(lhs==null || rhs==null) return false;
  const diff = lhs - rhs;                       // sign tells us which side we're on
  const prevDiff = a._last;                     // null on first eval → no cross yet
  switch(a.op){
    case "gt": return lhs > rhs;
    case "lt": return lhs < rhs;
    case "crossUp":   return prevDiff!=null && prevDiff < 0 && diff >= 0;
    case "crossDown": return prevDiff!=null && prevDiff > 0 && diff <= 0;
    case "crossing":  return prevDiff!=null && ((prevDiff < 0 && diff >= 0) || (prevDiff > 0 && diff <= 0));
    default: return false;
  }
}
function checkAlerts(){
  if(!lastData.length) return;
  const now = Date.now();
  alerts.forEach(a=>{
    if(!a.active) return;
    if(a.expiry && now > a.expiry){ a.active=false; saveAlerts(); renderAlertsPanel(); redraw(); return; }
    const lhs = sourceValue(a.source), rhs = alertTargetValue(a);
    if(alertTriggered(a, lhs, rhs)){
      fireAlert(a, lhs, rhs);
      if(a.trigger==="once"){ a.active=false; }
      saveAlerts(); renderAlertsPanel(); redraw();
    }
    if(lhs!=null && rhs!=null) a._last = lhs - rhs;   // remember side for next cross test
  });
}
function fireAlert(a, lhs, rhs){
  const base = a.message && a.message.trim() ? a.message : defaultAlertMessage(a);
  const msg = `${base} — now ${fmt(lhs)}`;
  const n = a.notify || ALERT_DEFAULT_NOTIFY;
  if(n.browser && window.Notification && Notification.permission==="granted"){ try{ new Notification("Freeview Alert",{body:msg}); }catch(e){} }
  if(n.popup){
    const t=document.createElement("div"); t.textContent="🔔 "+msg;
    t.style.cssText="position:fixed;top:60px;right:320px;z-index:500;background:#f7525f;color:#fff;padding:10px 16px;border-radius:6px;box-shadow:0 4px 16px #0008;font-size:13px;max-width:320px;";
    document.body.appendChild(t); setTimeout(()=>t.remove(),6000);
  }
  if(n.sound){ try{ beep(); }catch(e){} }
  // Email/external needs a backend; a local file:// page can't send it. The UI
  // toggle is kept for parity but does nothing here.
}
function beep(){ const ac=new (window.AudioContext||window.webkitAudioContext)(); const o=ac.createOscillator(),g=ac.createGain(); o.connect(g); g.connect(ac.destination); o.frequency.value=880; g.gain.value=0.08; o.start(); setTimeout(()=>{o.stop();ac.close();},220); }
function requestNotifPermission(){ if(window.Notification && Notification.permission==="default") Notification.requestPermission(); }
function toggleAlertsPanel(force){
  const m=document.getElementById("alertsPanel");
  const open=force!==undefined?force:!m.classList.contains("open");
  if(open){ renderAlertsPanel(); m.classList.add("open"); } else m.classList.remove("open");
}
function renderAlertsPanel(){
  const m=document.getElementById("alertsPanel");
  m.innerHTML='<div class="ph">Alerts <span class="cl" id="alClose">×</span></div>'+
    '<div style="padding:10px 14px;border-bottom:1px solid var(--border);"><button class="btn primary" id="alCreate" style="width:100%;padding:8px 12px;">＋ Create alert</button></div>'+
    '<div class="pb" id="alList"></div>';
  const list=m.querySelector("#alList");
  if(!alerts.length) list.innerHTML='<div class="pi" style="color:var(--muted)">No alerts. Click “Create alert” or right-click the chart.</div>';
  alerts.forEach(a=>{ const it=document.createElement("div"); it.className="pi"; it.style.cursor="pointer";
    const desc=defaultAlertMessage(a);
    it.innerHTML='<span>'+desc+' <span class="meta">('+(a.trigger==="every"?"every":"once")+(a.active?"":" · triggered")+')</span></span><span class="x" style="cursor:pointer;color:var(--muted)">×</span>';
    it.onclick=e=>{ if(e.target.classList.contains("x")) return; openAlertDialog({existing:a}); };
    it.querySelector(".x").onclick=e=>{ e.stopPropagation(); removeAlert(a.id); };
    list.appendChild(it);
  });
  m.querySelector("#alClose").onclick=()=>toggleAlertsPanel(false);
  m.querySelector("#alCreate").onclick=()=>openAlertDialog({});
}

document.getElementById("btnIndicators").onclick=()=>toggleIndicatorsMenu();
document.getElementById("btnAlert").onclick=()=>openAlertDialog({});                  // bell → create alert (TradingView)
document.getElementById("btnAlert").addEventListener("contextmenu", e=>{ e.preventDefault(); toggleAlertsPanel(); });  // right-click → manage list
function closeAllPopups(){ hideCtx(); toggleIndicatorsMenu(false); toggleAlertsPanel(false); closeDlg(); closeAlertDlg(); }

// ── Watchlist: add-section affordances ──
document.getElementById("wlAdd").onclick = ()=>addGroup(null);
// right-click empty space in the list (not on a section/row) → Add section
document.getElementById("wlBody").addEventListener("contextmenu", e=>{
  if(e.target.closest(".section") || e.target.closest(".row")) return;  // those have their own menus
  e.preventDefault();
  showCtx(e.clientX, e.clientY, [ mi("＋ Add section", ()=>addGroup(null)) ]);
});

// ── Boot ──
buildWatchlist();
installHoverTracker();     // lets crosshair mode select/edit shapes while still panning
loadPersisted();           // restore saved drawings for current symbol+tf
loadAlerts();              // restore saved alerts for current symbol
loadChart(activeSymbol, activeTF);
resize();
sizeCanvas();
// Hold the watchlist price sweep until the chart has had a head start on the
// connection pool — otherwise ~40 /stats calls queue ahead of the chart fetch
// and the chart sits blank for ~30s waiting for a free connection.
setTimeout(refreshPrices, 1200);
window.addEventListener("resize", ()=>{ resize(); sizeCanvas(); });
setInterval(refreshPrices, 6000);
setInterval(()=>loadChart(activeSymbol, activeTF, true), 20000);  // keepView: don't snap the chart
</script>
