<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Chart — Live Crypto (Coinbase)</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root{
    --bg:#131722; --panel:#1e222d; --panel2:#181c27; --border:#2a2e39;
    --text:#d1d4dc; --muted:#787b86; --green:#26a69a; --red:#ef5350;
    --accent:#2962ff; --hover:#2a2e39;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%; font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); overflow:hidden;}
  #app{display:flex; height:100vh; width:100vw;}

  /* ── Left drawing toolbar ── */
  #toolbar{width:44px; flex-shrink:0; background:var(--bg); border-right:1px solid var(--border);
    display:flex; flex-direction:column; align-items:center; padding-top:4px; gap:1px; overflow-y:auto; z-index:30;}
  #toolbar::-webkit-scrollbar{width:0;}
  .tool{width:38px; height:34px; display:flex; align-items:center; justify-content:center;
    border-radius:5px; cursor:pointer; color:#b2b5be; position:relative;}
  .tool:hover{background:var(--hover); color:#fff;}
  .tool.active{background:#2962ff22; color:#2962ff;}
  .tool.active svg{stroke:#2962ff;}
  .tool svg{width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:1.6; pointer-events:none;}
  .tool .badge{position:absolute; bottom:2px; right:3px; font-size:7px; color:var(--muted);}
  .tool-sep{width:24px; height:1px; background:var(--border); margin:4px 0;}

  /* z-index must beat the always-interactive drawing canvas (#draw, z-index:100)
     so toolbar dropdowns (timeframe menu etc.) that drop over the chart stay
     clickable instead of being swallowed by the overlay. The bar is only the top
     46px strip, so this never blocks chart pan/zoom gestures below it. */
  #topbar{position:absolute; top:0; left:44px; right:300px; height:46px; background:var(--bg);
    border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; padding:0 12px; z-index:120;}
  #symbolBox{font-weight:700; font-size:15px; letter-spacing:.3px; white-space:nowrap;}
  #symbolBox .exch{color:var(--muted); font-weight:400; font-size:12px; margin-left:6px;}
  /* ── Timeframe selector (TradingView-style sectioned dropdown) ── */
  .tf-group{display:flex; align-items:center; gap:2px; margin-left:8px;}
  .tf{padding:5px 9px; font-size:12px; border-radius:4px; cursor:pointer; color:var(--muted); user-select:none;}
  .tf:hover{background:var(--hover); color:var(--text);}
  .tf.active{background:var(--accent); color:#fff;}
  .tf-sel{position:relative;}
  .tf-sel-btn{display:flex; align-items:center; gap:5px; padding:5px 9px; font-size:12px; font-weight:600;
    border-radius:4px; cursor:pointer; color:var(--text); user-select:none; white-space:nowrap;}
  .tf-sel-btn:hover{background:var(--hover);}
  .tf-sel.open .tf-sel-btn{background:var(--hover);}
  .tf-sel-btn .caret{font-size:9px; color:var(--muted); transition:transform .12s;}
  .tf-sel.open .tf-sel-btn .caret{transform:rotate(180deg);}
  .tf-menu{display:none; position:absolute; top:calc(100% + 4px); left:0; z-index:60;
    background:var(--panel); border:1px solid var(--border); border-radius:6px; padding:4px;
    min-width:150px; max-height:70vh; overflow-y:auto; box-shadow:0 8px 24px rgba(0,0,0,.5);}
  .tf-sel.open .tf-menu{display:block;}
  .tf-menu::-webkit-scrollbar{width:8px;}
  .tf-menu::-webkit-scrollbar-thumb{background:var(--border); border-radius:4px;}
  .tf-sec{font-size:10px; font-weight:700; letter-spacing:.6px; color:var(--muted);
    text-transform:uppercase; padding:8px 10px 4px;}
  .tf-opt{display:flex; align-items:center; padding:6px 10px; font-size:13px; border-radius:4px;
    cursor:pointer; color:var(--text); user-select:none; white-space:nowrap;}
  .tf-opt:hover{background:var(--hover);}
  .tf-opt.active{background:var(--accent); color:#fff;}
  #maLegend{font-size:11px; margin-left:12px; white-space:nowrap;}
  #maLegend span{margin-right:8px;}
  #ohlc{font-size:11px; color:var(--muted); margin-left:10px; white-space:nowrap;}
  #ohlc b{color:var(--text); font-weight:600;}
  #status{margin-left:auto; font-size:11px; color:var(--muted); white-space:nowrap;}
  .dot{display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--green); margin-right:5px; vertical-align:middle;}

  #main{flex:1; position:relative; padding-top:46px; display:flex; flex-direction:column; overflow:hidden;}
  #chartWrap{width:100%; flex:1 1 0; min-height:60px;}   /* the only growable pane */
  #chart{width:100%; height:100%;}
  #draw{cursor:crosshair;}
  #rsiWrap{flex:0 1 auto; height:26%; min-height:96px; border-top:1px solid var(--border); position:relative;}
  #subPanes{flex:0 1 auto; min-height:0;}
  #rsiLabel{position:absolute; top:6px; left:10px; font-size:11px; color:var(--muted); z-index:5;}
  #rsiLabel b{font-weight:600;}
  #rsi{width:100%; height:100%;}

  #watchlist{width:300px; background:var(--panel); border-left:1px solid var(--border);
    display:flex; flex-direction:column; overflow:hidden;}
  #wlHead{padding:10px 12px; font-size:13px; font-weight:600; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;}
  #wlHead .sub{font-size:10px; color:var(--muted); font-weight:400;}
  #wlAdd{cursor:pointer; color:var(--muted); font-size:16px; line-height:1; padding:2px 6px;
    border-radius:4px; font-weight:400;}
  #wlAdd:hover{color:#fff; background:var(--hover);}
  #wlCols{display:flex; padding:6px 12px 6px 14px; font-size:11px; color:var(--muted);
    border-bottom:1px solid var(--border);}
  #wlCols .c1{flex:1;} #wlCols .c2{width:78px; text-align:right;}
  #wlCols .c3{width:66px; text-align:right;} #wlCols .c4{width:54px; text-align:right;}
  #wlBody{flex:1; overflow-y:auto;}
  .section{padding:7px 12px 5px 14px; font-size:11px; color:var(--muted); background:transparent;
    letter-spacing:.4px; border-bottom:1px solid rgba(42,46,57,.5);
    display:flex; align-items:center; gap:6px; cursor:pointer; user-select:none; position:relative;}
  .section:hover{background:rgba(42,46,57,.35);}
  .section .caret{font-size:9px; width:10px; flex-shrink:0; transition:transform .12s; color:var(--muted);}
  .section.collapsed .caret{transform:rotate(-90deg);}
  .section .gname{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  /* section trash: hidden until header hover, far right */
  .section .gdel{display:none; align-items:center; justify-content:center; width:20px; height:20px;
    border-radius:4px; color:var(--muted); cursor:pointer; flex-shrink:0;}
  .section:hover .gdel{display:flex;}
  .section .gdel:hover{color:var(--red); background:#2a2e39;}
  .section .gdel svg{width:13px; height:13px; fill:none; stroke:currentColor; stroke-width:1.6;
    stroke-linecap:round; stroke-linejoin:round;}
  /* section drop indicator (drag a symbol onto a collapsed/empty section header) */
  .section.drop-into{box-shadow:inset 0 0 0 1px var(--accent);}
  .row{display:flex; align-items:center; padding:6px 12px 6px 14px; cursor:pointer; position:relative;}
  .row:hover{background:var(--hover);}
  .row.active{background:#1c2c4a;}
  .row.dragging{opacity:.4;}
  .row.drop-above{box-shadow:inset 0 2px 0 0 var(--accent);}
  .row.drop-below{box-shadow:inset 0 -2px 0 0 var(--accent);}
  /* trash button: hidden until row hover, sits over the change columns at the right edge */
  .row .del{position:absolute; right:8px; top:50%; transform:translateY(-50%);
    width:22px; height:22px; border-radius:4px; display:none; align-items:center;
    justify-content:center; color:var(--muted); background:#1e222dcc; cursor:pointer; z-index:2;}
  .row:hover .del{display:flex;}
  .row .del:hover{color:var(--red); background:#2a2e39;}
  .row .del svg{width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:1.6;
    stroke-linecap:round; stroke-linejoin:round;}
  .row .sym{flex:1; display:flex; align-items:center; gap:9px; min-width:0;}
  .row .sym .nm{font-size:13px; font-weight:500; color:#d1d4dc; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .row .ic{width:20px; height:20px; border-radius:50%; flex-shrink:0; object-fit:contain;
    background:#2a2e39; color:#fff; font-size:9px; display:flex; align-items:center;
    justify-content:center; font-weight:700;}
  .row .last{width:78px; text-align:right; font-size:13px; font-variant-numeric:tabular-nums; color:#d1d4dc;}
  .row .chgabs{width:66px; text-align:right; font-size:12px; font-variant-numeric:tabular-nums;}
  .row .chg{width:54px; text-align:right; font-size:12px; font-variant-numeric:tabular-nums;}
  .up{color:#26a69a;} .down{color:#ef5350;}
  #wlBody::-webkit-scrollbar{width:8px;}
  #wlBody::-webkit-scrollbar-thumb{background:var(--border); border-radius:4px;}
  .flash-up{animation:fu .6s;} .flash-down{animation:fd .6s;}
  @keyframes fu{0%{background:rgba(38,166,154,.25);}100%{background:transparent;}}
  @keyframes fd{0%{background:rgba(239,83,80,.25);}100%{background:transparent;}}

  /* ── topbar buttons ── */
  .tbtn{background:transparent; border:none; color:#d1d4dc; font-size:12px; cursor:pointer;
    padding:5px 8px; border-radius:4px; display:flex; align-items:center; gap:4px;}
  .tbtn:hover{background:var(--hover);}

  /* ── sub-panes for separate-pane indicators (MACD, Stoch, etc.) ── */
  #subPanes{display:none; flex-direction:column; flex:0 1 auto; min-height:0;}
  .subpane{position:relative; height:120px; flex:0 1 120px; min-height:70px; border-top:1px solid var(--border);}
  .subpane .subLabel{position:absolute; top:4px; left:8px; z-index:5; font-size:11px; color:var(--muted);}
  .subpane .subClose{cursor:pointer; margin-left:8px; color:var(--muted);}
  .subpane .subClose:hover{color:var(--red);}

  /* ── indicator legend (top-left of chart) ── */
  #indLegend{position:absolute; top:50px; left:10px; z-index:40; font-size:11px;
    display:flex; flex-direction:column; gap:2px; pointer-events:auto;}
  .indrow{display:flex; align-items:center; gap:6px; background:#131722cc; padding:1px 6px; border-radius:3px;}
  .indrow .nm{font-weight:600;} .indrow .vals{color:var(--muted);}
  .indrow .x{cursor:pointer; color:var(--muted); padding:0 3px;}
  .indrow .x:hover{color:var(--red);} .indrow .gear{cursor:pointer; color:var(--muted);}
  .indrow .gear:hover{color:#fff;}

  /* ── popup context menu ── */
  .popmenu{position:absolute; display:none; z-index:300; background:#1e222d; border:1px solid var(--border);
    border-radius:6px; padding:4px 0; min-width:180px; box-shadow:0 6px 24px #000a; font-size:13px;}
  .popmenu .mi{padding:7px 14px; cursor:pointer; display:flex; align-items:center; gap:8px; color:#d1d4dc;}
  .popmenu .mi:hover{background:var(--accent); color:#fff;}
  .popmenu .msep{height:1px; background:var(--border); margin:4px 0;}
  .popmenu .sw{width:12px; height:12px; border-radius:2px; display:inline-block;}

  /* ── side panels (indicators / alerts) ── */
  .panel{position:absolute; display:none; z-index:300; top:90px; left:60px; width:340px; max-height:70vh;
    background:#1e222d; border:1px solid var(--border); border-radius:8px; box-shadow:0 8px 32px #000a;
    overflow:hidden; flex-direction:column;}
  .panel.open{display:flex;}
  .panel .ph{padding:12px 14px; font-weight:600; font-size:14px; border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center;}
  .panel .ph .cl{cursor:pointer; color:var(--muted); font-size:18px;}
  .panel .pb{overflow-y:auto; padding:6px 0;}
  .panel .pi{padding:9px 14px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; font-size:13px;}
  .panel .pi:hover{background:var(--hover);}
  .panel .pi .meta{color:var(--muted); font-size:11px;}
  .panel .search{margin:8px 12px; padding:7px 10px; background:#131722; border:1px solid var(--border);
    border-radius:5px; color:#d1d4dc; font-size:13px; outline:none;}
  .panel .indcat{font-size:10px; font-weight:700; letter-spacing:.6px; color:var(--muted);
    text-transform:uppercase; padding:10px 14px 4px; position:sticky; top:0; background:#1e222d;}

  /* ── settings dialog ── */
  #dlgBackdrop{position:fixed; inset:0; background:#0008; display:none; z-index:400;}
  #dlgBackdrop.open{display:block;}
  .dialog{position:fixed; display:none; z-index:401; top:50%; left:50%; transform:translate(-50%,-50%);
    width:360px; background:#1e222d; border:1px solid var(--border); border-radius:10px;
    box-shadow:0 12px 48px #000c; flex-direction:column;}
  .dialog.open{display:flex;}
  .dialog .dh{padding:14px 16px; font-weight:600; font-size:15px; border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center;}
  .dialog .dh .cl{cursor:pointer; color:var(--muted); font-size:20px;}
  .dialog .db{padding:14px 16px; display:flex; flex-direction:column; gap:12px; max-height:60vh; overflow-y:auto;}
  .dialog .field{display:flex; justify-content:space-between; align-items:center; gap:10px;}
  .dialog .field label{font-size:13px; color:#d1d4dc;}
  .dialog .field input[type=number], .dialog .field input[type=text], .dialog .field select{
    width:120px; padding:6px 8px; background:#131722; border:1px solid var(--border); border-radius:5px;
    color:#d1d4dc; font-size:13px; outline:none;}
  .dialog .field input[type=color]{width:34px; height:26px; padding:0; border:1px solid var(--border);
    border-radius:4px; background:#131722; cursor:pointer;}
  .dialog .field input[type=range]{width:120px;}
  .dialog .df{padding:12px 16px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px;}
  .dialog .btn{padding:7px 16px; border-radius:5px; border:none; cursor:pointer; font-size:13px;}
  .dialog .btn.primary{background:var(--accent); color:#fff;}
  .dialog .btn.ghost{background:transparent; color:#d1d4dc; border:1px solid var(--border);}

  /* ── Create-alert dialog (TradingView-style) ── */
  .alertdlg{width:440px;}
  .alertdlg .dh .sym{display:inline-flex;align-items:center;gap:6px;font-weight:700;}
  .alertdlg .arow{display:flex;align-items:flex-start;gap:14px;padding:6px 0;}
  .alertdlg .arow > .alabel{width:92px;flex:none;font-size:13px;color:var(--muted);padding-top:7px;}
  .alertdlg .actl{flex:1;display:flex;flex-direction:column;gap:8px;}
  .alertdlg select, .alertdlg input[type=number], .alertdlg input[type=text], .alertdlg input[type=datetime-local]{
    width:100%;padding:8px 10px;background:#131722;border:1px solid var(--border);border-radius:6px;
    color:#d1d4dc;font-size:13px;outline:none;}
  .alertdlg select:focus, .alertdlg input:focus{border-color:var(--accent);}
  .alertdlg .twocol{display:flex;gap:8px;}
  .alertdlg .twocol > *{flex:1;}
  .alertdlg .addcond{color:var(--accent);font-size:13px;cursor:pointer;user-select:none;padding:2px 0;}
  .alertdlg .addcond:hover{text-decoration:underline;}
  .alertdlg .asep{height:1px;background:var(--border);margin:8px 0;}
  .alertdlg .notif{display:flex;flex-wrap:wrap;gap:14px;}
  .alertdlg .notif label{display:flex;align-items:center;gap:6px;font-size:13px;color:#d1d4dc;cursor:pointer;}
  .alertdlg .notif input[type=checkbox]{width:auto;}
  .alertdlg .hint{font-size:11px;color:var(--muted);}

  /* alert price lines drawn by lightweight-charts createPriceLine - styled inline */
</style>
</head>
<body>
<div id="app">
  <div id="toolbar"></div>
  <div id="main">
    <div id="topbar">
      <span id="symbolBox"><span id="symName">NEAR-USD/INJ-USD</span><span class="exch">· Coinbase · <span id="tfName">1D</span></span></span>
      <div class="tf-group" id="tfGroup">
        <div class="tf-sel" id="tfSel">
          <div class="tf-sel-btn" id="tfSelBtn">
            <span class="tf-sel-label" id="tfSelLabel">1D</span>
            <span class="caret">▾</span>
          </div>
          <div class="tf-menu" id="tfMenu"><!-- built by JS from TF{} --></div>
        </div>
      </div>
      <!-- Chart-type selector (reuses the timeframe dropdown styling) -->
      <div class="tf-sel" id="ctSel" title="Chart type">
        <div class="tf-sel-btn" id="ctSelBtn">
          <span class="tf-sel-label" id="ctSelLabel">⬚ Candles</span>
          <span class="caret">▾</span>
        </div>
        <div class="tf-menu" id="ctMenu"><!-- built by JS from CHART_TYPES --></div>
      </div>
      <!-- Price-scale mode toggle: Normal → Log → Percent -->
      <button class="tbtn" id="btnScale" title="Price scale: Normal / Log / Percent">⤢ Auto</button>
      <button class="tbtn" id="btnIndicators">⊞ Indicators</button>
      <button class="tbtn" id="btnAlert" title="Click: create alert · Right-click: manage alerts">🔔 Alert</button>
      <span id="maLegend"></span>
      <span id="ohlc"></span>
      <span id="status"><span class="dot"></span>Live · Coinbase API</span>
    </div>
    <div id="chartWrap" style="position:relative;">
      <div id="chart" style="position:absolute; inset:0;"></div>
      <canvas id="draw" style="position:absolute; inset:0; width:100%; height:100%; pointer-events:auto; z-index:100;"></canvas>
    </div>
    <div id="rsiWrap">
      <div id="rsiLabel">RSI 14 close <b id="rsiVal" style="color:#7e57c2">—</b> <b id="rsiMaVal" style="color:#e0a82e">—</b></div>
      <div id="rsi"></div>
    </div>
    <div id="subPanes"></div>
    <div id="indLegend"></div>
  </div>

  <!-- floating UI -->
  <div id="ctxMenu" class="popmenu"></div>
  <div id="indicatorsMenu" class="panel"></div>
  <div id="alertsPanel" class="panel"></div>
  <div id="settingsDlg" class="dialog"></div>
  <div id="alertDlg" class="dialog alertdlg"></div>
  <div id="dlgBackdrop"></div>

  <div id="watchlist">
    <div id="wlHead"><span>comeback <span class="sub">▾</span></span><span id="wlAdd" title="Add section">＋</span></div>
    <div id="wlCols"><span class="c1">Symbol</span><span class="c2">Last</span><span class="c3">Chg</span><span class="c4">Chg%</span></div>
    <div id="wlBody"></div>
  </div>
</div>

<script>
// ── Coinbase Exchange public API (no key, no paywall) ──
const API = "https://api.exchange.coinbase.com";

// Coinbase uses BASE-USD. Watchlist mirrors the TradingView "comeback" layout.
// Symbols Coinbase doesn't list (XVG, XMR, NIL, DUSK) still appear but show "—".
const DEFAULT_GROUPS = [
  { name:"SPREADS", symbols:["NEAR-USD/INJ-USD"] },
  { name:"MEME",    symbols:["BONK-USD"] },
  { name:"PRIVACY", symbols:["XVG-USD","DASH-USD","XMR-USD","NIL-USD","ZEC-USD","HYPE-USD"] },
  { name:"OMEGA",   symbols:["TON-USD","HBAR-USD","SUI-USD","XLM-USD","SEI-USD"] },
  { name:"ALPHA",   symbols:["FET-USD","DUSK-USD","RENDER-USD","ASTER-USD","TAO-USD","INJ-USD","NEAR-USD"] },
  { name:"SECTION 2", symbols:["BTC-USD","XRP-USD","BNB-USD","ETH-USD","LINK-USD","BCH-USD","SOL-USD"] },
  { name:"BTC PAIRS", symbols:["ETH-BTC","SOL-BTC","LINK-BTC"] },
  { name:"SECTION 3", symbols:["ADA-USD","DOGE-USD","AVAX-USD","DOT-USD"] },
];

// The watchlist layout is user-editable (drag to reorder, trash to remove) and
// persisted, so GROUPS is mutable and ALL is recomputed from it on demand.
const WL_KEY = "fv_watchlist";
function loadGroups(){
  try{
    const raw = localStorage.getItem(WL_KEY);
    if(raw){
      const g = JSON.parse(raw);
      // basic shape check; fall back to defaults if the stored value is junk
      if(Array.isArray(g) && g.every(x=>x && Array.isArray(x.symbols))) return g;
    }
  }catch{}
  return JSON.parse(JSON.stringify(DEFAULT_GROUPS));  // deep copy of defaults
}
let GROUPS = loadGroups();
function saveGroups(){ try{ localStorage.setItem(WL_KEY, JSON.stringify(GROUPS)); }catch{} }
function allSymbols(){ return [...new Set(GROUPS.flatMap(g=>g.symbols))]; }

// Coin logos from CoinCap's free icon CDN (BASE symbol, lowercased).
// ASTER isn't on CoinCap → falls back to a letter circle.
const NO_LOGO = new Set(["ASTER","NIL"]);
function logoUrl(sym){
  const base = sym.split("/")[0].split("-")[0].toLowerCase();
  return `https://assets.coincap.io/assets/icons/${base}@2x.png`;
}

let activeSymbol = "NEAR-USD/INJ-USD";
let activeTF = "1d";  // timeframe key into TF{}

// ── Chart setup ──
const chartEl = document.getElementById("chart");
const rsiEl   = document.getElementById("rsi");
const common = {
  layout:{ background:{color:"#131722"}, textColor:"#d1d4dc" },
  grid:{ vertLines:{color:"#1e222d"}, horzLines:{color:"#1e222d"} },
  rightPriceScale:{ borderColor:"#2a2e39" },
  timeScale:{ borderColor:"#2a2e39", timeVisible:true, secondsVisible:false, rightOffset:12 },
  crosshair:{ mode:0 },
  // Pan + zoom are handled manually on the overlay canvas (dcanvas), which hides
  // these gestures from the chart's built-in handlers, so disable them here.
  handleScroll:false, handleScale:false,
};
const chart = LightweightCharts.createChart(chartEl, common);
const candle = chart.addCandlestickSeries({
  upColor:"#26a69a", downColor:"#ef5350", borderVisible:false,
  wickUpColor:"#26a69a", wickDownColor:"#ef5350",
});

// ── Chart type + scale ──────────────────────────────────────────────
// `candle` stays the canonical OHLC + coordinate anchor (every coord helper and
// the crosshair legend reference it). For non-candle styles we hide the candle
// series and feed an auxiliary series of the chosen type that shares the same
// price scale, so coordinates and drawings still line up. Heikin Ashi / Hollow
// are just the candle series with transformed data / per-bar colors.
let chartType = "candles";   // candles|hollow|heikin|bars|line|area|baseline
let scaleMode = 0;           // 0 Normal · 1 Log · 2 Percentage
const aux = {};              // lazily-created auxiliary series keyed by type
function auxSeries(type){
  if(aux[type]) return aux[type];
  if(type==="line")     aux[type]=chart.addLineSeries({ color:"#2962ff", lineWidth:2, priceLineVisible:true, lastValueVisible:true });
  else if(type==="area")aux[type]=chart.addAreaSeries({ lineColor:"#2962ff", topColor:"rgba(41,98,255,0.30)", bottomColor:"rgba(41,98,255,0.02)", lineWidth:2 });
  else if(type==="baseline") aux[type]=chart.addBaselineSeries({ baseValue:{type:"price",price:0}, topLineColor:"#26a69a", bottomLineColor:"#ef5350", topFillColor1:"rgba(38,166,154,0.20)", bottomFillColor1:"rgba(239,83,80,0.20)" });
  else if(type==="bars") aux[type]=chart.addBarSeries({ upColor:"#26a69a", downColor:"#ef5350", thinBars:false });
  return aux[type];
}
// Heikin Ashi transform: HA-Close=(O+H+L+C)/4; HA-Open=(prevHAO+prevHAC)/2;
// HA-High=max(H,HAO,HAC); HA-Low=min(L,HAO,HAC). First bar bootstrap uses raw O/C.
function heikinAshi(data){
  const out=[]; let pO=null,pC=null;
  for(const b of data){
    const c=(b.open+b.high+b.low+b.close)/4;
    const o=(pO==null)?(b.open+b.close)/2:(pO+pC)/2;
    const h=Math.max(b.high,o,c), l=Math.min(b.low,o,c);
    out.push({time:b.time, open:o, high:h, low:l, close:c}); pO=o; pC=c;
  }
  return out;
}
// Hollow candles: hollow body on an up-close (close≥open), filled on a down-close;
// colored green/red by the bar vs the previous close (TradingView convention).
function hollowData(data){
  return data.map((b,i)=>{
    const prev=i>0?data[i-1].close:b.open;
    const col=(b.close>=prev)?"#26a69a":"#ef5350";
    return { time:b.time, open:b.open, high:b.high, low:b.low, close:b.close,
      color: b.close>=b.open ? "rgba(0,0,0,0)" : col,   // hollow when close≥open
      borderColor:col, wickColor:col };
  });
}
// Route the current data into whatever representation chartType selects.
function applyChartType(data){
  const d = data || lastData;
  const showCandle = (chartType==="candles"||chartType==="hollow"||chartType==="heikin");
  candle.applyOptions({ visible:showCandle });
  Object.entries(aux).forEach(([k,s])=> s.applyOptions({ visible: k===chartType }));
  if(!d || !d.length) return;
  if(chartType==="heikin")      candle.setData(heikinAshi(d));
  else if(chartType==="hollow") candle.setData(hollowData(d));
  else if(showCandle)           candle.setData(d);   // plain candles
  else {
    candle.setData(d);  // keep candle data (invisible) so coordinates stay valid
    const s=auxSeries(chartType);
    if(chartType==="bars") s.setData(d.map(b=>({time:b.time,open:b.open,high:b.high,low:b.low,close:b.close})));
    else if(chartType==="baseline"){
      const base=d.length?d[0].close:0;
      s.applyOptions({ baseValue:{type:"price",price:base} });
      s.setData(d.map(b=>({time:b.time,value:b.close})));
    } else s.setData(d.map(b=>({time:b.time,value:b.close})));
  }
}
function setChartType(t){ chartType=t; applyChartType(); if(typeof syncChartTypeUI==="function") syncChartTypeUI(); }
function setScaleMode(m){ scaleMode=m; try{ chart.priceScale("right").applyOptions({ mode:m }); }catch(e){} if(typeof syncScaleUI==="function") syncScaleUI(); }

// ── Indicator math ──
function smaSeries(data, period){
  const out=[]; let sum=0;
  for(let i=0;i<data.length;i++){
    sum+=data[i].close;
    if(i>=period) sum-=data[i-period].close;
    if(i>=period-1) out.push({ time:data[i].time, value:sum/period });
  }
  return out;
}
function rsiSeries(data, period=14){
  const out=[]; let gain=0, loss=0;
  for(let i=1;i<data.length;i++){
    const d = data[i].close - data[i-1].close;
    const up = Math.max(d,0), dn = Math.max(-d,0);
    if(i<=period){ gain+=up; loss+=dn;
      if(i===period){ gain/=period; loss/=period;
        out.push({ time:data[i].time, value: loss===0?100:100-100/(1+gain/loss) }); }
    } else {
      gain=(gain*(period-1)+up)/period;
      loss=(loss*(period-1)+dn)/period;
      out.push({ time:data[i].time, value: loss===0?100:100-100/(1+gain/loss) });
    }
  }
  return out;
}
// simple MA over an arbitrary {time,value} series (for RSI smoothing)
function maOfSeries(series, period){
  const out=[]; let sum=0;
  for(let i=0;i<series.length;i++){
    sum+=series[i].value;
    if(i>=period) sum-=series[i-period].value;
    if(i>=period-1) out.push({ time:series[i].time, value:sum/period });
  }
  return out;
}

// ── Data loading (Coinbase) ──
// Coinbase candle = [time(s), low, high, open, close, volume], newest-first, ≤300 per call.
// Native granularities only: 1m,5m,15m,1h,6h,1d. 4h/12h/1w are AGGREGATED from a base.
//   base   = native granularity (sec) we actually fetch
//   bucket = target bar size (sec); if === base, no aggregation
//   pages  = how many ≤300-bar windows to paginate for depth
// pages tuned to Coinbase's real max depth per granularity (loop stops early on empty,
// so slightly over-asking is harmless). Every TF now pulls far more history than before.
// menu = long label shown in the dropdown; sec = section header it lives under.
const TF = {
  "1m":  { label:"1m",  menu:"1 minute",   sec:"MINUTES", base:60,    bucket:60,     pages:26 },  // ~7k bars (Coinbase caps 1m history)
  "5m":  { label:"5m",  menu:"5 minutes",  sec:"MINUTES", base:300,   bucket:300,    pages:36 },  // ~10k bars (~1 month)
  "15m": { label:"15m", menu:"15 minutes", sec:"MINUTES", base:900,   bucket:900,    pages:18 },  // ~5k bars
  "30m": { label:"30m", menu:"30 minutes", sec:"MINUTES", base:900,   bucket:1800,   pages:18 },  // 2×15m
  "1h":  { label:"1H",  menu:"1 hour",     sec:"HOURS",   base:3600,  bucket:3600,   pages:36 },  // ~10k bars (back to 2025)
  "4h":  { label:"4H",  menu:"4 hours",    sec:"HOURS",   base:3600,  bucket:14400,  pages:36 },  // 4×1h, deep
  "6h":  { label:"6H",  menu:"6 hours",    sec:"HOURS",   base:21600, bucket:21600,  pages:20 },  // ~5.5k bars (to 2022)
  "12h": { label:"12H", menu:"12 hours",   sec:"HOURS",   base:21600, bucket:43200,  pages:20 },  // 2×6h, to 2022
  "1d":  { label:"1D",  menu:"1 day",      sec:"DAYS",    base:86400, bucket:86400,  pages:9 },   // ~1.4k bars (to 2022)
  "1w":  { label:"1W",  menu:"1 week",     sec:"DAYS",    base:86400, bucket:604800, pages:9 },   // 7×1d
};

function parseCandlesAgg(raw){
  if(!Array.isArray(raw)) return [];
  // Coinbase candle = [time, low, high, open, close, volume]; keep volume for VWAP/Volume.
  return raw.map(k=>({ time:k[0], low:+k[1], high:+k[2], open:+k[3], close:+k[4], volume:+k[5]||0 }));
}

// Roll base bars up into fixed-size buckets aligned to epoch.
function aggregate(bars, base, bucket){
  if(bucket === base) return bars;
  const groups = {};
  for(const b of bars){
    const t = Math.floor(b.time / bucket) * bucket;   // bucket start
    const g = groups[t] || (groups[t] = { time:t, open:b.open, high:b.high, low:b.low, close:b.close, volume:0, _first:b.time, _last:b.time });
    if(b.time <= g._first){ g.open = b.open; g._first = b.time; }
    if(b.time >= g._last ){ g.close = b.close; g._last = b.time; }
    if(b.high > g.high) g.high = b.high;
    if(b.low  < g.low ) g.low  = b.low;
    g.volume += b.volume||0;
  }
  return Object.values(groups)
    .map(({_first,_last,...g})=>g)
    .sort((a,b)=>a.time-b.time);
}


// ── Bad-print filter ──
// Exchange feeds occasionally emit a single corrupt candle with an impossible
// high/low (e.g. INJ 2025-11-08 printed a 14.75 high on a day it opened 7.68 /
// closed 7.44). Dividing that into a ratio creates a fake spike. We clamp any
// wick that exceeds ~4× the LOCAL-median wick of its neighbors (genuine
// volatility is allowed; lone glitches are pulled back in line).
function median(arr){
  if(!arr.length) return 0;
  const s=[...arr].sort((a,b)=>a-b), m=s.length>>1;
  return s.length%2 ? s[m] : (s[m-1]+s[m])/2;
}
function sanitize(bars){
  const N=bars.length, W=10, K=4, MINW=0.15;   // window radius, slack factor, min allowed wick
  if(N<6) return bars;
  const upW=bars.map(k=>{const t=Math.max(k.open,k.close); return t? (k.high-t)/t : 0;});
  const dnW=bars.map(k=>{const b=Math.min(k.open,k.close); return b? (b-k.low)/b : 0;});
  const out=bars.map(k=>({...k}));
  for(let i=0;i<N;i++){
    const lo=Math.max(0,i-W), hi=Math.min(N,i+W+1);
    const u=[],d=[]; for(let j=lo;j<hi;j++) if(j!==i){ u.push(upW[j]); d.push(dnW[j]); }
    const top=Math.max(out[i].open,out[i].close), bot=Math.min(out[i].open,out[i].close);
    const upCap=top*(1+Math.max(median(u)*K, MINW));
    const dnFloor=bot*(1-Math.max(median(d)*K, MINW));
    if(out[i].high>upCap)  out[i].high=upCap;
    if(out[i].low<dnFloor) out[i].low=dnFloor;
  }
  return out;
}

// Fetch one page of newest candles (or the page ending at `end`). Returns the
// oldest-first parsed page, or [] on error/empty.
async function fetchPage(product, g, span, end){
  const qs = end===null
    ? `granularity=${g}`
    : `granularity=${g}&start=${end-span}&end=${end}`;
  try{
    const res = await fetch(`${API}/products/${product}/candles?${qs}`);
    return parseCandlesAgg(await res.json());
  }catch{ return []; }
}

// Clean + roll up an oldest-first bar list to the target bucket. Shared by the
// progressive loader so every partial render goes through the same pipeline.
function finalizeBars(all, tf){
  const seen = {};
  const out = [];
  for(const k of all){ if(seen[k.time]) continue; seen[k.time]=1; out.push(k); }
  out.sort((a,b)=>a.time-b.time);
  const clean = sanitize(out);                  // strip corrupt bad-print wicks
  return aggregate(clean, tf.base, tf.bucket);  // roll up to 4h/12h/1w if needed
}

// Progressive history loader. Calls `onPage(barsSoFar)` after EACH page so the
// chart can paint the newest candles immediately, then keeps deepening history
// in the background. Pages were previously fetched all-then-render, which meant
// up to 36 sequential round-trips before anything appeared on screen.
async function fetchKlinesProgressive(product, tfKey, onPage){
  const tf = TF[tfKey] || TF["1d"];
  const g = tf.base;
  const span = 300 * g;                 // seconds covered by one full page
  let end = null;                       // null = newest; Coinbase returns latest
  const all = [];
  for(let i=0; i<tf.pages; i++){
    const page = await fetchPage(product, g, span, end);
    if(!page.length) break;
    all.push(...page);
    if(onPage) onPage(all);                        // render what we have so far
    end = Math.min(...page.map(k=>k.time)) - g;   // step strictly before the oldest bar we got
    if(page.length < 200) break;                  // short page = reached start of history; stop early
  }
  if(!all.length) throw new Error("No data for "+product);
  return finalizeBars(all, tf);
}

// Non-progressive variant (single combined result), used where a caller just
// wants the full series without incremental callbacks.
async function fetchKlines(product, tfKey){
  return fetchKlinesProgressive(product, tfKey, null);
}

// Build synthetic A/B ratio (spread) by aligning candles on matching timestamps
function makeRatio(a, b){
  const bm = {}; b.forEach(k=>bm[k.time]=k);
  const out=[];
  for(const k of a){
    const q = bm[k.time];
    if(!q || !q.open || !q.close || !q.high || !q.low) continue;
    // TradingView spread = component-wise division (NOT high/low cross terms,
    // which falsely assume A peaks the instant B bottoms → fake giant wicks).
    const o = k.open/q.open;
    const c = k.close/q.close;
    let hi = k.high/q.high;
    let lo = k.low/q.low;
    if(lo > hi) [lo, hi] = [hi, lo];          // guard if division flips order
    // wick must still envelope the real open & close
    hi = Math.max(hi, o, c);
    lo = Math.min(lo, o, c);
    out.push({ time:k.time, open:o, high:hi, low:lo, close:c, volume:k.volume||0 });
  }
  return out;
}

function fmt(v){ return v>=100 ? v.toFixed(2) : v>=1 ? v.toFixed(3) : v.toPrecision(4); }

// Push a finished bar series into every series + indicator. Called on each
// progressive page as well as on the final result, so the chart stays live
// while history keeps deepening underneath it.
function renderData(data, keepView){
  lastData = data;                 // expose to the drawing engine (magnet/measure/extrapolation)
  applyChartType(data);            // route into the active chart style (candles/HA/line/…)
  if(typeof redraw==="function") redraw();

  // moving averages
  const legend=[];
  maSeries.forEach((s,i)=>{
    const m = MAS[i];
    const sd = smaSeries(data, m.p);
    s.setData(sd);
    if(sd.length) legend.push(`<span style="color:${m.color}">MA${m.p} ${fmt(sd[sd.length-1].value)}</span>`);
  });
  document.getElementById("maLegend").innerHTML = legend.slice(0,6).join("");

  // RSI + smoothing MA + TradingView-style fills
  const r = rsiSeries(data, 14);
  const rm = maOfSeries(r, 14);
  rsiOver.setData(r);                                  // green fill where RSI>70
  rsiUnder.setData(r);                                 // red fill where RSI<30
  band70.setData(r.map(d=>({time:d.time, value:70})));
  band50.setData(r.map(d=>({time:d.time, value:50})));
  band30.setData(r.map(d=>({time:d.time, value:30})));
  rsiLine.setData(r);
  rsiMa.setData(rm);
  if(r.length)  document.getElementById("rsiVal").textContent   = r[r.length-1].value.toFixed(2);
  if(rm.length) document.getElementById("rsiMaVal").textContent = rm[rm.length-1].value.toFixed(2);

  // user indicators + alerts (engine defined later in file; guard for first paint)
  if(typeof renderAllIndicators==="function") renderAllIndicators();
  if(typeof checkAlerts==="function") checkAlerts();

  // Snap to the most recent ~420 bars on a fresh load, re-snapping as each
  // progressive page reindexes the scale — but only until the user pans/zooms
  // (stopAutoSnap clears _autoSnap on the first wheel/drag) and never on the
  // 20s background refresh (keepView).
  if(!keepView && _autoSnap){
    const view = Math.min(data.length, 420);
    // Keep ~12 bars of empty room on the right (matches timeScale.rightOffset) so
    // horizontal lines/rays have a visible "future" region to extend into.
    chart.timeScale().setVisibleLogicalRange({ from: data.length-view, to: data.length+12 });
  }
  document.getElementById("status").innerHTML = `<span class="dot"></span>Live · Coinbase API · ${data.length} bars`;
}

// Token guards against a stale in-flight load clobbering a newer one (e.g. the
// user switches symbol/TF while pages from the previous request are still
// streaming in via progressive callbacks).
let loadToken = 0;

// Auto-snap state. While a fresh load streams pages in, each page prepends older
// history and reindexes the logical scale, so we re-snap to the latest candle
// on every page to keep it centred. But the SECOND the user pans/zooms we must
// stop snapping or we'd yank their view back (the "bounces back" bug).
//   _autoSnap – are we still allowed to auto-snap this load?
// stopAutoSnap() is called from the real gesture handlers (the dcanvas mousedown
// pan and the dcanvas wheel-zoom defined later), so it never interferes with the
// chart's own input handling.
let _autoSnap = false;
function stopAutoSnap(){ _autoSnap = false; }

async function loadChart(symbol, tf, keepView){
  const myToken = ++loadToken;
  document.getElementById("symName").textContent = symbol;
  document.getElementById("tfName").textContent = (TF[tf]||{}).label || tf;
  // clear any stale "No data" error from the previous symbol and show progress.
  if(!keepView){
    document.getElementById("ohlc").innerHTML = "";
    document.getElementById("status").innerHTML = `<span class="dot"></span>Loading ${symbol}…`;
    _autoSnap = true;   // a fresh load may snap to the latest candle until the user pans/zooms
  }
  const fresh = ()=> myToken===loadToken;       // still the active load?
  // On a fresh (non-keepView) load, snap to the latest candle on EVERY
  // progressive page — not just the first. Each new page prepends older history,
  // which reindexes the logical scale; a one-time snap would then drift off the
  // latest bar as history backfills, leaving the recent candles off-screen.
  const paint = (data)=>{
    if(!fresh() || !data.length) return;
    renderData(data, keepView);   // keepView=false ⇒ re-snap to the latest bar
  };
  try{
    if(symbol.includes("/")){
      const [a,b] = symbol.split("/");
      // Render the spread as each side's pages arrive. Re-derive the ratio from
      // whatever both sides have so far; the chart fills out as history deepens.
      let lastA=[], lastB=[];
      const tfMeta = TF[tf] || TF["1d"];
      const repaintRatio = ()=>{
        if(lastA.length && lastB.length)
          paint(makeRatio(finalizeBars(lastA,tfMeta), finalizeBars(lastB,tfMeta)));
      };
      const [ka,kb] = await Promise.all([
        fetchKlinesProgressive(a, tf, raw=>{ lastA=raw; repaintRatio(); }),
        fetchKlinesProgressive(b, tf, raw=>{ lastB=raw; repaintRatio(); }),
      ]);
      const data = makeRatio(ka, kb);
      if(!data.length) throw new Error("No overlapping data for "+symbol);
      paint(data);
    } else {
      const data = await fetchKlinesProgressive(symbol, tf, raw=>{
        if(fresh()) paint(finalizeBars(raw, TF[tf]||TF["1d"]));
      });
      paint(data);
    }
  }catch(e){
    if(fresh()) document.getElementById("ohlc").innerHTML = `<span class="down">⚠ ${e.message}</span>`;
  }
}

// crosshair → OHLC legend
chart.subscribeCrosshairMove(p=>{
  const c = p.seriesData.get(candle);
  if(!c) return;
  const col = c.close>=c.open ? "var(--green)":"var(--red)";
  document.getElementById("ohlc").innerHTML =
    `O<b>${fmt(c.open)}</b> H<b>${fmt(c.high)}</b> L<b>${fmt(c.low)}</b> C<b style="color:${col}">${fmt(c.close)}</b>`;
});
rsiChart.subscribeCrosshairMove(p=>{
  const v = p.seriesData.get(rsiLine);
  const m = p.seriesData.get(rsiMa);
  if(v) document.getElementById("rsiVal").textContent   = v.value.toFixed(2);
  if(m) document.getElementById("rsiMaVal").textContent = m.value.toFixed(2);
});

// ── Watchlist ──
const rowMap = {};
function buildWatchlist(){
  const body = document.getElementById("wlBody");
  body.innerHTML = "";
  GROUPS.forEach(g=>{
    const s = document.createElement("div");
    s.className = "section" + (g.collapsed ? " collapsed" : "");
    s.dataset.group = g.name;
    s.innerHTML = `<span class="caret">▾</span><span class="gname">${escHtml(g.name)}</span>`
      + `<span class="gdel" title="Remove section">${icTrashWl()}</span>`;
    s.onclick = (e)=>{ if(e.target.closest(".gdel")) return; toggleGroupCollapse(g.name); };
    s.querySelector(".gdel").onclick = (e)=>{ e.stopPropagation(); removeGroup(g.name); };
    s.oncontextmenu = (e)=>{ e.preventDefault(); e.stopPropagation(); showSectionMenu(g.name, e.clientX, e.clientY); };
    sectionDropWire(s, g.name);     // allow dropping a symbol onto the header (esp. when collapsed)
    body.appendChild(s);
    if(g.collapsed) return;         // header only; rows hidden while collapsed
    g.symbols.forEach(sym=>{
      const row = document.createElement("div");
      row.className="row"+(sym===activeSymbol?" active":"");
      row.dataset.sym = sym;
      const isRatio = sym.includes("/");
      const base = sym.split("/")[0].split("-")[0];
      // logo: real coin icon, or a letter circle for ratios / coins with no icon
      let icon;
      if(isRatio){
        icon = `<span class="ic" style="background:#8e44ad">÷</span>`;
      } else if(NO_LOGO.has(base)){
        icon = `<span class="ic" style="background:#2962ff">${base[0]}</span>`;
      } else {
        // <img>; if it 404s, swap to a letter circle on error
        icon = `<img class="ic" src="${logoUrl(sym)}" alt="${base}"
          onerror="this.outerHTML='<span class=\\'ic\\' style=\\'background:#2962ff\\'>${base[0]}</span>'">`;
      }
      row.dataset.group = g.name;           // a symbol may live in >1 group; key edits by group+sym
      row.draggable = true;
      row.innerHTML = `<span class="sym">${icon}<span class="nm">${sym}</span></span>
        <span class="last" data-last>—</span><span class="chgabs" data-chgabs>—</span><span class="chg" data-chg>—</span>
        <span class="del" title="Remove from watchlist">${icTrashWl()}</span>`;
      row.onclick = ()=>{
        activeSymbol = sym;
        document.querySelectorAll(".row").forEach(r=>r.classList.remove("active"));
        document.querySelectorAll(`.row[data-sym="${cssEsc(sym)}"]`).forEach(r=>r.classList.add("active"));
        if(typeof loadPersisted==="function") loadPersisted();   // drawings are per symbol+tf
        if(typeof loadAlerts==="function") loadAlerts();         // alerts are per symbol
        loadChart(sym, activeTF);
      };
      row.querySelector(".del").onclick = (e)=>{ e.stopPropagation(); removeSymbol(g.name, sym); };
      wlDragWire(row);
      body.appendChild(row);
      (rowMap[sym] = rowMap[sym]||[]).push(row);
    });
  });
}

// CSS.escape isn't on very old browsers; this is enough for our symbol set ("/", "-").
function cssEsc(s){ return (window.CSS && CSS.escape) ? CSS.escape(s) : s.replace(/["\\]/g,"\\$&"); }

// Small trash glyph for the per-row remove button.
function icTrashWl(){
  return '<svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg>';
}

// Remove a symbol from a specific group, persist, and rebuild. If the removed
// symbol was active, fall back to the first remaining symbol.
function removeSymbol(groupName, sym){
  const g = GROUPS.find(x=>x.name===groupName);
  if(!g) return;
  const i = g.symbols.indexOf(sym);
  if(i<0) return;
  g.symbols.splice(i,1);
  delete rowMap[sym];                       // rebuilt below; stale refs would otherwise leak
  saveGroups();
  if(activeSymbol===sym && !allSymbols().includes(sym)){
    const next = allSymbols()[0];
    if(next){
      activeSymbol = next;
      if(typeof loadPersisted==="function") loadPersisted();
      if(typeof loadAlerts==="function") loadAlerts();
      loadChart(next, activeTF);
    }
  }
  buildWatchlist();
  refreshPrices();                          // repaint prices on the rebuilt rows
}

// ── Drag to reorder ──
// HTML5 drag-and-drop. We move the (group,symbol) entry within GROUPS, allowing
// moves across groups too, then persist and rebuild.
let wlDrag = null;   // { group, sym } of the row being dragged
function wlDragWire(row){
  row.addEventListener("dragstart", e=>{
    wlDrag = { group: row.dataset.group, sym: row.dataset.sym };
    row.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
    try{ e.dataTransfer.setData("text/plain", row.dataset.sym); }catch{}
  });
  row.addEventListener("dragend", ()=>{
    row.classList.remove("dragging");
    document.querySelectorAll(".row.drop-above,.row.drop-below")
      .forEach(r=>r.classList.remove("drop-above","drop-below"));
    wlDrag = null;
  });
  row.addEventListener("dragover", e=>{
    if(!wlDrag) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    const before = (e.clientY - row.getBoundingClientRect().top) < row.offsetHeight/2;
    row.classList.toggle("drop-above", before);
    row.classList.toggle("drop-below", !before);
  });
  row.addEventListener("dragleave", ()=>row.classList.remove("drop-above","drop-below"));
  row.addEventListener("drop", e=>{
    if(!wlDrag) return;
    e.preventDefault();
    const before = row.classList.contains("drop-above");
    moveSymbol(wlDrag.group, wlDrag.sym, row.dataset.group, row.dataset.sym, before);
  });
}

// Move (fromGroup,fromSym) to sit before/after (toGroup,toSym) — possibly into
// another group. No-op when dropped on itself.
function moveSymbol(fromGroup, fromSym, toGroup, toSym, before){
  if(fromGroup===toGroup && fromSym===toSym) return;   // dropped on self
  const gf = GROUPS.find(x=>x.name===fromGroup);
  const gt = GROUPS.find(x=>x.name===toGroup);
  if(!gf || !gt) return;
  const fi = gf.symbols.indexOf(fromSym);
  if(fi<0) return;
  gf.symbols.splice(fi,1);                  // remove from source first
  let ti = gt.symbols.indexOf(toSym);
  if(ti<0) ti = gt.symbols.length;          // target vanished → append
  gt.symbols.splice(before ? ti : ti+1, 0, fromSym);
  saveGroups();
  buildWatchlist();
  refreshPrices();
}

// ── Sections (groups) ──
// Section identity is its name, so names are kept unique. Right-click a header
// for Rename / Remove section / Add symbol; click the header to collapse it.
function escHtml(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function uniqueGroupName(name, exceptGroup){
  let base = (name||"SECTION").trim() || "SECTION", out = base, n = 2;
  while(GROUPS.some(g=>g!==exceptGroup && g.name===out)) out = base+" "+(n++);
  return out;
}

function toggleGroupCollapse(name){
  const g = GROUPS.find(x=>x.name===name); if(!g) return;
  g.collapsed = !g.collapsed;
  saveGroups();
  buildWatchlist();
  refreshPrices();
}

function renameGroup(name){
  const g = GROUPS.find(x=>x.name===name); if(!g) return;
  const v = prompt("Rename section:", g.name);
  if(v==null) return;                       // cancelled
  g.name = uniqueGroupName(v, g);
  saveGroups();
  buildWatchlist();
  refreshPrices();
}

function removeGroup(name){
  const i = GROUPS.findIndex(x=>x.name===name); if(i<0) return;
  const g = GROUPS[i];
  if(g.symbols.length && !confirm(`Remove section "${g.name}" and its ${g.symbols.length} symbol(s)?`)) return;
  const removed = g.symbols.slice();
  GROUPS.splice(i,1);
  removed.forEach(sym=>{ if(!allSymbols().includes(sym)) delete rowMap[sym]; });
  saveGroups();
  // if the active symbol no longer exists anywhere, fall back to the first one left
  if(!allSymbols().includes(activeSymbol)){
    const next = allSymbols()[0];
    if(next){
      activeSymbol = next;
      if(typeof loadPersisted==="function") loadPersisted();
      if(typeof loadAlerts==="function") loadAlerts();
      loadChart(next, activeTF);
    }
  }
  buildWatchlist();
  refreshPrices();
}

// Add a section after the given one (or at the end when name is null).
function addGroup(afterName){
  const name = uniqueGroupName("NEW SECTION");
  const at = afterName!=null ? GROUPS.findIndex(x=>x.name===afterName)+1 : GROUPS.length;
  GROUPS.splice(at<=0?GROUPS.length:at, 0, { name, symbols:[] });
  saveGroups();
  buildWatchlist();
  renameGroup(name);                        // immediately prompt for a real name
}

// Add a symbol to a section. Accepts "BTC", "BTC-USD", "btc/usd"… normalises to
// Coinbase's BASE-QUOTE form (defaulting quote to USD) and ratio A/B form.
function normSym(input){
  let s = (input||"").trim().toUpperCase();
  if(!s) return null;
  if(s.includes("/")){
    const parts = s.split("/").map(p=>normSym(p));
    return parts.every(Boolean) ? parts.join("/") : null;
  }
  if(!s.includes("-")) s = s + "-USD";       // bare base → assume USD quote
  return s;
}
function addSymbolToGroup(name){
  const g = GROUPS.find(x=>x.name===name); if(!g) return;
  const raw = prompt(`Add symbol to "${g.name}"  (e.g. BTC, SOL-USD, ETH/BTC):`, "");
  if(raw==null) return;
  const sym = normSym(raw);
  if(!sym) return;
  if(g.symbols.includes(sym)){ alert(`${sym} is already in ${g.name}.`); return; }
  g.symbols.push(sym);
  saveGroups();
  buildWatchlist();
  refreshPrices();
}

function showSectionMenu(name, x, y){
  showCtx(x, y, [
    mi("✎ Rename",          ()=>renameGroup(name)),
    mi("🗑 Remove section",  ()=>removeGroup(name)),
    msep(),
    mi("＋ Add symbol",      ()=>addSymbolToGroup(name)),
    mi("＋ Add section",     ()=>addGroup(name)),
  ]);
}

// Let a dragged symbol be dropped onto a section header (appends to that group).
function sectionDropWire(el, name){
  el.addEventListener("dragover", e=>{
    if(!wlDrag) return;
    e.preventDefault(); e.dataTransfer.dropEffect="move";
    el.classList.add("drop-into");
  });
  el.addEventListener("dragleave", ()=>el.classList.remove("drop-into"));
  el.addEventListener("drop", e=>{
    if(!wlDrag) return;
    e.preventDefault(); el.classList.remove("drop-into");
    // append to end of this group: target the last symbol "after", or empty → moveSymbol appends
    const g = GROUPS.find(x=>x.name===name);
    const lastSym = g && g.symbols.length ? g.symbols[g.symbols.length-1] : null;
    moveSymbol(wlDrag.group, wlDrag.sym, name, lastSym, /*before=*/false);
  });
}

// Coinbase has no bulk 24hr endpoint; use per-product /stats (24h open/last).
async function fetchStats(product){
  try{
    const r = await fetch(`${API}/products/${product}/stats`);
    const s = await r.json();
    if(!s || !s.last) return null;
    return { last:+s.last, open:+s.open };
  }catch{ return null; }
}

// Run async tasks with a concurrency cap. The watchlist has ~40 legs; firing
// them all at once saturates the browser's 6-connections-per-host limit and
// starves the chart's own fetches (that was the ~30s blank-chart stall). A
// small cap keeps a few connections free for the chart.
async function mapLimit(items, limit, fn){
  const out = new Array(items.length);
  let i = 0;
  async function worker(){
    while(i < items.length){
      const idx = i++;
      out[idx] = await fn(items[idx], idx);
    }
  }
  await Promise.all(Array.from({length:Math.min(limit, items.length)}, worker));
  return out;
}

async function refreshPrices(){
  // resolve every leg we need (plain symbols + both sides of any ratio)
  const all = allSymbols();
  const legs = new Set();
  all.forEach(sym=> sym.split("/").forEach(s=>legs.add(s)) );
  const entries = await mapLimit([...legs], 4, async p=>[p, await fetchStats(p)]);
  const stats = Object.fromEntries(entries);

  all.forEach(sym=>{
    let price, prev;
    if(sym.includes("/")){
      const [a,b] = sym.split("/");
      const sa = stats[a], sb = stats[b];
      if(!sa || !sb) return;
      price = sa.last / sb.last;
      prev  = (sa.open && sb.open) ? sa.open/sb.open : price;
    } else {
      const s = stats[sym];
      if(!s) return;
      price = s.last;
      prev  = s.open || price;
    }
    const chgAbs = price - prev;                 // absolute change
    const chgPct = prev ? (price/prev - 1)*100 : 0;
    const up = chgAbs >= 0;
    const txt    = fmtPrice(price);
    const absTxt = (up?"+":"−") + fmtPrice(Math.abs(chgAbs));
    const pctTxt = (up?"+":"−") + Math.abs(chgPct).toFixed(2) + "%";

    (rowMap[sym]||[]).forEach(row=>{
      const lastEl = row.querySelector("[data-last]");
      const absEl  = row.querySelector("[data-chgabs]");
      const pctEl  = row.querySelector("[data-chg]");
      if(lastEl.textContent !== txt){
        row.classList.remove("flash-up","flash-down"); void row.offsetWidth;
        row.classList.add(up?"flash-up":"flash-down");
      }
      lastEl.textContent = txt;
      absEl.textContent = absTxt; absEl.className = "chgabs "+(up?"up":"down");
      pctEl.textContent = pctTxt; pctEl.className = "chg "+(up?"up":"down");
    });
  });
}

// Price formatting that preserves small-decimal precision like TradingView
// (e.g. 0.00000424, 0.05233, 1.813, 59,716.00).
function fmtPrice(v){
  const a = Math.abs(v);
  if(a === 0) return "0";
  if(a >= 1000) return v.toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2});
  if(a >= 1)    return v.toFixed(a>=100?2:3);
  if(a >= 0.001) return v.toFixed(a>=0.1?4:5);
  // very small: show enough significant digits (e.g. BONK 0.00000424)
  return v.toFixed(8).replace(/0+$/,"");
}

// Build the menu from TF{}: a section header per group, then one option per timeframe in TF order.
(function buildTfMenu(){
  let html = "", lastSec = null;
  for(const key in TF){
    const t = TF[key];
    if(t.sec !== lastSec){ html += `<div class="tf-sec">${t.sec}</div>`; lastSec = t.sec; }
    html += `<div class="tf-opt" data-i="${key}">${t.menu}</div>`;
  }
  tfMenu.innerHTML = html;
})();

// ─────────────────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────────────────
const draw = {
  tool:"cross", magnet:false, locked:false, hidden:false,
  shapes:[],          // {id,type,pts:[{time,price}],style:{...},text}
  pending:null,       // shape being created
  needClicks:2,       // clicks remaining to finish pending
  pendingClickMode:false, // true once a press without drag puts us in click-click mode
  sel:null,           // selected shape id
  hover:null,         // hovered shape id
  alertHover:null,    // id of alert line currently hovered (shows its delete icon)
  drag:null,          // {id, handle:int|'body', last:{time,price}}
  mouse:{x:0,y:0},
};
let lastData = [];                      // current candle data (set by loadChart)
const dcanvas = document.getElementById("draw");
const dctx = dcanvas.getContext("2d");

const DEFAULT_STYLE = { color:"#2962ff", width:2, dash:0, fill:"rgba(41,98,255,0.10)", showLabel:true };

// number of clicks each tool needs to complete
const CLICKS = {
  trend:2, ray:2, ext:2, rect:2, ellipse:2, fib:2, fibext:2, fibfan:2, fibtime:2,
  long:2, short:2, measure:2, channel:3,
  hline:1, hray:1, vline:1, text:1, callout:1,
};

// ─────────────────────────────────────────────────────────────────────
//  TOOLBAR DOM
// ─────────────────────────────────────────────────────────────────────
(function buildToolbar(){
  const tb = document.getElementById("toolbar");
  TOOLS.forEach(t=>{
    if(t.key==="sep"){ const s=document.createElement("div"); s.className="tool-sep"; tb.appendChild(s); return; }
    const el=document.createElement("div");
    el.className="tool"+(t.key==="cross"?" active":"");
    el.dataset.tool=t.key; el.title=t.name; el.innerHTML=t.icon();
    el.onclick=()=>onToolClick(t,el);
    tb.appendChild(el);
  });
})();

function onToolClick(t,el){
  if(t.action){ if(t.key==="clear"){ if(confirm("Remove all drawings?")){ draw.shapes=[]; draw.sel=null; persist(); redraw(); } } return; }
  if(t.toggle){
    el.classList.toggle("active");
    const on=el.classList.contains("active");
    if(t.key==="magnet") draw.magnet=on;
    if(t.key==="lock")   draw.locked=on;
    if(t.key==="hide"){  draw.hidden=on; redraw(); }
    return;
  }
  selectTool(t.key);
}

// Activate a tool by key (also used to auto-return to crosshair after placing).
function selectTool(key){
  document.querySelectorAll('.tool[data-tool]').forEach(x=>{
    if(["magnet","lock","hide"].includes(x.dataset.tool)) return;
    x.classList.toggle("active", x.dataset.tool===key);
  });
  draw.tool=key; draw.pending=null; draw.needClicks=0; draw.pendingClickMode=false; draw.sel=null;
  // The canvas is ALWAYS interactive now (pointerEvents stays "auto"). The chart's own
  // pan/zoom is disabled while drawing tools are active; in crosshair mode we forward
  // empty-space drags to the chart manually (see the pan logic in mousedown/move).
  const drawing=(key!=="cross");
  dcanvas.style.cursor = drawing ? "crosshair" : "default";
  // We handle pan (dcanvas mousedown) and zoom (dcanvas wheel) manually because
  // the overlay canvas hides these gestures from the chart's own handlers.
  chart.applyOptions({ handleScroll:false, handleScale:false });
  redraw();
}

// No-op kept for boot compatibility (panning + hover are handled inline now).
function installHoverTracker(){}

// Manual chart pan for crosshair mode (the canvas always covers the chart, so the
// chart's built-in drag-to-scroll can't see the gesture — we forward it here).
let panState=null;
function startPan(p){
  const ts=chart.timeScale();
  panState={ startX:p.x, startScroll:ts.scrollPosition() };
}
function doPan(p){
  if(!panState) return;
  const ts=chart.timeScale();
  const spacing = currentBarSpacing();                       // px per bar
  const deltaBars = (p.x - panState.startX) / spacing;        // drag-left → scroll back
  ts.scrollToPosition(panState.startScroll - deltaBars, false);
  redraw();
}
function currentBarSpacing(){
  // estimate px-per-bar from two visible bars
  if(lastData.length<2) return 6;
  const a=lastData[lastData.length-2], b=lastData[lastData.length-1];
  const xa=chart.timeScale().timeToCoordinate(a.time), xb=chart.timeScale().timeToCoordinate(b.time);
  if(xa!=null&&xb!=null&&xa!==xb) return Math.abs(xb-xa);
  return 6;
}

// ─────────────────────────────────────────────────────────────────────
//  COORDINATE CONVERSION  (price/time ⇄ pixels)
//
//  These MUST be total functions: every drawing point has to resolve to a pixel
//  even when it sits past the last bar (future) or outside the visible price
//  band — otherwise an endpoint vanishes or the line gets clipped ("eaten") the
//  instant it crosses the edge. We always fall back to a linear extrapolation
//  built from two reference points we know map cleanly.
// ─────────────────────────────────────────────────────────────────────

// Two bars whose time maps to a real (non-null) x. Prefer the tail, but scan
// inward so an anchor still exists when the last bars are scrolled off-screen
// (precisely the case where the old last-two-bars code returned null → "wall").
function timeAnchors(){
  const ts=chart.timeScale();
  // Collect every bar that currently maps to a real pixel.
  const pts=[];
  for(let i=0;i<lastData.length;i++){
    const x=ts.timeToCoordinate(lastData[i].time);
    if(x!=null) pts.push({time:lastData[i].time, x});
  }
  if(pts.length<2) return null;
  // CRITICAL: use anchors that are FAR APART in pixels, not the last two bars.
  // Adjacent bars near the right edge are often <3px apart; extrapolating 100px+
  // into the future off a 3px baseline amplifies sub-pixel error into a huge gap
  // (the line endpoint drifting away from its handle). The first + last visible
  // bars give the widest, most stable baseline.
  const a=pts[0], b=pts[pts.length-1];
  return (a.x!==b.x && a.time!==b.time) ? {a,b} : null;
}

function timeToX(time){
  const c=chart.timeScale().timeToCoordinate(time);
  if(c!=null) return c;
  const an=timeAnchors();
  if(!an) return lastData.length ? chart.timeScale().timeToCoordinate(lastData[lastData.length-1].time) : null;
  const {a,b}=an;
  return b.x + (time-b.time)*(b.x-a.x)/(b.time-a.time);
}
function xToTime(x){
  const t=chart.timeScale().coordinateToTime(x);
  if(t!=null) return t;
  // Past the last bar coordinateToTime returns null. Extrapolate WITHOUT rounding
  // so the value round-trips exactly through timeToX (otherwise the handle "sticks").
  const an=timeAnchors();
  if(!an) return lastData.length?lastData[lastData.length-1].time:0;
  const {a,b}=an;
  return b.time + (x-b.x)*(b.time-a.time)/(b.x-a.x);   // fractional time, no Math.round
}

// Price ⇄ y. coordinateToPrice / priceToCoordinate return null outside the
// visible price band; fit a line through two probe coordinates so off-band
// endpoints still resolve instead of nuking the whole shape.
function priceFit(){
  const H=dcanvas.clientHeight||1;
  const y1=Math.round(H*0.25), y2=Math.round(H*0.75);
  const p1=candle.coordinateToPrice(y1), p2=candle.coordinateToPrice(y2);
  if(p1==null||p2==null||p1===p2||y1===y2) return null;
  return {y1, p1, slope:(p2-p1)/(y2-y1)};            // price = p1 + (y-y1)*slope
}
function priceToY(price){
  const y=candle.priceToCoordinate(price);
  if(y!=null) return y;
  const f=priceFit(); if(!f) return null;
  return f.y1 + (price-f.p1)/f.slope;
}
function yToPrice(y){
  const p=candle.coordinateToPrice(y);
  if(p!=null) return p;
  const f=priceFit(); if(!f) return null;
  return f.p1 + (y-f.y1)*f.slope;
}

// Drive the chart's built-in crosshair from the overlay cursor so the crosshair
// lines and the right-axis price tag + bottom-axis time tag follow the mouse
// (TradingView behaviour). The overlay canvas otherwise eats the mousemove.
// setCrosshairPosition() doesn't reliably fire subscribeCrosshairMove when driven
// programmatically, so we also refresh the OHLC legend ourselves here.
function updateCrosshair(p){
  try{
    const price=candle.coordinateToPrice(p.y);
    const time=chart.timeScale().coordinateToTime(p.x);
    if(price==null || time==null){ chart.clearCrosshairPosition(); return; }
    chart.setCrosshairPosition(price, time, candle);
    updateOhlcLegend(time);
  }catch(e){}
}
// Show the OHLC of the bar nearest the crosshair time (or the hovered price when
// past the last bar / between bars with no exact match).
function updateOhlcLegend(time){
  if(!lastData.length) return;
  let best=lastData[0], bd=Infinity;
  for(const b of lastData){ const d=Math.abs(b.time-time); if(d<bd){bd=d;best=b;} }
  const col = best.close>=best.open ? "var(--green)":"var(--red)";
  document.getElementById("ohlc").innerHTML =
    `O<b>${fmt(best.open)}</b> H<b>${fmt(best.high)}</b> L<b>${fmt(best.low)}</b> C<b style="color:${col}">${fmt(best.close)}</b>`;
}
// Width (px) of the right price-axis gutter — the strip past the plot where the
// candles don't render. Used to keep ray arrowheads off the axis price tag.
function axisW(){
  try{ const w=chart.priceScale("right").width(); if(w>0) return w; }catch(e){}
  return 64;   // sane default if the API is unavailable
}

function snap(time,price){
  if(!draw.magnet || !lastData.length) return {time,price};
  let best=lastData[0], bd=Infinity;
  for(const b of lastData){ const d=Math.abs(b.time-time); if(d<bd){bd=d;best=b;} }
  const cand=[best.open,best.high,best.low,best.close];
  let bp=cand[0], pd=Infinity;
  for(const p of cand){ const d=Math.abs(p-price); if(d<pd){pd=d;bp=p;} }
  return {time:best.time, price:bp};
}

function sizeCanvas(){
  const w=dcanvas.clientWidth, h=dcanvas.clientHeight, dpr=window.devicePixelRatio||1;
  dcanvas.width=w*dpr; dcanvas.height=h*dpr;
  dctx.setTransform(dpr,0,0,dpr,0,0);
  redraw();
}
function evtPt(e){ const r=dcanvas.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; }
function ptToCoord(p){ return snap(xToTime(p.x), yToPrice(p.y)); }

// ─────────────────────────────────────────────────────────────────────
//  POINTER STATE MACHINE  (the part that was broken — rewritten cleanly)
// ─────────────────────────────────────────────────────────────────────
let uid=1; function newId(){ return "s"+(uid++); }

// Tracks the press location so mouseup can tell a CLICK from a DRAG.
let downPt=null, downMoved=false;

dcanvas.addEventListener("mousedown", e=>{
  if(e.button!==0) return;                 // left only; right handled by contextmenu
  e.preventDefault();
  stopAutoSnap();                          // a real pan gesture → stop auto-snapping to latest
  const p=evtPt(e), c=ptToCoord(p);
  downPt=p; downMoved=false;

  // ── Alert delete icon takes priority in any mode (it's only shown on hover). ──
  const trashId=alertTrashHit(p);
  if(trashId){ removeAlert(trashId); draw.alertHover=null; downPt=null; return; }

  // ── CROSSHAIR mode: click a shape → select/drag it; click empty → pan the chart ──
  if(draw.tool==="cross"){
    const hit = draw.locked ? null : hitTest(p);
    if(hit){ draw.sel=hit.id; draw.drag={ id:hit.id, handle:hit.handle, last:c }; redraw(); }
    else { draw.sel=null; startPan(p); redraw(); }
    return;
  }

  // ── DRAW mode ──
  // If a multi-point shape is mid-placement (e.g. channel waiting for 3rd point),
  // this press adds the next point.
  if(draw.pending && draw.pendingClickMode){ addPendingPoint(c); return; }

  // Resize a handle of the currently-selected shape.
  if(!draw.locked && draw.sel){
    const hit=hitTest(p);
    if(hit && hit.id===draw.sel && typeof hit.handle==="number"){
      draw.drag={ id:hit.id, handle:hit.handle, last:c }; redraw(); return;
    }
  }

  // Begin a new shape. The endpoint follows the cursor until release (drag) or
  // until the next click (click-click), whichever the user does.
  if(!draw.pending) startPending(c);
});

// ── Wheel zoom (and shift+wheel pan) ──
// The drawing canvas sits on top of the chart with pointer-events:auto, so the
// chart's own built-in wheel-zoom never sees the gesture. We implement it here:
// scroll = zoom in/out anchored under the cursor; shift+scroll = pan sideways.
dcanvas.addEventListener("wheel", e=>{
  e.preventDefault();
  stopAutoSnap();                                  // user is driving the view now
  const ts = chart.timeScale();
  const range = ts.getVisibleLogicalRange();
  if(!range) return;
  const { from, to } = range;
  const span = to - from;

  // Shift (or horizontal-dominant trackpad) → pan instead of zoom.
  if(e.shiftKey || Math.abs(e.deltaX) > Math.abs(e.deltaY)){
    const delta = (e.shiftKey ? e.deltaY : e.deltaX);
    const shift = (delta / 100) * span * 0.1;       // gentle horizontal pan
    ts.setVisibleLogicalRange({ from: from + shift, to: to + shift });
    redraw();
    return;
  }

  // Zoom anchored at the cursor: keep the bar under the pointer fixed.
  const p = evtPt(e);
  const w = dcanvas.clientWidth || 1;
  const frac = Math.min(1, Math.max(0, p.x / w));   // 0=left edge, 1=right edge
  const anchor = from + span * frac;                // logical index under cursor
  const factor = e.deltaY > 0 ? 1.1 : 1/1.1;        // wheel down = zoom out
  const newSpan = Math.max(8, span * factor);       // never fewer than ~8 bars
  ts.setVisibleLogicalRange({
    from: anchor - (anchor - from) * (newSpan/span),
    to:   anchor + (to - anchor) * (newSpan/span),
  });
  redraw();
}, {passive:false});

function startPending(c){
  const tool=draw.tool;
  const need=CLICKS[tool]||2;
  if(need===1){ finishOneClick(tool,c); return; }
  draw.pending={ id:newId(), type:tool, pts:[c, {...c}], style:{...DEFAULT_STYLE} };
  draw.needClicks=need-1;           // points still to set after the first
  draw.pendingClickMode=false;      // becomes true if user releases without dragging
  redraw();
}

// Adds the next point in CLICK-CLICK mode (used for the 3rd point of a channel,
// or when the user clicks instead of drags).
function addPendingPoint(c){
  const pend=draw.pending;
  pend.pts[pend.pts.length-1]=c;
  draw.needClicks--;
  if(draw.needClicks<=0){ commitPending(); }
  else { pend.pts.push({...c}); redraw(); }
}

function commitPending(){
  const pend=draw.pending;
  draw.pending=null; draw.needClicks=0; draw.pendingClickMode=false;
  if(!pend) return;
  // reject a shape whose points are all the same spot (an accidental click)
  const a=pend.pts[0], b=pend.pts[pend.pts.length-1];
  const tooSmall = pend.pts.every(pt=>pt.time===a.time && pt.price===a.price);
  if(tooSmall){ redraw(); return; }
  draw.shapes.push(pend);
  draw.sel=pend.id;
  persist();
  // TradingView default: after placing one drawing, return to the crosshair so the
  // next click SELECTS (rather than spawning another line). Re-pick the tool to draw again.
  selectTool("cross");
  redraw();
}

function finishOneClick(tool,c){
  if(tool==="text" || tool==="callout"){
    const txt=prompt(tool==="callout"?"Note:":"Text:", tool==="callout"?"Note":"Text");
    if(txt==null) return;
    const s={ id:newId(), type:tool, pts:[c], style:{...DEFAULT_STYLE, color:"#d1d4dc"}, text:txt };
    draw.shapes.push(s); draw.sel=s.id;
  } else {
    const s={ id:newId(), type:tool, pts:[c], style:{...DEFAULT_STYLE} };
    draw.shapes.push(s); draw.sel=s.id;
  }
  persist(); selectTool("cross"); redraw();
}

dcanvas.addEventListener("mousemove", e=>{
  const p=evtPt(e), c=ptToCoord(p);
  draw.mouse=p;
  // The overlay canvas hides the cursor from the chart, so its built-in crosshair
  // (and the price/time axis tags) never move. Forward the cursor position so the
  // crosshair + axis labels track it like TradingView.
  updateCrosshair(p);
  if(downPt && Math.hypot(p.x-downPt.x, p.y-downPt.y)>3) downMoved=true;

  if(panState){ doPan(p); return; }                       // panning the chart (cross mode)
  if(draw.drag && !draw.locked){ applyDrag(draw.drag, c); redraw(); return; }

  if(draw.pending){
    draw.pending.pts[draw.pending.pts.length-1]=c;        // endpoint tracks cursor
    redraw(); return;
  }
  // hover feedback
  const hit=hitTest(p);
  const nh=hit?hit.id:null;
  // alert-line hover (shows its delete icon). A shape hover wins over it.
  const na = (!hit && draw.tool==="cross") ? alertHit(p) : null;
  let changed=false;
  if(nh!==draw.hover){ draw.hover=nh; changed=true; }
  if(na!==draw.alertHover){ draw.alertHover=na; changed=true; }
  if(changed) redraw();
  const overTrash=alertTrashHit(p);
  dcanvas.style.cursor = (hit || overTrash || na) ? (hit&&hit.handle==="body"?"move":"pointer")
                       : (draw.tool==="cross"?(panState?"grabbing":"crosshair"):"crosshair");
});

// Hide the crosshair (and its axis tags) when the cursor leaves the chart.
dcanvas.addEventListener("mouseleave", ()=>{
  draw.mouse=null;
  try{ chart.clearCrosshairPosition(); }catch(e){}
  if(draw.hover||draw.alertHover){ draw.hover=null; draw.alertHover=null; redraw(); }
});

window.addEventListener("mouseup", e=>{
  if(panState){ panState=null; downPt=null; downMoved=false; redraw(); return; }   // end chart pan
  // finishing a drag-edit of an existing shape
  if(draw.drag){ persist(); draw.drag=null; downPt=null; return; }

  // finishing the creation gesture for a pending shape
  if(draw.pending){
    const pend=draw.pending;
    const need=CLICKS[pend.type]||2;
    if(downMoved){
      // PRESS-DRAG-RELEASE: the user dragged out the shape in one gesture.
      if(need<=2){
        // 2-point shapes are complete on release.
        commitPending();
      } else {
        // multi-point (channel): first segment set by the drag, remaining points
        // are placed by subsequent CLICKS.
        pend.pts.push({...pend.pts[pend.pts.length-1]});
        draw.needClicks=need-2;
        draw.pendingClickMode=true;
      }
    } else {
      // CLICK (no drag): switch to click-click mode and wait for the next click(s).
      draw.pendingClickMode=true;
    }
  }
  downPt=null; downMoved=false;
});

// double-click finishes a click-click pending (commit with current points) OR
// opens settings on a shape.
dcanvas.addEventListener("dblclick", e=>{
  if(draw.pending){
    // drop the floating endpoint and commit what's placed
    if(draw.pending.pts.length>1) draw.pending.pts.pop();
    commitPending();
    return;
  }
  const hit=hitTest(evtPt(e));
  if(hit){ draw.sel=hit.id; openSettings(hit.id); }
});

// keyboard: Esc cancels, Del removes selected
window.addEventListener("keydown", e=>{
  if(e.key==="Escape"){ draw.pending=null; draw.needClicks=0; draw.sel=null; closeAllPopups(); redraw(); }
  if((e.key==="Delete"||e.key==="Backspace") && draw.sel!=null && !draw.locked){
    if(document.activeElement && /INPUT|TEXTAREA/.test(document.activeElement.tagName)) return;
    deleteShape(draw.sel);
  }
});

// ─────────────────────────────────────────────────────────────────────
//  DRAG / EDIT
// ─────────────────────────────────────────────────────────────────────
function getShape(id){ return draw.shapes.find(s=>s.id===id); }
function deleteShape(id){ draw.shapes=draw.shapes.filter(s=>s.id!==id); if(draw.sel===id) draw.sel=null; persist(); redraw(); }

function applyDrag(drag,c){
  const s=getShape(drag.id); if(!s) return;
  if(typeof drag.handle==="number"){
    s.pts[drag.handle]=c;
  } else { // body: move all points by delta
    const dt=c.time-drag.last.time, dp=c.price-drag.last.price;
    s.pts=s.pts.map(pt=>({time:pt.time+dt, price:pt.price+dp}));
  }
  drag.last=c;
}

// ─────────────────────────────────────────────────────────────────────
//  HIT TESTING
// ─────────────────────────────────────────────────────────────────────
function px(pt){ return {x:timeToX(pt.time), y:priceToY(pt.price)}; }
function hitTest(p){
  for(let i=draw.shapes.length-1;i>=0;i--){
    const s=draw.shapes[i];
    // handles first
    for(let h=0;h<s.pts.length;h++){
      const q=px(s.pts[h]);
      if(q.x!=null && q.y!=null && Math.hypot(p.x-q.x,p.y-q.y)<8) return {id:s.id, handle:h};
    }
    if(nearShape(s,p)) return {id:s.id, handle:"body"};
  }
  return null;
}
function nearShape(s,p){
  const a=px(s.pts[0]); if(a.x==null||a.y==null) return false;
  const W=dcanvas.clientWidth, H=dcanvas.clientHeight;
  if(s.type==="hline") return Math.abs(p.y-a.y)<6;
  if(s.type==="hray")  return Math.abs(p.y-a.y)<6 && p.x>=a.x;
  if(s.type==="vline") return Math.abs(p.x-a.x)<6;
  if(s.type==="text"||s.type==="callout") return Math.abs(p.x-a.x)<60 && Math.abs(p.y-a.y)<14;
  if(s.pts.length<2) return false;
  const b=px(s.pts[1]); if(b.x==null) return false;
  if(s.type==="rect"||s.type==="long"||s.type==="short"||s.type==="measure"){
    const x1=Math.min(a.x,b.x),x2=Math.max(a.x,b.x),y1=Math.min(a.y,b.y),y2=Math.max(a.y,b.y);
    const onEdge = (p.x>=x1-4&&p.x<=x2+4&&(Math.abs(p.y-y1)<5||Math.abs(p.y-y2)<5)) ||
                   (p.y>=y1-4&&p.y<=y2+4&&(Math.abs(p.x-x1)<5||Math.abs(p.x-x2)<5));
    const inside = p.x>=x1&&p.x<=x2&&p.y>=y1&&p.y<=y2;
    return onEdge||inside;
  }
  if(s.type==="ellipse"){
    const cx=(a.x+b.x)/2, cy=(a.y+b.y)/2, rx=Math.abs(b.x-a.x)/2, ry=Math.abs(b.y-a.y)/2;
    if(rx<1||ry<1) return false;
    const v=((p.x-cx)**2)/(rx*rx)+((p.y-cy)**2)/(ry*ry);
    return v>0.7 && v<1.3;
  }
  if(s.type==="ray"){ const [ex,ey]=extend(a.x,a.y,b.x,b.y,W,H); return distToSeg(p.x,p.y,a.x,a.y,ex,ey)<6; }
  if(s.type==="ext"){ const [sx,sy]=extend(b.x,b.y,a.x,a.y,W,H),[ex,ey]=extend(a.x,a.y,b.x,b.y,W,H); return distToSeg(p.x,p.y,sx,sy,ex,ey)<6; }
  // default: segment a-b (trend, fib lines, channel, etc.)
  return distToSeg(p.x,p.y,a.x,a.y,b.x,b.y)<6;
}
function distToSeg(px_,py,x1,y1,x2,y2){
  const dx=x2-x1,dy=y2-y1,l2=dx*dx+dy*dy;
  if(l2===0) return Math.hypot(px_-x1,py-y1);
  let t=((px_-x1)*dx+(py-y1)*dy)/l2; t=Math.max(0,Math.min(1,t));
  return Math.hypot(px_-(x1+t*dx),py-(y1+t*dy));
}
